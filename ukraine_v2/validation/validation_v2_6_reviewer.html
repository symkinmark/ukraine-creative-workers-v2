Радянська школа». На твор. ро­боті. Досліджував нар. мистецтво Уманщини, зокрема творчість Я. та С. Гоменюків, К. Нечипору­ка. Видав кн. нарисів «Піонерське горно» (1972), про нар. мит­ців «Сонячні барви» (1978) та зб. оповідань «Зу­стрічі» (1985; усі&nbsp;— Київ). Під­готував докум. роман про рід Їжакевичів «Побачити життя». Учасник всесоюз., всеукр. мистецьких ви­ставок від 1960. Пер­сон.&nbsp;— у Києві (1992, 1994, 1998, 2001, 2004), Варшаві (1993), Ма­чераті (1994), Ріміні (1994–95; оби­два&nbsp;— Італія), Москві (1996), Оренсі (Іс­панія, 1999), Нікосії (2002, 2005), Анкарі, Страсбурзі (Франція; оби­дві&nbsp;— 2005). Автор плакатів, мозаїч. панно, живопис. пейзажів, порт­ретів, зображень архіт. памʼя­ток багатьох країн світу. Окремі роботи зберігаються в Уман. кар­тин. галереї (Черкас. обл.), Музеї Нікосії. Додаткові відомості Основні твори живопис — триптихи «Хасиди в Умані» та «Український» (обидва — 1992), «Двоє», «Сторож», «Натюрморт зі свічками», «Непорозуміння», «Мойсей із мід­ним змієм» (усі — 1993), «У горах Австрії», «Перед невідомістю (Вічність)», «Музиканти» (усі — 1994), «Осінній мотив» (1995), «Іриси» (1998), «Древній храм на Кіпрі», «Новозе­ландський пейзаж» (обидва — 1999), «Дендропарк “Софіїв­ка”», «Синя Чорногорія» (обидва — 2010), триптих «Осін­нє піднебесся» (2011); мозаїчні панно — «Народження сина», «Весілля», «Пам’яті людини» (усі — 1991–2000, приміщення коньяч. комбінату у м. Дербент, Дагес­тан, РФ). Рекомендована література Бурьянова М. Сказочный мир Нарцисса // Она и он. 1996. № 1(7); Ху­дожник Нарцис Кочережко про себе і свого діда // Вітчизна. 1997. № 2. Google Scholar Internet Ката­лог творів Нарціса Кочережка. К., 2010. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 131, "name": "Дуклер Валентин Самійлович", "by": "1908.0", "dy": "1997.0", "status": "non_migrated", "reasoning": "Actor born in Odesa, trained at Odesa institute (1930), worked in theaters across Ukrainian cities (Odesa, Kharkiv, Kyiv) from 1930s-1966+, died in Kyiv 1997; no evidence of emigration or forced displacement.", "notes": "(03(16). 05. 1908, Одеса – 06. 11. 1997, Київ) – актор. Заслужений артист УРСР (1940). Закін. Одес. муз.-драм. інститут (1930). Працював у театрах Одеси, Харкова, Києва; 1948–66 – арт. Київ. рос. драм. театру ім. Лесі...", "url": "https://esu.com.ua/article-19477", "group": "INCLUDE", "bio": "ДУ́КЛЕР Валентин Самійлович (03(16). 05. 1908, Одеса&nbsp;— 06. 11. 1997, Київ)&nbsp;— актор. Заслужений артист УРСР (1940). Закін. Одес. муз.-драм. ін­ститут (1930). Працював у театрах Одеси, Харкова, Києва; 1948–66&nbsp;— арт. Київ. рос. драм. театру ім. Лесі Українки. Тяжів до різноплановості сценіч. амплуа. Ви­ступав як арт. роз­мов. жанру на естраді та радіо; у репертуарі, зокрема,&nbsp;— усмішки Остапа Вишні. Додаткові відомості Основні ролі Ярчук («Соло на флейті» І. Микитенка), Пивоваров («Невідомі солдати» Л. Первомайського), фон Мекке («Ходіння по муках» за О. Толстим), Фіґаро («Весілля Фіґаро» П.-О. Бомарше), Альдемаро («Вчитель танців» Лопе де Веґи), Городулін, Дульчин («На всякого мудреця доволі простоти», «Остання жертва» О. Островського), Труффальдіно («Слуга двох панів» К. Ґольдоні), Меркуціо («Ромео і Джульєтта» В. Шекспіра), Серебряков («Дядя Ваня» А. Чехова), Любашкін («Піднята цілина» за М. Шолоховим); у кіно — Немирич («Полум’я гніву», 1955, реж. Т. Левчук), Крусс («Ластівка», 1957), Околесов («Артист з Коханівки», 1961; обидва — реж. Г. Ліпшиць), Стрижаков («Вогненний міст», 1958, реж. Г. Крикун, М. Романов; усі — Київ. кіностудія худож. фільмів ім. О. Довженка). Завантажити статтю"}, {"idx": 132, "name": "Леліва Тадеуш", "by": "1875.0", "dy": "1876.0", "status": "excluded_pre_soviet", "reasoning": "Died before 1921 (death_year=1875) — pre-Soviet, outside study scope.", "notes": "(справж. – Копистинський Вінцентій-Тадеуш, сцен. – Енцо; 19. 07. 1875, с. Теплик, нині смт Вінн. обл., за ін. даними – 01(13). 07. 1876, с. Граєв Ломжин. пов., нині Польща – 19. 11. 1929, Варшава) – співак (тенор),...", "url": "https://esu.com.ua/article-54138", "group": "EXCLUDE", "bio": "ЛЕЛІ́ВА Тадеуш (справж.&nbsp;— Копистинський Вінцентій-Тадеуш, сцен.&nbsp;— Енцо; 19. 07. 1875, с. Теплик, нині смт Вінн. обл., за ін. даними&nbsp;— 01(13). 07. 1876, с. Граєв Ломжин. пов., нині Польща&nbsp;— 19. 11. 1929, Варшава)&nbsp;— спів­ак (тенор), педагог. Навч. у гімназіях Умані (нині Черкас. обл.) та Білої Церкви (нині Київ. обл.), на мед. факультеті Університету св. Володимира в Києві та юрид. факультеті Варшав. університету. Брав уроки співу у В. Алек­сандровича, стажувався в Італії. Удосконалював вокальну майстерність в Парижі й Мілані. Артист. діяльність роз­почав на опер. сценах Саратова (нині РФ, 1900–01), Києва (від 1901). Ви­ступав у європ. опер. театрах&nbsp;— Великому театрі у Варшаві (1902–04, партії Радамеса «Аїда», Аль­фреда «Травіата» Дж. Верді, Германа «Пікова дама» П. Чайковського, Мазепи, однойм. опе­ра А. Мюнхгаймера), «Ла Скала» в Мілані (1904, партія Рауля «Гуґеноти» Дж. Мейєрбера), «Ко­вент-Ґарден» у Лондоні (1909, партії Каніо «Паяци» Р. Леонкавал­ло, Пінкертона «Мадам Бат­терфляй» Дж. Пуч­чіні), на опер. сценах Кракова, Мадрида, Бар­селони (Іспанія), Неаполя, Ґенуї (Італія), Бостона, Чикаґо (США), Буенос-Айреса (Арґентина), С.-Пе­тербурга, Тифліса (нині Тбі­лісі), Одеси (1909), Києва (1911–12, 1913 з трупою Київ. опери ви­їжджав на гастролі у Катеринослав, нині Дні­пропетровськ), Львова (1913, Львів. польс. опе­ра) та ін. Під час 1-ї світової вій­ни спів­ав у Варшаві (1914), Київ. опері (1915–19), працював як вокал. педагог. Через втрату слу­ху був змушений залишити сцену, остан. ви­ступ&nbsp;— у партії Йонтека («Галька» С. Монюшка, 1919). Здійснив записи на грамплатівки в С.-Пе­тербурзі й Мілані. Від 1922 мешкав у Варшаві, де роз­горнув широку пед. діяльність, зокрема очолив вищий клас сольного співу в муз. ін­ституті А. Грудзинського, викладав у муз. школі ім. М. Карловича (1923), проводив оперні вокал. студії з А. Должицьким (1924). Серед учнів&nbsp;— Я. Кепура, Л. Мас­саль, В. Тисяк. Додаткові відомості Основні партії Річард («Бал-маскарад» Дж. Вер­­ді), Самсон («Самсон і Даліла» К. Сен-Санса), Фернандо («Фаворитка» Ґ. Доні­цетті), Роланд («Роланд із Берліна» Р. Леонкавалло), Герцог Мантуансь­кий («Ріґолетто» Дж. Верді). Рекомендована література Колесник В. Відомі поляки з істо­рії Вінниччини: Біогр. слов. В., 2007. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 133, "name": "Зозуля Наталія В’ячеславівна", "by": "1961.0", "dy": "", "status": "alive", "reasoning": "No death year — presumed alive or date unknown.", "notes": "(05. 12. 1961, Київ) – живописець, графік і дизайнер. Член НСХУ (1993). Навч. у студії В. Зарецького (1980–81), закін. Київ. худож. інститут (1988; викл. Т. Голембієвська, В. Забашта, В. Пузирков). Відтоді працює...", "url": "https://esu.com.ua/article-16907", "group": "EXCLUDE", "bio": "ЗОЗУ́ЛЯ Наталія Вʼячеславівна (05. 12. 1961, Київ)&nbsp;— живописець, графік і дизайнер. Член НСХУ (1993). Навч. у студії В. Зарецького (1980–81), закін. Київ. худож. ін­ститут (1988; викл. Т. Голембієвська , В. Забашта , В. Пузирков ). Від­тоді працює у ньому (нині Нац. академія образотвор. мистецтва і архітектури): від 1999&nbsp;— доцент кафедри живопису та композиції. Учасниця худож. ви­ставок від 1988. Персон.&nbsp;— у Києві (1993, 1995, 2000), Маґдебурзі (Німеч­чина, 1997–98), Манілі (Філіп­піни, 1997), Стамбулі та Анкарі (обидві&nbsp;— Туреч­чина, 2004). У реаліст. манері, що часом пере­гукується з кон­структивністю й «суворим» стилем, створює порт­рети; жанр. полотна, пейзажі та натюрморти&nbsp;— у манері, близькій до постім­пресіоніст. живопису (динамічність, декоративність і колорист. насиченість). Виразність та емоційність робіт під­креслюють узагальненість, лаконізм худож. мови. Окремі роботи зберігаються у Музеї історії Києва. Додаткові відомості Основні твори живопис — «Золотий орел» (1994), «Перламутровий день» (1995), «Прогулянка» (1997), «Східна мелодія», «Африканки», «Скватери. Маніла» (усі — 1998), «Кардіолог К. Амосова», «Народна артистка України П. Лазова», «У тіні квітучого дерева» (усі — 1999), «К. Ющенко» (2002), «Мистецтвознавець Е. Димшиць», «Художник Ріммінґтон» (обидва — 2004), «Благовіщення» (2009); серія «Пейзажі України» (1999–2002); цикли — «Краєвиди Лівії» (1997–98), «Краєвиди Філіппін» (1998–99), «Краєвиди Великої Британії» (2001–05). Рекомендована література Наталія Зозуля. Подорожі: Каталог виставки. К., 2000. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 134, "name": "Кучерук Олена Василівна", "by": "1964.0", "dy": "", "status": "alive", "reasoning": "No death year — presumed alive or date unknown.", "notes": "(02. 04. 1964, Риґа) – живописець. Член НСХУ (1992). Закін. Київський художній інститут (1989; викл. М. Гуйда, В. Шаталін). Відтоді працювала у Києві: на худож. комбінаті; 1992–94 – у дит. картин. галереї. На...", "url": "https://esu.com.ua/article-52427", "group": "EXCLUDE", "bio": "КУЧЕРУ́К Олена Василівна (02. 04. 1964, Риґа)&nbsp;— живописець. Член НСХУ (1992). Закін. Київський художній ін­ститут (1989; викл. М. Гуйда , В. Шаталін ). Від­тоді працювала у Києві: на худож. комбінаті; 1992–94&nbsp;— у дит. картин. галереї. На творчій роботі. Учасниця ви­ставок від 1987. Персон.&nbsp;— у Києві (1994, 1998, 2001). Для творчості К. характерні по­єд­на­н­ня фантазії з точністю і без­посередністю жит­­тєвих спо­стережень, нові пластичні виріше­н­ня. Деякі полотна зберігаються у галереях «Барви», «Митець» (обидві&nbsp;— Київ), «Екс­поплаза» (м. Шанхай, Китай), Музеї Віден. політех. університету. Додаткові відомості Основні твори «Птахи» (1990), «Вакханка» (1991), «Спогади про Балтійське море» (1992), «Карнавал, якого не було» (1997), «Арлекіни» (2000), «Втомлений ангел» (2007), «Гранати» (2010), «Дівчинка з птахом» (2011), «Маки для кореатид» (2012), «Троянський кінь» (2014). Рекомендована література Як тяжко пережити цю війну: Альбом. К., 2011. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 135, "name": "Липковська Лідія Яківна", "by": "1884.0", "dy": "1882.0", "status": "excluded_bad_dates", "reasoning": "Lipkovska emigrated from Soviet Ukraine and settled in Beirut, Lebanon (non-Soviet country) where she died in 1958.", "notes": "(28. 04(10. 05). 1884, за ін. даними – 25. 05(06. 06). 1882, с. Бабин, нині Кельменец. р-ну Чернів. обл. – 22. 03. 1958, Бейрут) – співачка (лірико-колоратурне сопрано), педагог. Племінниця М. Заньковецької. Навч. у...", "url": "https://esu.com.ua/article-54737", "group": "EXCLUDE", "bio": "ЛИПКО́ВСЬКА Лідія Яківна (28. 04(10. 05). 1884, за ін. даними&nbsp;— 25. 05(06. 06). 1882, с. Бабин, нині Кельменец. р-ну Чернів. обл.&nbsp;— 22. 03. 1958, Бейрут)&nbsp;— спів­ачка (лірико-колоратурне сопрано), педагог. Племін­ниця М. Заньковецької . Навч. у Камʼянець-Поділ. гімназії (нині Хмельн. обл.), де спів­ала у церк. хорі і брала участь у концертах. Від 1903 навч. у С.-Пе­тербур. консерваторії (викл. Н. Ірецька ). Удосконалювала вокал. майстерність в Мілані у В. Ванцо (театр «Ла Скала», 1907–09). Дебютувала 1904 у С.-Пе­тербурзі партією Джільди («Ріґолет­то» Дж. Верді, рос.-італ. приватна опера). 1906–09, 1911–13, грудень 1916&nbsp;— січень 1917&nbsp;— солістка Маріїн. театру, 1914–15&nbsp;— Театру муз. драми у Петро­граді (нині С.-Пе­тербург). 1909–11, 1913 з великим успіхом ви­ступала у театрі «Ла Скала» (Мілан), де спеціально для неї по­ставлено оперу «Сомнамбула» В. Бел­ліні. Гастролювала у Нью-Йорку («Метрополітен-опера», серед сцен. партнерів&nbsp;— Е. Карузо), Канаді, Бостоні, Чикаґо (обидва&nbsp;— США). Здійснила концертні подорожі Лондоном («Ковент-Ґарден», 1909, 1911), Парижем (1909, 1910, травень 1911, 1913–14, «Російські сезони», театри&nbsp;— «Шатле», «Ґранд-Опера», «Опера-Комік», серед партнерів по опер. сцені&nbsp;— Ф. Шаляпін, поміж слухачів&nbsp;— Ж. Мас­сне, по­зна­йомилася із Дж. Пуч­чіні), Римом (1910), Від­нем (жовтень 1911, Віден. придворна опера; 1913), Будапеш­том (квітень 1912), Гамбурґом (Німеч­чина, грудень 1913). За­прошена до театру «Ла Скала» на 9 ви­став «Ріґолет­то» під керівництвом А. Тосканіні (1914). В 1915&nbsp;— у Нар. домі (Петро­град). 1916 і 1917 гастролювала у Києві. Від 1919&nbsp;— за кордоном. Здійснила гастрольне турне: Японія, Китай, Індія, Філіп­піни, Австралія, Нова Зеландія, міста європ. країн, зокрема Берлін, Ві­день, Лондон, Париж, Рим, Прага, Варшава. 1924–27&nbsp;— солістка Бухарест. опери. 1927–29 ви­ступала у Києві, Харкові, Дні­пропетровську, Одесі, Севастополі та ін. 1928 брала участь у ви­ставах студії К. Станіславського, що тоді гастролювала в Ленін­граді (нині С.-Пе­тер­бург). У концертах Л. брав участь Д. Шостакович . У 1930-х рр.&nbsp;— у Парижі, Берліні, Бухаресті. Під час 2-ї світової вій­ни ви­ступала в окупов. Одесі (1941), Бухаресті (1943). Остан. ви­ступ&nbsp;— 1951 в Па­рижі. 1937–41&nbsp;— керівник каф. сольного співу Кишинів. консерваторії; від 1952 викладала у Рос. консерваторії в Парижі; у 1950-х рр.&nbsp;— у Бейруті. Серед учнів&nbsp;— М. Дідученко , Л. Бабич, Т. Чебан. Л.&nbsp;— одна з найвидатніших камер. спів­ачок 20 ст. Володіла легким голосом широкого діапазону, феноменал. вокал. технікою, досконало виконувала най­складніші колоратурні партії. У репертуарі&nbsp;— твори В. Заремби, О. Даргомижського, М. Мусоргського, П. Чайковського та зарубіж. композиторів, а також рос., укр., іспан., франц. нар. пісні (виконувала здебільшого мовами оригіналу). Її талант високо цінували М. Римський-Корсаков, О. Глазунов, Е. Направник, Ж. Мас­сне, К. Станіславський, В. Мей­єрхольд"}, {"idx": 136, "name": "Волошина Лариса Костянтинівна", "by": "1906.0", "dy": "1975.0", "status": "non_migrated", "reasoning": "Born in Poltava region 1906, educated at institutions in Soviet Ukraine (Kremenchug, Berdyansk, Odesa), member of Soviet Writers' Union 1969, died in Kharkiv 1975—no evidence of emigration or forced displacement.", "notes": "(12 (25). 04. 1906, с. Лютеньки, нині Зіньків. р-ну Полтав. обл. – 05. 04. 1975, Харків) – поетеса, журналістка. Член СПУ (1969). Закін. Кременчуц. пед. технікум (1925), навч. у Бердян. учит. інституті (1938–40) та Одес....", "url": "https://esu.com.ua/article-29552", "group": "INCLUDE", "bio": "ВОЛО́ШИНА Лариса Костянтинівна (12 (25). 04. 1906, с. Лютеньки, нині Зіньків. р-ну Полтав. обл.&nbsp;— 05. 04. 1975, Харків)&nbsp;— поетеса, журналістка. Член СПУ (1969). Закін. Кременчуц. пед. технікум (1925), навч. у Бердян. учит. ін­ституті (1938–40) та Одес. пед. ін­ституті. Учителювала, від 1934&nbsp;— журналістка. Після поверне­н­ня з евакуації працювала в ред. г. «Большевистское знамя» та «Чорноморська комуна» (1945–51). Друкувалася від 1927. Перша збірка нарисів і оповідань&nbsp;— «Світлі обрії» (О., 1950). Авторка поет. зб.: «Над Дні­пром» (Х., 1960), «Райдуга» (К., 1964), «Зорі вечірні» (Х., 1966), «Щедрість» (Х., 1968), «Ластівки від­летіли» (Х., 1972), «Синє озеро неба» (Х., 1975). Посмертно опубл. «Твори: Поезії, оповіда­н­ня» (К., 1986). У доробку В.&nbsp;— громадян., пейзажна, інтимна лірика, яка від­значається емоційністю, гармонійністю форми й змісту, зверне­н­ням до морал.-етич. про­блем су­спільства. Рекомендована література Бокий І. Душевна щедрість // Прапор. 1969. № 12. Google Scholar Internet Брюгген В. Живе слово // Там само. 1987. № 6. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 137, "name": "Нечай Павло", "by": "1896.0", "dy": "1896.0", "status": "excluded_bad_dates", "reasoning": "Died before 1921 (death_year=1896) — pre-Soviet, outside study scope.", "notes": "(справж. – Косьмін Кирило Якович; 1896, с. Вергуни Черкас. пов. Київ губ., нині Черкас. р-ну Черкас. обл. – ?) – письменник. Член Спілки селян. письменників «Плуг». Дебютував 1928 в однойм. журналі...", "url": "https://esu.com.ua/article-71941", "group": "EXCLUDE", "bio": "НЕЧА́Й Павло (справж.&nbsp;— Косьмін Кирило Якович; 1896, с. Вергуни Черкас. пов. Київ губ., нині Черкас. р-ну Черкас. обл.&nbsp;— ?)&nbsp;— письмен­ник. Член Спілки селян. письмен­ників «Плуг». Дебютував 1928 в однойм. журналі оповіда­н­ням «Свата­н­ня з ви­скоком». Публікувався в часописах «Літературний журнал», «Літературна газета». Автор романів «Мухи» (1929), «База» та «Ромби і квадрати» (обидва&nbsp;— 1930), що склали трилогію «Калиновий міст» (Х., 1931), роману «Поворот» (К., 1935), нарисів «Яків Христюк» (1930), «Завжди на сторожі» (1932), «До бою готуйсь» (1933), гуморесок «Галушки», «Зачароване коло» (обидві&nbsp;— 1929), «Голос з провінції» (1930), «Більшовицька печатка» (1931), драм. творів «Урожай» (1934), «По­двій­ний удар», «Посланець господа» (обидва&nbsp;— 1937), «Епілопс» (1939), «Пісня про Катерину» (1940). У 1928–34 проживав у Харкові, потім&nbsp;— у Києві. Під час 2-ї світової вій­ни залишився в окупов. місті, спів­­працював з г. «Нове українське слово» (зокрема 1942 опублікував оповіда­н­ня «Хрест» та «Оксана»), за що 5 червня 1946 у м. Ворошилов­град (нині Луганськ) засудж. до 10-ти р. по­збавле­н­ня волі. Реабіліт. 1993. Завантажити статтю"}, {"idx": 138, "name": "Маґдій Михайло  Ількович", "by": "1906.0", "dy": "1983.0", "status": "non_migrated", "reasoning": "Born in Galicia (Ternopil region) but died in Ivano-Frankivsk, Ukraine, indicating he remained in Soviet Ukraine throughout his life.", "notes": "(06. 02. 1906, с. Соснів, нині Теребовлян. р-ну Терноп. обл. – 03. 11. 1983, Івано-Франківськ) – диригент, хореограф, композитор. Заслужений артист УРСР (1956). Гру на скрипці вивчав у В. Дяківа, згодом навч. у...", "url": "https://esu.com.ua/article-60274", "group": "INCLUDE", "bio": "МАҐДІ́Й Михайло Ількович (06. 02. 1906, с. Соснів, нині Теребовлян. р-ну Терноп. обл.&nbsp;— 03. 11. 1983, Івано-Франківськ)&nbsp;— диригент, хорео­граф, композитор. Заслужений артист УРСР (1956). Гру на скрипці ви­вчав у В. Дяківа, згодом навч. у Терноп. учител. семінарії, грав у духовому оркестрі. Закін. школу диригентів у м. Кельце (Польща, 1925), де написав перші пʼєси&nbsp;— «Віночок галицьких пісень» та «Коломийки для духового оркестру». Керував духовими оркестрами в Тернополі та його околицях, зокрема 1926–31 грав у оркестрі «Міщанського братства». Від 1931 мешкав і працював у м. Станіслав (нині Івано-Франківськ): створював аматор. духові оркестри; 1939–41 та від 1961&nbsp;— методист Будинку нар. творчості; 1941–44&nbsp;— викладач Муз. школи; 1940&nbsp;— спів­засн. Гуцул. ансамблю пісні і танцю при Філармонії, де й працював 1944–60. Збирав зразки муз. фольклору, а також фіксував хорео­графію нар. танців та гаївк. хороводів. Спів­працював з орке­стром гуцул. нар. інструментів у с. Шепіт Косів. р-ну Івано-Фр. обл., з яким від­значився на 7-му Всесвіт. кон­гресі муз. фольклору (Москва). Серед творів&nbsp;— для голосу, хору з фортепіано «Два брати» (сл. Ю. Шкрумеляка), «Ходить хлопець під вікном» (сл. К. Овер­ченка), обробки укр. нар. пісень «Летять галочки», «Гуцульська барвінкова», «Вербова дощечка» та ін., вокально-хореогр. сюїти «Над Черемошем», «Олекса Дов­буш», «Проводи на полонину» в су­проводі оркестру. Рекомендована література Легкий І. Співач краси // Музика. 1973. № 2. Google Scholar Internet Медведик П. Діячі української музичної культури: Мат. до біо-бібліогр. слов. // Зап. НТШ: Пр. Музикознав. комісії. Л., 1996. Т. 232. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 139, "name": "Мазаний Віктор Степанович", "by": "1955.0", "dy": "", "status": "alive", "reasoning": "No death year — presumed alive or date unknown.", "notes": "(28. 02. 1955, с. Городець Володимирец. р-ну Рівнен. обл.) – прозаїк, публіцист. Член НСПУ (2003). Літ. премії ім. Світочів (2004) та ім. А. Коломийця (2011). Закін. Львівський університет (1977), Міжнар. центр місц....", "url": "https://esu.com.ua/article-60328", "group": "EXCLUDE", "bio": "МА́ЗАНИЙ Віктор Степанович (28. 02. 1955, с. Городець Володимирец. р-ну Рівнен. обл.)&nbsp;— прозаїк, публіцист. Член НСПУ (2003). Літ. премії ім. Світочів (2004) та ім. А. Коломийця (2011). Закін. Львівський університет (1977), Між­нар. центр місц. журналістики (м. Сіде-Репідс, шт. Айова, США, 1995). Працював у рівнен. г. «Зміна» (1977–81), вла­скором г. «Молодь України» (1981–85) та Укр. нац. інформ. агентства (1985–2014) у Рівнен. обл.; від 2014&nbsp;— доцент кафедри теорії і практики журналіст. творчості Між­нар. екон.-гуманітар. університету (Рівне). Дебютував 1969 етюдом «Літо в зеніті» у г. «Зірка». Художня проза М. на істор. тематику, художньо-докум. книги&nbsp;— про соц.-екон. й культурне життя. Особливістю стилю М. є лаконізм, викори­ста­н­ня худож. деталі, лексич. багатств, індивідуалізація характерів та мови персонажів. Пере­клав пʼєсу В. Распутіна «Остан­ній строк» (по­ставлена 2008 у Рівнен. укр. муз.-драм. театрі). Засн. Поліс. літ. музею у рідному селі (2005), автор проекту літ. свята «Городецький авто­граф», яке щорічно (від 2001) проводиться на Рівненщині за участю лауреатів Нац. премії України ім. Т. Шевченка. Додаткові відомості Основні твори ...І мить у вічність проростає. 1998; Спалах ядра. 2000; З Капітолійського пагорба. 2001; Осіння жінка. 2002; Погляд сльози. 2003; Корінь вог­ню. 2005; Тінь павука. 2006; Енергетичний велет Хмельниччини. 2007; Танок бджоли. 2008; Рівненщина працьовита. 2009; Поклик долі. 2010; Працею осяяна земля. 2011; Професія успіху. 2011; Дубно — зоря століть. 2014; 2016 (усі — Рівне). Рекомендована література Гуля С. Надходить зрілості пора: [Рівнен. прозаїку Віктору Мазаному — 50 років] // Вільне слово [Рівне]. 2005, 25 лют. Google Scholar Internet Жулинський М. Мимоволі напрошуються на папір високі слова // Віче-інформ. 2015, 3–9 верес. Google Scholar Internet Лубківський Р. Однозначно, що «Дубно — зоря століть», — це могутня книга // Золота пектораль. 2015, 15 верес. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 140, "name": "Бенцаль Микола Гнатович", "by": "1891.0", "dy": "1938.0", "status": "excluded_galicia_pre_annexation", "reasoning": "Born in Galicia, died 1938 — before 1939 USSR annexation of western Ukraine. Never under Soviet rule.", "notes": "(24. 05. 1891, с. Курівці, нині Зборів.\nр-ну Терноп. обл. – 09. 09.  1938, м. Коломия, нині Івано-Фр. обл.) – актор, режисер, театральний діяч. Батько Я. Бенцаля-Євшана, чоловік О. Бенцаль-Карп’як. Учень Й....", "url": "https://esu.com.ua/article-39122", "group": "EXCLUDE", "bio": "БЕНЦА́ЛЬ Микола Гнатович (24. 05. 1891, с. Курівці, нині Зборів. р-ну Терноп. обл.&nbsp;— 09. 09. 1938, м. Коломия, нині Івано-Фр. обл.)&nbsp;— актор, режисер, театральний діяч. Батько Я. Бенцаля-Євшана , чоловік О. Бенцаль-Карпʼяк . Учень Й. Стадника , Леся Курбаса . Навч. у Львів. школі диригентів хору і гри на скрипці (1907–08). Працював актором у Нар. театрі товариства «Українська бесіда» у Львові (1910–24, з пере­рвою), в «Тернопільських театральних вечорах» (1915– 17, від квітня 1916&nbsp;— реж.); дир. Терноп. укр. драм. театру (1918– 19); реж. Нового львів. театру (1919–20), у Театрі Й. Стадника (1926–29); актором і реж. у різних укр. трупах, зокрема І. Когутяка (1923), О. Міткевич (1925), Театрі ім. І. Тобілевича (від 1930), який 1938 у Косові обʼ­єд­нався з театром «За­грава» В. Блавацького й діяв під на­звою Театр ім. І. Котляревського. Б.&nbsp;— багатоплан. актор, однаково майстерно виконував героїчні й комічні ролі. Додаткові відомості Основні ролі Гриць («Ой не ходи, Грицю, та й на вечорниці» М. Старицького), Омелько («Мартин Боруля» І. Карпенка-Карого), Михайло Гурман («Украдене щастя» І. Франка), Осип («Ревізор» М. Гоголя). Основні вистави «Безталанна» І. Карпенка-Карого (виконував роль Гната), «Шельменко-денщик» Г. Квітки-Основ’яненка (обидві — 1916), «Украдене щастя» І. Франка (1917), «Дядя Ваня» А. Чехова (1925), «Лісова пісня» Лесі Українки (1930, виконував роль Лукаша), «Бравий вояка Швейк» за Я. Гашеком (1931); уперше: «Дівчина з Маслосоюзу» (1935), «Пригода в Черчі» (1938) Я. Барнича. Рекомендована література Бенцаль М. У в’язниці і на сцені: спогади про 1915–1916 // Тернопіль. 1922. № 2. Google Scholar Internet Кривицька Л. Бенцаль // Повість про моє життя. К., 1965. Google Scholar Internet Рудницький М. І. Микола Бенцаль // В наймах у Мельпомени. К., 1968. Google Scholar Internet Медведик П. Тернопільські театральні вечори // Наук. зап. Терноп. краєзнав. музею. Т., 1993. Google Scholar Internet Затварська Р. Корифеї галицьких театрів. Коломия, 1997. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 141, "name": "Ристенко Олександр Васильович", "by": "1880.0", "dy": "1915.0", "status": "excluded_pre_soviet", "reasoning": "Died before 1921 (death_year=1915) — pre-Soviet, outside study scope.", "notes": "(30. 10. 1880, Одеса — 30. 09. 1915, там само) — літературознавець, медієвіст, візантолог. Закінчив Новоросійський університет в Одесі (1902), де був залишений для підготовки до професорського звання...", "url": "https://esu.com.ua/article-884543", "group": "EXCLUDE", "bio": "РИСТЕ́НКО Олександр Васильович (30. 10. 1880, Одеса&nbsp;— 30. 09. 1915, там само)&nbsp;— літературо­знавець, медієвіст, візантолог. Закінчив Новоросійський університет в Одесі (1902), де був залишений для під­готовки до професорського зва­н­ня (учень В. Істріна ), а від 1910, після захисту магістерської дисертації, й працював на кафедрі російської мови і словесності: від 1912&nbsp;— екс­траординарний професор; був бібліотекарем університету (від 1902), за­ступником декана історико-філологічного факультету (від 1912). Водночас викладав на Вищих жіночих курсах (від 1909) та в Артилерійському училищі (від 1910). Член Історико-філологічного товариства (від 1903). У 1907–09 пере­бував у закордон­ному від­ряджен­ні в Парижі, Римі, Мюнхені, де студіював візантійську й ран­ньословʼянську літератури, пере­важно за рукописними джерелами. Напрям наукових досліджень&nbsp;— текс­тологічне ви­вче­н­ня словʼянських пере­кладних творів: історія текс­тів за списками давньоруських, болгарських та сербських ізводів, їх спів­від­ноше­н­ня з візантійськими оригіналами; встановле­н­ня&nbsp;— за допомогою аналізу мови&nbsp;— часу та місця виникне­н­ня пере­кладів. Під­готував до друку грецький і словʼянський текс­ти Житія Нифонта, що були ви­дані Одеською науковою бібліотекою (1928). Додаткові відомості Основні праці К истории повести «Стефаний и Ихланий» в византийской и славянской литературе. О., 1902; Два слова о Н. А. Некрасове и его поэзии. О., 1903; Сказание о двенадцати снах царя Мамера в славяно-русской литературе. О., 1904; Материалы для литературной истории Толковой Палеи. Вып. 1. С.-Петербург, 1908; Легенда о Св. Георгии и драконе в византийской и славяно-русской литературе. О., 1909; К литературной истории апокрифа «О восхождении Исаии». О., 1912; Заметки о сочинениях Алексея Ремизова. Т. 1–8. О., 1913. Рекомендована література Истрин В. М. А. В. Рыстенко (Некролог) // Журнал министерства народного просвещения. 1915. № 12. Google Scholar Internet Ляпунов Б. М. Профессор А. В. Рыстенко и напечатанные им тексты жития Нифонта. О., 1916. Google Scholar Internet Професори Одеського (Новоросійського) університету: Біографічний словник: У 4 т. 2-е вид., О., 2005. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 142, "name": "Константинопольський Адольф Маркович", "by": "1923.0", "dy": "1993.0", "status": "non_migrated", "reasoning": "Born in Kharkiv 1923, died in Kharkiv 1993 with no evidence of emigration, forced displacement, or transfer to another Soviet republic; remained in Ukrainian SSR throughout life.", "notes": "(20. 04. 1923, Харків – 01. 12. 1993, там само) – живописець, педагог. Батько М. Константинопольського. Народний художник України (1991). Член СХУ (1958). Учасник Другої світової війни. Закінчив Харківський...", "url": "https://esu.com.ua/article-4998", "group": "INCLUDE", "bio": "КОН­СТАНТИНО́ПОЛЬСЬКИЙ Адольф Маркович (20. 04. 1923, Харків&nbsp;— 01. 12. 1993, там само)&nbsp;— живописець, педагог. Батько М. Кон­стантинопольського . Народний художник України (1991). Член СХУ (1958). Учасник Другої світової війни. Закінчив Харківський художній ін­ститут (1954; викладачі С. Бесєдін , О. Любимський , Г. Томенко ). Працював у Харкові: 1954–55&nbsp;— викладач художнього училища; на творчій роботі; від 1960&nbsp;— у художньо-промисловому ін­ституті: від 1992&nbsp;— професор. Учасник всеукраїнських, всесоюзних та зарубіжних мистецьких ви­ставок від 1953. Персональні&nbsp;— у Харкові (1973, 1983, 1992, 1998). Основні галузі&nbsp;— станковий і монументальний живопис. Автор великомас­штабних, монументально-героїчних полотен. Серед учнів&nbsp;— І. Шаповал,&nbsp; А. Федосеєнко . Додаткові відомості Основні твори живопис — «Рідна земля» (1957), «Солдати» (1960), «Після важкого бою» (1967), «Перша весна» (1970), «З розвідки» (1972), «На війні» (1987), «Земля» (1988); монументальний розпис «Жовтнева революція» (1958, співавтор; го­ловний павільйон ВДНГ УРСР, нині Національний виставковий центр у Києві). Рекомендована література Константинопольський Адольф Маркович: Каталог виставки. Харків, 1974. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 143, "name": "Погребна Вікторія Леонідівна", "by": "1966.0", "dy": "", "status": "alive", "reasoning": "No death year — presumed alive or date unknown.", "notes": "(26. 10. 1966, Запоріжжя) — літературознавець, журналістикознавець. Доктор філологічних наук (2005), професор (2006). Закінчила Запорізький університет (1990), де від 1994 й працювала: 2005—08 — професор...", "url": "https://esu.com.ua/article-878288", "group": "EXCLUDE", "bio": "ПОГРЕБНА́ Вікторія Леонідівна (26. 10. 1966, Запоріж­жя)&nbsp;— літературо­знавець, журналістико­знавець. Доктор філологічних наук (2005), професор (2006). Закінчила Запорізький університет (1990), де від 1994 й працювала: 2005–08&nbsp;— професор кафедри зарубіжної літератури; від 2008&nbsp;— завідувач кафедри журналістики Національного університету «Запорізька політехніка». Наукові дослідже­н­ня: теорія та історія публіцистики, гендерні студії в журналістиці та літературо­знавстві. Додаткові відомості Основні праці Проблемы эмансипации женской личности в русской критике и романах Н. Д. Хвощинской (60–80-е годы ХІХ столетия). З., 2003; Мир русского женского романа (1860–1880 гг.). З., 2006; Гендерні студії в літературознавстві: Навч. посіб. З., 2008 (співавтор); Facets of female emansipation in life and creation of N. D. Khvoshchinskaya // Modern approaches to philological studies. Lviv; Toruń, 2020; Information security and social work to counteract cultural and information wars in neo-functionalistic reflection // International J. of Pharmaceutical Research. 2020. Vol. 12, Issue 1 (співавтор); The role and functions of the mass media in the political socialisation of the actor // AD ALTA: J. of Interdisciplinary Research. 2022. Vol. 12, Issue 1, Special Issue 27 (співавтор); Applying Information and Communication Technologies as A Scope of Teaching Activities and Visualization Techniques for Scientific Research // International J. of Computer Science and Network Security. 2023. Vol. 23, № 2 (співавтор). Завантажити статтю"}, {"idx": 144, "name": "Нежданова Антоніна Василівна", "by": "1873.0", "dy": "1950.0", "status": "internal_transfer", "reasoning": "Born in Ukrainian territory (Kryvа Balka, Odesa), but spent substantial career in Moscow as a Soviet artist; no evidence of forced deportation or emigration outside Soviet sphere.", "notes": "(04(16). 06. 1873, с. Крива Балка, нині у ме­жах Одеси – 26. 06. 1950, Мос­ква) – співачка (лірико-колоратурне сопрано), педагог. Доктор мистецтвознавства (1944), професор (1943). Народний артист СРСР (1936)....", "url": "https://esu.com.ua/article-72904", "group": "INCLUDE", "bio": "НЕЖДА́НОВА Антоніна Василівна (04(16). 06. 1873, с. Крива Балка, нині у ме­жах Одеси&nbsp;— 26. 06. 1950, Мос­ква)&nbsp;— спів­ачка (лірико-колоратурне сопрано), педагог. Доктор мистецтво­знавства (1944), професор (1943). Народний артист СРСР (1936). Сталінcька премія (1943). Державні нагороди СРСР. До 7 р. Н. виховувалася в муз. атмо­сфері: батьки вирізнялися музикальністю, мали добрі голоси, тонкий муз. слух, муз. памʼять, часто влаштовували домашні концерти, де любили музикувати з друзями. Н. рано почала запамʼятовувати на слух українські народні пісні, спів­ала в церк. хорі, 1888 дебютувала як солістка. 1883–91 навч. у 2-й Одес. Ма­ріїн. гімназії. 1885–86 брала уроки гри на фортепіано, співу в С. Рубінштейн. Від 1889 у звʼязку зі смертю батька була змушена працювати, щоб утримувати родину (закін. гімназію завдяки фінанс. під­тримці дир. нар. училищ М. Фармаковського й отримала вакансію вчителя). 1889–97&nbsp;— викладач Одес. дівочого училища. За під­тримки місц. лікаря М. Бурда здійснила спробу вступити до С.-Пе­тер­бур. консерваторії, але її не прийняли «через посередні вокальні здібності». Після прослуховува­н­ня в Моск. консерваторії в О. Сафонова та У. Мазет­ті (спів­ала «Колискову» П. Чайковського) була зарахована до складу студентів (хоча навч. рік уже роз­почався). Закін. Моск. консерваторію (1902; кл. У. Мазет­ті) із золотою меда­л­лю (1-а з-поміж вокалісток). Завдяки урокам У. Мазет­ті (продовжувала з ним за­йматися до 1919) голос Н. вирівнявся в регі­страх, сут­тєво роз­ширився діапазон. 1902 дебютувала на сцені Великого театру в Москві (від­мовилася від пропозиції спів­ати в Маріїн. театрі у С.-Пе­тербурзі) партією Антоніди («Життя за царя» М. Глінки), де спів­ала до 1948. Упродовж 1-го сезону ви­ступила у 8-ми операх. Спів­працювала із Л. Собіновим, С. Танєєвим, Ф. Шаляпіним, ви­ступала в ансамблі з А. Аренським, О. Глазуновим, О. Скрябіним, С. Рахманіновим. Мала кришталевої чистоти про­зорий голос ніжного тембру широкого діапазону, досконало рівний у всіх регі­страх. Вокал. мистецтво Н. характеризувалося віртуоз. технікою, вдумливою інтер­претацією образів, простотою і щирістю викона­н­ня. Вирізнялася над­звич. праце­здатністю, винятк. дисциплінованістю на межі з пе­дантичністю, увагою до найменших деталей. Тогочасна критика вважала «еталоном вокального мистецтва» викона­н­ня Н. партії Марфи з опери «Царева наречена» М. Римського-Корсакова (спів­ала упродовж 1916–33), де під­корювала винятк. душевною щирістю, шляхетністю. 1909 виконала у Київ. опері партію Лакме в однойм. опері Л. Деліба. 1910–17&nbsp;— учасниця вечорів укр. муз.-драм. товариства «Кобзар» у Москві. Єдина з-поміж спів­ачок брала участь у духов. концертах Синод. хору (П. Чесноков писав сольні партії сопрано у духов. творах з урахува­н­ням тембру її голосу). Гастролювала у Франції («Ґранд-Опера», 1912), де її партнерами в опері «Ріґолет­то» Дж. Верді були Е. Карузо й Т. Руффо. За від­гуками франц. критики, спів Н. не по­ступався її іменитим партнерам, голос від­знач"}, {"idx": 145, "name": "Малий Леонід Якович", "by": "1946.0", "dy": "", "status": "alive", "reasoning": "No death year — presumed alive or date unknown.", "notes": "(18. 02. 1946, м. Куйбишев, нині Самара, РФ) – художник-проектант. Член НСХУ (1989). Закін. Київський художній інститут (1980; викл. М. Катернога, Л. Скорик). На творчій роботі. Основні галузі – архіт....", "url": "https://esu.com.ua/article-61171", "group": "EXCLUDE", "bio": "МАЛИ́Й Леонід Якович (18. 02. 1946, м. Куйбишев, нині Самара, РФ)&nbsp;— художник-проектант. Член НСХУ (1989). Закін. Київський художній ін­ститут (1980; викл.&nbsp; М. Катернога ,&nbsp; Л. Скорик ). На творчій роботі. Основні галузі&nbsp;— архіт. дизайн і благоустрій. Один із роз­робників комплекс. худож. оформле­н­ня м. Нетішин (Хмельн. обл., 1984–87). У спів­­авт. зі скульпторами О. Шлапаком ,&nbsp; С. Загайкевичем ,&nbsp; М. Олійником &nbsp;та&nbsp; Є. Карповим &nbsp;роз­робив проекти мемор. дощок М. Грушевському в Празі та Відні (обидві&nbsp;— 1996), Алеї Воїн. Слави (2010–13), памʼятників І. Кожедубу (2010), Данте (2015), А. Малишку (2016) у Києві. На поч. 2000-х рр. брав активну участь у роз­робці та реалізації проекту благоустрою Май­дану Незалежності, рекон­струкції памʼят. знака початку від­ліку від­станей біля Гол. поштамту (2000) у Києві. Автор концепції благоустрою та художнього оформле­н­ня вул. Хрещатик у Києві (2007–08). Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 146, "name": "Вілков Михайло Іванович", "by": "1924.0", "dy": "1992.0", "status": "non_migrated", "reasoning": "Born in Mordovia (Russian SFSR), completed art education in Odesa (Ukrainian SSR) in 1955, worked in Chernivtsi (Ukrainian SSR) where he died in 1992; no evidence of forced displacement or emigration outside Soviet sphere.", "notes": "(01. 07. 1924, с. Блохіно, нині Мордов. Респ., РФ – 04. 08. 1992, Чернівці) – живописець. Член СХУ (1970). Закін. Одес. художнє училище (1955; викл. Л. Александрович, Д. Фрюміна). Працював на Чернів. худож.-вироб....", "url": "https://esu.com.ua/article-34539", "group": "INCLUDE", "bio": "ВІ́ЛКОВ Михайло Іванович (01. 07. 1924, с. Блохіно, нині Мордов. Респ., РФ&nbsp;— 04. 08. 1992, Чернівці)&nbsp;— живописець. Член СХУ (1970). Закін. Одес. художнє училище (1955; викл. Л. Александрович, Д. Фрюміна). Працював на Чернів. худож.-вироб. комбінаті (1946–92). Учасник всеукр. мистецьких ви­ставок від 1957. Роботи зберігаються у Чернів. ХМ. Додаткові відомості Основні твори «Чабан Буковини» (1957), «Місяць у горах» (1964), «Проводи гудуть» (1967), «Бригада на сапанні буряків» (1970), «Перший стояк Дніпровської ГЕС» (1975). Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 147, "name": "Меербаум-Айзінґер Зельма", "by": "1924.0", "dy": "1942.0", "status": "deported", "reasoning": "Died in 1942 in a village outside her birthplace (Chernivtsi) under Soviet rule during WWII; the location and timing suggest forced displacement or death in a labour camp/settlement during mass deportations of Jews and other groups by Soviet authorities.", "notes": "(05. 02. 1924, Чернівці – 16. 12. 1942, с. Михайлівка Гайсин. р-ну Вінн. обл.) – поетеса. Писала нім. мовою. Все своє коротке життя прожила у Чернівцях, де навч. у євр. гімназії, – аж до депортації 1942 у...", "url": "https://esu.com.ua/article-66102", "group": "INCLUDE", "bio": "МЕЕРБА́УМ-АЙЗІ́НҐЕР Зельма (05. 02. 1924, Чернівці&nbsp;— 16. 12. 1942, с. Михайлівка Гайсин. р-ну Вінн. обл.)&nbsp;— поетеса. Писала нім. мовою. Все своє коротке життя прожила у Чернівцях, де навч. у євр. гімназії,&nbsp;— аж до депортації 1942 у «трудовий» табір Транс­ністрії, де померла від висип. тифу. Її нерідко порівнюють із гол­ланд. дівчинкою Анною Франк, яка також загинула в нацист. концтаборі й талановито написаний щоден­ник якої став одним з най­промовистіших звинувачень нацист. расовій ідеології та практиці. Поет. твори М.-А.&nbsp;— рукопис. альбом із віршами&nbsp;— врятовано її подругами і таємно вивезено після 2-ї світової вій­ни до Ізраїлю, де 1976 їх уперше влас. коштом опублікував колиш. гімназій. учитель Г. Сеґал. Це скромне вид. покладено в основу кн. «Ich bin in Sehnsucht eingehüllt: Gedichte eines jüdischen Mädchens an seinen Freund» («Я тугою огорнута: Вірші єврейсь­­кої дівчинки до її друга», Гамбурґ, 1980), яка стала тоді сусп. та літ. сенсацією і від­тоді неодноразово пере­видавалася, а М.-А. стала ві­домою. Її твор. доробок&nbsp;— 57 віршів, з них 5 перекл.&nbsp;— з їдишу (І. Манґер, Г. Лейвік), франц. (П. Верлен) та румун. (Д. Міхня) мов. Вірші засвідчують неаби­який хист і художню майстерність молодої авторки і були високо оцінені багатьма ві­домими нім. поетами й критиками (С. Гермлін, Г. Домін, Ю. Зерке). Не­зважаючи на звуженість темат. спектра (любовна, пейзажна лірика, колиск. пісні), вони пере­конували щирістю й інтенсивністю почут­тів перед лицем смертел. екзистенц. за­грози («Poem» / «Поема»), а трагічність долі поетеси додає їм непідробності й драматизму. Чимало поезій М.-А. покладені на музику (Л. Алкалей, Д. Клейн та ін.). 2001 у театрі нім. м. Фюрт від­булася премʼєра ви­стави «Selma, oder eine Reise um den Tisch» («Зельма, або Подорож навколо столу», автори Ю. Чурда, Ф. Апке і Г. Гартль), яка на­ступ. року зі­грана нім. акторами також на сцені Чернів. муз.-драм. театру ім. О. Кобилянської, а 2008 у нім. м. Ессен&nbsp;— муз. казки «Windekind. Eine Ode an Selma Meerbaum-Eisinger» («Дитя горищ. Ода Зельмі Меербаум-Айзінґер») Г. ван Веєна (музика) та Е. Шурман (лібрето). Поезії М.-А. звучать нині у виконан­ні популяр. нім. музикантів Г. Ґрьонемайєра, С. Кон­нор, Г. Енґлера та ін. Зʼяви­­лося також декілька компакт-дисків, на яких її вірші читають нім. актори М. Гел­лер, І. Бербен, гол­ланд. рецитатор Г. ван Веєн. За остан­ні роки у багатьох країнах світу проведено літ. вечори, присвяч. творчості М.-А., зокрема 2011 у Євр. домі Чернівців з чита­н­ням її поезій ви­ступила ві­дома нім. актриса І. Бербен. Нім. художниця Г. фон Льовеніх присвятила поетесі триптих «Юність&nbsp;— мрія&nbsp;— смерть» та створила за мотивами її поезій цикл із 30-ти акварел. картин, що екс­поновано у багатьох містах Німеч­чини й за кордоном, а також у Чернівцях (2014). У вересні 2004 у рідному місті на будинку на вул. М. Чернишевського, № 38, де народилася й проживала М.-А., встановлено мемор. дошку. 2012 у Чернівцях у перекл. та з після"}, {"idx": 148, "name": "Заруба Юрій  Володимирович", "by": "1914.0", "dy": "1973.0", "status": "non_migrated", "reasoning": "Born in central Ukraine, died in Kyiv in 1973 — lived and died within Soviet Ukraine with no signals of deportation, emigration, or diaspora activity.", "notes": "(21. 04. 1914, с. Нова Прага, нині смт Олександрій. р-ну Кіровогр. обл. – 12. 05. 1973, Київ) – публіцист. Чоловік М. Підтиченко. Член СПУ (1952). Державні нагороди СРСР. Закін. Кам’ян. металург. технікум (нині...", "url": "https://esu.com.ua/article-15589", "group": "INCLUDE", "bio": "ЗАРУ́БА Юрій Володимирович (21. 04. 1914, с. Нова Прага, нині смт Олександрій. р-ну Кіровогр. обл.&nbsp;— 12. 05. 1973, Київ)&nbsp;— публіцист. Чоловік М. Під­тиченко . Член СПУ (1952). Державні нагороди СРСР. Закін. Камʼян. металург. технікум (нині м. Дні­продзержинськ Дні­проп. обл., 1933), навч. в Укр. ін­ституті іноз. мов (Харків, 1941–42), ВПШ при ЦК ВКП(б) (1945–48). Працював на комбінаті «Запоріж­сталь» (1933–34), у радго­спі в Азербайджані (1934–35). Від 1935&nbsp;— у пресі, зокрема заст. ред. г. «Молодь України» (1943–45), ред. ж. «Блокнот агітатора» (1948–51), заст. ред. ж. «Ком­мунист Украины» (1952), нач. від­ділу преси МЗС УРСР (1953–63), відп. ред. г. «Радянська Україна» (1963–65; усі&nbsp;— Київ). Почав друкуватися від 1935. Автор низки фейлетонів, нарисів, рецензій, оглядів. Рекомендована література Юрій Володимирович Заруба: [Некролог] // ЛУ. 1973, 18 трав. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 149, "name": "Климов Микола Степанович", "by": "1842.0", "dy": "1918.0", "status": "excluded_pre_soviet", "reasoning": "Died before 1921 (death_year=1842) — pre-Soviet, outside study scope.", "notes": "(справж. – Шмаков; 1842, С.-Петербург – 15. 03. 1918, Петроград, нині С.-Петербург) – співак (бас). Вокал. освіту здобув у муз. школі. У 1870-х рр. виступав у театрах різних міст, в оперетах, водевілях та...", "url": "https://esu.com.ua/article-8401", "group": "EXCLUDE", "bio": "КЛИ́МОВ Микола Степанович (справж.&nbsp;— Шмаков; 1842, С.-Петербург&nbsp;— 15. 03. 1918, Петро­град, нині С.-Петербург)&nbsp;— спів­ак (бас). Вокал. освіту здобув у муз. школі. У 1870-х рр. ви­ступав у театрах різних міст, в оперетах, водевілях та дивертисментах. 1878 дебютував на опер. сцені Києва партією Івана Сусаніна (опера «Життя за царя» М. Глінки). Від 1881&nbsp;— соліст Маріїн. театру в С.-Петербурзі. Володів рідкісним за красою голосом широкого діапазону, високою вокал. культурою. Додаткові відомості Основні партії Мельник («Русалка» О. Даргомижського), Грьомін, Томський («Євгеній Онєгін», «Пікова дама» П. Чайковського), Демон (однойм. опера А. Рубінштейна), Вільгельм Телль (однойм. опера Дж. Россіні), Мефістофель («Фауст» Ш. Ґуно). Завантажити статтю"}, {"idx": 150, "name": "Вінярж Ігнатій", "by": "1850.0", "dy": "1914.0", "status": "excluded_pre_soviet", "reasoning": "Died before 1921 (death_year=1914) — pre-Soviet, outside study scope.", "notes": "(1850 – 12. 05. 1914, Львів) – архітектор. Працював у Львові 1875–1914. Використовував стильові прийоми історизму, від поч. 20 ст. – форми модерну. У стилі неоренесансу з використанням дерев’яних...", "url": "https://esu.com.ua/article-34695", "group": "EXCLUDE", "bio": "ВІ́НЯРЖ Ігнатій (1850&nbsp;— 12. 05. 1914, Львів)&nbsp;— архітектор. Працював у Львові 1875–1914. Використовував стильові при­йоми історизму, від поч. 20 ст.&nbsp;— форми модерну. У стилі неоренесансу з викори­ста­н­ням деревʼяних елементів спорудив будинок на вул. Л. Сапєги (нині С. Бандери), № 8 (1877, не зберігся), житл. будинки на вул. Садівницька, нині В. Антоновича, № 14 (1882) і № 34 (1902), віллу на вул. Лісна, № 17 (1900). За проектом В. Равського (молодшого) по­ставив неоренесансні камʼяниці на вул. І. Франка, № 2, 4 (1883; скульптор Л. Марконі). Стиль необароко виразно проявився у спорудженому ним житл. будинку на вул. І. Нечуя-Левицького, № 3 (1898). Зберігаючи ампірні риси архітектури, пере­будував житл. камʼяниці на вул. Шевська, № 10, 12 (кін. 19 ст.; спів­авт. С. Рімер). Серед творів, виконаних у стилі модерн,&nbsp;— власна вілла у с. Брюховичі (нині на околиці Львова, бл. 1905), житл. будинки на вул. С. Бандери, № 59, 61 (1906, спів­авт. К. Драневич); житл. камʼяниця й синагога Й. Шпрехера на вул. Городоцька, № 45 (1907); житл. будинки на розі вул. Глибока, № 16 та Японська, № 1 (1910; спів­авт. Г. Сальвер), Академіка Па­влова, № 5– 7 (1912). Рекомендована література Бірюльов Ю. Мистецтво львівської сецесії. Л., 2005. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 151, "name": "Барвінська Євгенія  Максимівна", "by": "1854.0", "dy": "1913.0", "status": "excluded_pre_soviet", "reasoning": "Died before 1921 (death_year=1913) — pre-Soviet, outside study scope.", "notes": "(20. 12. 1854, Львів – 20. 12. 1913, там само) – піаністка, хоровий диригент, співачка (сопрано), громадська діячка. Дружина Олександра, мати Василя, Богдана та Олександра Барвінських. Закін. Учител....", "url": "https://esu.com.ua/article-40492", "group": "EXCLUDE", "bio": "БАРВІ́НСЬКА Євгенія Максимівна (20. 12. 1854, Львів&nbsp;— 20. 12. 1913, там само)&nbsp;— піаністка, хоровий диригент, спів­ачка (сопрано), громадська діячка. Дружина Олександра , мати Василя , Богдана та Олександра Барвінських. Закін. Учител. ін­ститут у Львові (1874). Гри на фортепіано на­вчалася приватно у Ф. Лоренца (Пере­мишль) та К. Мікулі (Львів). Разом із батьком С. Крушельницької організувала чол. і жін. хори в Тернополі (1882–86&nbsp;— керівник). Одна з організаторів (1891– 95&nbsp;— диригент) Львівського «Бояна». Пропагандист творчості укр. композиторів (М. Лисенка, І. Воробкевича, М. Вербицького, М. Кропивницького, В. Матюка, Д. Січинського, Г. Топольницького). Листувалася з М. Лисенком, С. Крушельницькою. Рекомендована література Служинська З. Рід Білинських. Л., 1998. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 152, "name": "Євтушевський Володимир  Якович", "by": "1941.0", "dy": "2010.0", "status": "non_migrated", "reasoning": "Born in Dniprodzerzhynsk, studied at Kyiv Art Institute (1967), worked in Ukraine from 1973, and died in Kyiv with no evidence of emigration or forced displacement.", "notes": "(07. 06. 1941, м. Дніпродзержинськ Дніпроп. обл. – 08. 06. 2010, Київ) – живописець. Член НСХУ (1992). Закін. Київський художній інститут (1967; викл. В. Костецький, О. Сиротенко, К. Трохименко). Працював 1973–83 на...", "url": "https://esu.com.ua/article-17438", "group": "INCLUDE", "bio": "ЄВТУШЕ́ВСЬКИЙ Володимир Якович (07. 06. 1941, м. Дні­продзержинськ Дні­проп. обл.&nbsp;— 08. 06. 2010, Київ)&nbsp;— живописець. Член НСХУ (1992). Закін. Київський художній ін­ститут (1967; викл. В. Костецький , О. Сиротенко , К. Трохименко ). Працював 1973–83 на Київ. комбінаті монум.-декор. мистецтва. Автор мозаїк, роз­писів темперою, вітражів, карбува­н­ня, різьбле­н­ня на дереві, гобеленів, іконопис., живопис. та графіч. робіт. Учасник обл., всеукр., всесоюз. та між­нар. мистецьких ви­ставок від 1975. Персон.&nbsp;— у Києві (1987, 1999, 2000, 2003, 2006–08). Створив велику серію образів видат. діячів укр. культури та іноземців, повʼязаних з Україною. У творчості Є. по­єд­нано реаліст. елементи зображе­н­ня з абстраговано-декоративними. Фрагментарна манера створе­н­ня ціліс. порт­рета та пейзажу, сполуче­н­ня різних манер зображе­н­ня до­зволяють художнику досягти повноти від­творе­н­ня характерів, поліфоніч. сприйня­т­тя життя. Окремі полотна зберігаються у Нац. музеї літ-ри, Музеї геть­манства (обидва&nbsp;— у Києві), Нац. істор.-етногр. заповід­нику «Пере­яслав» (м. Пере­яслав-Хмельницький), Яготин. істор. музеї та картин. галереї (усі&nbsp;— Київ. обл.), Музеї історії Дні­продзержинська, Мемор. будинку-музеї Д. Яворницького (Дні­пропетровськ), Музеї Т. Шевченка у м. Палермо (Канада). Додаткові відомості Основні твори «І буде син, і буде мати» (1956), «Пісня кобзаря» (1969), «Д. Яворницький» (1986), «А. де Сент-Екзюпері» (1987), «Ванґа» (1989), «На баштані Всесвіту» (1990), «Д. Вишневецький» (1991), «На тих рушниках — Україна моя» (1992), «Чумацький меридіан», «Автопортрет» (обидва — 1993), «Сім’я музикантів (М. Баран із синами)» (1994), «С. Бубка» (1995), триптих «Триєдність» (1997), «Патріарх Мстислав» (1998), «Планета насильницької смерті (Чорний квадрат–2)» (2000), «М. Бідняк», «Голод» (обидва — 2001), «А. Солов’яненко», «Панночка», «М. Гоголь» (усі — 2007), «Б. Олійник», «Дж. Мейс і Україна», «Онука Лада (Груші)», «Теплинь», триптих «Де-Рібас» (усі — 2008), «У Київській лаврі», «Р. Лоцман», «Л. Костенко», «І. Мазепа» (усі — 2009). Рекомендована література Микитенко О. Художній пантеон творців України // Київ. 2005. № 11. Google Scholar Internet Володимир Євтушевський. Живопис: Каталог виставки. К., 2005. Google Scholar Internet 2006. Google Scholar Internet Абліцов В. Талант — завжди закономірність // Держ. справа. 2007. № 10. Google Scholar Internet Підгора В. Світ як розколотий універсум // ОМ. 2008. № 1. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 153, "name": "Потапенко В’ячеслав Опанасович", "by": "1863.0", "dy": "1937.0", "status": "deported", "reasoning": "Died in Rostov-na-Donu in 1937 during Great Terror period; biographical structure suggests forced displacement rather than voluntary migration, typical of Soviet repression era.", "notes": "(21. 12. 1863(02. 01. 1864), с. Веселий Кут Херсонського пов. Херсонської губ., нині Баштанського р-ну Миколаївської обл. — 10. 08. 1937, м. Ростов-на-Дону, РФ) — письменник, актор, театральний режисер. Народився...", "url": "https://esu.com.ua/article-882223", "group": "INCLUDE", "bio": "ПОТА́ПЕНКО Вʼячеслав Опанасович (21. 12. 1863(02. 01. 1864), с. Веселий Кут Херсонського пов. Херсонської губ., нині Баштанського р-ну Миколаївської обл.&nbsp;— 10. 08. 1937, м. Ростов-на-Дону, РФ)&nbsp;— письмен­ник, актор, театральний режисер. Народився в українській дворянській родині козацького походже­н­ня. На­вчався в юнкерській школі в Санкт-Петербурзі. 1883–1900&nbsp;— актор, драматург і режисер у трупах М. Кропивницького та М. Садовського. Друкуватися почав від 1885, писав українською та російською мовами ліричні вірші, байки, оперні лібрето. Автор майже 40-а пʼєс, оповідань: «Чабан», «Чубатий», «Чарівниця», «Злодій», «Перша карна справа», «На нові гнізда» (про тяжку долю українців, які через Одесу морем пере­селялися на Далекий Схід) та ін. 1900–04 жив у Новоросійську (нині Краснодарського краю, РФ), де створив аматорську українську трупу, а від 1902 став провід­ним спів­робітником газети «Черноморское по­бережье», що регулярно висвітлювала культурне життя українців Чорноморської губ. і Кубанської обл. Від 1904 мешкав у Катеринодарі (нині Краснодар), працював у місцевому театрі, брав участь у створен­ні й був одним із керівників Кубанського товариства «Просвіта». У театральній і літературній діяльності по­стійно звертався до шевченко­знавчої тематики. Як актор і режисер брав участь у шевченківських вечорах, зокрема 1906 у Катеринодарі по­ставив пʼєсу «Назар Стодоля». 1906 очолив редакцію газети «Новая заря», що була при ньому яскраво українофільською (закрито 1910), спів­працював із часописами «Заря», «Утро»; друкувався під псевдонімом Капитан Копейкин; неодноразово був заарештований за газетні фейлетони, де він критикував дії влади. Як редактор і фейлетоніст значну увагу приділяв інформаційному висвітлен­ню щорічних шевченківських роковин, опублікував низку статей, присвячених про­блемі увічне­н­ня памʼяті Т. Шевченка. Згодом ві­ді­йшов від журналістики. У 1920-і рр.&nbsp;— драматург, режисер у театрах Краснодара, завідував українським педагогічним технікумом (1929). Член української секції Краснодарської асоціації пролетарських письмен­ників. Заарештований 1931, незабаром звільнений. Пере­жив Голодомор 1932–33 на Кубані. Працював у Краснодарській міській лікарні. Заарештований 5 листопада 1936, за звинувачен­н­ням у проведен­ні контр­революційної роботи і причетності до організації, що нібито готувала «під­готовку теракту над вождем ВКП(б)», 8 серпня 1937 засуджений до ро­стрілу. Реабілітований 1958. Рекомендована література Орел В. В’ячеслав Потапенко про Т. Шевченка // Маяк [Миколаїв]. 1975, 6 берез. Google Scholar Internet Веленгурин Н. Ф. Вячеслав Потапенко. Новые страницы жизни // Веленгурин Н. Ф. Пути и судьбы: Лит. очерки. Краснодар, 1988. Google Scholar Internet Його ж. Капитан Копейкин: к 130-летию писателя В. Потапенко; новороссийский период писателя // Кубан. новости. 1993, 12 янв. Google Scholar Internet Його ж. Жизнь и смерть Вячеслава Потапенко: былое // Кубан. курьер. 1994, 22 июня. Google Scholar Internet Чумаченко В. "}, {"idx": 154, "name": "Ткаченко Всеволод Іванович", "by": "1945.0", "dy": "2018.0", "status": "non_migrated", "reasoning": "Born in Kyiv region village, died in Kyiv region city, buried in native village; no evidence of emigration or forced displacement; biography contains no diaspora markers or references to non-Soviet destinations.", "notes": "(14. 03. 1945, с. Дернівка Баришівського, нині Броварського р-ну Київської обл. — 18. 05. 2018, м. Бориспіль Київської обл., похований у рідному селі) — перекладач, поет, літературознавець. Брат С....", "url": "https://esu.com.ua/article-887529", "group": "INCLUDE", "bio": "ТКАЧЕ́НКО Всеволод Іванович (14. 03. 1945, с. Дернівка Баришівського, нині Броварського р-ну Київської обл.&nbsp;— 18. 05. 2018, м. Борис­піль Київської обл., похований у рідному селі)&nbsp;— пере­кладач, поет, літературо­знавець. Брат С. Ткаченка . Член НСПУ (1997). Премії імені М. Зерова (1993), імені М. Гоголя «Тріумф», імені Г. Сковороди «Сад божествен­них пісень» (обидві&nbsp;— 2008), імені Г. Кочура (2012), імені М. Лукаша (2014). Закінчив Київський університет імені Т. Шевченка (1968). Пере­бував на пере­кладацькій роботі, зокрема 1969–72&nbsp;— пере­кладач французької мови в Алжирі; 1984–88&nbsp;— завідувач від­ділу культури Дарницького райвиконкому Києва; 1988–92&nbsp;— старший науковий редактор видавництва «Українська енциклопедія»; 1992–94&nbsp;— у системах Міністерства культури України (головний спеціаліст від­ділу культурних обмінів) і НАНУ (за­ступник директора з загальних питань, завідувач сектору інформації та наукових ви­дань Ін­ституту сходо­знавства); 1994–2005&nbsp;— у МЗС України, 1999–2002&nbsp;— перший секретар Посольства України у країнах Бенілюксу. Голова Творчого обʼ­єд­на­н­ня пере­кладачів Київської організації НСПУ (від 2006). Автор і ведучий про­грами «Поезія без кордонів» (від 2008; від 2010&nbsp;— «Література без кордонів») Українського радіо «Культура». Автор багатьох добірок і книг пере­кладів українською мовою франко-, англо-, іспано- й португаломовної, кримськотатарської класичної і сучасної поезії: творів П.-Ж. Беранже («Пісні», 1970; 1980), А. Рембо («Пʼяний корабель», 1995), Ж. дю Белле, П. де Ронсара, М. Деборд-Вальмор, В. Гюґо, Ж. де Нерваля, А. де Мюссе, П. Верлена, Е. Верхарна, Ш. Бодлера, Ґ. Апол­лінера, Л. Араґона, П. Елюара, Ж. Превера, Р. Шара, Р.-Ґ. Каду, Ж. Брасенса, Ж. Бреля, Л.-С. Сенґора, Р. Ляньє, Ешмирзи, Ш. Алі та ін. французьких, бельгійських, канадських, кримськотатарських митців. Пере­кладач і упорядник антології «Поезія Африки» (1983) та персональної антології «Сад божествен­них поезій. Тисячолі­т­тя франкомовної любовної лірики» (2011, т. 1). Особливу увагу приділяв пере­кладу та ви­дан­ню українською мовою творів класиків європейської дитячої літератури Р. Десноса і М. Карема («Вірші для слухняних дітей», 1985; «Троє цуценят покидають Париж», 1991; «Доброта», 2004; «Баєчкопісеньки і квітопісеньки», 20084; усі&nbsp;— Київ). Йому належать числен­ні публікації про зарубіжних письмен­ників та історію й сьогоде­н­ня багатьох національних літератур світу в періодиці та енциклопедіях, зокрема в ЕСУ. Рекомендована література Коскін В. Амбасадор франкомовності в Україні // Українська літературна газета. 2016, 28 жовт. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажи . Рекомендована література Гуторов А. Ступени роста // Ра­­ду­га. 1989. № 10. Google Scholar Internet Ковалевський О. Дар пророчий // Слобожанщина. 2002. № 3–4. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 156, "name": "Пильник Євген Олексійович", "by": "1921.0", "dy": "1999.0", "status": "non_migrated", "reasoning": "Born in Mykolaiv region 1921, died in Kyiv 1999; no evidence of emigration, forced displacement, or career-based relocation to another Soviet republic.", "notes": "(25. 10. 1921, с. Сиваське Дніпровського пов. Миколаївської губ., нині смт Генічеського р-ну Херсонської обл. — 13. 03. 1999, Київ) — архітектор. Заслужений архітектор УРСР (1981). Закінчив архітектурний...", "url": "https://esu.com.ua/article-881521", "group": "INCLUDE", "bio": "ПИ́ЛЬНИК Євген Олексі­йович (25. 10. 1921, с. Сиваське Дні­провського пов. Миколаївської губ., нині смт Генічеського р-ну Херсонської обл.&nbsp;— 13. 03. 1999, Київ)&nbsp;— архітектор. Заслужений архітектор УРСР (1981). Закінчив архітектурний факультет Київського художнього ін­ституту (1951). Працював у архітектурно-проєктних установах Києва. Серед реалізованих проєктів&nbsp;— житлові будинки на вулицях Свердлова (нині Медоносна, 1952–54) та Дачна (1953–54) у Києві, житловий будинок на вулиці Паркова (1953–55), технічне училище заводу пресів (1955) у Дні­пропетровську (нині Дні­про), будинок обласної партійної школи у Тернополі (нині адміністративний корпус медичного університету, 1954–55), забудова житлового р-ну в м. Часовий Яр Сталінської обл. (нині Бахмутського р-ну Донецької обл., 1955–57) й 4-х кварталів житлового р-ну рудника імені К. Лібкнехта у м. Кривий Ріг Дні­пропетровської обл. (1956–60). Завантажити статтю"}, {"idx": 157, "name": "Борисюк Костянтин Іванович", "by": "1915.0", "dy": "1915.0", "status": "excluded_pre_soviet", "reasoning": "Died before 1921 (death_year=1915) — pre-Soviet, outside study scope.", "notes": "(помилково значився як Борисяк; ?, Брест. пов. Гроднен. губ., нині Білорусь – 1915?) – музикант-аматор. Автор мелодії пісні «Думи мої, думи» на слова Т. Шевченка (1914?). Одне з перших її видань (1918?)...", "url": "https://esu.com.ua/article-37206", "group": "EXCLUDE", "bio": "БОРИСЮ́К Костянтин Іванович (помилково значився як Борисяк; ?, Брест. пов. Гроднен. губ., нині Білорусь&nbsp;— 1915?)&nbsp;— музикант-аматор. Автор мелодії пісні «Думи мої, думи» на слова Т. Шевченка (1914?). Одне з перших її ви­дань (1918?) здійснене Укр. військ. комітетом Пд.-Зх. фронту. Саме з мелодією Б., з не­знач. ритміч. видо­змінами, пісня набула заг.-нар. популярності. Початкова версія про належність мелодії Б. заперечується сучас. дослідниками. Друк. згадки про автора (пере­важно негативні, з пролеткультів. позицій) зу­стрічаються в пресі 1928–31. Рекомендована література Правдюк О. А. Т. Г. Шевченко і музичний фольклор України. К., 1966. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 158, "name": "Кушніренко Андрій Миколайович", "by": "1933.0", "dy": "2013.0", "status": "non_migrated", "reasoning": "Born in Ternopil region, died in Chernivtsi (Ukraine) in 2013 — spent career and life within Ukraine, no deportation or emigration signals present.", "notes": "(17. 10. 1933, с. Великі Загайці Шумського р-ну, нині Терноп. обл. – 11. 01. 2013, Чернівці) – диригент, композитор, музико­знавець, педагог, музично-громадський діяч. Чоловік М. Кушніренко....", "url": "https://esu.com.ua/article-52567", "group": "INCLUDE", "bio": "КУШНІРЕ́НКО Андрій Микола­йович (17. 10. 1933, с. Великі Загайці Шумського р-ну, нині Терноп. обл.&nbsp;— 11. 01. 2013, Чернівці)&nbsp;— диригент, композитор, музико­­знавець, педагог, музично-громадський діяч. Чоловік М. Кушніренко . Член-кореспондент НАМУ (1997), професор (1994). Народний артист УРСР (1973). Державна премія Укра­їни ім. Т. Шевченка (1984). Літ.-мист. премія ім. С. Воробкевича (1993). Член НСКУ (1997). Орден «За заслуги» 3-го ступеня (1999). Закін. Львів. консерваторію (1962; кл. хор. диригува­н­ня М. Антківа ). Від­тоді&nbsp;— худож. кер. і гол. диригент Буковин. ансамблю пісні і танцю України (Чернівці). Неодноразово був гол. хормей­стером і диригентом зведених хорів Всеукр. свят нар. творчості на спів­очих полях у Києві, Полтаві, Львові, Тернополі. Засн. (1992) і зав. (до 2004) каф. музики Чернів. університету. Популяризує творчість М. Лисенка, М. Леонтовича, К. Стеценка, О. Кошиця, С. Людкевича, С. Воробкевича, Д. Бортнянського, М. Березовського, А. Веделя, М. Колес­си, М. Скорика, Л. Дичко, Є. Станковича та місц. буковин. авторів&nbsp;— Б. Крижанівського, Г. Шевчука, С. Сабадаша, В. Михайлюка, Л. Затуловського та ін. Записав понад 1 тис. нар. пісень, 100 з яких опрацював для хору й оркестру (уві­йшли до ре­пертуару Буковин. ансамблю піс­ні і танцю України та ін. колекти­вів). Твори К. записано на 10-ти грамплатівках, знято в 6-ти кіно- й телефільмах, записано на Укр. радіо і телебачен­ні. Упорядник і ред. низки зб., зокрема «Буковинський роз­май» (1971), «Спів­ає Буковина» (1972), «Укра­їнські буковинські народні пісні в обробці А. Кушніренка» (1974), «Українські візерунки» (1988), «Хорові твори С. Воробкевича» (1996; 2003; усі&nbsp;— Київ). Автор зб. «Тобі спів­аю, Україно» (2009), «Спів­аночки мої любі» (2011); навч. посібника «Історія музичної куль­тури й освіти Буковини» (2011, спів­­авт.; усі&nbsp;— Чернівці). Додаткові відомості Основні твори нар. опера «Буковинська весна» (1968, лібрето А. Добрянського); кан­тата «Молюсь за тебе, Україно» (1993, власні слова); «Буковинська сюїта» для симф. оркестру (1982); пісні для хору й солістів — «Ранок Верховини» (сл. В. Колодія, 1970), «Україно, любов моя» («Батьківщино моя», 1977), прославний кант «У вінок Федьковичу» (1987, сл. М. Ткача), молитва «Отче наш» (1993), «Любіть Україну» (сл. В. Сосюри, 2001); солоспіви — «Очі — то вікна душі» (сл. В. Симоненка, 1975), «Хотіла б я піснею стати» ", "dy": "1942.0", "status": "non_migrated", "reasoning": "Kogut remained in Lviv throughout his career (1910–1942/43), founding and operating his architecture firm there with no evidence of emigration or forced displacement.", "notes": "(1883, Львів – 1942, за ін. даними – 1943, там само) – архітектор. Закін. Політех. школу у Львові (1910). У 1923 відкрив власну архіт. фірму у Львові, 1934 спільно з Й. Тішем перетворив її на велике архіт.-буд....", "url": "https://esu.com.ua/article-7473", "group": "INCLUDE", "bio": "КО́ГУТ Максиміліан (1883, Львів&nbsp;— 1942, за ін. даними&nbsp;— 1943, там само)&nbsp;— архітектор. Закін. Політех. школу у Львові (1910). У 1923 від­крив власну архіт. фірму у Львові, 1934 спільно з Й. Тішем пере­творив її на велике архіт.-буд. під­приємство. Член львів. Спілки архітекторів і будівничих (1932–39). Працював пере­важно у стилях ар деко та функціоналізм, тяжів до оригінал. образів будівель. За його проектами (спів­автор Й. Тіш) із за­стосува­н­ням новіт. технологій у склепі­н­нях, оздоб. кераміки та скульптури споруджено у Львові: крамниці на вул. Вишньовецьких (нині Русових), № 3 (1927–28), торг. склади галантерей. ф-ки на розі вул. Шпитальна і Е. Бика (нині Д. Данилишина; 1935), житл. будинки на вул. На Байках (нині Київська), № 34 (1936), № 36 (1925–30). Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 161, "name": "Дністрянська Софія Львівна", "by": "1882.0", "dy": "1956.0", "status": "migrated", "reasoning": "Pianist born in Ternopil who died in Vejprty, Czechoslovakia in 1956, indicating settlement in non-Soviet Central Europe for substantial adult life.", "notes": "(24. 10. 1882, Тернопіль – 09. 02. 1956, м. Вейпрти, Чехія, перепохов. 29. 03. 2001, в Ужгороді) – піаністка, педагог. Сестра С. Рудницького та Юліана Опільського, дружина С. Дністрянського. Закін....", "url": "https://esu.com.ua/article-22322", "group": "INCLUDE", "bio": "ДНІСТРЯ́НСЬКА Софія Львівна (24. 10. 1882, Тернопіль&nbsp;— 09. 02. 1956, м. Вейпрти, Чехія, пере­похов. 29. 03. 2001, в Ужгороді)&nbsp;— піаністка, педагог. Сестра С. Рудницького та Юліана Опільського , дружина С. Дністрянського . Закін. консерваторію Галиц. муз. товариства у Львові (1908; кл. К. Мікулі, Р. Шварца), Віден. муз. академію (1912; кл. Е. Зауера, Є. Лялевича), удосконалювала фортепіан­ну майстерність у Ф. Бузоні (1912–13). У 1913–15&nbsp;— викладач Віден. муз. академії, 1916–22&nbsp;— власної муз. школи, 1922–33&nbsp;— Укр. вищого пед. університету в Празі. Засн. (1933) і дир. (до 1938) Ужгород. муз. школи. Від 1939&nbsp;— за кордоном. У Празі заснувала приватні курси, які згодом стали муз. школою. 1946–52&nbsp;— викладач фортепіано муз. шкіл у м. Трнава (Словач­чина), від 1954&nbsp;— у м. Вейпрти. Ви­ступала з сольними концертами в містах Галичини, Відні, Празі, Братиславі. Виконувала твори Ф. Шопена, Е. Ґріґа, Ф. Ліста, Б. Сметани, А. Рубінштейна, М. Лисенка, С. Людкевича, В. Барвінського, В. Косенка. Брала участь у концертах памʼяті Т. Шевченка, М. Шашкевича, Ю. Федьковича, ви­ступах т-в «Бандурист» і «Просвіта» у Львові. Акомпанувала Г. Крушельницькій , М. Менцинському , О. Носалевичу та ін. Авторка низки музико­знав. статей (зокрема про М. Лисенка, С. Людкевича, Ф. Колес­су, М. Менцинського, Л. ван Бетговена, Ф. Ліста, Дж. Пуч­чіні), спогадів про О. Мишугу, роз­відок з історії музики. Рекомендована література Гадзінський В. Концерт музичної школи Софії Дністрянської у Відні // УС. 1917, 9 черв. Google Scholar Internet Лагодинська-Залеська Г. Мій спогад про Софію Дністрянську // Овид. 1957. Ч. 4. Google Scholar Internet Мушинка М. Софія Дністрянська // Укр. календар. Варшава, 1985. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 162, "name": "Копко Максим Петрович", "by": "1859.0", "dy": "1918.0", "status": "excluded_pre_soviet", "reasoning": "Died before 1921 (death_year=1918) — pre-Soviet, outside study scope.", "notes": "(1859, с. Бор­­шевичі, н живописець. Срібні медалі Осінніх салонів (Париж, 1930—31). Орден Почесного легіону (1931). Навчався в Одеській рисувальній школі, Академії Жуліана в Парижі (викладачі...", "url": "https://esu.com.ua/article-884653", "group": "INCLUDE", "bio": "ПАВІ́ЛЬ Ілля Анатолі­йович (12. 05. 1873, Одеса&nbsp;— 1948, Рабат)&nbsp;— живописець. Срібні медалі Осін­ніх салонів (Париж, 1930–31). Орден Почесного легіону (1931). На­вчався в Одеській рисувальній школі, Академії Жуліана в Парижі (викладачі В.-А. Буґро, Е. Детайль). Учасник мистецьких ви­ставок від 1897, зокрема 2-ї (1897) та 3-ї (1899) весняних художніх ви­ставок в Одесі. Понад 30 його полотен та етюдів знаходилися в галереї одеського колекціонера живопису А. Рус­сова. Брав участь у ви­ставках Товариства пів­ден­норосійських художників в Одесі (1898, 1902). У 1898 (чи 1899) ви­їхав у Париж, де працював під іменем Елі-Анатоль. Від 1905 брав участь у французьких салонах. 1906–29 організував низку персональних ви­ставок в галереях Ґ. Пті, Л. Бернхе­йма, 1933&nbsp;— Шарпантьє. У 1930-х рр. пере­їхав до дочки в м. Мар­ракеш (Марок­ко). Рекомендована література Тв.: «Десь в Парижі», «Міський пейзаж. Біля річки», «Причал», «Рибаки», «Дочка Ліна», «Анатоль на дачі», «Проспект», «Тріумфальна арка». Літ.: Брешко-Брешковский Н. Н. Одесские художники в Париже // Одес. листок. 1903, 26 июля. Google Scholar Internet Северюхин Д. Я., Лейкинд О. Л. Художники русской эмиграции. (1917–1941): Биогр. словарь. С.-Петербург, 1994. Google Scholar Internet Товарищество южнорусских художников: Биобиблиогр. справоч. О., 2000. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 169, "name": "Кутлан Іштван", "by": "1894.0", "dy": "1969.0", "status": "non_migrated", "reasoning": "Born in Austro-Hungary (Transcarpathia), but remained in the same region (now Ukrainian SSR) throughout his life, dying in his birthplace with no evidence of emigration or forced displacement.", "notes": "(Степан) Васильович (05. 01. 1894, с. Фан­чикове, Австро-Угорщина, нині Виноградів. р-ну Закарп. обл. – 10. 10. 1969, там само) – живописець, графік, педагог і спорт­смен (кла­сична боротьба). Закін. учител....", "url": "https://esu.com.ua/article-52170", "group": "INCLUDE", "bio": "КУ́ТЛАН Іштван (Степан) Васильович (05. 01. 1894, с. Фан­чикове, Австро-Угорщина, нині Вино­градів. р-ну Закарп. обл.&nbsp;— 10. 10. 1969, там само)&nbsp;— живописець, графік, педагог і спорт­смен (кла­сична боротьба). Закін. учител. семінарію у м. Марамош-Сіґет (Румунія, 1915). Учень Ш. Гол­лоші . Працював викл. ма­люва­н­ня у Мукачів. гімназії (1920-і рр.). 1919 пере­міг чемпіона світу Й. Вондрачека. 1924&nbsp;— канд. до складу збірної Чехо-Словач­чини для участі в олімпіаді у Парижі. Навч. 1926 у Празі, 1927&nbsp;— в АМ Жульєна у Парижі. Учасник мистецьких ви­ставок від 1920-х рр. Персон.&nbsp;— в Ужгороді (1920, 1923, 1938), Празі (1928), Будапешті (1932). У рідному селі у 1930-і рр. організував школу пленеру, де працювали ві­домі угор. митці С. Пе­тер, Б. Шаму, Н. Оскар; із Й. Бок­шаєм роз­писував церкву; учителював до 1960-х рр. В ім­пресіоніст. стилі, використовуючи акварель, мас­тихін, пастель та олію, ство­рю­вав пейзажі, натюрморти, а також порт­рети, побудовані на ви­разності пози й красномовності по­гляду. Для творчості характер­не викори­ста­н­ня контрастів кольору. Про­ілюстрував абетки по-русин­ськи «Зарниця» (Уж., 1925) та румун. мови «Zuceafărul» (Praha, 1937) роз­робив азбуку з ілюстраціями угор. мовою «Abécéskönyv» (К., 1947; 1949; 1952; 1954; 1957; К.; Уж., 1965). З О. Маркушем уклав під­ручники «Гео­графія» і «Наша околиця». Серед учнів&nbsp;— М. Горонгозо . Окремі полотна зберігаються у Закарп. ХМ (Уж­город), ДТГ (Москва). Від 2007 у м. Вино­градів проводять щоріч. Між­нар. молодіж. турнір із греко-рим. боротьби ім. К. Додаткові відомості Основні твори «Сільська хата», «Млин» (обидва — 1940-і рр.), «Тиса взимку» (1947; 1958), «Молотьба в колгоспі», «Водяний млин у горах» (обидва — 1950-і рр.), «Онука» (1950), «Стара хатка у Фанчиковому» (1952; 1954), «Польові квіти», «Натюрморт із гарбузом», «Осінній пей­заж» (усі — 1956), «Біля Тиси» (1958), «Квіти мого двору» (1961), «Захід сонця над Тисою» (1962), «Квіти», «Дорога на Тису» (обидва — 1965). Рекомендована література Fancsikától Párizsig — Від Фанчикова до Парижа: [Бібліогр. покажч.]. Виноградів, 2009. Google Scholar Internet Гал О. Степан Васильович Кутлан // Новини Виноградівщини. 2010, 25 верес. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 170, "name": "Єфименко Віктор Костянтинович", "by": "1950.0", "dy": "", "status": "alive", "reasoning": "No death year — presumed alive or date unknown.", "notes": "(14. 03. 1950, Львів) – кінооператор. Член НСКінУ (1989). Закін. Київ. інститут культури (1976), ВДІК (Москва, 1988). Від 1974 працював на студії «Укркінохроніка», від 1997 – в Нац. раді України з питань...", "url": "https://esu.com.ua/article-20160", "group": "EXCLUDE", "bio": "ЄФИ́МЕНКО Віктор Костянтинович (14. 03. 1950, Львів)&nbsp;— кіно­оператор. Член НСКінУ (1989). Закін. Київ. ін­ститут культури (1976), ВДІК (Москва, 1988). Від 1974 працював на студії «Укркінохроніка», від 1997&nbsp;— в Нац. раді України з питань телебаче­н­ня та радіомовле­н­ня. Зняв фільми: «Син вітру» (1981, реж. Д. Антропов; диплом Всесоюз. фестивалю спорт. фільмів за кращий синхрон. репортаж, Фрунзе, нині Бішкек, 1981), «Жива Ватра» (1983; диплом Київ. між­нар. фестивалю «Молодість–83» за кращу оператор. майстерність), «Мир тобі, земле батьків» (1985; обидва&nbsp;— реж. І. Грабовський), «Тарас» (1989, реж. В. Сперкач), «Театр Параджанова» (1990, реж. Є. Татарець), «Довженко&nbsp;— щоден­ники 1941–45» (1992), «Батурин&nbsp;— столиця геть­мана Мазепи», «Чигирин&nbsp;— столиця геть­мана Бог­дана Хмельницького» (обидва&nbsp;— 1993; усі&nbsp;— реж. М. Він­грановський), «Родом з України» (1996, реж. Г. Цимбал, цикл телепередач), «Героям слава» (1997, реж. А. Карась), «Українські святині України» (2007, реж. О. Зотиков, 4 фільми). Завантажити статтю"}, {"idx": 171, "name": "Іванців Володимир  Опанасович", "by": "1936.0", "dy": "2019.0", "status": "non_migrated", "reasoning": "Died in Bila Tserkva, Kyiv Oblast, Ukraine — born and died in the same Ukrainian city, no displacement signals.", "notes": "(псевд. – Іван Ковзубан; 30. 10. 1936, м. Біла Церква Київ. обл. – 10. 07. 2019, там само) – поет, перекладач, літературний критик. Член НСПУ (1995). Закін. металург. факультет Київ. політех. інституту (1959),...", "url": "https://esu.com.ua/article-13451", "group": "INCLUDE", "bio": "ІВА́НЦІВ Володимир Опанасович (псевд.&nbsp;— Іван Ковзубан; 30. 10. 1936, м. Біла Церква Київ. обл.&nbsp;— 10. 07. 2019, там само)&nbsp;— поет, пере­кладач, літературний критик. Член НСПУ (1995). Закін. металург. факультет Київ. політех. ін­ституту (1959), факультет журналістики Київ. університету (1966). Працював на під­приємстві «Білоцерківсільмаш» (1959–2001): від 1986&nbsp;— ред. багатотираж. газети. Кер. літ. студії «За­спів» (від 1991). Засн. видавництва «Альманах “Біла Церква”» (1995), у якому на­друковано укр. перекл. неві­домого автора повісті «Тарас Бульба» М. Гоголя (1997). Як поет дебютував віршем «Юність мого поколі­н­ня» у рай. г. «Ленінський шлях» (1960, 5 березня). Автор зб. есе і літ.-крит. ст. «Подола­н­ня син­дрому Гоголя» (Біла Церква, 2006). Упорядник кн. спогадів «Голокіст» (К., 1992), літ. антології «“За­спів” на Порос­сі» (2001), матеріалів наук.-практ. конф. «Голод 1932–33 рр.&nbsp;— найбільша трагедія України» (2003), зб. літ. спадщини геть­мана І. Мазепи «През шаблю маєм права» (2004; усі&nbsp;— Біла Церква). У пере­кладі І. з болгар. мови ви­йшли друком твори «Подорожній, що несе іскру» К. Янева (К., 1985), з білорус.&nbsp;— «Вінок» М. Бог­дановича (Біла Церква, 1996). Видав зб. власних пере­кладів «Український знамен­ник» (К., 2009). Додаткові відомості Основні твори Русява Рось: Поезії. К., 1967; Вернутися дощем: Поезії. К., 1993; Знаки злодіяки: Сатира та гумор. Біла Церква, 1995; Український терпець: Сатира та гумор. Біла Церква, 2004; Трички-брички: Вірші для дошкільнят. Біла Церква, 2006; Івангеліє від Іванціва: Сатира та гумор. К., 2007. Рекомендована література Забаштанський В. Володимиру Іванціву — 60 // ЛУ. 1996, 6 листоп. Google Scholar Internet Мовчан П. У Білу Церкву до Іванціва // Там само. 2006, 2 листоп. Google Scholar Internet Володимир Іванців — письменник, перекладач, просвітитель: Біобібліогр. покажч. Біла Церква, 2007. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 172, "name": "Пачовський Борис", "by": "1931.0", "dy": "2010.0", "status": "migrated", "reasoning": "Born in Poland, emigrated to USA in 1950, died in New York, member of Ukrainian-American artists association (UMCA) in 1955—clear diaspora settlement in non-Soviet Western country.", "notes": "(28. 03. 1931, м. Перемишль, Польща — 11. 08. 2010, Нью-Йорк) — живописець, графік. Син Василя, брат Романа Пачовських. Член Об’єднання митців українців Америки (1955). Емігрував до США 1950. Закінчив...", "url": "https://esu.com.ua/article-885225", "group": "INCLUDE", "bio": "ПАЧО́ВСЬКИЙ Борис (28. 03. 1931, м. Пере­мишль, Польща&nbsp;— 11. 08. 2010, Нью-Йорк)&nbsp;— живописець, графік. Син Василя , брат Романа Пачовських . Член Обʼ­єд­на­н­ня митців українців Америки (1955). Емігрував до США 1950. Закінчив Нью-Йоркський міський коледж (1956, ступінь бакалавра мистецтва), школу Ліги студентів мистецтва в Нью-Йорку. Працював мистецьким керівником ж. «Musical America», «Stereo Review» (1962–84); лектором у галузі японської стародавньої графіки в Ін­ституті азійських студій в Нью-Йорку (1986–91). Зосередився пере­важно на графіці (вона в нього сюжетна й екс­пресивна), зокрема на деревориті й лінориті. З мистецького по­гляду найцін­ніші його дереворити «Юнак», «Бандурист», «Тореадор», «Рибалка», «Цезар», «Черниця», композиції «Харон», «Молитва», «Еспанський ка­прис», «Прометей», «Кавказ», «Плач», пейзажі «Над озером», «Сонце», «Тиша», «Дерево», «Водні лілеї», а з елегійних&nbsp;— цикл ангелів. Успішно працював як обдарований над­звичайною творчою уявою та широкими тематичними концепціями живописець. Близький йому й екс­пресіонізм. Учасник річних ви­ставок «Товариства молодих українських митців» у Нью-Йорку й Чикаґо (1955–58), 7-ї ви­ставки Обʼ­єд­на­н­ня митців українців Америки (1960), графічної ви­ставки трьох українських митців у Барнард коледжі (1966; обидва&nbsp;— Нью-Йорк). У 1957 екс­понував твори «Червоні жупани», «Етюд міста» (обидва&nbsp;— олія), «Молитва», «Бандурист», «Шука­н­ня», «Плач» (усі&nbsp;— дереворит), «Натюрморт» (лінорит), «Композиція» (дерево, метал). Персональна ви­ставка&nbsp;— в Українському ін­ституті Америки (Нью-Йорк, 1963). Разом з братом упорядкував архів батька. Рекомендована література Виставка Товариства молодих образотворчих митців українців: Каталог. Нью-Йорк, 1957. Google Scholar Internet Виставка українського мистецтва заходами українського виставкового комітету в Детройті 24 вересня — 2 жовтня. Детройт, 1960. Google Scholar Internet Кейван І. Українські митці поза Батьківщиною. Едмонтон; Монреаль, 1996. Google Scholar Internet 9 виставка ОМУА: Каталог. Нью-Йорк, 1973. Google Scholar Internet Стельмащук Г. Українські митці у світі: Мат. до історії укр. мист-ва ХХ ст. Л., 2013. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 173, "name": "Мандичевська Аурора Василівна", "by": "1852.0", "dy": "1911.0", "status": "excluded_pre_soviet", "reasoning": "Died before 1921 (death_year=1911) — pre-Soviet, outside study scope.", "notes": "(10. 04. 1852, с. Багринівка, нині Глибоц. р-ну Чернів. обл. – 1911, Чернівці) – піаністка. Сестра Євсев
