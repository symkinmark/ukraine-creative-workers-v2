<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>V2.6 Validation Reviewer (200 entries)</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 14px; background: #f0f2f5; color: #1a1a1a; height: 100vh; overflow: hidden; }
#app { display: flex; height: 100vh; }

/* ── Sidebar ── */
#sidebar { width: 280px; min-width: 200px; background: #1e2533; color: #c8cdd8;
            display: flex; flex-direction: column; overflow: hidden; }
#sidebar-header { padding: 12px 14px; background: #161b27; }
#sidebar-header h2 { font-size: 13px; color: #e8ecf4; margin-bottom: 6px; }
#stats-bar { font-size: 11px; color: #8892a4; line-height: 1.6; }
#stats-bar span { display: inline-block; margin-right: 8px; }
.stat-correct { color: #4caf50; }
.stat-wrong   { color: #f44336; }
.stat-skip    { color: #ff9800; }
.stat-unseen  { color: #8892a4; }
#search-box { margin: 8px 14px; padding: 5px 8px; background: #2a3248;
               border: 1px solid #3a4460; border-radius: 4px; color: #c8cdd8; font-size: 12px;
               width: calc(100% - 28px); }
#filter-bar { display: flex; gap: 4px; padding: 0 14px 8px; flex-wrap: wrap; }
.filter-btn { font-size: 10px; padding: 2px 7px; border: 1px solid #3a4460; border-radius: 12px;
               background: transparent; color: #8892a4; cursor: pointer; }
.filter-btn.active { background: #3a5bcc; border-color: #3a5bcc; color: #fff; }
#entry-list { flex: 1; overflow-y: auto; }
.entry-item { padding: 8px 14px; border-bottom: 1px solid #252c3f; cursor: pointer;
               transition: background 0.1s; border-left: 3px solid transparent; }
.entry-item:hover { background: #252c3f; }
.entry-item.active { background: #2a3a6a; }
.entry-item.decided-correct { border-left-color: #4caf50; }
.entry-item.decided-wrong   { border-left-color: #f44336; }
.entry-item.decided-skip    { border-left-color: #ff9800; }
.entry-name { font-size: 12px; color: #d0d5e0; white-space: nowrap;
               overflow: hidden; text-overflow: ellipsis; }
.entry-meta { font-size: 10px; color: #5a6480; margin-top: 2px; }
.badge { display: inline-block; font-size: 9px; padding: 1px 5px; border-radius: 3px;
          font-weight: 600; margin-right: 4px; }
.badge-inc { background: #1a3a2a; color: #4caf50; }
.badge-exc { background: #3a1a1a; color: #ef5350; }

/* ── Main panel ── */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#toolbar { background: #fff; border-bottom: 1px solid #e0e4ed; padding: 10px 20px;
             display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
#toolbar h1 { font-size: 15px; color: #333; flex: 1; }
.kbd-hint { font-size: 11px; color: #888; }
kbd { background: #f0f0f0; border: 1px solid #ccc; border-radius: 3px; padding: 1px 5px;
       font-size: 11px; font-family: monospace; }
#nav-btns { display: flex; gap: 6px; }
.nav-btn { padding: 4px 12px; border: 1px solid #d0d5e0; border-radius: 4px;
             background: #fff; cursor: pointer; font-size: 12px; color: #444; }
.nav-btn:hover { background: #f5f7fb; }
#progress-bar { height: 3px; background: #e8ecf5; flex-shrink: 0; }
#progress-fill { height: 3px; background: #3a5bcc; transition: width 0.3s; width: 0%; }
#content-area { flex: 1; overflow-y: auto; padding: 20px 28px; }
#entry-card { background: #fff; border-radius: 8px; box-shadow: 0 1px 6px rgba(0,0,0,0.08);
               padding: 24px; max-width: 860px; }
#entry-card h2 { font-size: 20px; color: #111; margin-bottom: 4px; }
.meta-row { font-size: 12px; color: #666; margin-bottom: 14px; }
.meta-row a { color: #3a5bcc; text-decoration: none; }
.meta-row a:hover { text-decoration: underline; }
.section-label { font-size: 10px; font-weight: 700; text-transform: uppercase;
                   letter-spacing: 0.05em; color: #999; margin-bottom: 4px; }
.section-box { background: #f7f9fc; border-left: 3px solid #d0d8f0; padding: 10px 14px;
                border-radius: 0 6px 6px 0; margin-bottom: 14px; font-size: 13px;
                line-height: 1.55; color: #333; max-height: 160px; overflow-y: auto; }
.bio-box { background: #f7f9fc; border-left: 3px solid #b0c4de; padding: 12px 14px;
            border-radius: 0 6px 6px 0; margin-bottom: 20px; font-size: 13px;
            line-height: 1.6; color: #333; max-height: 280px; overflow-y: auto; }
#decision-row { display: flex; gap: 10px; margin-top: 6px; flex-wrap: wrap; align-items: flex-start; }
.dec-btn { flex: 1; min-width: 120px; padding: 12px; border-radius: 6px; border: 2px solid transparent;
             font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
.dec-btn.correct { background: #e8f5e9; color: #2e7d32; border-color: #a5d6a7; }
.dec-btn.correct:hover, .dec-btn.correct.active { background: #4caf50; color: #fff; border-color: #4caf50; }
.dec-btn.wrong { background: #ffebee; color: #c62828; border-color: #ef9a9a; }
.dec-btn.wrong:hover, .dec-btn.wrong.active { background: #f44336; color: #fff; border-color: #f44336; }
.dec-btn.skip { background: #fff8e1; color: #e65100; border-color: #ffe082; }
.dec-btn.skip:hover, .dec-btn.skip.active { background: #ff9800; color: #fff; border-color: #ff9800; }

/* ── Notes box ── */
#notes-section { margin-top: 16px; }
#notes-label { font-size: 10px; font-weight: 700; text-transform: uppercase;
                letter-spacing: 0.05em; color: #999; margin-bottom: 5px; }
#notes-label.is-wrong { color: #c62828; }
#reviewer-notes { width: 100%; padding: 10px 12px; font-size: 13px; font-family: inherit;
                   border: 2px solid #e0e4ed; border-radius: 6px; resize: vertical;
                   min-height: 70px; line-height: 1.5; color: #333; background: #fafbfd;
                   transition: border-color 0.15s; }
#reviewer-notes:focus { outline: none; border-color: #3a5bcc; background: #fff; }
#reviewer-notes.is-wrong { border-color: #f44336; background: #fff8f8; }
#reviewer-notes.is-wrong:focus { border-color: #c62828; }
#notes-saved { font-size: 11px; color: #4caf50; margin-top: 4px; opacity: 0;
                transition: opacity 0.3s; height: 16px; }

/* ── Export modal ── */
#export-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; }
#export-modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
                 background: #fff; border-radius: 10px; padding: 28px; min-width: 400px;
                 box-shadow: 0 8px 40px rgba(0,0,0,0.3); }
#export-modal h3 { font-size: 16px; margin-bottom: 16px; }
.export-btn { display: block; width: 100%; padding: 10px 14px; margin-bottom: 10px;
               border: 1px solid #d0d5e0; border-radius: 6px; background: #f5f7fb;
               cursor: pointer; font-size: 13px; text-align: left; }
.export-btn:hover { background: #e8ecf5; }
.export-close { margin-top: 8px; background: #fff; border: 1px solid #ccc; padding: 8px;
                 border-radius: 6px; cursor: pointer; width: 100%; font-size: 13px; }
</style>
</head>
<body>
<div id="app">

  <!-- Sidebar -->
  <div id="sidebar">
    <div id="sidebar-header">
      <h2>Validation Reviewer v2.6</h2>
      <div id="stats-bar">
        <span class="stat-correct">✓ <span id="s-correct">0</span></span>
        <span class="stat-wrong">✗ <span id="s-wrong">0</span></span>
        <span class="stat-skip">~ <span id="s-skip">0</span></span>
        <span class="stat-unseen">? <span id="s-unseen">200</span></span>
        <br>
        <span id="s-pct">0%</span> complete
      </div>
    </div>
    <input id="search-box" type="text" placeholder="Search name…" oninput="filterList()">
    <div id="filter-bar">
      <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('unseen',this)">Unseen</button>
      <button class="filter-btn" onclick="setFilter('correct',this)">Correct</button>
      <button class="filter-btn" onclick="setFilter('wrong',this)">Wrong</button>
      <button class="filter-btn" onclick="setFilter('INCLUDE',this)">INCLUDE</button>
      <button class="filter-btn" onclick="setFilter('EXCLUDE',this)">EXCLUDE</button>
    </div>
    <div id="entry-list"></div>
  </div>

  <!-- Main -->
  <div id="main">
    <div id="toolbar">
      <h1 id="toolbar-title">Select an entry</h1>
      <span class="kbd-hint">
        <kbd>C</kbd> Correct &nbsp;
        <kbd>W</kbd> Wrong &nbsp;
        <kbd>S</kbd> Skip &nbsp;
        <kbd>←</kbd><kbd>→</kbd> Navigate
      </span>
      <div id="nav-btns">
        <button class="nav-btn" onclick="navigate(-1)">← Prev</button>
        <button class="nav-btn" onclick="navigate(1)">Next →</button>
        <button class="nav-btn" onclick="openExport()">Export ↗</button>
      </div>
    </div>
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <div id="content-area">
      <div id="entry-card">
        <p style="color:#999;text-align:center;padding:40px 0">Select an entry from the sidebar to begin reviewing.</p>
      </div>
    </div>
  </div>

</div>

<!-- Export modal -->
<div id="export-overlay" onclick="if(event.target===this)this.style.display='none'">
  <div id="export-modal">
    <h3>Export Results</h3>
    <div id="export-summary" style="font-size:12px;color:#555;margin-bottom:14px;line-height:1.6"></div>
    <button class="export-btn" onclick="downloadJSON()">⬇ Download JSON</button>
    <button class="export-btn" onclick="downloadCSV()">⬇ Download CSV</button>
    <button class="export-btn" onclick="copyToClipboard()">📋 Copy JSON to clipboard</button>
    <div id="export-count" style="font-size:12px;color:#888;margin:8px 0"></div>
    <button class="export-close" onclick="document.getElementById('export-overlay').style.display='none'">Close</button>
  </div>
</div>

рун. квартету. Їхній брат Леонід Якович (18. 02. 1886, Одеса&nbsp;— 25. 06. 1950, там само)&nbsp;— трубач, педагог, диригент. Професор (1947). Закін. Одес. муз. училище (1902). Мешкав і працював в Одесі: 1908–13&nbsp;— соліст оркестру Опер. театру, водночас викл. Муз. училища; 1913–50&nbsp;— викладач Консерваторії: від 1935&nbsp;— завідувач кафедри духових інструментів; за сумісництвом 1922–24&nbsp;— диригент пере­сув. Опер. театру, 1927–38&nbsp;— симф. оркестру Радіо, 1939–42&nbsp;— симф. оркестру Філармонії. 1942–45 пере­бував в евакуації в Ашґабаті, викладав у місц. муз. училищі, був диригентом драм. театру. 1945 повернувся до Одеси. Автор наук.-метод. праць, транс­крипцій для труби творів В.-А. Моцарта, Л. ван Бетговена, К. Сен-Санса, Р. Штраус­са. Піаністи&nbsp;— його дочка Серафима Леонідівна (15. 11. 1915, Одеса&nbsp;— 05. 05. 2016, м. Кельн, Німеч­чина). Закін. Одес. консерваторію (1938; кл. М. Старкової), аспірантуру при Моск. консерваторії (1941; кер. Г. Нейгауз). Ви­ступала з концертами пере­важно в Одесі. 1945–82&nbsp;— доц. Одес. консерваторії. Від 1990-х рр. мешкала в Німеч­чині. Авторка книги про фортепіан­не мистецтво. Серед учнів&nbsp;— О. Ботвинов, В. Дашковський, М. Легоцький, Ф. Любарський. Її син Євген Гедеонович (16. 09. 1945, Одеса). Заслужений артист РРФСР (1987). Лауреат Між­нар. конкурсу піаністів ім. королеви Єлизавети у Брюс­селі (1964, 1-а премія і золота медаль). За­кін. Моск. консерваторію (1968; кл. Г. та С. Нейгаузів) та аспірантуру при ній (1971; кер. Я. Зак). Від 1966&nbsp;— соліст Моск. філармонії; від 1971&nbsp;— викладач Моск., від 1992&nbsp;— проф. Брюс­сел. консе"}, {"idx": 1, "name": "Білоус-Гарасевич Марія Савівна", "by": "1918.0", "dy": "2004.0", "status": "migrated", "reasoning": "Ukrainian writer born in Soviet Ukraine, died in Sterling Heights, Michigan, USA in 2004, indicating emigration to North America and settlement outside the Soviet sphere.", "notes": "(14. 10. 1918, м. Знам’янка, нині Кіровогр. обл. – 27. 12. 2004, м. Стерлінг-Гайтс, шт. Мічиган, США) – письменниця. Закін. Київський університет (1941). Під час 2-ї світової війни працювала зав. навч. частини...", "url": "https://esu.com.ua/article-40894", "group": "INCLUDE", "bio": "БІЛОУ́С-ГАРАСЕ́ВИЧ Марія Савівна (14. 10. 1918, м. Знамʼянка, нині Кіровогр. обл.&nbsp;— 27. 12. 2004, м. Стерлінг-Гайтс, шт. Мічиган, США)&nbsp;— письмен­ниця. Закін. Київський університет (1941). Під час 2-ї світової війни працювала зав. навч. частини серед. школи у Воронежі, згодом ін­спектором-методистом і зав. метод. кабінету при Мінераловодському рай­вно на Пн. Кавказі. Друкувалася від 1952 у газетах «Вільне слово», «Новий шлях» (Торонто), «Свобода» (Нью-Джерсі), журналах «Нові дні» (Торонто), «Овид» (Чикаґо), «Дзвони» (Рим), альманасі Обʼ­єдн. укр. письмен­ників «Слово». Авторка оглядів, статей, літ. порт­ретів, есе про Дж. Стейнбека, У. Самчука, Яра Славутича, Т. Курпіту, Г. Черінь, М. Коцюбинського, І. Нечуя-Левицького, Лесю Українку, Б. Лепкого, В. Стуса, О. Веретенченка. Була членом Обʼ­єдн. укр. письмен­ників в екзилі, чл. журі Укр. літ. фонду ім. І. Франка в Чикаґо. Завантажити статтю"}, {"idx": 2, "name": "Зозе Євген", "by": "1917.0", "dy": "1917.0", "status": "excluded_bad_dates", "reasoning": "Died before 1921 (death_year=1917) — pre-Soviet, outside study scope.", "notes": "(справж. – Шведченко; 1917, Полтавщина – ?) – поет. Здобув тех. освіту. 1942 вивезений до Німеччини на примус. роботи. Після 2-ї світової війни жив у Зх. Німеччині, від 1948 – у Франції, від 1951 – в...", "url": "https://esu.com.ua/article-16891", "group": "EXCLUDE", "bio": "ЗОЗЕ́ Євген (справж.&nbsp;— Шведченко; 1917, Полтавщина&nbsp;— ?)&nbsp;— поет. Здобув тех. освіту. 1942 вивезений до Німеч­чини на примус. роботи. Після 2-ї світової війни жив у Зх. Німеч­чині, від 1948&nbsp;— у Франції, від 1951&nbsp;— в Австралії. Спів­засн. Демократ. обʼ­єд­на­н­ня бувших ре­пресов. українців совєтами (Мюнхен, 1951). Актив. діяч Укр. громади Пд. Австралії. Друкуватися почав ще в Україні. Його поезії притаман­ні довільність форми, фрагментарність. Опублікував в альманасі «Новий обрій» (Мельбурн) низку своїх віршів, оповідань, спогадів («Ліквідація», 1999, ч. 11), пере­кладів з англ. мови поезій Р. Мор­рісона (1993, 1997). Добірки віршів З. на­друк. у зб. «Рідні голоси з далекого континенту» (К., 1993) та в перекл. англ. мовою Р. Мор­рісона у кн. «Australiaʼs Ukrainian Poets» («Українські поети Австралії», Мельбурн, 1973). Завантажити статтю"}, {"idx": 3, "name": "Гурвич Ірина  Борисівна", "by": "1911.0", "dy": "1995.0", "status": "non_migrated", "reasoning": "Born in Letychiv, Ukraine in 1911, graduated from Kyiv Art Institute in 1934, worked in Ukraine subsequently, died in Kyiv in 1995 with no evidence of emigration or forced displacement.", "notes": "(17(30). 06. 1911, м. Летичів Поділ. губ., нині Хмельн. обл. – 30. 03. 1995, Київ) – режисер-мультиплікатор. Заслужений діяч мистецтв УРСР (1973). Закін. Київський художній інститут (1934). Відтоді працювала у...", "url": "https://esu.com.ua/article-24764", "group": "INCLUDE", "bio": "ГУ́РВИЧ Ірина Борисівна (17(30). 06. 1911, м. Летичів Поділ. губ., нині Хмельн. обл.&nbsp;— 30. 03. 1995, Київ)&nbsp;— режисер-мультиплікатор. Заслужений діяч мистецтв УРСР (1973). Закін. Київський художній ін­ститут (1934). Від­тоді працювала у від­ділі худож. мультиплікації Київ. кіностудії худож. фільмів, від 1940&nbsp;— на «Київнаукфільмі», де від 1959 ставила фільми худож. мультиплікації (1966–87&nbsp;— худож. кер. Твор. обʼ­єдн. худож. мультиплікації, нині «Укранімафільм»). Художник-мультиплікатор стрічок «Заро­зуміле курча» (1935), «Казка про Івана» (1936), «Папанінці» (1936), «Дні­про», «Дис­петчерський сигнал» (1937–41) та ін. По­ставила фільми «Пригоди Перця» (1961, спів­авт.), «Супутниця королеви» (1962), «Заєць і їжак», «Золоте яєчко» (обидва&nbsp;— 1963), «Лелеченя» (1964), «Зелена кнопка» (1965), «Злісний роз­трощувач яєць» (1966), «Легенда про полумʼяне серце» (1967), «Опудало», «Казка про місячне сяйво» (обидва&nbsp;— 1968), «Кіт і Кит», «Марс–ХХ» (обидва&nbsp;— 1969), «Журавлик» (1970), «Про смугасте слоненя», «Дивовижне китеня» (обидва&nbsp;— 1971), «Як жінки чоловіків продавали» (1972; спец. приз журі 2-го Вкф мультфільмів, Заґреб, 1973), «Теплий хліб» (1973), «Пригоди жирафки», «Вересковий мед» (обидва&nbsp;— 1974), «Салют» (1975), «Як чоловіки жінок провчили» (1976), «Чому в ослика довгі вуха» (1977), «Нічні капітани» (1978), «Люлька миру» (1979), «Якось я при­йшов додому» (1980), «Колискова» (1984), «Гра» (1985), «Гаврош» (1986), «Біла арена» (1987), «Ой, куди ж ти їдеш...» (1988), «Недоколихана» (1989) та ін. Завантажити статтю"}, {"idx": 4, "name": "Андрущук Микола Михайлович", "by": "1958.0", "dy": "1998.0", "status": "non_migrated", "reasoning": "Born in Volyn region (Ukraine) and died in Lviv (Ukraine) in 1998 — both birth and death locations are within Ukraine, with no signals of deportation, emigration, or diaspora membership.", "notes": "(07. 05.\n1958, с. Прилуцьке Ківерців.  р-ну Волин. обл. – 30. 01. 1998, Львів) – художник, графік, кераміст. Член НСХУ (1994). Закін. Львів. інститут декор. і приклад. мистецтва (1984, викл. І. Франк, Д. Крвавич)....", "url": "https://esu.com.ua/article-44305", "group": "INCLUDE", "bio": "АНДРУЩУ́К Микола Михайлович (07. 05. 1958, с. Прилуцьке Ківерців. р-ну Волин. обл.&nbsp;— 30. 01. 1998, Львів)&nbsp;— художник, графік, кераміст. Член НСХУ (1994). Закін. Львів. ін­ститут декор. і приклад. мистецтва (1984, викл. І. Франк , Д. Крвавич ). 1985–88&nbsp;— ре­ставратор стародав. живопису у Львів. філіалі Держ. н.-д. ре­ставрац. майстерень; 1988–98&nbsp;— художник Львів. екс­перим. кераміко-скульптур. ф-ки. Брав участь у між­нар. та всеукр. ви­ставках; персон.&nbsp;— 1994–98 (Львів). Працював у галузі станк. скульптури (жанри: порт­рет-символ, абстрактна композиція; матеріали: шамот, камінь, камʼяна маса, гіпс, бронза; поверх­ні робіт пере­важно фактурні, часто з поліхромією, елементами графіки). Твори вирізняються християнсько-нац. та філос. спрямува­н­ням; у них при лаконічності худож. висловлюва­н­ня виявляється гармон. врівноваженість форми (лінія, силует, організація простору) із по­глибл. змістом та довершеністю композиції. По­єд­нував досягне­н­ня світ. авангард. пласт. мистецтва з традиціями нац. культури. Твори зберігаються у Хмельн. ХМ, Львів. картин. галереї, Львів. нац. музеї. Додаткові відомості Основні твори «Крокуюча форма», «Титан» (обидва — 1988); «Пієта», «Молитва» (обидва — 1989); «Мойсей» (1992); «Фуґа», «Велика форма», «Задума» (всі — 1994); «Материнство» (1996). Рекомендована література Бойко Ю. Народження нового мистецького об’єднання товариства «Шлях» // Наше життя. 1990. № 4. Google Scholar Internet Чорна М. Про виставку об’єднання «Шлях» // Ратуша. 1992, 30 лип. Google Scholar Internet Термінатор Ю. Шляхи «Шляху»: 1989– 1992, або Спроба есеїстичної препарації // Ратуша. 1992, 22 серп. Google Scholar Internet Дорош А. Виставка творів Михайла Красника та Миколи Андрущука // Пост-Поступ. 1994, 9 верес. Google Scholar Internet Бойко Ю. На роздоріжжі, або Деякі думки про сучасне мистецтво в Україні // Сучасність. 1996. № 9. Google Scholar Internet Яців Р. Зупинена незбагненність // Назустріч. 1998. № 1. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 5, "name": "Коваленко Микола Васильович", "by": "1887.0", "dy": "1956.0", "status": "non_migrated", "reasoning": "Poet born in Palpchyk (Cherkasy region) and died in Sosnyvka (Kyiv region), both within Ukrainian SSR; no evidence of emigration, deportation, or transfer to another Soviet republic.", "notes": "(псевд.: Микола К., Селянин К., Селянин, К-о; 10. 01. 1887, с. Пальчик, нині Катеринопіл. р-ну Черкас. обл. – 09. 04. 1956, с. Соснівка Іванків. р-ну Київ. обл.) – поет. Склав екстерном екзамен на учителя....", "url": "https://esu.com.ua/article-8300", "group": "INCLUDE", "bio": "КОВАЛЕ́НКО Микола Васильович (псевд.: Микола К., Селянин К., Селянин, К-о; 10. 01. 1887, с. Пальчик, нині Катеринопіл. р-ну Черкас. обл.&nbsp;— 09. 04. 1956, с. Соснівка Іванків. р-ну Київ. обл.)&nbsp;— поет. Склав екс­терном екзамен на учителя. Учителював. Друкувався від 1906 у г. «Громадська думка», ж. «Рідний край». Осн. мотиви зб. «Під хрестом життя» (1910)&nbsp;— зневіра і роз­губленість. Уболіва­н­ням за долю рідного народу та вірою у його воскресі­н­ня пройнята зб. «Огнен­на сльоза» (1917). У зб. «В кривавім тумані» (1918) від­значив, що громадян. війна&nbsp;— величезна трагедія народу, насамперед селян. У віршах, опубл. після 1917 у періодиці, від­творив нову соц. дійсність. За­знавши вульгарно-соціол. критики, ві­ді­йшов від літ-ри. 1923–28&nbsp;— у Житомирі: слухач мед. ін­ституту, ред. г. «Сільські віхи». Літ. працівник радіокомітету у Харкові. Написав роман «Червоні зигзаги», поему «Степ», бл. 200 загадок. Рекомендована література Лаврінович К. Занедбані й забуті // Мистецтво. 1919. № 2. Google Scholar Internet Півторадні В. Українська література перших років революції (1917–1923 рр.). К., 1968. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 6, "name": "Ґостинська Владислава", "by": "1858.0", "dy": "1934.0", "status": "excluded_galicia_pre_annexation", "reasoning": "Born in Galicia, died 1934 — before 1939 USSR annexation of western Ukraine. Never under Soviet rule.", "notes": "(1858, Львів – 1934, там само) – скульпторка. Навч. у Львів. худож.-пром. школі (1880–83; викл. Т. Вишньовецький), у Відні в Худож.-пром. школі та в майстерні С.-Р. Левандовського (1884–86). Від 1886 працювала у...", "url": "https://esu.com.ua/article-25744", "group": "EXCLUDE", "bio": "ҐОСТИ́НСЬКА Владислава (1858, Львів&nbsp;— 1934, там само)&nbsp;— скульпторка. Навч. у Львів. худож.-пром. школі (1880–83; викл. Т. Вишньовецький), у Відні в Худож.-пром. школі та в майстерні С.-Р. Левандовського (1884–86). Від 1886 працювала у Львові, викладала рисунок у жін. учител. семінарії. Брала участь у львів. мист. ви­ставках від 1886. На Заг. кра­йовій ви­ставці 1894 екс­понувала книжк. шафу, оздоблену різьбленими і живопис. орнаментами, що стилізували мотиви гуцул. керам. виробів О. Бахметюка. Виконувала у тонованому під бронзу гіпсі, теракоті і бронзі порт­ретні погру­д­дя, плакети та медаль­йони ві­домих львівʼян (зокрема «Ф. Боберська», 1889; «С. Невядомський», 1891; «Е. Лозинський», 1900). У 1889 виконала бронз. порт­рет. медаль­йон для памʼятника Ф. Боберської (автор С.-Р. Левандовський) у львів. костелі кармелітів св. Михаїла. Порт­ретні погру­д­дя трактувала як композиції побут. жанру: «Чернець», «Італійка» (обидві&nbsp;— 1886), «Старець» (1887), «Пустун» (1894). Різьбила також твори на істор. тему. Скульптура «І. Богун» (1888), ін­спірована романами Г. Сенкевича, пред­ставляла енергійно виліплену по­стать молодого укр. козака, «сина степів». Для творчості Ґ. властиві реалізм, увага до деталей, у порт­ретах&nbsp;— глибока психол. характеристика. Від поч. 20 ст. зверталася до ім­пресіонізму й символізму (напр., у бронз. скульптурах «Думка» і «Ворожка», обидві&nbsp;— 1905). Роботи зберігаються у Львів. галереї мистецтв та істор. музеї. Завантажити статтю"}, {"idx": 7, "name": "Бойко Леонід Сергійович", "by": "1928.0", "dy": "2017.0", "status": "non_migrated", "reasoning": "Born in Ukrainian SSR (Nykopol region), died in Kyiv; no evidence of emigration, forced displacement, or voluntary transfer to another Soviet republic.", "notes": "(07. 12. 1928, с. Городище, нині Нікопол. р-ну Дніпроп. обл. – 15. 12. 2017, Київ) – літературознавець і критик. Закін. Київський університет (1961). Кандидат філологічних наук (1980). Член НСПУ (1975). У 1963– 67 –...", "url": "https://esu.com.ua/article-36107", "group": "INCLUDE", "bio": "БО́ЙКО Леонід Сергі­йович (07. 12. 1928, с. Городище, нині Нікопол. р-ну Дні­проп. обл.&nbsp;— 15. 12. 2017, Київ)&nbsp;— літературо­знавець і критик. Закін. Київський університет (1961). Кандидат філологічних наук (1980). Член НСПУ (1975). У 1963– 67&nbsp;— кор. г. «Літературна Україна», 1967–68&nbsp;— відп. секр. Комісії критики СПУ, 1968–72&nbsp;— оргсекр. правлі­н­ня СПУ, 1972–77&nbsp;— за­ступник секр. правлі­н­ня СПУ, 1978–81&nbsp;— за­ступник гол. ред. ж. «Радянське літературо­знавство» (нині «Слово і час»), від 1981&nbsp;— в. о. вченого секр., м. н. с., ст. н. с. Ін­ституту літ-ри НАНУ, від 1995&nbsp;— гол. ред. видавн. дому «КМ Academia». Друкувався від 1961. Автор зб. літ.-крит. статей «Сенс життя людського» (1972) та нарисів «Згусток неспокою» (1978), моно­графій «Пилип Капельгородський. Нарис життя і творчості» (1982), «Історико-революційна проза Пилипа Капельгородського» (1983), «З когорти одержимих. Життя і творчість Бориса Антоненка-Давидовича в літературному процесі 20 ст.», «Подвижник духу» (обидві&nbsp;— 2003); роз­шукав, упорядкував і прокоментував неві­домі й малові­домі твори Б. Антоненка-Давидовича у кн. «Нащадки прадідів» (1998). Брав участь у наук. ви­да­н­нях: «Бій ішов святий і правий» (1986), «Діалектика художнього пошуку. Літературний процес 60–80-х років» (1989), «20-і роки: літературні дис­кусії, полеміки» (1991), «З порога смерті... Письмен­ники України&nbsp;— жертви сталінських ре­пресій» (1991), «Історія української літератури 20 столі­т­тя» у двох книгах (1993–95). Усі на­звані книги опубл. в Києві. Автор перед­мов та післямов до вид. творів Олени Журливої (1966), Є. Кротевича (1968), П. Капельгородського (1982), Д. Бузька (1991), Б. Антоненка-Давидовича (1999), числен. критичних, літературо­знав. і публіцист. статей у періодиці. Рекомендована література Здоровега В. Документалістика: здобутки і прорахунки // Жовтень. 1980. № 1. Google Scholar Internet Наєнко М. Дійсністю окрилений // ЛУ. 1983, 7 квіт. Google Scholar Internet Стешенкова Т. Книжка, на яку він чекав усе життя // Там само. 1998, 8 жовт. Google Scholar Internet Коновал О. Нащадки прадідів Б. Антоненка-Давидовича // УВ. 1998, 18 жовт. Google Scholar Internet Никанорова О. Стійкий і непоступливий // Уряд. кур’єр. 1998, 27 жовт. Google Scholar Internet Кононенко П. Друге дихання // ЛУ. 1998, 31 груд. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 8, "name": "Мнішек Анджей-Єжи-Філіп", "by": "1823.0", "dy": "1905.0", "status": "excluded_pre_soviet", "reasoning": "Died before 1921 (death_year=1905) — pre-Soviet, outside study scope.", "notes": "(21. 11. 1823, містечко Вишнівець, нині смт Збараз. р-ну Терноп. обл. – 11. 05. 1905, Париж) – живописець, колекціонер. Успадкувавши 1846 разом із братом родин. маєток у Вишнівці, 1854 продав палац та частину...", "url": "https://esu.com.ua/article-68143", "group": "EXCLUDE", "bio": "МНІ́ШЕК Анджей-Єжи-Філіп-Стані­слав (21. 11. 1823, містечко Вишнівець, нині смт Збараз. р-ну Терноп. обл.&nbsp;— 11. 05. 1905, Париж)&nbsp;— живописець, колекціонер. Успадкувавши 1846 разом із братом родин. маєток у Вишнівці, 1854 продав палац та частину б-ки. Найцін­ніші мист. твори (серед. 18 ст.) вивіз до Парижа. Малярство студіював приватно в Ж. Ґіґу та Л. Коньє. У Парижі від­крив живописну майстерню. Створював пере­важно порт­рети. Картини М. екс­понували в Кракові (1877, 1885, 1887), Варшаві (1882, 1896), Львові (1894), Лондоні (1880), Парижі (1888, 1918) та Відні (1913). Колекціонував твори фламанд., гол­ланд. та італ. художників. Один із перших колекціонерів робіт гол­ланд. живописця Ф. Галса. Колекція нараховувала бл. 500 картин, гравюр, малюнків, кераміки, меблів, годин­ників, муз. інструментів. 1902 і 1910 частину зі­бра­н­ня М. про­дано на аукціоні. Завантажити статтю"}, {"idx": 9, "name": "Гринюк Юрій  Михайлович", "by": "1891.0", "dy": "1937.0", "status": "excluded_galicia_pre_annexation", "reasoning": "Born in Galicia, died 1937 — before 1939 USSR annexation of western Ukraine. Never under Soviet rule.", "notes": "(1891, с. Воскресинці, нині Коломий. р-ну Івано-Фр. обл. – 03. 12. 1937, побл. м. Медвежьєгорськ, Карелія, РФ) – поет. Навч. у Львів. університеті (1913–14). Від 1914 – в австро-угор. армії. Засудж. до 6-ти місяців...", "url": "https://esu.com.ua/article-31695", "group": "EXCLUDE", "bio": "ГРИНЮ́К Юрій Михайлович (1891, с. Воскресинці, нині Коломий. р-ну Івано-Фр. обл.&nbsp;— 03. 12. 1937, побл. м. Медвежьєгорськ, Карелія, РФ)&nbsp;— поет. Навч. у Львів. університеті (1913–14). Від 1914&nbsp;— в австро-угор. армії. Засудж. до 6-ти місяців увʼязне­н­ня у військ. фортеці за те, що роз­давав солдатам власні сатир. та антивоєн­ні вірші. Покара­н­ня від­бував у м. Куфштайн в Тиролі (Австрія). 1915 направлений на лікува­н­ня в м. Ін­нсбрук (Австрія), оздоровчі табори Чехії та Угорщини. 1917 ви­знаний придатним до канцеляр. служби, направлений до Львова. 1918 повернувся до Коломиї. Член літ. організації «Зх. Україна». Автор зб. віршів «В кривавому танці» (Коломия, 1919), новел (друкував у періодиці, зокрема у ж. «Добра новина»). Заарешт. у серпні румун. службою без­пеки, пере­даний польс. владі. Після втечі з увʼязне­н­ня прибув до м. Камʼянець-Подільський (нині Хмельн. обл.), вступив на службу до уряду УНР. На­прикінці 1919 при­знач. нач. від­ділу політ. інформації у Він­ниці. Після приходу у січні 1920 більшовиків Г. пере­йшов на їхній бік. Після організації на Сх. Поділ­лі Галиц. парткому спів­працював із губерн. ЧК; у ред. г. «Червоний стрілець». У період пере­бува­н­ня УГА у складі Червоної армії служив при штабі. У квітні потрапив у полон до поляків, пере­бував у вʼязницях, утік. Працював у держ. установах Він­ниці, за­ймався українізацією. Від 1929&nbsp;— викладач української мови у навч. закладах. На­прикінці 20-х&nbsp;— на поч. 30-х рр. подав у видавництво «Зх. Україна» поет. зб. «У світ за-очі», «Залізом спів­аю» (не на­друк., рукописи&nbsp;— у фонді видавництва у ЦДАМЛМ). 10 лютого 1933 заарешт. органами ГПУ, 27 жовтня того ж року засудж. до 10-ти р. таборів за участь у «Поділ. філії УВО». Покара­н­ня від­бував у Карелії, де працював на лісобіржі. 1937 заарешт. за звинуваче­н­ням у ворожому ставлен­ні до заходів партії, рад. уряду та провокації. 20 листопада засудж. до роз­стрілу. Реабіліт. 1989. Рекомендована література Мельник В. Поет і тюрма // Україна молода. 2006, 11 січ. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 10, "name": "Бородін Василь  Степанович", "by": "1930.0", "dy": "2011.0", "status": "non_migrated", "reasoning": "Born in Russian territory (Kursk region), worked as a literary scholar, and died in Kyiv with no evidence of emigration to non-Soviet countries or forced displacement.", "notes": "(23. 02. 1930, с. Прилепи, нині Курської обл., РФ – 21. 06. 2011, Київ) – літературознавець. Доктор філологічних наук (1981). Державна премія України імені Тараса Шевченка (1980). Закінчив Харківський...", "url": "https://esu.com.ua/article-37306", "group": "INCLUDE", "bio": "БОРОДІ́Н Василь Степанович (23. 02. 1930, с. Прилепи, нині Курської обл., РФ&nbsp;— 21. 06. 2011, Київ)&nbsp;— літературо­знавець. Доктор філологічних наук (1981). Державна премія України імені Тараса Шевченка (1980). Закінчив Харківський університет (1953). Від 1956 працював в Ін­ституті літератури НАНУ (Київ): 1984–96&nbsp;— завідувач від­ділу шевченко­знавства, від 1996&nbsp;— провід­ний науковий спів­робітник. Досліджував життя і творчість Т. Шевченка. Автор книг: «Соціально-побутові поеми Т. Г. Шевченка періоду “Трьох літ” (1843–1845 рр.)» (1958), «Три поеми Т. Г. Шевченка: “Сова”, “Сліпий”, “Наймичка”» (1964), «Т. Г. Шевченко і царська цензура: Дослідже­н­ня та документи. 1840–1862 рр.» (1969, з додатком факсимільного копії рукописної збірки «Поезія Т. Шевченка. Том перший», нед­опущеної цензурою до ви­да­н­ня у 1859), «Над текс­тами Т. Г. Шевченка» (1971; усі&nbsp;— Київ), «Путь “Кобзаря”: Судьба книги Т. Шевченко» (Москва, 1978; вірменською мовою&nbsp;— у спів­авторстві, Єреван, 1993). Спів­автор моно­графій: «Шевченко­знавство. Під­сумки й про­блеми» (1975), «Творчий метод і поетика Т. Г. Шевченка» (1980), «Т. Г. Шевченко: Біо­графія» (1984). Один з активних творців (за­ступник від­повід­ального редактора) фундаментальної енциклопедії «Шевченківського словника» (т. 1–2, 1976–77). Під науковим керівництвом Б. і з його участю створена збірка наукових праць: «Пита­н­ня текс­тології: Т. Г. Шевченко» (1990), «Проект тематичного словника Шевченківської Енциклопедії», під­готовлено корпус «Листи до Тараса Шевченка» (обидва&nbsp;— 1993; усі&nbsp;— Київ). У тематиці числен­них шевченко­знавчих статей і роз­відок Б. провід­не місце належить комплексним дослідже­н­ням про­блем шевченківської текс­тології в усіх її теоретичних і практичних аспектах, цензурної долі та історії ви­дань і публікацій творів поета, роз­робці філологічної концепції та принципів під­готовки академічного ви­да­н­ня його спадщини. Значна частина праць Б. присвячена архівно-документальним пошукам, публікації виявлених ним раніше неві­домих творів, авто­графів, листів, нових документів, мемуарних, епістолярних матеріалів про Т. Шевченка. Серед них&nbsp;— ґрунтовна збірка «Спогади про Тараса Шевченка» (1982; 1989, під­готовка та коментува­н­ня, у спів­авторстві). Б. брав участь у текс­тологічній під­готовці та коментуван­ні академічних повних зі­брань творів Т. Шевченка в 6-ти томах (т. 1–4, 6, 1963–64) та 12-ти томах (т. 1, 2, 1989–90), творів у 5-ти томах (т. 1–5, 1978–79; т. 3, 4, 5, 1984), «Творів» М. Костомарова в 2-х томах (т. 1–2, 1967), І. Франка в 3-х томах (т. 2, 1973; усі&nbsp;— Київ). Окремими ви­да­н­нями ви­йшли під­готовлені Б. «Балади» (1982), «Повісті» (1986; 1988), «Автобио­графия. Дневник» (1988; усі&nbsp;— Київ), збірники поезій у російському пере­кладі («Кобзарь», 1980; 1984; «Из­бран­ные сочинения», 1987; обидва&nbsp;— Москва). Рекомендована література Пільгук І. Дослідження текстолога // ЛУ. 1972, 31 берез. Google Scholar Internet Комаринець Т. Предмет дос"}, {"idx": 11, "name": "Внуковський Григорій  Іванович", "by": "1879.0", "dy": "1879.0 енків. Державна премія України імені Тараса...", "url": "https://esu.com.ua/article-55260", "group": "INCLUDE", "bio": "ЛИТО́ВЧЕНКО Марія Тимофіївна (22. 06. 1927, с. Гупалівка Магдалинів. р-ну, нині Дні­проп. обл.&nbsp;— 25. 10. 2014, Київ)&nbsp;— художниця декоративного текс­тилю. Дружина Івана , мати Наталії Литовченків. Державна премія України імені Тараса Шевченка (1998). Заслужений художник України (1996). Член НСХУ (1965). Закін. Львів. ін­ститут прикладного та декоративного мистецтва (1961; викл. М. Бавструк). На твор. ро­боті. Учасниця обл., всеукр. худож. ви­ставок від 1961. Персон.&nbsp;— у Києві (1994, 1997, 2001, посмертна&nbsp;— 2016). Роботи від­значаються яскравою нац. спря­мованістю, новатор. манерою викона­н­ня, де про­стежується звʼя­зок із традиц. нар. мистецтвом. Додаткові відомості Основні твори гобелени — «Т. Шевченко і Україна» (1960), «Пробудження» (1968), «Ве­сілля» (1969), «Музами натхнена» (1972), «Народні месники» (1975), «Зем­ля квітує» (1978), «Творчість» (1982), «На землі Черкаській» (1984, Черкас. краєзн. музей), «Голуба Волинь» (1987, Палац урочистих подій, Луцьк), три­птих «Витоки слов’янської писемності» (1990, НБУВ), «Прометей» (1989), «Тро­їсті музики», «Закохані», «Птах фенікс» (усі — 1990), «Тривога», «Молитва», «Музика», «Пісня» (усі — 1991), «Боротьба», «Поет» (обидва — 1992), «Вир», «Двоє» (обидва — 1993), «Дума про Україну» (1995), «Рек­вієм» (1996; усі — спів­авт.). Рекомендована література Чегусова З. Іван, Марія та На­­талка Литовченки // ОМ. 1997. № 3–4. Google Scholar Internet Литовченко: Альбом. К., 1999. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 15, "name": "Король Митрофан Спиридонович", "by": "1874.0", "dy": "1920.0", "status": "excluded_pre_soviet", "reasoning": "Died before 1921 (death_year=1920) — pre-Soviet, outside study scope.", "notes": "(псевд.: Король-Тугий Д. С., Тугий, Эмка, К-оль Т., Мамин М.; 12. 11. 1874, м. Армянський вський університет (1985), ви­вчав таджиц. і перську мови та класичну й сучасну літ-ри Сходу в Ін­ституті мови та літ-ри в Душанбе (1985–88). Від 1989&nbsp;— науковий спів­робітник Ін­ституту літ-ри НАНУ (Київ); від 1995&nbsp;— на дипломат. роботі в МЗС України, зокрема 1998–2000 працював у посольстві України в Паки­стані, 2001–02&nbsp;— держ. екс­перт із питань від­носин із країнами Близ. й Серед. Сходу Ради нац. без­пеки та оборони України, 2002–04&nbsp;— в місії ОБСЄ та ін. проектах у Таджики­стані; 2005–07&nbsp;— за­ступник ген. дир. Між­регіон. академії упр. персоналом та ред. г. «Між­народний академічний вісник». Від 2007&nbsp;— на творчій роботі. У ж. «Сучасність» (2004, № 4, 5) на­друк. проз. твір «Апологія міфу: З потоку буття» (2004), оста­н­ня кн. «Замовле­н­ня Без­о­дні»&nbsp;— не опубл. Автор пере­кладів літ. творів із таджиц. (зокрема поета Б. Собіра, 1988), фарсі та ін. мов, а також літ.-крит. та наук. статей і рецензій. Додаткові відомості Основні твори Тернове поле. 1987; Цвіте терен. 1991; Злива. 1997; Велик гріх. 2003; Аратта Веда. 2003; Дідоніана. Троянські лови. 2004; Апологія міфу. 2005; Вогненна, вітряна і зливна. 2006; Дідоніана. Шлях Одісея. 2007 (усі — Київ). Рекомендована література Борисюк І. «... і Бог став жінкою, деревом, травою і вином...» (Роздуми про поезію І. Маленького) // СіЧ. 2006. № 11. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 17, "name": "Гаврилюк Олександр  Васильович", "by": "1881.0", "dy": "1930.0", "status": "excluded_galicia_pre_annexation", "reasoning": "Born in Galicia, died 1930 — before 1939 USSR annexation of western Ukraine. Never under Soviet rule.", "notes": "(1881, містечко Почаїв, нині місто Кременец. р-ну Терноп. обл. – після 1930) – диригент, музикознавець. Закін. Моск. духовну академію (1905), де зі студент. хором влаштовував концерти укр. музики....", "url": "https://esu.com.ua/article-28041", "group": "EXCLUDE", "bio": "ГАВРИЛЮ́К Олександр Васильович (1881, містечко Почаїв, нині місто Кременец. р-ну Терноп. обл.&nbsp;— після 1930)&nbsp;— диригент, музико­знавець. Закін. Моск. духовну академію (1905), де зі студент. хором влаштовував концерти укр. музики. Керував архі­єрей. хором у Житомирі, з яким виконував «Літургію» С. Рахманінова, «Страсну неділю» О. Гречанінова, був викл. і кер. хору 1-ї Житомир. чол. гімназії. Публікував стат­ті з історії укр. музики та муз. життя Волині в місц. пресі. Спів­працював з ві­домим хор­мейстером М. Гайдаєм , друкувався в журналі «Баян», який видавав у Тамбові П. Бігдаш-Бігдашев . Завантажити статтю"}, {"idx": 18, "name": "Кипріян Іван", "by": "1856.0", "dy": "1924.0", "status": "excluded_galicia_pre_annexation", "reasoning": "Born in Galicia, died 1924 — before 1939 USSR annexation of western Ukraine. Never under Soviet rule.", "notes": "(27. 10. 1856, м. Сокаль, нині Львів. обл. – 1924) – диригент, композитор, музикознавець, громадсько-політичний і церковний діяч УГКЦ. Закін. Ставропігій. гімназію у Львові (1879; викл. А. Вахнянин),...", "url": "https://esu.com.ua/article-6273", "group": "EXCLUDE", "bio": "КИ­ПРІЯ́Н Іван (27. 10. 1856, м. Сокаль, нині Львів. обл.&nbsp;— 1924)&nbsp;— диригент, композитор, музико­знавець, громадсько-політичний і церковний діяч УГКЦ. Закін. Ставропігій. гімназію у Львові (1879; викл. А. Вахнянин ), Пере­мишл. духовну семінарію (Польща, 1883), навч. у Львів. духов. семінарії (1882). У 1883 рукопоклад. на священика владикою Іоан­ном (Ступницьким). Від­тоді працював у парафії м. Добромиль (нині Старосамбір. р-ну Львів. обл.), водночас керував хором у м-ку Любачев. 1884–88&nbsp;— адміністратор, парох у с. Шумʼяч (нині Турків. р-ну Львів. обл.), де диригував світс. мішани- ми хорами. 1888–1919&nbsp;— парох м-ка Немирів Рава-Руського пов. (нині смт Яворів. р-ну Львів. обл.). При парафії у Немирові 1889 створив «Руську читальню» (від 1895 діяла під патронатом львів. товариства «Просвіта»). 1905&nbsp;— за­ступник, згодом голова повіт. товариства «Просвіта» у Раві-Руській. Автор праці «Основи музики» (1880, у рукописі). 1885 у Пере­мишлі видав «Учебникъ початковыхъ вѣдомо­стій музики и спѣву», у якому вперше опрацював укр. муз. термінологію. 1898 написав марш «За Русь» на честь 50-ї річниці скасува­н­ня кріпацтва в Галичині (сл. В. Ференчака; на­друк. як Квартет для мішаного і чол. хору). Видав «Партитуру церковних хорів» Д. Бортнянського (1883), «Божествен­ну Літургію святого Василія Великого» (Л., 1893), «Церковний спів­аник для шкільної молоді» (1910). Записані ним нар. пісні вміщено у зб. «Русько-народні галицькі мелодії» П. Бажанського (Л., 1905–12, вип. 1– 10). У 1900 К. обрано головою «Руської ради» Рава-Руського пов. Був чл. Укр. нац.-демократ. партії. Брав участь у вибор. кампаніях до Галиц. кра­йового сейму й австр. парламенту. Засуджував позицію москвофіл. партії, яка під­тримала поляків у боротьбі з укр. нац. рухом. 1919–20 був капеланом УГА. Побоюючись пере­слідувань з боку польс. влади, ви­їхав до Чехо-Словач­чини. Від листопада 1920&nbsp;— викладач випуск. курсів, катехит у таборі укр. інтернованих у м. Ліберці, де 1921 організував спів­ац.-муз. секцію. 1922 (за ін. даними&nbsp;— 1923) заарешт. рад. карал. органами, висланий до концтабору у Сибір. К. опікувався дітьми, які там пере­бували, сповід­ав і причащав вʼязнів перед смертю. Ді­знавшись про засудже­н­ня на смерть 20-ти дітей, нелегально пробрався до них. Вартові зна­йшли усіх замерзлими. Додаткові відомості Основні праці Партитура спѣвовъ церковныхъ и свѣтскихъ. 1882; Оỹтреня въ свѦтую и великую недѣлю Пасхи. 1883; Церковні пісні. 2009 (усі — Львів). Рекомендована література Лебедович І. Полеві духівники Української Галицької Армії. Вінніпеґ, 1963. Google Scholar Internet Горак Я. Листи Івана Кипріяна // Музика Галичини: Наук. зб. Львів. муз. академії. 2001. Т. 6, вип. 5. Google Scholar Internet Жаровський О. Отець Іван Кипріян — життя та діяльність. Л., 2002. Google Scholar Internet Кипріян М. Отець Іван Кипріян (1856–1924). Священик, диригент, композитор, автор музичних підручників. Л., 2012. Google Scholar Internet Вибрати все Експортувати в TXT Експор"}, {"idx": 19, "name": "Машковський  Карл", "by": "1868.0", "dy": "1936.0", "status": "excluded_galicia_pre_annexation", "reasoning": "Born in Galicia, died 1936 — before 1939 USSR annexation of western Ukraine. Never under Soviet rule.", "notes": "(26. 05. 1868, Львів – 24. 03. 1936, Варшава) – живописець, графік, художник театру. Навч. у Краків. школі образотвор. мистецтва (1887–92), Мюнхені (1891–92), Парижі в ательє Л. Жерома та Академії Жуліан (1894–96)....", "url": "https://esu.com.ua/article-65838", "group": "EXCLUDE", "bio": "МАШКО́ВСЬКИЙ Карл (26. 05. 1868, Львів&nbsp;— 24. 03. 1936, Варшава)&nbsp;— живописець, графік, художник театру. Навч. у Краків. школі образотвор. мистецтва (1887–92), Мюнхені (1891–92), Парижі в ательє Л. Жерома та Академії Жуліан (1894–96). Працював у Львові (1896–1905, 1909–10, 1914), Кракові (1898–1900, 1910–14), на Гуцульщині (1900–07). Офіцер Польс. легіонів 1914–17. Брав участь у мист. ви­ставках від 1896. Персон.&nbsp;— у Львові (1905). Від 1925&nbsp;— у По­знані (Польща): дир. Школи декор. мистецтва і худож. промислу. Створив олійні порт­рети, нар. типажі та сцени із життя гуцулів, пейзажі, інтерʼєри, натюрморти, вітражі. Роз­писував церкви, костели, каплиці в Україні та Польщі. Проектував меблі, театр. декорації, костюми, плакати, книжк. обкладинки. До 1914 творив під впливом ім­пресіонізму та сецесії, за­стосовуючи у творах гуцул. тематики екс­пресив. ліній. малюнок та інтенсивні кольори (зелений, червоний, синій); пізніше пере­йшов до неокласицизму. Автор дослідж. і статей польс. мовою з питань гуцул. етнології, декор. та ужитк. мистецтва. Порт­рети М. створили С. Виспянський, Ю. Мегоф­фер (обидва&nbsp;— 1896), Т. Аксентович (1916), В. Кос­сак (1917). Деякі картини зберігаються у Львів. галереї мистецтв, Нац. музеї у Львові, музеях Польщі. Додаткові відомості Основні твори живопис — «Г. Опенський» (1893), «У гуцульській хаті» (1897), «Стара хата» (1903), «Осінній вечір» (1904), «Гуцульські колядники», «Гуцулка» (обидва — 1905), «Русинка», «Гуцул із Жаб’є» (обидва — 1906), «Краєвид з-під Пруту» (1907), «Ю. Пілсудський» (1916); цикли — «Крає­види з Покуття» (1896), «Інтер’єри українських і молдавських церков» (1908–09); серія «Прядильниці» (1905); віт­ражі — «Св. Яцек» (домінікан. костел у Кракові), у куполі Вірмен. церкви у Львові (обидва — 1909–10), «Архангел Михаїл» (1923, костел св. Михаїла у с. Заріччя, нині Підкарп. воєводства, Польща). Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 20, "name": "Барка Василь", "by": "1908.0", "dy": "2003.0", "status": "unknown", "reasoning": "B2-reclassified (death_year corrected 1908.0→2003): api_error: \"Could not resolve authentication method. Expected either api_key or auth_token to be set. Or for on", "notes": "(справж. – Очерет Василь Костянтинович; ін. псевд. – Іван Вершина; 16. 07. 1908, с. Солониці, нині Лубен. р-ну Полтав. обл. – 11. 04. 2003, м. Ґлен-Спей, шт. Нью-Йорк, США) – поет, прозаїк, есеїст,...", "url": "https://esu.com.ua/article-40577", "group": "EXCLUDE", "bio": "БА́РКА Василь (справж.&nbsp;— Очерет Василь Костянтинович; ін. псевд.&nbsp;— Іван Вершина; 16. 07. 1908, с. Солониці, нині Лубен. р-ну Полтав. обл.&nbsp;— 11. 04. 2003, м. Ґлен-Спей, шт. Нью-Йорк, США)&nbsp;— поет, прозаїк, есе­їст, літературо­знавець. Кандидат філологічних наук (1940). Навч. у Лубен. пед. технікумі, на філол. факультеті Краснодар. пед. ін­ституту (30-і рр.), де потім викладав історію зх.-європ. літ-р середньовіч­чя. Учасник 2-ї світової війни, був двічі поранений, а 1943 вивез. німцями до Берліна як остарбайтер. Після війни пере­бував у таборах для пере­міщ. осіб в Авґсбурзі. Від 1950&nbsp;— у США, спершу мешкав у Нью-Йорку, а від поч. 70-х рр.&nbsp;— у Ґлен-Спеї. До війни опубл. зб. поезій «Шляхи» (1930) і «Цехи» (1932; обидві&nbsp;— Харків). Критика звертала увагу на спорідненість ран­ньої творчості Б. з пантеїзмом П. Тичини, рос. символізмом, італ. Ренесансом і традиціями барок. поезії. Автор поет. книг «Апостоли» (Авґсбурґ, 1946), «Білий світ» (Мюнхен, 1947), «Псалом голубиного поля» (1958), «Океан І» (1959), «Лірник» (1968), «Океан ІІ» (1979; усі&nbsp;— Нью-Йорк), «Океан IІІ» (К., 1992), драм. поеми «Кавказ» (К., 1993). В романі у віршах «Свідок для сонця шестикрилих» (Нью-Йорк, 1981) Б. засобами поет. символіки та склад. алюзій до текс­ту Святого письма осмислює про­блему осягне­н­ня Людиною величного помислу Творця. Автор проз. романів «Рай» (Джерсі-Сіті; Нью-Йорк, 1953), де викривається соціаліст. «рай» у СРСР, та «Жовтий князь» (Мюнхен; Нью-Йорк, 1963)&nbsp;— одного із най­пронизливіших творів про геноцид українського народу в голодоморі 1932–33. Пере­клав з англ. мови трагедію В. Шек­спіра «Король Лір» (Штут­тґарт; Нью-Йорк, 1969), з італ.&nbsp;— фрагменти «Божествен­ної комедії» Данте (Штут­тґарт, 1978). Для зрілого періоду творчості Б. характерне оригін. викори­ста­н­ня засобів фольклор. поетики в по­єд­нан­ні з принципами барок. символіки, цілісність худож. композицій, пере­йнятих просвітленою християн. містикою й натхнен. оприсутне­н­ням Бога в колі дарованого людині світу. «Із двох можливих варіянтів символізму&nbsp;— одного, що знає, а другого, що шукає,&nbsp;— Барка послідовно надає пере­вагу першому. ...За нібито позірним сюр­реалізмом цих кон­струкцій існує зумисний смисл, існує правда» (І. Фізер). Цією правдою для Б. є радісна євангел. вість, адресована кожній людині, обтяж. марнотою буднів і тягарем влас. двочасності. Про­зрі­н­ня остаточ. смислів, що так химерно роз­бігаються з контекс­том дійсності та її мов. практикою&nbsp;— під­ґрунтя всієї творчості Б. Саме звідси&nbsp;— наполегливе й винахідливе творе­н­ня влас. мови, від­мін­ної як від традиц. літ., так і роз­мовно-побут. укр. дискурсів серед. 20 ст. «Мимоволі виникає від­чу­т­тя, що поет хоче сказати щось невисказане, щось, що лежить за межами звичайної лексики. Слова стоять на пере­шкоді, і поет мусить їх уживати, але робити це із за­стереже­н­ням. Тому його мова пере­сичена архаїзмами, рідко вживаними словами, новими формами старих слів і особливо "}, {"idx": 21, "name": "Покорний Ярослав", "by": "1919.0", "dy": "1996.0", "status": "migrated", "reasoning": "Born in Osijek (now Croatia) in 1919, died in Štrbá, Slovakia in 1996; biography indicates settlement outside Soviet sphere in Central/Eastern Europe, consistent with diaspora migration pattern.", "notes": "(16. 11. 1919, м. Осієк, нині Хорватія — 07. 10. 1996, с. Штрба Пряшівського краю, Словаччина) — композитор, диригент. Закінчив Військову музичну школу у Празі. Працював у військовій капелі у Високому...", "url": "https://esu.com.ua/article-880202", "group": "INCLUDE", "bio": "ПОКО́РНИЙ Ярослав (16. 11. 1919, м. Осієк, нині Хорватія&nbsp;— 07. 10. 1996, с. Штрба Пряшівського краю, Словач­чина)&nbsp;— композитор, диригент. Закінчив Військову музичну школу у Празі. Працював у військовій капелі у Високому Миті, в театрі в Оломоуці (1945–50; обидва&nbsp;— нині Чехія). Грав в оркестрі оперети Українського народного театру (1951–59), був диригентом Під­дуклянського українського народного ансамблю (1959–82) у Пряшеві. Автор понад 90 музичних творів, зокрема обробок циклів пісень «Парубоцькі пісні», «Віночок українських народних пісень», «Травʼянки» та ін., інструментовок, мелодій до танців «Козацький вихор», «Коломийки», «На дрітарку», до чардашів та ін. Писав сценічну музику для по­становок Українського народного театру, обробляв народні пісні для аматорських колективів «Земплин», «Вигорлат», «Маковиця» та ін. Завантажити статтю"}, {"idx": 22, "name": "Митрак Олександр Андрійович", "by": "1837.0", "dy": "1913.0", "status": "excluded_pre_soviet", "reasoning": "Died before 1921 (death_year=1837) — pre-Soviet, outside study scope.", "notes": "(псевд. – Материн; 16. 10. 1837, с. Плоске, нині Сваляв. р-ну Закарп. обл. – 17. 03. 1913, с. Росвигове, нині у межах м. Мукачеве Закарп. обл.) – письменник, фольклорист, церковний діяч. Закін. Ужгород....", "url": "https://esu.com.ua/article-64707", "group": "EXCLUDE", "bio": "МИТРА́К Олександр Андрі­йович (псевд.&nbsp;— Материн; 16. 10. 1837, с. Плоске, нині Сваляв. р-ну Закарп. обл.&nbsp;— 17. 03. 1913, с. Росвигове, нині у межах м. Мукачеве Закарп. обл.)&nbsp;— письмен­ник, фольклорист, церковний діяч. Закін. Ужгород. духовну семінарію (1862). Восени того ж року рукопоклад. на священ­ника. Душпастирював у русин. парафіях на Під­карп. Русі та Пря­шівщині. 1900 ви­йшов на пенсію і пере­їхав до Ужгорода, згодом оселився у с. Росвигове. Помер після обшуку, проведеного угор. жандармами з метою виявити заборонену рос. літературу. Автор ви­даної за влас. рахунок фундам. пр. «Рус­ско-мадьярскій словарь» (1881)&nbsp;— словника рос. літ. мови з її угор. від­повід­никами, до якої до­дано список діалект. русин. слів. 2-а ч.&nbsp;— «Мадьярско-рус­скій словарь» (над якою працював протягом 20 р.)&nbsp;— зʼявилася друком після його смерті (1922). Творча спадщина М. невелика за обсягом (кілька десятків поезій, публіцист. статей, дорож. заміток, етногр. нарисів). Поезії писав закарп. діалектом української мови. Серед найцікавіших, опубл. під псевд. Материн,&nbsp;— «На Верховинѣ» (1867), «Мы убоги», «Думка» (обидві&nbsp;— 1869). На сторінках літ. тижневика «Свѣтъ» на­друкував нарис «Путѣвые впечатлѣнія на Верхо­винѣ» (1867), який став хрестомат. твором закарп. літ-ри і журналістики 2-ї пол. 19 ст. У його ст. «Рус­ский народ», опубл. 1866 у «Мѣсяцословѣ», з етногр. точки зору охарактеризував укр. та рос. народи, написав про укр. козацтво і Б. Хмельницького. Серед ін. публікацій&nbsp;— «Содержаніе духовенства въ Америкѣ» // «Листокъ», 1893, ч. 20; «Грамота Мануила Олшавскаго, хранящаяся въ Потоцкой церкви (Сообщаетъ А. Мит­ракъ)» // там само, 1889, ч. 4. Фольклорна спадщина М. також ще недо­статньо ви­вчена. У львів. архівах зберігаються 3 збірки фольклор. записів «Народныя пѣсни угорскихъ русиновъ», які він надіслав Я. Гол ецбуд» (1968–70); художни­ком Калус. ТЕЦ (1970–2010). Учасник місь­ких, обл., всеукр., всесоюз., між­­нар. худож. ви­ставок від 1970-х рр. Персон.&nbsp;— в Івано-Франківську (1970, 1981, 1991, 2000), Калуші (1975, 1981, 1983, 1987, 1991), Бурштині (1980), Коломиї (1984; усі&nbsp;— Івано-Фр. обл.). Створював пей­зажі та натюрморти у реаліст. стилі. Окремі роботи зберігаються у Калус. краєзн. музеї, Музеї укр. нар. мистецтва ім. Т. Шевченка (м. Палермо, Канада), га­лереї «Гек­косо» (Токіо). Додаткові відомості Основні твори «Будівництво карбацину» (1976), «На промислі» (1977), «Карпатська весна. Вид на Говерлу» (1978), «Відлига» (1979), «Старий Галич» (1980), «Річка Бо­лохівка» (1981), «Стара фортеця» (1983), «На полювання» (1986), «Два кольори» (1987), «Соняшники з калиною», «Осін­ні барви» (обидва — 1988), «Ромашки», «Зимова тиша» (обидва — 1989), «Теп­лий день» (1990), «Зима в Карпатах» (1991), «Осінній натюрморт» (1992), «Вид на село Єгровище» (1995), «Кінець лю­того», «Хмарний день» (обидва — 2000), «Лютий. Село Мислівка» (2001), «Захмарилось» (2004), «Ріка Свіча» (2005), «Гора Смотрич. Село Дзенброня», «Чор­ногора» (обидва — 2006), «Свідок минулого», «Зима в Синечові», «Бузок» (усі — 2007), «Сонце заходить» (2008), «Два кольори мої, два кольори», «Селище Колочава» (обидва — 2009), «Село Синевирська Поляна» (2010); серії — «Свя­тогірський монастир» (1980), «Шевчен­ківськими місцями» (1983), «Поволжя» (1985), «Старі церкви Прикарпаття» (2005–10). Рекомендована література Побуцька М. Дивосвіт Йосипа Кравця // Дзвони Підгір’я. 1991, 20 лис­топ.; Виставка живопису Йосипа Крав­ця: Каталог. Ів.-Ф., 1991. Google Scholar Internet Художники Івано-Франківщини: Альбом. К., 2002. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 28, "name": "Красовський Артур Францович", "by": "1848.0", "dy": "1920.0", "status": "excluded_pre_soviet", "reasoning": "Died before 1921 (death_year=1920) — pre-Soviet, outside study scope.", "notes": "(1848 – після 1920) – живописець, педагог. Навч. в Одес. рисув. школі (1873–75). Відтоді – її викл. Як рисувальник і фотограф брав участь в археол. експедиції Н. Кон­­дакова в Стамбулі (1884). Викл....", "url": "https://esu.com.ua/article-2998", "group": "EXCLUDE", "bio": "КРАСО&#769;ВСЬКИЙ Артур Францович (1848&nbsp;— після 1920)&nbsp;— живописець, педагог. Навч. в Одес. рисув. школі (1873–75). Від­тоді&nbsp;— її викл. Як рисувальник і фото­граф брав участь в археол. екс­педиції Н. Кон­­дакова в Стамбулі (1884). Викл. рисунку Одес. міського ді­­вочого та кер. каф. пер­спективи вищого худож. (1918–20) училищ. Учасник ви­ставок від 1892. Екс­понував акварел. пейзажі на ви­ставках Товариства пд.-рос. художників (1893–95). Автор кн. «Руководство к преподаванию рисования в средних учебных заведениях» (О., 1902). Рекомендована література Кондаков Н. П. Византийские церкви и памятники. 1886. Google Scholar Internet Филатов В. П. Рассказ, длиною в жизнь. 2011 (обидві — Одеса). Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 29, "name": "Васкевич Анатолій Мар’янович", "by": "1936.0", "dy": "2025.0", "status": "non_migrated", "reasoning": "Born in Vinnytsia 1936, died there 2025, member of Soviet Artists' Union (НСХУ) from 1998, studied at Moscow correspondence university but remained based in Ukrainian SSR throughout career with no evidence of emigration or forced displacement.", "notes": "(26. 09. 1936, Вінниця – 06. 05. 2025, там само) – живописець і дизайнер. Член НСХУ (1998). Закін. Моск. заоч. нар. університет мистецтв (1967; викл. О. Вишняков). Працював у галузях станк. живопису і...", "url": "https://esu.com.ua/article-32431", "group": "INCLUDE", "bio": "ВАСКЕ́ВИЧ Анатолій Марʼянович (26. 09. 1936, Він­ниця&nbsp;— 06. 05. 2025, там само)&nbsp;— живописець і дизайнер. Член НСХУ (1998). Закін. Моск. заоч. нар. університет мистецтв (1967; викл. О. Вишняков). Працював у галузях станк. живопису і дизайну інтерʼєру. Від 1966&nbsp;— декоратор Вінн. міськхарчторгу; оформлювач Вінн. міського тресту їдалень та ресторанів (від 1968) та Вінн. худож.-вироб. майстерні (від 1972); від 1995&nbsp;— проектант Вінн. худож. комбінату. Учасник обл. та всеукр. худож. ви­ставок від 1985. Творча манера В. характеризується незавершеністю письма. Пейзажі й натюрморти&nbsp;— не стільки зображе­н­ня натури, скільки типаж; вирізняються вишуканим колоритом, оригінальністю вираже­н­ня теми. Оформив інтерʼєри: Нар. музею с. Вахнівка Липовец. р-ну Вінн. обл. (1983), Музею історії медицини (Вінн. мед. університет, 1984), Музею історії педагогіки (Вінн. університет, 1985). Додаткові відомості Основні твори живопис — «На Одеському узбережжі», «Осінні барви» (усі — 1975), «Партизани» (1978), «Вінницький хімкомбінат» (1979), «Вечоріє» (1980), «Гурзуф», «На околиці села» (обидва — 1984), «Рання весна» (1985), «Квітуче Поділля» (1995), «Зимове мереживо» (1996), «Несподіваний сніг» (1997), «Осінь на Вінничині» (2000), «Сонячний день» (2001), «Ранок над Бугом», «Немирівська весна» (обидва — 2003), «Сонячний ранок» (2004). Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 30, "name": "Левицький Модест  Олександрович", "by": "1874.0", "dy": "1927.0", "status": "migrated", "reasoning": "Choir conductor born in Ukrainian village (1874) who died in Brazil (1927), indicating substantial settlement in South America outside Soviet sphere.", "notes": "(псевд. і крипт.: М. Лев, М. Л., Л.; 16. 08. 1874, с. Ниж­нів, нині Тлумац. р-ну Івано-Фр. обл. – 1927, Бразилія) – хоровий диригент, співак (баритон), музичний і театральний критик, музично-громадський діяч....", "url": "https://esu.com.ua/article-53795", "group": "INCLUDE", "bio": "ЛЕВИ́ЦЬКИЙ Модест Олександрович (псевд. і крипт.: М. Лев, М. Л., Л.; 16. 08. 1874, с. Ниж­нів, нині Тлумац. р-ну Івано-Фр. обл.&nbsp;— 1927, Бразилія)&nbsp;— хоровий диригент, спів­ак (баритон), музичний і театральний критик, музично-громадський діяч. Закін. гімназію у Станіславові (нині Івано-Франківськ), юрид. факультет Чернів. університету (1898). Музики, зокрема основ диригува­н­ня, навч. спочатку в батька (священика й диригента хору), потім приватно у Відні. 1893–98 разом із батьком керував хором міщан у Скалі-над-Збручем (нині смт Скала-Подільська Борщів. р-ну Терноп. обл.), у репертуарі якого були церк. пісне­співи, канти, а також твори М. Вербиць­кого, А. Вахнянина, В. Матюка, П. Ніщинського, М. Лисенка, О. Нижанківського, Д. Січинського, українські народні пісні, зокрема колядки, веснянки. Як спів­ак Л. щорічно ви­ступав із хором на концертах «Просвіти» й традиц. Шевченків. вечорах. Був учасником свята з нагоди творчого ювілею В.-А. Гржималі (1904), концертів Г. Хоткевича (1906). Від 1899 працював на залізниці в Чернівцях, де його творча діяльність ві­діграла помітну роль у муз.-театр. житті міста. Спів­засн. хор. товариства «Боян Буковинський» (1899–1913, від 1903&nbsp;— його голова). Брав участь у святкуван­ні творчого ювілею М. Лисенка, вітав його від імені Товариства в Чернівцях і Києві. Організатор 1-ї на Буковині Муз. школи ім. М. Лисенка (Чернівці, 1904–16, від 1907&nbsp;— її дир.), засн. «Товариства для плека­н­ня української пісні, музики і штуки драматичної» (1905), що утримувало муз. школу (викладалися теорія, історія музики, соло­спів, гра на фортепіано і скрипці), проводило концерти й драм. ви­стави, мало нотну бібліотеку, популяризувало твори укр. композиторів. Завдяки Л. уже на 3-му році існува­н­ня школи в ній навч. понад 40 учнів. Восени 1918 був одним із організаторів укр. влади на Буковині. 1919 обраний чл. комісії сусп. опіки та комунікац. комісії Укр. нац. ради ЗУНР. 1920 висланий румун. владою до Сх. Галичини (м. Теребовля, нині Тер­ноп. обл.), де працював в Укр. торг.-госп. спілці, керував церков. та просвітян. хорами. Автор статей у пресі, зокрема г. «Діло» (Львів), «Буковина» (Чернівці). 1925 на за­проше­н­ня П. Карман­ського емігрував до Бразилії, де й помер. Рекомендована література Концерт «Буковинського Бояна» в Чернівцях (диригент — М. О. Левицький) // Буковина. Чц., 1906, 22 листоп. Google Scholar Internet Пилипчук Р. Лисенко на Буковині // Микола Лисенко — борець за народність і реалізм у мистецтві. К., 1965. Google Scholar Internet Демочко К. Буковинський Боян // Мистецька Буковина. К., 1968. Google Scholar Internet Його ж. За велінням серця // Там само. 1990. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 31, "name": "Недєлін Євген Якович", "by": "1850.0", "dy": "1913.0", "status": "excluded_pre_soviet", "reasoning": "Died before 1921 (death_year=1850) — pre-Soviet, outside study scope.", "notes": "(справж. – Недзельський Євґеніуш; 19. 11. 1850, хутір побл. м. Гайсин, нині Вінн. обл. – 22. 10(04. 11). 1913, Київ) – актор, педагог. Виступав в аматор. виставах, від 1873 – на профес. сцені, в оперетах. Грав у...", "url": "https://esu.com.ua/article-72826", "group": "EXCLUDE", "bio": "НЕДЄ́ЛІН Євген Якович (справж.&nbsp;— Недзельський Євґеніуш; 19. 11. 1850, хутір побл. м. Гайсин, нині Вінн. обл.&nbsp;— 22. 10(04. 11). 1913, Київ)&nbsp;— актор, педагог. Ви­ступав в аматор. ви­ставах, від 1873&nbsp;— на профес. сцені, в оперетах. Грав у Новочеркаську (нині Ростов. обл.), Іркутську (обидва&nbsp;— нині РФ), Одесі, Києві; виконував ролі «коханців» і «простаків». Від 1882&nbsp;— на драм. сцені у Таганрозі (нині Ростов. обл.), Саратові, Ростові (усі&nbsp;— нині РФ). 1887 вступив до Харків. товариства акторів під керівництвом антре­пренера М. Бородая. Від 1898 викладав у Київ. муз.-драм. школі М. Лесневич-Носової. 1899–1913 працював у театрах Києва й Одеси (в антре­призах під керівництвом М. Соловцова, М. Багрова та ін.). Володів блискучою сценіч. технікою, від­різнявся невимушеністю гри. 1901 разом із М. Соловцовим і Т. Чужбиновим організував і очолив Товариство драм. акторів у Києві (про­існувало 5 р.). Додаткові відомості Основні ролі Телятєв («Шалені гроші» О. Островського), Кулигін («Три сестри» А. Чехова), Чепурной («Діти сонця» М. Горького), Юлій Цезар, Бенедикт («Юлій Цезар», «Багато галасу даремно» В. Шекспіра), Наполеон («Мадам Сан-Жен» В. Сарду), Піккіло («Перікола» Ж. Оффенбаха). Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 32, "name": "Равський Вінцент", "by": "1850.0", "dy": "1927.0", "status": "excluded_galicia_pre_annexation", "reasoning": "Born in Galicia, died 1927 — before 1939 USSR annexation of western Ukraine. Never under Soviet rule.", "notes": "(молодший; 26. 11. 1850, Львів — 04. 09. 1927, там само) — архітектор. Брат К. Равського. Навчався у Львівській технічній академії (1869—72) та Віденській політехніці (1873—74). Від 1876 — уповноважений...", "url": "https://esu.com.ua/article-885672", "group": "EXCLUDE", "bio": "РА́ВСЬКИЙ Вінцент (молодший; 26. 11. 1850, Львів&nbsp;— 04. 09. 1927, там само)&nbsp;— архітектор. Брат К. Равського. На­вчався у Львівській технічній академії (1869–72) та Ві­денській політехніці (1873–74). Від 1876&nbsp;— уповноважений будівничий у Львові. Від 1877&nbsp;— член, 1908–09&nbsp;— голова Політехнічного товариства у Львові. Один з організаторів і голова оргкомітету Архітектурної ви­ставки у Львові в 1910. Споруджував у різних напрямах історизму (пере­важно неоренесансу та необароко, «стилю піт­тореск») за власними проєктами житлові, громадські, промислові та адміністративні будинки. Серед реалізованих проєктів у Львові&nbsp;— житлові будинки на нинішній вул. І. Франка, № 2–4 (1883–84, скульптор Л. Марконі), власні вілли на вул. Матейка, № 8 (1892–94), на нинішній вул. Чу­принки, № 61 (1896), вілла Я. Русоцької на вул. І. Франка, № 68 (1898), колишній будинок дирекції залізниці на нинішній вул. Січових Стрільців, № 3 (1885–87, скульптор Л. Марконі), будинок друкарні на вул. Лінде (нині Ліста), № 4 (1895), дім Політехнічного товариства на нинішній вул. Дудаєва, № 9 (1901–06). Збудував палац Лянцкоронських у Тартакові (нині село Червоно­градського р-ну Львівської обл., 1898). Рекомендована література Архітектура Львова: Час і стилі. XIII–XXI ст. Л., 2008. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 33, "name": "Кравчук Анатолій Андрійович", "by": "1934.0", "dy": "2000.0", "status": "non_migrated", "reasoning": "Actor born in Kirovohrad and died in Lviv, both in Ukrainian SSR; no evidence of emigration, deportation, or transfer to another Soviet republic.", "notes": "(08. 05. 1934, м. Зінов’євськ, нині Кіровоград – 28. 03. 2000, Львів) – актор, режисер. Чоловік Ірини, батько Олексія Кравчуків. Народний артист УРСР (1975), засл. арт. Латв. РСР (1963). Закін. Київ. інститут...", "url": "https://esu.com.ua/article-2588", "group": "INCLUDE", "bio": "КРАВЧУ&#769;К Анатолій Андрі­йович (08. 05. 1934, м. Зіновʼєвськ, нині Кірово­град&nbsp;— 28. 03. 2000, Львів)&nbsp;— актор, режисер. Чоловік Ірини , батько Олексія Кравчуків . Народний артист УРСР (1975), засл. арт. Латв. РСР (1963). Закін. Київ. ін­ститут театр. мистецтва (1957; викл. В. Неллі). Від­тоді працював актором і реж. Камʼянець-Поділ. рос. драм. театру (Хмельн. обл.); 1959–60&nbsp;— Хмельн. укр. муз.-драм. театру ім. Г. Петровського; 1960–64&nbsp;— театру Червонопрапор. Балтій. флоту (м. Лієпая, Латвія); 1964–80, 1985–2000&nbsp;— актор і реж., 1995–98&nbsp;— худож. кер. і гол. реж. Львів. драм. театру Зх. оператив. командува­н­ня; 1980–85&nbsp;— гол. реж., худож. кер. Львів. укр. драм. театру ім. М. Заньковець­кої. Майстер пере­втіле­н­ня К. створював на сцені різнохарактерні особистості&nbsp;— від соц. героїв сучасності до трагед. персонажів. Його творчості притаман­ні тонкий і майстерно виконаний малюнок ролі; проникне­н­ня в стиль і природу образу по­єд­нувалося із глибиною гри. Як реж. проявив себе вдумливим по­становником і пропагандистом театр. мистецтва. Автор поет. зб. «Храните Гениев, храните!» (Л., 2002). Фрагменти з щоден­ника К. «Простые мысли. О моем ремесле» опубл. українською мовою у ж. «Просценіум» (2009, № 25; 2010, № 26). Разом із дружиною на Львів. телебачен­ні зі­грав у ви­ставі «Будка Ч-27» І. Франка (1970, реж. В. Робочек). Додаткові відомості Основні ролі Заробітчанин («Хазяїн» І. Карпенка-Карого), Анатолій («Суд матері» І. Рачади), Гриціан («Весілля в Малинівці» О. Рябова, Л. Юхвіда), Женя Маркелов («Гросмейстерський бал» Г. Гуревича за І. Штемлером), Віктор («Варшавська мелодія» Л. Зоріна), Єгор, Федір («Марія», «Барабанщиця» А. Салинського), Паша Плужников («У списках не значився» за Б. Васильєвим), Михайло Архангельський («Погода на завтра» М. Шатрова), П’ятьор­кін («Васса Желєзнова» М. Горького), Клоун, Хосе («Три хвилини Мартіна Гроу», «Інтерв’ю в Буенос-Айресі» Г. Бо­­ровика). Основні вистави «Анджело, тиран Паду­ан­ський» В. Гюґо (1962, також роль Ан­­джело), «Сон князя Святослава» І. Фран­­ка (1981), «Декамерон» за Дж. Бокаччо (1982), «Санітарний день» О. Коломій­ця, «Пригоди бравого вояка Швейка» за Я. Гашеком (обидві — 1983), «Мсьє Амількар, або Людина, яка платить» І. Жаміака (1987, також роль Олек­­сан­дра Амількара), «Між двох сил» В. Вин­­ниченка (1991), «Привиди» Г. Ібсена (також роль Пастора Мандерса), «Бал злодіїв» Ж. Ануя (обидві — 1992), «Адво­кат Мартіан» Лесі Українки (1994, та­­кож роль Мартіана, музичне оформлення), «Мати-наймичка» за Т. Шев­ченком, «По-модньому» М. Стариць­­кого (також роль Вареника), «Зойчина квартира» М. Булгакова, «Жахливі бать­ки» Ж. Кокто (також роль Жоржа; усі — 1996), «На перші гулі» С. Васильченка (1997). Завантажити статтю"}, {"idx": 34, "name": "Бородієвич Євген Омелянович", "by": "1889.0", "dy": "1924.0", "status": "excluded_galicia_pre_annexation", "reasoning": "Born in Galicia, died 1924 — before 1939 USSR annexation of western Ukraine. Never under Soviet rule.", "notes": "(06. 01. 1889, с. Денисів, нині Козів. р-ну Терноп. обл. – 17. 03. 1924, м. Тарнобжеґ, нині П ольклорні та етногр. матеріали. Рукопис. архів К. зберігається в Ін­ституті літ-ри НАНУ (Київ) та ЛНБ. Автор зб. сатир. оповідань «Будяки» (Л., 1890), низки статей на пед. теми, у яких об­стоював пере­дові принципи навч. та вихова­н­ня, зокрема «До братів учителів» (1890), «Лектура для молоді» (1891), «Сучасна психологія» (1893) та ін. Рекомендована література Возняк М. Іван Франко в добі радикалізму // Україна. 1926. № 6. Google Scholar Internet Франко І. Нарис історії українсько-руської літератури до 1890 р. // Франко І. Зібрання творів: У 50 т. Т. 41. К., 1984. Google Scholar Internet Кирчів Р. Іван Франко і брати Кирчіви: Листування // Зап. НТШ. Пр. філол. секції. 1996. Т. 229. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 36, "name": "Зак Ісидор Аркадійович", "by": "1909.0", "dy": "1998.0", "status": "internal_transfer", "reasoning": "Born in Odesa, worked within Soviet system (Stalin Prize 1948, People's Artist of USSR 1976), ended career in Novosibirsk, RF — voluntary internal Soviet relocation, no evidence of forced displacement or emigration to non-Soviet country.", "notes": "(01(14). 02. 1909, Одеса – 16. 08. 1998, м. Новосибірськ, РФ) – диригент. Народний артист СРСР (1976). Сталінcька премія (1948). Навч. в Одес. консерваторії (1925; кл. теорії музики В. Золотарьова), закін. Ленінгр....", "url": "https://esu.com.ua/article-14595", "group": "INCLUDE", "bio": "ЗАК Ісидор Аркаді­йович (01(14). 02. 1909, Одеса&nbsp;— 16. 08. 1998, м. Новосибірськ, РФ)&nbsp;— диригент. Народний артист СРСР (1976). Сталінcька премія (1948). Навч. в Одес. консерваторії (1925; кл. теорії музики В. Золотарьова ), закін. Ленінгр. консерваторію (нині С.-Петербург, 1928; кл. диригува­н­ня М. Малька ). Був диригентом театрів опери та балету у Владивостоці та Хабаровську (1928–31), Куйбишеві (нині Самара, 1933–36; усі&nbsp;— РФ), Дні­пропетровську (1936–37), Горькому (нині Нижній Новгород, 1937–44), Новосибірську (обидва&nbsp;— РФ, 1944–49, від 1968; один із засн. театру), Львові (1949–51), Харкові (1951–52), Алма-Аті (нині Алмати, 1952–55), Челябінську (РФ, 1955–68; один із засн. театру). У Львові вперше в Україні по­ставив оперу «Далібор» Б. Сметани (1950). За участі З. по­ставлено опери: «Скупий лицар» С. Рахманінова (1943), «Руслан і Людмила» (1944), «Іван Сусанін» (1945) М. Глінки, «Брандербуржці в Чехії» Б. Сметани (1963), «Пікова дама» П. Чайковського (1969). Завантажити статтю"}, {"idx": 37, "name": "Литвин Олексій Костянтинович", "by": "1965.0", "dy": "", "status": "alive", "reasoning": "No death year — presumed alive or date unknown.", "notes": "(13. 05. 1965, м. Магнітогорськ Челябін. обл., РФ) – графік, дизайнер. Син К. Литвина. Член Спілки дизайнерів України (1996), НСХУ (2000). Закін. Рівнен. муз. училище (1984), Міжнар. школу церк. архітектури при...", "url": "https://esu.com.ua/article-55087", "group": "EXCLUDE", "bio": "ЛИТВИ́Н Олексій Костянтинович (13. 05. 1965, м. Магнітогорськ Челябін. обл., РФ)&nbsp;— графік, дизайнер. Син К. Литвина . Член Спілки дизайнерів України (1996), НСХУ (2000). Закін. Рівнен. муз. училище (1984), Між­нар. школу церк. архітектури при Львів. політех. ін­ституті (1992), худож.-пед. факультет Рівнен. гуманітар. університету (2002). Працює у Рівному: на худож.-вироб. комбінаті (1987–2013); дизайнер полігр. фірми (1991–99); водночас у гуманітар. університеті: дизайнер видавн. центру (1998–2006), викл. курсу проектува­н­ня і дизайну (2005–07); дизайнер Нац. університету вод. господарства та природокористува­н­ня (2013–15). Голова Рівнен. організації Спілки дизайнерів України (від 2002). Учасник обл., всеукр. мистецьких ви­ставок від 1993. Персон.&nbsp;— у Рівному (2010, 2015). Створює пере­важно пейзажі у реаліст. стилі, логотипи. Деякі роботи зберігаються в Остроз. краєзн. музеї (Рівнен. обл.). Додаткові відомості Основні твори «Кульбаби», «Земля невідома», «Острозька брама» (усі — 1990), «Миколаївська церква» (1992), «Відлуння ел» О. Коломійця), Гриціян («Весілля в Малинівці» О. Рябова, Л. Юхвіда), Кум Цибуля, Солопій Черевик, Голова, Собакевич, Городничий (за повістями «Сорочинський ярмарок» і «Майська ніч», за романом «Мертві душі», «Ревізор» М. Гоголя), Іван («Без вини винні» О. Островського), Михеїч («Живи і пам’ятай» В. Распутіна), Васков («А зорі тут тихі…» Б. Васильєва), Капулетті («Ромео і Джульєтта» В. Шекспіра), Лорд Гардінер («Марія Тюдор» В. Гюґо). Рекомендована література Чернігівський обласний академічний український музично-драматичний театр ім. Т. Г. Шевченка. 90 років. Чг., 2016. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 39, "name": "Побережець Віктор Олексійович", "by": "1943.0", "dy": "2023.0", "status": "non_migrated", "reasoning": "Actor born in Luhansk region (Ukrainian SSR) in 1943, died in Kharkiv in 2023 with no evidence of emigration or forced displacement; remained within Ukrainian SSR throughout life.", "notes": "(13. 05. 1943, с. Нова Астрахань, нині Сіверськодонецького р-ну Луганської обл. — 27. 01. 2023, Харків) — актор, співак (тенор). Заслужений артист УРСР (1990). Закінчив Харківське музичне училище (1966). У 1965—66...", "url": "https://esu.com.ua/article-879010", "group": "INCLUDE", "bio": "ПО­БЕРЕ́ЖЕЦЬ Віктор Олексі­йович (13. 05. 1943, с. Нова Астрахань, нині Сіверськодонецького р-ну Луганської обл.&nbsp;— 27. 01. 2023, Харків)&nbsp;— актор, спів­ак (тенор). Заслужений артист УРСР (1990). Закінчив Харківське музичне училище (1966). У 1965–66&nbsp;— артист хору Харківського українського драматичного театру імені Т. Шевченка; 1966–2021&nbsp;— соліст Харківського театру музичної комедії. Володів гарним голосом світлого сріблястого тембру широкого діапазону з вільним верх­нім регі­стром. Ви­ступав у всьому провід­ному теноровому репертуарі: ліричному, характерному і навіть лірико-драматичному, що до­зволяло йому спів­ати не лише складні партії у класичному репертуарі, а й у рок-операх, мюзиклах, музичних комедіях. П.&nbsp;— майстер психологічних пере­втілень й естрадних ім­провізацій. Вперше в Україні створив образи Графа Рєзанова («Юнона та Авось» О. Рибнікова), Юди («Ісус Христос&nbsp;— суперзірка» Е. Веб­бера), Савонароли («Монарх, блудниця і монах» О. Журбіна), Еймса («Сестра Керрі» Р. Паулса), Фагота («Чорна магія» В. Гевіксмана). Гастролі в Грузії, Латвії, Вірменії, Росії. Додаткові відомості Основні ролі Фальк, Стефан, Урбіно («Летюча миша», «Циганський барон», «Ніч у Венеції» Й. Штраусса), Черевик («Сорочинський ярмарок» О. Рябова), Леметр («Подорож на Місяць» Ж. Оффенбаха), Мелон («Роз-Марі» Г. Стотгарта та Р. Фрімля), Пінеллі («Принцеса цирку» І. Кальмана). Завантажити статтю"}, {"idx": 40, "name": "Вознюк Василь Васильович", "by": "1958.0", "dy": "", "status": "alive", "reasoning": "No death year — presumed alive or date unknown.", "notes": "(03.  07.  1958, м. Каркші Кашкадар’їн. обл., Узбекистан) – художник-карикатурист, графік. Член Асоц. карикатуристів (2003). Освіта середня. Від 1976 – у Житомирі. Працював на заводі «Електровимірювач»...", "url": "https://esu.com.ua/article-27417", "group": "EXCLUDE", "bio": "ВОЗНЮ́К Василь Васильович (03. 07. 1958, м. Каркші Кашкадарʼїн. обл., Узбеки­стан)&nbsp;— художник-карикатурист, графік. Член Асоц. карикатуристів (2003). Освіта середня. Від 1976&nbsp;— у Житомирі. Працював на заводі «Електровимірювач» (1976–86). Від 1989 спів­працює з видавництвами Житомира, Києва, низкою зарубіж. ви­дань. Від 2005&nbsp;— гол. художник Всеукр. асоц. «КВН України». Від 1999&nbsp;— учасник і лауреат між­нар. конкурсів карикатур. Персон. ви­ставки&nbsp;— у Парижі (2002), Житомирі (2003–04). Рекомендована література Літ: Зорин И. Картина житомирского художника пополнила коллекцию картин Букингемского двора // Житомир. телеграф. 2003, 9 авг. Google Scholar Internet Василий Вознюк: Буклет. Ж., 2004. Google Scholar Internet Герасимків А. «Моє прикордоння»: Про виставку відомого житомир. художника В. Воз
