o evidence of emigration or forced displacement.", "notes": "(13. 03. 1888, с. Айдаргази Євпаторій. пов., нині с. Орлянка Євпаторій. р-ну, АР Крим – 04. 05. 1934, с. Коккози, нині Соколине Бахчисарай. р-ну, АР Крим) – кримськотатарський письменник. Рано залишився...", "url": "https://esu.com.ua/article-73894", "group": "INCLUDE", "bio": "НУЗЕ́Т Мемет (13. 03. 1888, с. Айдаргази Євпаторій. пов., нині с. Орлянка Євпаторій. р-ну, АР Крим&nbsp;— 04. 05. 1934, с. Кок­кози, нині Соколине Бахчисарай. р-ну, АР Крим)&nbsp;— кримськотатарський письмен­ник. Рано залишився сиротою. Від 1900 навч. у «Зынджырлы-медресе» в Бахчисараї. Писати почав під впливом рев. подій 1905. Поет-сатирик у своїх віршах ви­сміював екс­плуататор. дійсність, реалістично від­творював життя народу, різко критикував шкідливі реліг. звичаї. 1909, знаходячись під поліц. на­глядом, заарешт. за низку сатир.-гуморист. епі­грам на цар. чиновників (4 місяці пробув у вʼязниці під слідством). Після звільне­н­ня мандрував Рос. імперією. 1912 дебютував вір­шами в г. «Терджиман» («Пере­кладач»). У них широко використовував фольклор крим. татар. Ви­ступав також у жанрі прози: сатир. повість «Селим сохта» («Семінарист Селім»), де майстерно від­ображено трагікомічні випадки із життя вчителів та вихованців медресе, а також наслідки поразки Росії в рос.-япон. вій­ні 1905, оповіда­н­ня «Талийсиз къоран­та» («Нещаслива сімʼя»; обидва&nbsp;— 1910-і рр.) тощо. У 1920-х рр. учителював під Севастополем. Ці ж роки стали найпліднішими для нього: «Зевкъыма кете» («Мені цікаво»), «Къудалыкъ» («Сватівство»; обидва&nbsp;— 1927), «Нишанлыма кеткенде» («У гості до зарученої»), «Койде къыш» («Зима в селі»; обидва&nbsp;— 1928)&nbsp;— у творах домінує опис життя простого народу, персонажі наділені рисами побут. характеру. Окремі твори Н. вміщено до післявоєн. кримськотатар. хрестоматій з літ-ри. Пере­слідувався з боку рад. влади за належність до багатих прошарків. За свідче­н­нями родичів несподівано помер у лікарні. Частину його твор. доробку втрачено під час депортації 1944, якої за­знали його дружина й дочка. Рекомендована література Тарханская З. В память о поэте // Голос Крыма. 1998, 25 апр. Google Scholar Internet Деятели крымскотатарской культуры. (1921–1944 г.): Биобиблиографический словарь / Гл. ред. и сост. Д. П. Урсу. Сф., 1999. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 176, "name": "Коженьовська Ванда", "by": "1883.0", "dy": "1935.0", "status": "excluded_galicia_pre_annexation", "reasoning": "Born in Galicia, died 1935 — before 1939 USSR annexation of western Ukraine. Never under Soviet rule.", "notes": "(1883, м. Станіслав, нині Івано-Франківськ – 18. 08. 1935, Львів) – графік і живописець. Член Союзу польс. художниць у Львові (1917), Спілки львів. графіків (1932). Навч. у Львові в майстернях О....", "url": "https://esu.com.ua/article-7545", "group": "EXCLUDE", "bio": "КОЖЕНЬО́ВСЬКА Ванда (1883, м. Станіслав, нині Івано-Франківськ&nbsp;— 18. 08. 1935, Львів)&nbsp;— графік і живописець. Член Союзу польс. художниць у Львові (1917), Спілки львів. графіків (1932). Навч. у Львові в майстернях О. Авґустиновича, С. Батовського-Качора , Л.-А. Дрекслер , Худож.-пром. школі (1905–09), Мюнхен. мист. школі А. Ашбе (1910–11). Від­тоді працювала у Львові. Брала участь у міських ви­ставках від 1912. Персон.&nbsp;— посмертна у Львові (1935). Створювала картини на реліг. тематику, краєвиди, порт­рети у техніках гравюри, офорта, мідьорита, дереворита, сухої голки. Творча манера К. еволюціонувала від сецесії до стилю ар деко, неокласицизму і модернізації малярства ренесансу; у деяких пізніх естампах, виконаних із гострими чорно-білими зі­ткне­н­нями, поміт. вплив екс­пресіонізму. Видала альбом офортів «Костели старого Львова» (Л., 1917). Для львів. видавництва К. Якубовського ілюструвала естампами дит. книжки й під­ручники з історії. Окремі роботи зберігаються у Львів. галереї мистецтв. Додаткові відомості Основні твори графіка — «Млин», «Берези» (обидва — 1910–12), «Голова старого» (1911), «Саломея», «Чародійки» (обидва — 1912), «Фрагмент римо-католицької катедри (Гріб Господній)» (1914), «Подвір’я Вірменської церкви», «Костел домініканців», «Розп’яття у костелі бернардинців», «Монастир бенедиктинок», «Каплиця Боїмів», «Подвір’я Успенської церкви» (усі — 1914–16), триптих «Хресна дорога» (1932), «Вуличний скрипаль», «Св. Себастьян», «Втеча до Єгипту», «Пустельник», «Столяр» (усі — 1933); екслібриси — Ф. Бесядецького, Е. Булянди, М. Ґольдштайна, Є. Конарського, Е. Ромера, Т. Сольського (усі — 1912–30); живопис — «Жінка у білому» (1917), «Воскресіння», «Оплакування» (обидва — 1919), «Оливна гора», «Костел св. Войцеха у Львові», «Рання весна», «Іспанка» (усі — 1920-і рр.), «Покладення до гробу» (1922), «Молитва» (1927). Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 177, "name": "Мучник Леонід Овсійович", "by": "1896.0", "dy": "1966.0", "status": "non_migrated", "reasoning": "Мучник was born in Odesa in 1896 and died there in 1966, with all documented education and professional activity occurring within the Ukrainian SSR; no evidence of emigration or forced displacement.", "notes": "(05(17). 12. 1896, Одеса – 08. 01. 1966, там само) – живописець і педагог. Член СХУ (кін. 1930-х рр.). Закін. в Одесі художні училище (1914; викл. К. Костанді, Г. Ладиженський) та інститут (1926; викл. П. Волокидін)....", "url": "https://esu.com.ua/article-70517", "group": "INCLUDE", "bio": "МУ́ЧНИК Леонід Овсі­йович (05(17). 12. 1896, Одеса&nbsp;— 08. 01. 1966, там само)&nbsp;— живописець і педагог. Член СХУ (кін. 1930-х рр.). Закін. в Одесі художні училище (1914; викл. К. Ко­станді, Г. Ладиженський) та ін­ститут (1926; викл. П. Волокидін). Від­тоді&nbsp;— викладач Одес. худож. ін­ституту (1935–61&nbsp;— професор кафедри живопису) та худож. училища (1949–66&nbsp;— керівник живопис. майстерні). Основна галузь&nbsp;— станк. живопис. Учасник обл., всеукр., всесоюз. мистецьких ви­ставок від 1925. Персон.&nbsp;— в Одесі (1962). Автор багатофігур. композицій про істор. події Чорномор. флоту, мор. і міських пейзажів, натюрмортів у реаліст. стилі. Полотна М. від­значаються істор. достовірністю, яскравою колір. гамою. Деякі роботи зберігаються в НХМ (Київ), Одес. і Харків. ХМ. Серед учнів –&nbsp; О. Ацманчук ,&nbsp; В. Власов ,&nbsp; К. Ломикін ,&nbsp; Л. Семикіна , А. Сорока, М. Тодоров, К. Філатов. Додаткові відомості Основні твори монум. розпис в Одес. артшколі (1923, збитий 1930); живопис — «Підвіз провіанту до броненосця “Потьомкін” у 1905 році» (1934), «Свіжий вітер (Буря на морі)» (1935), «Повстання на крейсері “Очаків”» (1937), «Загибель ескадри» (1938), «Ялтинський порт» (1942), «Море» (1946), «Потьомкінці виносять на берег тіло вбитого Г. Вакуленчука» (1947–57), «Ми ще повернемося!» (1947), «Хризантеми» (1948), «Двоє» (1949), «Штормовий вечір», «Новий Світ. Крим», «Набережна Ялти» (усі — 1950), «Опівдні», «У порту. Одеса» (обидва — 1951), «Скелі, освітлені сонцем» (1952), «У відкритому морі» (1954), «Бузок цвіте», «Двоє на березі моря», «Лагодять сіті» (усі — 1955), «Берег моря» (1956), «У горах» (1958), «Сонячний ранок» (1959), «Гурзуф» (1961). Рекомендована література Котляр М. Леонід Євсейович Мучник // ОМ. 1940. № 5. Google Scholar Internet Леонід Овсійович Мучник: Каталог. О., 1963. Google Scholar Internet Басанець Т. Послідовники М. Л. Бойчука: «одеська майстерня» // Черный квадрат над Черным морем: Мат. к истории авангард. искусства Одессы. ХХ век. О., 2007. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 178, "name": "Бучинська Наталія Любомирівна", "by": "1977.0", "dy": "", "status": "alive", "reasoning": "No death year — presumed alive or date unknown.", "notes": "(28. 04. 1977, Львів) – естрадна співачка. Народний артист України (2004). Лауреатка фестивалю «Червона рута» (1995, 1-е м.), конкурсів «Пісенний вернісаж» (1995–98). Закін. Терноп. академію нар....", "url": "https://esu.com.ua/article-23126", "group": "EXCLUDE", "bio": "БУЧИ́НСЬКА Наталія Любомирівна (28. 04. 1977, Львів)&nbsp;— естрадна спів­ачка. Народний артист України (2004). Лауреатка фестивалю «Червона рута» (1995, 1-е м.), конкурсів «Пісен­ний вернісаж» (1995–98). Закін. Терноп. академію нар. господарства (1998), Київ. академію внутр. справ (2004), університет культури і мистецтв (2008; викл. С. Деркач). У 1998–2004&nbsp;— солістка Держ. ансамблю пісні і танцю внутр. військ МВС України. Від 2004&nbsp;— на творчій роботі. Виконує пісні на сл. Ю. Рибчинського, В. Кіровського, Р. Квінти та ін. укр., рос., франц., ісп., англ., вірм. та польс. мовами. У творчості по­єд­нано сучасне аранжува­н­ня та укр. фольклор. Ви­ступає також у дуетах із Д. Гордоном, О. Малініним, М. Поплавським, В. Гришком. Гастролює в країнах СНД, Польщі. Випустила аудіоальбом «Про те, чого не вимовиш словами…» (1999) і компакт-диски «Дівчина-весна» (2004), «Душа» (2008). Завантажити статтю"}, {"idx": 179, "name": "Павліковський Тадеуш Мечиславович", "by": "1861.0", "dy": "1915.0", "status": "excluded_pre_soviet", "reasoning": "Died before 1921 (death_year=1915) — pre-Soviet, outside study scope.", "notes": "(09. 11. 1861, м-ко Медика, нині село Підкарпатського воєводства, Польща — 28. 09. 1915, м. Краків, Польща) — режисер, театральний діяч. Закінчив гімназію святої Анни в Кракові. Вивчав музику у Відні,...", "url": "https://esu.com.ua/article-878801", "group": "EXCLUDE", "bio": "ПАВЛІКО́ВСЬКИЙ Тадеуш Мечиславович (09. 11. 1861, м-ко Медика, нині село Під­карпатського воєводства, Польща&nbsp;— 28. 09. 1915, м. Краків, Польща)&nbsp;— режисер, театральний діяч. Закінчив гімназію святої Анни в Кракові. Ви­вчав музику у Відні, Ляйпцизі (Німеч­чина), режисуру&nbsp;— у Й. Савітса у Ва­ймарі та Л. Хронегки в Майнінґені (обидва&nbsp;— Німеч­чина). 1893–99 і 1913–15&nbsp;— художній керівник Театру імені Ю. Словацького у Кракові. 1900–06&nbsp;— директор новозбудованого Міського театру у Львові, від­кри­т­тя якого від­булося 4 жовтня 1900, серед почесних гостей був автор проєкту З. Ґорґолевський , художники, різьбярі, скульптори, числен­ні урядовці та видатний художник Г. Семирадський . Перша опера, яку по­ставили на сцені театру,&nbsp;— «Янек» В. Желенського. Головну партію виконав славнозвісний соліст Варшавської опери О. Мишуга . Вже за перший рік керівництва театром від­булося 117 оперних і 67 опереткових ви­став. П. пильно стежив за творчою карʼєрою багатьох світових спів­аків і дбав про те, щоб вони ви­ступали на львівській сцені. Серед них були й ві­домі українці&nbsp;— М. Менцинський , О. Носалевич та Є. Гушалевич . У квітні 1903 на гостин­ні ви­ступи до Львова була за­прошена С. Крушельницька. Тоді спів­ачка ви­ступила у шести ви­ставах: «Манон» Ж. Мас­сне, «Графиня» та «Галька» С. Монюшка, «Трубадур» Дж. Верді, «Жидівка» Ф. Галеві та «Гуґеноти» Дж. Мейєрбера. Діяльність П. тривала пʼять оперних сезонів, було по­ставлено 488 ви­став. В історію музичного мистецтва П. уві­йшов як режисер-реформатор. Завантажити статтю"}, {"idx": 180, "name": "Морськой Гаврило  Олексійович", "by": "1862.0", "dy": "1914.0", "status": "internal_transfer", "reasoning": "Singer received vocal training in Kyiv and performed there, then moved to Petrograd (St. Petersburg) for his opera career, remaining within the Russian Empire/Soviet sphere without emigrating abroad.", "notes": "(справж. – Янчевецький; 23. 03(04. 04). 1862, Черніг. губ. – 26. 12. 1914 (08. 01. 1915), Петроград, нині С.-Петербург) – співак (лірико-драматичний тенор). З дит. років співав у Київ. митропол. хорі. Вокал. освіту...", "url": "https://esu.com.ua/article-69369", "group": "INCLUDE", "bio": "МОРСЬКО́Й Гаврило Олексі­йович (справж.&nbsp;— Янчевецький; 23. 03(04. 04). 1862, Черніг. губ.&nbsp;— 26. 12. 1914 (08. 01. 1915), Петро­град, нині С.-Петербург)&nbsp;— спів­ак (лірико-драматичний тенор). З дит. років спів­ав у Київ. митропол. хорі. Вокал. освіту здобув у регент. класах Придвор. хор. капели в С.-Петербурзі, згодом у С.-Пе­тербур. консерваторії (1889; кл. С. Габеля, К. Еверарді). Удосконалював майстерність у О. Палечека. 1889–92&nbsp;— соліст Одес., 1892–93, 1894–95&nbsp;— Київ., 1893–94&nbsp;— Харків. опер. театрів, 1895–1907&nbsp;— Маріїн. опери у С.-Пе­тер­бурзі. Володів сильним голосом широкого діапазону. Виконав. майстерність М. характеризувалася гнучкою муз. технікою і темперамент. драм. грою. Активно пропагував укр. муз. мистецтво на теренах Росії. Був головою укр. громади у С.-Петербурзі, на вечорах якої влаштовував концерти укр. музики. 1900–01 на фірмі «Грамофон» у С.-Петербурзі записав українські народні пісні «На городі пастернак», «Якби таки або так, або сяк», романси «Садок вишневий коло хати» М. Лисенка та влас. романс «У гаю, гаю вітру нема». 1907, 1909 гастролював в Україні, зокрема Харкові, Полтаві, Катеринославі (нині Дні­про), Єлисавет­граді (нині Кропивницький). Додаткові відомості Основні партії Садко, Берендей, Ликов, Дяк, Левко («Садко», «Снігуронька», «Царева наречена», «Ніч перед Різдвом» М. Римського-Корсакова), Герман, Ленський («Пікова дама», «Євгеній Онєгін» П. Чайковського), Самозванець, Голицин («Борис Годунов», «Хованщина» М. Мусоргського), Хозе («Кармен» Ж. Бізе), Рауль, Іоанн Лейденський («Гуґеноти», «Пророк» Дж. Мейєрбера), Радамес («Аїда» Дж. Верді), Лоенґрін (однойм. опера Р. Ваґнера). Рекомендована література Русова С. Український вечір у Петербурзі // Рада. 1907, 29 лют. Google Scholar Internet Кон­церт Морского // РМГ. 1909. № 16. Google Scholar Internet Мор­ской Г. А. (Некролог) // Театр и искусство. 1915. № 1. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 181, "name": "Михайлів Любомир Львович", "by": "1953.0", "dy": "", "status": "alive", "reasoning": "No death year — presumed alive or date unknown.", "notes": "(04. 01. 1953, с. Кропивник, нині Долин. р-ну Івано-Фр. обл.) – письменник, журналіст, краєзнавець, громадський діяч. Член НСЖУ (1984), НСПУ (2000), Національної спілки крає­знавців України (2015). Премії ім....", "url": "https://esu.com.ua/article-64807", "group": "EXCLUDE", "bio": "МИХА́ЙЛІВ Любомир Львович (04. 01. 1953, с. Кропивник, нині Долин. р-ну Івано-Фр. обл.)&nbsp;— письмен­ник, журналіст, крає­знавець, громадський діяч. Член НСЖУ (1984), НСПУ (2000), Національної спілки крає­­знавців України (2015). Премії ім. Марійки Під­гірянки (1997), ім. М. Утриска (2003), ім. В. Стефаника, ім. Я. Дорошенка (обидві&nbsp;— 2016), лауреат Всеукр. літ. конкурсу «Золотий тризуб» (2011). Закін. Львівський університет (1979). Працював завідувач від­ділу радіо­інформації у рожнятів. рай. г. «Нові горизонти», 1998–2013&nbsp;— за­ступник нач. від­ділу культури Рожнятів. райдерж­адміністрації. Голова Рожнятів. рай. організації товариства «Просвіта» (від 1990). У творах М. домінують мотиви нац. історії, патріотизму, закоханості в добро й красу. Схильний до філос. медитацій на теми «особа і су­спільство», «людина і природа», «сенс люд. життя». Його перу однаково під­владні як класич. римований, так і білий чи вільний вірш, а також сонети, рубаї. Автор зб. малої прози «Зазимки» (Рожнятів, 2007), краєзн. нарисів «Долина» (Уж., 1988), «Село Кропивник з по­гляду минулого» (Долина, 1998), «Рожнятів і околиці» (Снятин, 2000; 2012), «Історія села Кропивник» (Ів.-Ф., 2009). Додаткові відомості Основні твори Формула зерна. Снятин, 1993; Амплітуда вогню. Снятин, 1994; Плаї. Рожнятів, 1996; Гірська земля. Долина, 2001; Клавіші сонця. Л., 2003; На семи вітрах. Долина, 2004; Високосний рік. Л., 2007; Автограф любові. Л., 2007; Між сотнями літ. Ів.-Ф., 2007; Літа і літо. Л., 2009; Вербовий мед. Л., 2012; Сонети. Л., 2012; Вибрані твори: У 3 т. Ів.-Ф., 2013–15; Йшли батальйони на Схід. Ів.-Ф., 2015; За день до весни. Ів.-Ф., 2016; На околиці осені: Вибр. поезії, поеми. Ів.-Ф., 2016. Рекомендована література Тимочко М. Михайлів Любомир Львович // Укр. журналістика в іменах. Л., 2003. Вип. 10. Google Scholar Internet Павліха І. Заглядаючи у душу слова // ЛУ. 2008, 20 берез. Google Scholar Internet Фарина І. Сонет — то таємниця, загадковість // Перевал. 2016. № 3–4. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 182, "name": "Фіцнерівна-Морозова Марія Іванівна", "by": "1873.0", "dy": "1920.0", "status": "excluded_pre_soviet", "reasoning": "Died before 1921 (death_year=1920) — pre-Soviet, outside study scope.", "notes": "(08. 12. 1873, Львів — 1920, м. Кам’янка-Струмилова, нині Кам’янка-Бузька Львівського р-ну Львівської обл.) — оперна співачка, акторка. Співу навчалася у диригента Ф. Доліста. 1889—91 — солістка...", "url": "https://esu.com.ua/article-886327", "group": "EXCLUDE", "bio": "ФІЦНЕРІ́ВНА-МОРО́ЗОВА Марія Іванівна (08. 12. 1873, Львів&nbsp;— 1920, м. Камʼянка-Струмилова, нині Камʼянка-Бузька Львівського р-ну Львівської обл.)&nbsp;— оперна спів­ачка, акторка. Співу на­вчалася у диригента Ф. Доліста. 1889–91&nbsp;— солістка Львівського міського театру, 1892–1902&nbsp;— у театрі товариства «Українська бесіда». Водночас ви­ступала у трупі Ю. Косиненка (1897–98), мандрівній трупі І. Мороза (ви­йшла заміж 1898). Від 1902 припинила театральну діяльність, продовжувала брати участь у концертах. Додаткові відомості Основні партії Наталка і Терпелиха, Солоха, Панна («Наталка Полтавка», «Різдвяна ніч», «Утоплена» М. Лисенка), Одарка («Запорожець за Дунаєм» С. Гулака-Артемовського), Сантуцца («Сільська честь» П. Масканьї). Рекомендована література Медведик П. Діячі української музичної культури: Мат. до біобібліогр. слов. // Зап. НТШ: Пр. Музикозн. комісії. Л., 1993. Т. 232. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 183, "name": "Фільц Богдана Михайлівна", "by": "1932.0", "dy": "2021.0", "status": "non_migrated", "reasoning": "Born in Yavoriv (now Lviv Oblast), died in Kyiv; no evidence of emigration from Soviet sphere or forced displacement; career as composer remained within Ukrainian SSR.", "notes": "(14. 10. 1932, м. Яворів, нині Львівської обл. — 05. 05. 2021, Київ) — композитор, музикознавець. Дружина Миколи, мати Богдана Мордюків. Кандидат мистецтвознавства (1964), доктор філософії з мистецтва (2006)....", "url": "https://esu.com.ua/article-884727", "group": "INCLUDE", "bio": "ФІЛЬЦ Бог­дана Михайлівна (14. 10. 1932, м. Яворів, нині Львівської обл.&nbsp;— 05. 05. 2021, Київ)&nbsp;— композитор, музико­знавець. Дружина Миколи , мати Богдана Мордюків . Кандидат мистецтво­знавства (1964), доктор філософії з мистецтва (2006). Заслужена діячка мистецтв України (1999). Член НСКУ (1961). Премії імені М. Лисенка (1993), імені В. Косенка (2003). Мистецька премія «Київ» імені А. Веделя (2016). Лауреатка Всеукраїнського конкурсу композиторів «Духовні псалми третього тисячолі­т­тя» (Київ, 2001). Після арешту 1939 і загибелі батька (адвокат, активний діяч «Просвіти», ініціатор створе­н­ня багатьох культурно-мистецьких закладів у Яворові), разом із матірʼю та сестрами 1940 була заслана до Казах­стану. Від 1945 мешкала у Львові. Закінчила історико-теоретичний (1956) та композиторський (1958) факультети Львівської консерваторії. Учениця С. Людкевича . Від 1962 працювала в Ін­ституті мистецтво­знавства, фольклористики та етнології НАНУ (Київ): від 1969&nbsp;— старший науковий спів­робітник. Серед творів&nbsp;— числен­ні хори й пісні для дітей, хорові композиції, романси, написані на поезії Т. Шевченка, І. Франка, Лесі Українки, Л. Костенко, Д. Павличка, М. Сингаївського та ін., обробки народних пісень, зокрема колядок і щедрівок. Її сакральні хори на канонічні текс­ти уві­йшли до репертуару багатьох дитячих та академічних капел. Авторка роз­ділів до багатотомної «Історії української музики» (К., 1989, т. 1; 1992, т. 4), числен­них статей до низки енциклопедій (зокрема «Української музичної енциклопедії», ЕСУ), наукових збірників, журналів. Твори Ф. звучать в Україні та за її межами (Польща, Чехія, Австрія, Німеч­чина, Велика Британія, Данія, Нідерланди, Фінляндія, Франція, США, Угорщина, країни Балтії, Канада та ін.). Додаткові відомості Основні праці Фортепіанна творчість В. С. Косенка. К., 1965; Хорові обробки українських народних пісень: творчі принципи опрацювання пісень радянськими композиторами. К., 1965; Український радянський романс. К., 1970; Художня самодіяльність на сучасному етапі. К., 1977 (співавт.); Багатогранність творчої діяльності Галини Менкуш (До 60-річчя від дня народження бандуристки) // Народна творчість та етнографія. 2006. № 3. Основні твори для симфонічного оркестру — Концерт для фортепіано з оркестром (1958), «Верховинська рапсодія» (1961); для дитячого хору — «Від льоду до льоду» (1965), «Смерічка» (1973), «Любимо землю свою» (1977), «Від зими до зими» (1983), «Земле моя» (1985), «Весняний дзвін» (1987), «Жива криниця» (1998); хорові кантати — «Любіть Україну», «Юнакові» (обидві — 1958, слова В. Сосюри), «Пори року» (2013, слова П. Тичини), хоровий реквієм «Ангелику» (2014, пам’яті героїв Небесної сотні); для фортепіано — «Три п’єси на теми лемківських пісень» (1961), «Закарпатські новелети» (1966), «Лемківські варіації» (1972), «Київський триптих» (1982), «Шість візерунків» (1983–86), «Музичні присвяти» (1985–2002), «Музичний калейдоскоп» (1996); солоспіви на слова Т. Шевченка, І. Франка, Лесі Українки, О. О"}, {"idx": 184, "name": "Клименко Пилип Пилипович", "by": "1862.0", "dy": "1917.0", "status": "excluded_pre_soviet", "reasoning": "Died before 1921 (death_year=1917) — pre-Soviet, outside study scope.", "notes": "(1862, Україна – після 1917) – живописець, графік, педагог. Закін. Одес. рисув. школу (1879; викл. К. Костанді), відтоді викладав у ній до 1893. Учасник виставок Товариства пд.-рос. художників від 1891....", "url": "https://esu.com.ua/article-7753", "group": "EXCLUDE", "bio": "КЛИМЕ́НКО Пилип Пилипович (1862, Україна&nbsp;— після 1917)&nbsp;— живописець, графік, педагог. Закін. Одес. рисув. школу (1879; викл. К. Ко­станді ), від­тоді викладав у ній до 1893. Учасник ви­ставок Товариства пд.-рос. художників від 1891. Більшість творів присвяч. чорномор. пейзажам, зображен­ню суден. Осн. техніки&nbsp;— акварель, олія. Акварел. штильові композиції із невеликими судами на рейді та умиротворен­ністю мор. стихії виконував професійно, ніжним колір. ріше­н­ням. Значну кількість робіт К. із видами Чорного моря на­друковано на листівках 1910–11 у видавництвах «Ришар» (С.-Петербург) та П. Гекшера (Стокгольм). Серед учнів&nbsp;— О. Новаківський . Додаткові відомості Основні твори живопис — «Малий Фонтан» (1891), «Літній день», «Хатина рибалки» (обидва — поч. 20 ст.), «Край села» (1905), «У відкритому морі» (1910); графіка — «Крим. Симеїз», «Крим. Алупка», «Крим. Гурзуф» (усі — поч. 20 ст.), «Крим. Севастополь» (1910), «Буксир», «Прогулянка» (обидва — 1914), «Кримський пейзаж із пініями» (1915). Рекомендована література Каталог 2-й периодической выставки южно-русских художников. 1891. Google Scholar Internet Афанасьев В. А., Барковский О. М. Товарищество южно-русских художников в Одессе. 2000 (обидва — Одеса). Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 185, "name": "Голець Ярослав Васильович", "by": "1941.0", "dy": "", "status": "alive", "reasoning": "No death year — presumed alive or date unknown.", "notes": "(27. 11. 1941, с. Великий Говилів Терноп. р-ну Терноп. обл.) – скульптор. Закін. Львів. інститут прикладного та декоративного мистецтва (1975; викл. Д. Крвавич, З. Флінта). Відтоді працює на Терноп....", "url": "https://esu.com.ua/article-25221", "group": "EXCLUDE", "bio": "ГО́ЛЕЦЬ Ярослав Васильович (27. 11. 1941, с. Великий Говилів Терноп. р-ну Терноп. обл.)&nbsp;— скульптор. Закін. Львів. ін­ститут прикладного та декоративного мистецтва (1975; викл. Д. Крвавич , З. Флінта ). Від­тоді працює на Терноп. худож.-вироб. комбінаті Худож. фонду України; одночасно від 1995&nbsp;— викладач Теребовлян. училища культури (Терноп. обл.). Учасник худож. ви­ставок від 1975. Концепцію автор. ідеї в кераміці збагачує метафорич. мовою нац. архетипів у по­єд­нан­ні з духом нар. фантазії. Роботи зберігаються у Терноп. ХМ. Додаткові відомості Основні твори рельєфи — «Лісові мотиви» (1976), «Чотири пори року» (Палац культури «Текстильник», 1985); барельєф І. Франка до мемор. дошки на будинку Терноп. обл. філармонії (1983); «Жіночий портрет» (1976); пам’ятник Т. Шевченку (1986; м. Монастириська Терноп. обл.); мемор. дошки — Лесі Українці на однойм. вулиці (1983; усі — у Тернополі), О. Барвінському (1997, с. Шляхтинці Терноп. р-ну Терноп. обл.); керам. пласти — «Пісня Карпат», «Квітуча земля» (обидва — 1980), з міфол. сюжетами (1987–89), на теми нар. пісень (1991–2001). Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 186, "name": "Борін Борис Абрамович", "by": "1899.0", "dy": "1965.0", "status": "non_migrated", "reasoning": "Borin remained in Ukrainian SSR throughout his career, working in Odesa theatres from 1923 and receiving the title of People's Artist of Ukrainian SSR in 1960, dying in Chernivtsi in 1965 with no evidence of emigration or forced displacement.", "notes": "(справж. – Шварцман; 19. 11(01. 12). 1899, Одеса – 09. 02. 1965, Чернівці) – режисер. Народний артист УРСР (1960). Закін. Першу держ. театр. студію в Одесі (1923). Працював у театрах Одеси: рай. драм. (1923),...", "url": "https://esu.com.ua/article-37220", "group": "INCLUDE", "bio": "БО́РІН Борис Абрамович (справж.&nbsp;— Шварцман; 19. 11(01. 12). 1899, Одеса&nbsp;— 09. 02. 1965, Чернівці)&nbsp;— режисер. Народний артист УРСР (1960). Закін. Першу держ. театр. студію в Одесі (1923). Працював у театрах Одеси: рай. драм. (1923), «Мас­содрамі» (1924), рос. драм. ім. А. Іванова (1925–28), Театрі Революції (1928–31, 1935–44); 1931–35&nbsp;— у Харків. укр. драм. театрі Революції. У 1943 очолював фронт. концертну бригаду, яка ви­ступала перед бійцями 3-го Укр. фронту. 1944–48&nbsp;— реж., 1948–65&nbsp;— гол. реж. Чернів. муз.-драм. театру ім. О. Кобилянської. Вдало по­єд­нував глибокий аналіз твору і яскраву видовищну форму ви­став. Учні Б.&nbsp;— К. Артеменко , Ю. Величко , Є. Золотова . Плідно продовжив творчу роботу Чернів. театру&nbsp;— своєрід. сценіч. літопис Буковини, започаткований В. Васильком 1947 по­становкою «Землі» за О. Кобилянською,&nbsp;— ви­ставами: «Весняний потік» (1949) і «Ярослава» (1953) З. Прокопенка, «У неділю рано зілля копала» за О. Кобилянською, «Лукʼян Кобилиця» Л. Балковенка і Г. Мізюна (обидві&nbsp;— 1955), «Леся» М. Андрієвич (1959), «Вітрова донька» В. Зубаря (1962). Додаткові відомості Основні вистави «Устим Кармелюк» В. Суходольського (1940), «Житейське море» І. Карпенка-Карого (1945), «На людному місці» О. Островського (1947), «Підступність і кохання» Ф. Шіллера (1948), «Отелло» В. Шекспіра (1949), «Лихо з розуму» О. Грибоєдова (1950), «Вій, вітерець!» Я. Райніса (1951), «Анджело, тиран падуанський» В. Гюґо (1953), «Тев’є-молочник» за Шолом-Алейхемом (1956), «Оптимістична трагедія» В. Вишневського (1957), «Доки сонце зійде, роса очі виїсть» М. Кропивницького, «Тайфун» Цао-Юя (обидві — 1958), «Іркутська історія» О. Арбузова, «Урієль Акоста» К. Гуцкова (обидві — 1960), «Сеньйор Маріо пише комедію» А. Ніколаї (1961), «Іспанці» М. Лермонтова (1964). Рекомендована література Лейченко Г. Режисер-майстер // Рад. Буковина. 1980, 30 жовт. Google Scholar Internet Сулятицький Т. Слово про митця // Театр. бесіда. 2000. № 2. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 187, "name": "Зарудний Микола  Якович", "by": "1921.0", "dy": "1991.0", "status": "non_migrated", "reasoning": "Born in Ukrainian village, died in Kyiv in 1991 with no evidence of emigration or forced displacement; remained in Ukrainian SSR throughout life.", "notes": "(20. 08. 1921, с. Оріховець, нині Сквир. р-ну Київ. обл. – 25. 08. 1991, Київ) – драматург, прозаїк. Член СПУ (1950). Учасник 2-ї світової війни. Бойові нагороди. Навч. в Укр. комуніст. інституті журналістики...", "url": "https://esu.com.ua/article-15616", "group": "INCLUDE", "bio": "ЗАРУ́ДНИЙ Микола Якович (20. 08. 1921, с. Оріховець, нині Сквир. р-ну Київ. обл.&nbsp;— 25. 08. 1991, Київ)&nbsp;— драматург, прозаїк. Член СПУ (1950). Учасник 2-ї світової війни. Бо­йові нагороди. Навч. в Укр. комуніст. ін­ституті журналістики (Харків, 1939–41), закін. Казах. університет (Алма-Ата, нині Алмати; 1942). Працював журналістом. 1961–63&nbsp;— гол. ред. Київ. кіностудії худож. фільмів ім. О. Довженка; 1966–69&nbsp;— секр. правлі­н­ня СПУ, 1981–90&nbsp;— правлі­н­ня Київ. організації СПУ. Почав друкуватися 1944. Перші пʼєси написані в дусі часу, зокрема під впливом творчості О. Корнійчука. Успіх і гол. риси драматургії З.&nbsp;— конфлікт між високим, одухотвореним і приземлено-меркантильним, які означила комедія «Веселка» (1958; 1962), роз­винулися у пʼєсах «Мертвий бог» (1960), «Фортуна» (1964), «Рим, 17, до запита­н­ня» (1969), «Дороги, які ми вибираємо» (1971), «Пора жовтого листя» (1974), «Маестро, туш!» (1978), «Обочина», «Регіон» (обидві&nbsp;— 1981), «Бронзова ваза» (1985; усі&nbsp;— Київ) та ін. Більшість пʼєс&nbsp;— на теми сільс. життя. Від­знач. Державною премією України ім. Т. Шевченка (1978) за трагедію «Тил» (К., 1977; про воєн­не лихолі­т­тя), що ставилася у Львів. укр. драм. театрі ім. М. Заньковецької (реж.-по­становник С. Данченко). У повісті «Мої земляки» (1950), зб. оповідань «Світло» (1961), романах «На білому світі» (1967), «Уран» (1970), «Гілея» (1973; усі&nbsp;— Київ) порушив морал. та екол. про­блеми села. За сценаріями З. знято х/ф «Веселка» (за однойм. комедією, 1959, реж. М. Літус), «Стежки-доріжки» (1963, реж. О. Борисов, А. Войтецький), «Тут нам жити» (1973; усі&nbsp;— Київ. кіностудія худож. фільмів ім. О. Довженка), фільми-спектаклі «Чужий дім» (1968), «Вірність» (1977), «І від­летимо з вітрами» (1978), «Тил» (1979; усі&nbsp;— студія «Укртелефільм»). Додаткові відомості Основні твори П’єси. 1959; Антеї. Сини ідуть далі: П’єса. 1961; Ну й діти…: Комедія. 1963; Острів твоєї мрії: Драма. 1963; Марина: Героїчна драма [за мотивами творів Т. Шевченка]. 1965; Сині роси: П’єси. 1968; На білому світі. Уран: Романи. 1975; Твори: У 4 т. 1981–82; Твори: У 2 т. 1991 (усі — Київ). Рекомендована література Шлапак Д. Я. З любов’ю до сучасника. К., 1981. Google Scholar Internet Спиридонова А. Маестрові туш! // КіЖ. 1991. № 3. Google Scholar Internet [Некролог] // ЛУ. 1991, 29 серп. Google Scholar Internet Кравченко А. Є. Драматургія Миколи Зарудного // Стильові тенденції укр. літ-ри ХХ ст.: Зб. К., 2004. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 188, "name": "Дзиндра Петро Іванович", "by": "1944.0", "dy": "", "status": "alive", "reasoning": "No death year — presumed alive or date unknown.", "notes": "(28. 03. 1944, м. Ярослав, нині Польща) – скульптор. 1945 родину виселено до смт Заболотів (нині Івано-Фр. обл.). Навч. малюванню й скульптури у тестя Є. Дзиндри. Закін. Львів. інститут прикладного та...", "url": "https://esu.com.ua/article-24116", "group": "EXCLUDE", "bio": "ДЗИ́НДРА Петро Іванович (28. 03. 1944, м. Ярослав, нині Польща)&nbsp;— скульптор. 1945 родину виселено до смт Заболотів (нині Івано-Фр. обл.). Навч. малюван­ню й скульптури у тестя Є. Дзиндри . Закін. Львів. ін­ститут прикладного та декоративного мистецтва (1976; викл. Д. Крвавич , Т. Максисько , І. Самотос , Я. Шеремета ). Основна галузь&nbsp;— монум.-декор. скульптура. Використовує бронзу, камінь, мармур, граніт. Додаткові відомості Основні твори садово-парк. скульптура «Спорт» (1976, Центр. парк культури та відпочинку у Львові); мемор. таблиці — для мемор. комплексу УСС (1990; с. Пи- куличі, Польща), композитору С. Люд- кевичу (1994; м. Ярослав), поету Оле- гу Ольжичу (вул. Личаківська у Львові), командиру УПА В. Щигельському (вул. Пекарська у Львові; арх. обох — О. Яре- ма); пам’ятники — Т. Шевченку (1990, співавт. С. Дзиндра; с. Демня Микол. р-ну Львів. обл.); письменнику А. Чай- ковському (м. Самбір Львів. обл.; арх. обох — О. Ярема); надгробки — Є. Дзиндрі (1988; співавт. Я. Троцько); меценату В. Кашицькому (арх. О. Ярема; обидва — на Личаків. кладовищі у Львові), поету О. Козловському (1994; с. Гребінне, Польща); портрет нар. арт. України О. Гринька. Завантажити статтю"}, {"idx": 189, "name": "Кучеря Наталія Олександрівна", "by": "1957.0", "dy": "", "status": "alive", "reasoning": "No death year — presumed alive or date unknown.", "notes": "(28. 10. 1957, Київ) – художниця театру. Заслужений художник України (2017). Член НСХУ (2000). Закін. Київ. ху­­дож. інститут (1983; майстерня Д. Лі­­дера). Від 1982 – у Нац. опері України ім. Т. Шевченка (Київ),...", "url": "https://esu.com.ua/article-52428", "group": "EXCLUDE", "bio": "КУЧЕ́РЯ Наталія Олександрівна (28. 10. 1957, Київ)&nbsp;— художниця театру. Заслужений художник України (2017). Член НСХУ (2000). Закін. Київ. ху­­дож. ін­ститут (1983; майстерня Д. Лі­­дера ). Від 1982&nbsp;— у Нац. опері України ім. Т. Шевченка (Київ), де створила костюми до опер «Наймичка» М. Вериківського, «Богема» і «Манон Леско» Дж. Пуч­­чіні, «Бал-маскарад» Дж. Верді, «Війна і мир» С. Прокофʼєва, «Катерина Ізмайлова» Д. Шос­­та­­ковича, «Ярослав Мудрий» Г. Май­­бороди, «Наталка Полтавка» М. Лисенка, балету «Лісова пісня» М. Скорульського, ви­стави «Дама з камеліями» на музику Л. ван Бетговена, Й. Брам­­са, Ґ. Форе, І. Стравинського (усі&nbsp;— 1990–2000-і рр.). Оформи­­ла балет «Бармалей та Айболить» Ю. Шевченка (за К. Чуковським, лібрето О. Баклана, В. Ли­­твинова; Київ. театр опери і балету для дітей та юнацтва, 1990-і рр.), ви­стави «Гол­ландоч­­ка» (1994) та «Маріца» (2000) І. Кальмана, «Граф Люксембурґ» (1995) Ф. Легара, «Американська комедія» (1996) М. Самой­­лова (усі&nbsp;— Київ. театр оперети); балет «Лускунчик» П. Чайковського (1997, Рос. камер. ба­­лет «Москва», РФ). За її ескізами створ. костюми до ви­став «Обо­­чина» М. Зарудного (Нац. укр. театр ім. І. Франка), «Шалені гроші» О. Островського (Нац. театр рос. драми ім. Лесі Українки), про­грам балету на льоду (усі&nbsp;— 2000-і рр., Київ), опери «Війна і мир» С. Прокофʼєва (2006, м. Брно, Чехія). Спів­працювала з&nbsp; Ю. Шевченко . Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 190, "name": "Прибік Йосиф В’ячеславович", "by": "1853.0", "dy": "1855.0", "status": "excluded_pre_soviet", "reasoning": "Died before 1921 (death_year=1855) — pre-Soviet, outside study scope.", "notes": "(Йозеф Вацлавович; 13. 04. 1853, за ін. даними — 11. 03. 1855, маєток Свята Гора, передмістя Пршібрама поблизу Праги — 20. 10. 1937, Одеса) — диригент, композитор, педагог. Народний артист УСРР (1932). Закінчив...", "url": "https://esu.com.ua/article-879497", "group": "EXCLUDE", "bio": "ПРИ́БІК Йосиф Вʼячеславович (Йозеф Вацлавович; 13. 04. 1853, за ін. даними&nbsp;— 11. 03. 1855, маєток Свята Гора, перед­містя Пршібрама по­близу Праги&nbsp;— 20. 10. 1937, Одеса)&nbsp;— диригент, композитор, педагог. Народний артист УСРР (1932). Закінчив Празькі фортепіан­ну академію (1875; за ін. даними&nbsp;— орган­ну школу, 1872) та консерваторію (1876, як піаніст і диригент). Від 1878 мешкав у Смоленську (Росія), де очолював від­діле­н­ня Російського музичного товариства (1879–93). П. був диригентом Харківської (1870–82, 1888–89), Львівської (1882–83), Київської (1883–85) опер. 1889–93&nbsp;— капель­мейстер Товариства оперних спів­аків І. Прянишникова (Київ). Від 1894&nbsp;— в Одесі: диригент, від 1920&nbsp;— головний диригент, від 1926&nbsp;— почесний диригент Оперного театру, водночас від 1919&nbsp;— професор Консерваторії. Вперше по­ставив низку опер в театрах Києва, Одеси, а також оперу «Майська ніч» М. Римського-Корсакова в Шелапутинському театрі (Москва, 1892). Диригував у Києві першими в Україні (після Маріїнського театру в Санкт-Петербурзі) по­становками опер «Пікова дама» П. Чайковського (1890), «Князь Ігор» О. Бородіна (1891). У репертуарі диригента, зокрема, були рідко виконувані ви­стави: «Фальстаф» Дж. Верді, «Трі­стан та Ізольда» Р. Ваґнера, «Король Лагорський» Ж. Мас­сне, «Роберт-диявол», «Іоанн Лейденський» Дж. Мейєрбера, «Заза» Р. Леонкавал­ло, «Дівчина із Заходу», «Манон Леско» Дж. Пуч­чіні та ін. Як композитор написав одноактні сценічні твори («Забув!!!», «Нерви», «Заручини», «Радість», «У пітьмі» та ін.), балетні сюїти, оркестрові твори (музична картина «Свято на селі», обробки народних пісень для оркестру, «Українська рапсодія» тощо), Струн­ний квартет на молдавські народні теми, романси. Автор досліджень з теорії музики. Рекомендована література Полферов Я. Иосиф Прибик // Сов. музыка. 1935. № 2. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 191, "name": "Сембратович Роман-Іван", "by": "1875.0", "dy": "1906.0", "status": "excluded_pre_soviet", "reasoning": "Died before 1921 (death_year=1906) — pre-Soviet, outside study scope.", "notes": "(псевд. і крипт.: Висовський Р., Учасник, Р. В., Сeverus, Galizischer Slave, R. S.; 06. 07. 1875, с. Монастирець, нині Польща — 08. 01. 1906, Відень) — публіцист, видавець, журналіст, громадсько-політичний діяч. Народився в...", "url": "https://esu.com.ua/article-891574", "group": "EXCLUDE", "bio": "СЕМБРАТО́ВИЧ Роман-Іван (псевд. і крипт.: Висовський Р., Учасник, Р. В., Сeverus, Galizischer Slave, R. S.; 06. 07. 1875, с. Монастирець, нині Польща&nbsp;— 08. 01. 1906, Ві­день)&nbsp;— публіцист, видавець, журналіст, громадсько-політичний діяч. Народився в родині пароха. На­вчався в Самбірській класичній гімназії (нині Львівська обл.) із польською мовою на­вча­н­ня, де входив до гуртка молодих гімназистів, особливо наполегливо ви­вчав німецьку мову. Закінчив українську гімназію в Пере­мишлі (нині Польща, 1893), студіював право у Ві­денському університеті. Ще гімназистом заснував разом із друзями читальню «Просвіти» у Яворові (нині Львівська обл.), на вакаціях готував до вступу в гімназію хлопчиків зі свого села, ставлячи перед собою мету поповнити ряди української інтелігенції. Серед його друзів і однодумців тих років був П. Карманський . У студентські роки брав активну участь у діяльності академічного товариства «Січ», до 30-річчя якого разом із М. Кордубою і С. Яричевським випустив 1898 одно­ймен­ний альманах, де були опубліковані його прозові твори. У тому ж році був пред­ставником цього товариства на студентському зʼ­їзді у Києві, брав участь у святкуван­ні 100-літнього ювілею української літератури у Львові. Спів­працював із ві­денським робітничим товариством радикального напряму «Родина», ви­ступав із популярними лекціями. Під­тримував кандидатуру І. Франка , з яким листувався від 1892, на виборах до ав­стрійського парламенту 1898. Його дописи про історію та культуру України друкували в ав­стрійській, німецькій, данській та швейцарській періодиці: «Volksstimme» (Ві­день), «Berliner Tagenblatt» (Берлін), «Politiken» (Копенгаґен), «Le Courrier Européen» (Женева). Був спів­робітником часопису «Neues Wiener Journal» та власним кореспондентом «Frankfurter Zeitung». Резонансною була його ста­т­тя у двотижневику «Die Wage» (Ві­день) про махінації польської адміністрації. Громадсько-політична діяльність С. при­звела до непоро­зумінь із батьком, який від­мовив синові у матеріальній допомозі, тож заробляти на життя став приватними лекціями. 1901 разом з А. Скаргою започаткував інформаційне бюро для публікації спеціалізованого періодичного ви­да­н­ня «Moderne Revue» з українською про­блематикою, яке не вдалося реалізувати через фінансові причини. Взявши позику, заснував німецькомовний журнал «X-Strahlen» (Ві­день, 1901; ви­йшло 14 чисел), у ви­да­н­ня якого вкладав усі свої гонорари за стат­ті, які друкував у різних ви­да­н­нях. Видавав (разом із В. Яворським й А. Косом ) та був від­повід­альним редактором часопису «Ruthenische Revue» (Ві­день, 1903–05). Завдяки цьому ви­дан­ню С. 1904 роз­по­всюдив анкету «Заборона української мови в Росії» серед ви­значних європейських діячів політики, науки і культури. Від­повіді на неї було ви­дано окремою книжечкою «Das Urteil der europäischen Kulturwelt über des Ukas von 1876 (Durch welche die ukrainische Literatur im russischen Reiche verboten wurde)» (Vien, 1905). Анкета викликала значний резонанс у політичн"}, {"idx": 192, "name": "Кендзерський Ігнатій", "by": "1877.0", "dy": "1968.0", "status": "non_migrated", "reasoning": "Born in Polish territory (Krasnystav), educated in Lviv, and worked as architect in Lviv from 1908 onwards; no evidence of Soviet displacement or emigration to non-Soviet countries outside Polish-Ukrainian borderlands.", "notes": "(1877, м. Краснистав, нині Люблін. воєводства, Польща – 1968, м. Люблін) – архітектор. Навч. у Політех. школі у Львові (1897–1902). Відтоді працював у Львові: від 1908 – уповноважений архітектор. Спільно з...", "url": "https://esu.com.ua/article-11745", "group": "INCLUDE", "bio": "КЕНДЗЕ́РСЬКИЙ Ігнатій (1877, м. Красни­став, нині Люблін. воєводства, Польща&nbsp;— 1968, м. Люблін)&nbsp;— архітектор. Навч. у Політех. школі у Львові (1897–1902). Від­тоді працював у Львові: від 1908&nbsp;— уповноважений архітектор. Спільно з А. Опольським будував житл. і громад. споруди у різних модерніз. істор. стилях, найчастіше використовував роман. і готичні прототипи. Серед найви­значніших реаліз. проектів у Львові&nbsp;— Катол. дім (нині муніцип. театр) на вул. Городоцька, № 2а (нині № 36), школа св. Йосипа (нині юрид. факультет Ін­ституту новіт. технологій) на вул. І. Лелевеля (нині В. Верещагіна), № 9 (обидва&nbsp;— 1909–10), Дім убогих св. Вінцента де Поля на вул. Театинська (нині М. Кривоноса), № 1а (1909–13, пере­будова), житл. будинки на вул. С. Виспянського (нині І. Вишенського), № 11–15, 20–24, 25–33 (1909–12), прибутк. камʼяниці на вул. Цитадельна, № 5–7 (нині П. Чайковського, № 35–37; 1910–11), жін. гімназія ім. королеви Ядвіґи (нині Ін­ститут патології крові та транс­фуз. медицини НАМНУ) на вул. А. Потоцького (нині Генерала Чу­принки), № 45 (1930–34, спів­автор А. Опольський). Конкурсні проекти (нереалізовані): для Тернополя&nbsp;— будинку Товариства нар. шкіл (1907, 1-а премія), для Львова&nbsp;— рекон­струкції ратуші (1908) й Акц. кооп. банку (1911, спів­автор А. Опольський, 1-а премія), нового будинку Львів. університету (1913). Від 1920&nbsp;— міський архітектор Любліна, де спорудив будинок місії єзуїтів «Боболанум» (1922–23, нині військ. шпиталь), Фінанс. палату, від­будував ратушу (1947–52). Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 193, "name": "Містраль Ґабрієла", "by": "", "dy": "1889.0", "status": "excluded_non_ukrainian", "reasoning": "B1-patch: Gabriela Mistral (1889–1957) is the Chilean Nobel laureate; no Ukrainian residence or connection. Wrongly included in ESU dataset.", "notes": "(Mistral Gabriela; справж. – Lucila Godoy Alcayaga, Лусіла Ґодой Алькаяґа; 07. 04. 1889, м. Вікунья, провінція Кокімбо, Чилі – 10. 01. 1957, м. Гемпстед, шт. Нью-Йорк, США; похов. у Чилі) – чилійська поетеса, громадська...", "url": "https://esu.com.ua/article-67935", "group": "EXCLUDE", "bio": "МІСТРА́ЛЬ Ґабрієла (Mistral Gabriela; справж.&nbsp;— Lucila Godoy Alcayaga, Лусіла Ґодой Алькаяґа; 07. 04. 1889, м. Вікунья, провінція Кокімбо, Чилі&nbsp;— 10. 01. 1957, м. Гемпстед, шт. Нью-Йорк, США; похов. у Чилі)&nbsp;— чилійська поетеса, громадська діячка, дипломат. Нобелівська премія з літератури (1945), Національна літературна премія Чилі (1951). З 16-ти років учителювала. Від 1924&nbsp;— чилійський консул в Італії, 1933–35&nbsp;— Іспанії, 1935–37&nbsp;— Португалії, 1938–46&nbsp;— Бразилії, США. Брала участь у роботі Ліги Націй і ООН (1946). Перші вірші опубліковані 1903. Псевдонім на честь італійського письмен­ника Ґабріеле ДʼАн­нуціо і провансальського поета Ф. Містраля. Глибоко драматичні ранні поезії М., сповнені туги за коханим, що перед­часно покинув світ&nbsp;— «Sonetos de la muerte» («Сонети смерті», 1914; уві­йшли до збірки «Desolación» / «Від­чай», Нью-Йорк, 1922). Поезія справжнього почу­т­тя М. зробила її символом ідеалістичних прагнень для всієї Латинської Америки. Широкої популярності набула її збірка колискових пісень та віршів «Ternura» («Ніжність», Мадрид, 1924). Збірка «Tala» («Руба­н­ня лісу», Буенос-Айрес, 1938), наповнена мотивами та образами фольклору,&nbsp;— гімн історії й природі латиноамериканського континенту. До остан­ньої збірки «Lagar» («Давильня», Сантьяґо, 1954) уві­йшли лірико-філософські та інші вірші. М. звеличувала людину праці, об­стоювала права жінки, людську гідність. Писала стат­ті з питань літератури, нариси, есе. 1984 у Києві в упорядкуван­ні та з перед­мовою М. Литвинця ви­йшли її «Поезії». Окремі вірші М. пере­клав І. Качуровський (опубліковані у збірці «Золота галузка», Буенос-Айрес; Мюнхен, 1991), а також Д. Павличко, С. Борщевський, Г. Латник, Г. Чубай, Ю. Покальчук, В. Моруга, О. Криштальська. 2009 у Сантьяґо від­крито Культурний центр її імені, на честь М. на­звано кратер на Меркурії. Додаткові відомості Основні твори Poesías completas. Madrid, 1958; Poema de Chile. Santiago, 1967; Lagar II. Santiago, 1992; укр. перекл. — [Вірші] // Всесвіт. 1979. № 4; [Вірші] // Поезія’80. Вип. 1. К., 1980; [Вірші] // Дніпро. 1981. № 3; [Сонети] // Світ. сонет. К., 1983. Рекомендована література Сіро Алегрія. Мій друг Габрієла Містраль // Всесвіт. 1979. № 4. Google Scholar Internet Литвинець М. Життя в осяянні поезії // Містраль Г. Поезії. К., 1984. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 194, "name": "Китастий Андрій Трохимович", "by": "1892.0", "dy": "1916.0", "status": "excluded_pre_soviet", "reasoning": "Died before 1921 (death_year=1916) — pre-Soviet, outside study scope.", "notes": "(1892, м. Кобеляки, нині Полтав. обл. – 1916, за ін. даними – 1917) – живописець, іконописець. Брат Івана та Григорія Китастих. Основи фахової майстерності здобув у Лавр. маляр. школі у \nКиєві. Автор...", "url": "https://esu.com.ua/article-6661", "group": "EXCLUDE", "bio": "КИТА́СТИЙ Андрій Трохимович (1892, м. Кобеляки, нині Полтав. обл.&nbsp;— 1916, за ін. даними&nbsp;— 1917)&nbsp;— живописець, іконописець. Брат Івана та Григорія Китастих . Основи фахової майстерності здобув у Лавр. маляр. школі у Києві. Автор ікон «Спаситель», «Св. Миколай», порт­ретів Т. Шевченка, укр. селян (зокрема чумаків). Зробив копію з полк. корогви, що знаходилася в Успен. соборі м. Кобеляки. У Троїц. церкві Полтави зберігається твір К.&nbsp;— «Божа Мати» (1911). Малював образи для Видубиц. монастиря у Києві, Почаїв. лаври (нині Кременец. р-н Терноп. обл.), храмів Сумщини, Полтавщини, Одеси. Загинув на фронті, у Карпатах. Рекомендована література Андрій Китастий // Бобрищев К. Отчий край. П., 2004. Кн. 2. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 195, "name": "Дерегус Вікторія-Марина  Михайлівна", "by": "1929.0", "dy": "1995.0", "status": "non_migrated", "reasoning": "Born in Kharkiv 1929, died there 1995, member of Soviet Artists' Union (1962), studied at Kharkiv art school (1950), no evidence of emigration or forced displacement.", "notes": "(02. 04. 1929, Харків – 04. 04. 1995, там само) – живописець і графік. Дочка Михайла, мати Файзрахмана Дерегусів, сестра Наталії Дерегус-Лоренс. Член СХУ (1962). Закін. Харків. художнє училище (1950; викл. Б....", "url": "https://esu.com.ua/article-26093", "group": "INCLUDE", "bio": "ДЕРЕ́ГУС Вікторія-Марина Михайлівна (02. 04. 1929, Харків&nbsp;— 04. 04. 1995, там само)&nbsp;— живописець і графік. Дочка Михайла , мати Файзрахмана Дерегусів , сестра Наталії Дерегус-Лоренс . Член СХУ (1962). Закін. Харків. художнє училище (1950; викл. Б. Вакс , О. Яковенко ). Від 1957 брала участь у респ., всесоюз. та між­нар. мист. ви­ставках. Основні галузі&nbsp;— станк. живопис (жанри&nbsp;— пейзаж, порт­рет, натюрморт) і графіка (техніки&nbsp;— гравюра, офорт, монотипія). Пейзажі Д. по­значені романтизмом, правдивим від­творе­н­ням природи. У ран­ній період творчості Д. зверталася до мотивів природи і міського пейзажу різних регіонів (зокрема Харківщини, Сумщини, Полтавщини, Чернігівщини), за­стосовуючи при­йоми вільного пленер. письма. Пере­важають пейзажі з нац. мотивами, низку робіт присвячено шевченків. місцям. Іноді зверталася до широкої панорами пейзажів просторового плану з високою лінією горизонту. Улюблені мотиви варіюються, набуваючи нової гами від­тінків. Для творів 1960–70-х рр. характерні узагальненість, схематичність форми, декоративність, пастозна манера письма з тонким нюансува­н­ням зелені; у 1980–90-і рр. зʼявилася тенденція до мʼякої тональності, конкретності, деталізації та багатоплановості. Роботи зберігаються у Харків. ХМ. Додаткові відомості Основні твори живопис — «Вітер» (1957), «Автопортрет» (1960-і рр.), «Місячна ніч» (1960), «Літній вечір» (1961), «Вечоріє», «У Моринцях» (обидва — 1964), «Весна» (1965, 1974), «Літній день», «Свіжий вітер» (обидва — 1967), «Тиша» (1970), «Бузок» (1977), «Шумлять верби» (1977, 1982), «Літо», «Польові квіти» (обидва — 1978), «У лісопарку» (1979), «Сутінки» (1979, 1989), «Хмарно» (1980), «Чернігівщина» (1981), «Вечір над Пслом», «Соняшники» (обидва — 1982), «Хліб», «Квіти, фрукти, овочі» (обидва — 1984), «Біля Псла» (1985), «Восени» (1986), «На Звенигородщині» (1988), «Ромашки» (1990), «Піони» (1991), «Троянди» (1992); графіка — «Лелеки», «Скельки» (обидва — 1960-і рр.), «Жовтневий ліс» (1962), «Повінь» (1963), «Вечір у Кирилівці» (1964), «Верби», «Ставок» (обидва — 1971), «Місячний день» (1972), «Човни» (1974), «Стежка» (1975), «Вечір» (1979), «Хатки» (1980). Рекомендована література Мистецькі шляхи Харківщини: Альбом. Х., 1998. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 196, "name": "Дорошенко Василь", "by": "1925.0", "dy": "1925.0", "status": "excluded_bad_dates", "reasoning": "Born in Yamnytsya, Ivano-Frankivsk region (western Ukraine) and died in 1925, before WWII emigration waves, with no diaspora or deportation signals.", "notes": "(справж. – Мицько Василь Антонович; 26. 11. 1925, с. Ямниця Тисмениц. р-ну, нині Івано-Фр. обл. – ?) – графік і живописець. Член Об’єдн. мистців-українців Америки (1960). Очолив 1941 друкарню Краєвої тех....", "url": "https://esu.com.ua/article-21037", "group": "EXCLUDE", "bio": "ДОРОШЕ́НКО Василь (справж.&nbsp;— Мицько Василь Антонович; 26. 11. 1925, с. Ямниця Тисмениц. р-ну, нині Івано-Фр. обл.&nbsp;— ?)&nbsp;— графік і живописець. Член Обʼ­єдн. мистців-українців Америки (1960). Очолив 1941 друкарню Краєвої тех. рефектури «Кратер», де виконував дереворити за проектами Н. Хасевича . Закін. Станіслав. полігр. школу (нині Івано-Франківськ, 1943). Від 1943&nbsp;— у під­піл­лі ОУН. Від 1945&nbsp;— у Німеч­чині, студіював фото­графію в Укр. тех.-госп. ін­ституті (1946–47). Від 1949&nbsp;— у США. Навч. в Укр. мист. студії (1954–59) та Мемор. мист. школі (1960–62) у Філадельфії. Очолив друкарню, 20 р. працював у видавництві «Америка». 1959–69&nbsp;— викладач Укр. мист. студії. Засн. та ілюстратор ж. «Нотатки з мистецтва» (від 1964). Член управи Мист. фундації ім. А. Кирилюка (від 1970). Учасник худож. ви­ставок від 1960. Автор дереворитів, ліноритів («Церква», «Осінь», «Пов­станець», «Голова») та серії літо­графій, проектів обкладинок, марок, іл. до журналів, листівок, праць з букво­знавства, оформлень сцени. Творчість Д. від­значається чіткою композицією, тех. майстерністю. Роботи зберігаються в Укр. катол. музеї (Рим). Рекомендована література Кейван І. Українські митці поза батьківщиною. Едмонтон; Монреаль, 1996. Google Scholar Internet Галіпчак Г. Воля, соборність, незламність // ОМ. 2004. № 3. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 197, "name": "Бурий Валентин  Дмитрович", "by": "1949.0", "dy": "2015.0", "status": "non_migrated", "reasoning": "Actor born in Chernihiv oblast and died in Sumy; no evidence of emigration, forced displacement, or transfer to another Soviet republic.", "notes": "(05.  12. 1949, с. Студинка Новгород-Сівер. р-ну Черніг. обл. – 15. 07. 2015, Суми) – актор. Народний артист України (2013). Закін. Далекосхід. пед. інститут мистецтв у Владивостоці (1979; викл. А. Присяжнюк)....", "url": "https://esu.com.ua/article-38060", "group": "INCLUDE", "bio": "БУ́РИЙ Валентин Дмитрович (05. 12. 1949, с. Студинка Новгород-Сівер. р-ну Черніг. обл.&nbsp;— 15. 07. 2015, Суми)&nbsp;— актор. Народний артист України (2013). Закін. Далеко­схід. пед. ін­ститут мистецтв у Владивостоці (1979; викл. А. Присяжнюк). Від­тоді&nbsp;— у Примор. кра­йовому ТЮГу (Владивосток); 1984–89&nbsp;— Волин. укр. муз.-драм. театрі ім. Т. Шевченка; 1989–2001&nbsp;— Сум. театрі драми та муз. комедії ім. М. Щепкіна; від 2001&nbsp;— у Сум. обл. театрі для дітей та юнацтва. Б. притаман­не амплуа характер. актора драми, виконував також ролі соц. героїв серед. віку. Додаткові відомості Основні ролі Семен («Дай серцю волю, заведе в неволю» М. Кропивницького), Василь («Душогуби» І. Тогобочного), Олександр, Чмутін («Зорі на вранішньому небі», «Весілля в стилі “ретро”» О. Галіна), Майор («Дами і гусари» А. Фредро), Феррі («Сільва» І. Кальмана), Конаш («Чмир» за М. Кропивницьким), Лопахін, Світловидов («Вишневий сад», «Калхас» А. Чехова), Священик («Матінка Кураж і її діти» Б. Брехта), Борис («Провінціалки» Я. Стельмаха), Максим Богун («Вірність» М. Зарудного), Прочанин («На полі крові» Лесі Українки), Божий («Хулій Хурина» М. Куліша), Кочкарьов («Одруження» М. Гоголя), Хомутов («20 хвилин з янголом» О. Вампілова). Завантажити статтю"}, {"idx": 198, "name": "Хашдеу Богдан Петричейку", "by": "1838.0", "dy": "1907.0", "status": "excluded_pre_soviet", "reasoning": "Died before 1921 (death_year=1907) — pre-Soviet, outside study scope.", "notes": "(Hasdeu Bogdan Petriceicu; 26. 02. 1838, с. Керстенці Хотинського пов. Бессарабської губ., нині Хотинського р-ну Чернівецької обл. — 25. 08. 1907, м. Кимпіна, Румунія) — румунський письменник, філолог, історик,...", "url": "https://esu.com.ua/article-891628", "group": "EXCLUDE", "bio": "ХАШДЕ́У Бог­дан Петричейку (Hasdeu Bogdan Petriceicu; 26. 02. 1838, с. Керстенці Хотинського пов. Бес­сарабської губ., нині Хотинського р-ну Чернівецької обл.&nbsp;— 25. 08. 1907, м. Кимпіна, Румунія)&nbsp;— румунський письмен­ник, філолог, історик, публіцист, архівіст, громадько-політичний діяч. Член Румунської АН (1887). Походив із молдовського шляхетного роду. На­вчався у гімназіях Він­ниці, Рівного, Камʼянця-Подільського (нині Хмельницької обл.), Кишинева, на юридичному факультеті Харківського університету (1852–54). Служив у гусарському корпусі під час Кримської війни. Від 1858 мешкав у Яссах (нині Румунія): учителював, працював бібліотекарем. Від 1876&nbsp;— директор Державного архіву в Бухаресті, від 1878&nbsp;— професор філології Бухарестського університету. Один із засновників румунської історичної та філологічної науки. Заснував і редагував журнал «Arhiva historică a României» («Історичний архів Румунії», 1865–67), пізніше&nbsp;— «Columna lui Traian» («Колона Траяна», 1870). Автор праць «Istoria critică a Românilor» («Критична історія румунів», 1875), «Etymologicum Magnum Romaniae» («Великий етимологічний словник Румунії», 1886, не закінчено) та ін. У своїх дослідже­н­нях по­єд­нував позитивістський метод із прові­денціальною концепцією історії, прагнув систематизувати румунську мову, показати її латинське корі­н­ня. Х. заклав основи румунської національної фольклористики&nbsp;— «Ştefan cel Mare şi Italia» («Штефан Великий та Італія», 1873), «Poezia poporană a ucrainenilor în legătură cu istoria românilor» («Українська народна поезія у звʼязку з історією румунів», 1876), «Poezia poporană la sârbi şi bulgari» («Сербська і болгарська народна поезія», 1877) та ін. Від­гукувався на пита­н­ня української історії. У моно­графії «Ioan Vodăcel Cumplit» («Іон Воде Лютий», 1865) показав допомогу козаків молдованам у боротьбі проти турецьких загарбників. Високо оцінював Б. Хмельницького, називав його «най­блискучішим козацьким геть­маном». Написав прихильну рецензію на працю «Історичні пісні українського народу» В. Антоновича і М. Драгоманова (1874–75), від­значаючи, що українська народна пісен­на творчість&nbsp;— «одна з найбагатших і найцікавіших у світі». Ви­ступав також як письмен­ник: автор циклу сонетів «Dragoş» («Драгош»), поеми «Voichiţa Vodă» («Князівна Войкіца»), роману «Soarta» («Доля»), пʼєс «Răsvan şi Vidra» («Ра­зван і Відра»), «Domniţa Ruxandra» («Князівна Руксандра»). Брав активну участь у громадському і політичному житті. Депутат Палати депутатів Румунії (1868–69, округ Бол­град), ви­ступав як пред­ставник ліберальної партії; текс­ти його промов друкували в «Monitorul Oficialal României» («Офіційний вісник Румунії»). Творчість Х. характеризується енциклопедичною широтою, по­єд­на­н­ням наукового і художнього мисле­н­ня. Його праці започаткували нові напрями в румунському мово­знавстві, архіво­знавстві, історіо­графії та літературо­знавстві. Рекомендована література Романець О. Джерела братерства. Богдан П. Хашдеу і східноромансько"}, {"idx": 199, "name": "Дулемб’янка Марія", "by": "1861.0", "dy": "1919.0", "status": "excluded_pre_soviet", "reasoning": "Died before 1921 (death_year=1919) — pre-Soviet, outside study scope.", "notes": "(грудень 1861, Краків – 07. 08. 1919, Львів) – громадська діячка і живописець. Навч. у Відні, Школі рисунку у Варшаві (1880–85; викл. В. Герсон), Академії Жюльєн у Парижі (1885–86). Працювала в Австрії (1887–88),...", "url": "https://esu.com.ua/article-19482", "group": "EXCLUDE", "bio": "ДУЛЕМБʼЯНКА Марія (грудень 1861, Краків&nbsp;— 07. 08. 1919, Львів)&nbsp;— громадська діячка і живописець. Навч. у Відні, Школі рисунку у Варшаві (1880–85; викл. В. Герсон), Академії Жюльєн у Парижі (1885–86). Працювала в Австрії (1887–88), Італії, від 1896&nbsp;— у Львові: від 1915&nbsp;— гол. хранитель Худож.-пром. музею. Спів­засн. і чл. Союзу польс. художниць (1917). Активна діячка фемініст. руху в Львові. Най­ближча подруга польс. письмен­ниці М. Конопніцької . За­ймалася музикою та публіцистикою. Малювала порт­рети, побут. сцени та краєвиди у стилі реалізму кін. 19 ст., а також з елементами пленеризму й ім­пресіонізму. Учасниця мистецьких ви­ставок у Львові від 1903 (персон. посмертна&nbsp;— 1919). Роботи зберігаються у Львів. галереї мистецтв, музеях Польщі. Додаткові відомості Основні твори «Тріо» (1884), «Читання» (1890-і рр.), «Господарка», «Сирітська доля» (обидва — 1890), «Без роботи» (1900), «Автопортрет у береті» (1901), «Автопортрет зі скрипкою», «Автопортрет із палітрою», «Дівчина з мандоліною», «Море» (усі — 1909), «Читання», «Вид костелу св. Лизавети у Львові». Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}];
const STORAGE_KEY       = 'ukraine_v26_validation_decisions';
const NOTES_STORAGE_KEY = 'ukraine_v26_validation_notes';

// Load from localStorage
let decisions = {};
let userNotes = {};
try { decisions = JSON.parse(localStorage.getItem(STORAGE_KEY)       || '{}'); } catch(e) {}
try { userNotes = JSON.parse(localStorage.getItem(NOTES_STORAGE_KEY) || '{}'); } catch(e) {}

let currentIdx  = null;
let activeFilter = 'all';
let searchQuery  = '';
let noteTimer    = null;

// ── Render sidebar list ──
function renderList() {
  const list = document.getElementById('entry-list');
  const q = searchQuery.toLowerCase();
  list.innerHTML = '';
  ENTRIES.forEach(e => {
    const dec = decisions[e.idx];
    if (activeFilter === 'unseen'  && dec)               return;
    if (activeFilter === 'correct' && dec !== 'correct') return;
    if (activeFilter === 'wrong'   && dec !== 'wrong')   return;
    if (activeFilter === 'INCLUDE' && e.group !== 'INCLUDE') return;
    if (activeFilter === 'EXCLUDE' && e.group !== 'EXCLUDE') return;
    if (q && !e.name.toLowerCase().includes(q)) return;

    const hasNote = !!userNotes[e.idx];
    const div = document.createElement('div');
    div.className = 'entry-item' +
      (dec === 'correct' ? ' decided-correct' : dec === 'wrong' ? ' decided-wrong' : dec === 'skip' ? ' decided-skip' : '') +
      (currentIdx === e.idx ? ' active' : '');
    div.dataset.idx = e.idx;
    div.innerHTML = `<div class="entry-name">${e.idx + 1}. ${e.name}${hasNote ? ' 📝' : ''}</div>
      <div class="entry-meta">
        <span class="badge ${e.group === 'INCLUDE' ? 'badge-inc' : 'badge-exc'}">${e.group}</span>
        ${e.status} · ${e.by||'?'}–${e.dy||'?'}
        ${dec ? ' · <b>' + (dec==='correct'?'✓':dec==='wrong'?'✗':'~') + '</b>' : ''}
      </div>`;
    div.onclick = () => showEntry(e.idx);
    list.appendChild(div);
  });
}

// ── Show entry ──
function showEntry(idx) {
  currentIdx = idx;
  const e = ENTRIES.find(x => x.idx === idx);
  if (!e) return;
  document.getElementById('toolbar-title').textContent = `[${idx+1}/200] ${e.name}`;

  const dec      = decisions[idx] || '';
  const noteText = userNotes[idx] || '';
  const isWrong  = dec === 'wrong';

  const card = document.getElementById('entry-card');
  card.innerHTML = `
    <h2>${e.name}</h2>
    <div class="meta-row">
      ${e.by||'?'} – ${e.dy||'?'} &nbsp;|&nbsp; <b>${e.status}</b>
      &nbsp;|&nbsp; <span class="badge ${e.group==='INCLUDE'?'badge-inc':'badge-exc'}">${e.group}</span>
      &nbsp;|&nbsp; <a href="${e.url}" target="_blank">ESU article ↗</a>
    </div>
    ${e.bio ? `<div class="section-label">ESU Bio</div><div class="bio-box">${e.bio.replace(/</g,'&lt;')}</div>` : ''}
    ${e.notes ? `<div class="section-label">Classifier Notes</div><div class="section-box">${e.notes.replace(/</g,'&lt;')}</div>` : ''}
    ${e.reasoning ? `<div class="section-label">Migration Reasoning</div><div class="section-box">${e.reasoning.replace(/</g,'&lt;')}</div>` : ''}
    <div id="decision-row">
      <button class="dec-btn correct ${dec==='correct'?'active':''}" onclick="decide(${idx},'correct')">✓ Correct <small>(C)</small></button>
      <button class="dec-btn wrong   ${dec==='wrong'  ?'active':''}" onclick="decide(${idx},'wrong'  )">✗ Wrong   <small>(W)</small></button>
      <button class="dec-btn skip    ${dec==='skip'   ?'active':''}" onclick="decide(${idx},'skip'   )">~ Skip    <small>(S)</small></button>
    </div>
    <div id="notes-section">
      <div id="notes-label" class="${isWrong ? 'is-wrong' : ''}">
        ${isWrong ? '✗ What is wrong? (required for wrong decisions)' : 'Notes (optional)'}
      </div>
      <textarea id="reviewer-notes"
        class="${isWrong ? 'is-wrong' : ''}"
        placeholder="e.g. should be migrated — emigrated to Paris 1922; or: death year wrong, correct is 1991"
        oninput="scheduleNoteSave(${idx})"
      >${noteText}</textarea>
      <div id="notes-saved"></div>
    </div>`;

  // Focus notes area automatically when wrong
  if (isWrong) {
    setTimeout(() => {
      const ta = document.getElementById('reviewer-notes');
      if (ta) ta.focus();
    }, 50);
  }

  renderList();
  updateStats();
  // Scroll to top of card
  document.getElementById('content-area').scrollTop = 0;
}

// ── Note saving (debounced) ──
function scheduleNoteSave(idx) {
  clearTimeout(noteTimer);
  noteTimer = setTimeout(() => saveNote(idx), 600);
}

function saveNote(idx) {
  const ta = document.getElementById('reviewer-notes');
  if (!ta) return;
  const text = ta.value.trim();
  if (text) {
    userNotes[idx] = text;
  } else {
    delete userNotes[idx];
  }
  localStorage.setItem(NOTES_STORAGE_KEY, JSON.stringify(userNotes));
  const saved = document.getElementById('notes-saved');
  if (saved) {
    saved.textContent = 'saved';
    saved.style.opacity = '1';
    setTimeout(() => { if (saved) saved.style.opacity = '0'; }, 1500);
  }
  renderList();  // update 📝 indicator in sidebar
}

// ── Decision ──
function decide(idx, verdict) {
  decisions[idx] = verdict;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(decisions));
  updateStats();

  // Re-render card to update button states + notes styling
  showEntry(idx);

  // Auto-advance after short delay — but NOT for wrong (user needs to write a note)
  if (verdict !== 'wrong') {
    setTimeout(() => {
      const visible = [...document.querySelectorAll('.entry-item')].map(el => parseInt(el.dataset.idx));
      const pos = visible.indexOf(idx);
      if (pos >= 0 && pos < visible.length - 1) showEntry(visible[pos + 1]);
    }, 350);
  }
}

// ── Navigate ──
function navigate(dir) {
  // Save any pending note before navigating
  if (currentIdx !== null) saveNote(currentIdx);
  const all = ENTRIES.map(e => e.idx);
  const pos = all.indexOf(currentIdx);
  const next = pos + dir;
  if (next >= 0 && next < all.length) showEntry(all[next]);
}

// ── Stats ──
function updateStats() {
  const decided = Object.values(decisions);
  const correct = decided.filter(d => d==='correct').length;
  const wrong   = decided.filter(d => d==='wrong').length;
  const skip    = decided.filter(d => d==='skip').length;
  const unseen  = 200 - correct - wrong - skip;
  document.getElementById('s-correct').textContent = correct;
  document.getElementById('s-wrong').textContent   = wrong;
  document.getElementById('s-skip').textContent    = skip;
  document.getElementById('s-unseen').textContent  = unseen;
  const pct = Math.round((correct+wrong+skip)/200*100);
  document.getElementById('s-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
}

// ── Filter / Search ──
function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}
function filterList() {
  searchQuery = document.getElementById('search-box').value;
  renderList();
}

// ── Keyboard shortcuts ──
document.addEventListener('keydown', e => {
  if (['INPUT','TEXTAREA'].includes(e.target.tagName)) return;
  if (currentIdx === null) return;
  if (e.key === 'c' || e.key === 'C') decide(currentIdx, 'correct');
  if (e.key === 'w' || e.key === 'W') decide(currentIdx, 'wrong');
  if (e.key === 's' || e.key === 'S') decide(currentIdx, 'skip');
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navigate(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   navigate(-1);
});

// ── Export ──
function openExport() {
  if (currentIdx !== null) saveNote(currentIdx);
  const decided   = Object.values(decisions);
  const correct   = decided.filter(d => d==='correct').length;
  const wrong     = decided.filter(d => d==='wrong').length;
  const skip      = decided.filter(d => d==='skip').length;
  const withNotes = Object.keys(userNotes).length;
  document.getElementById('export-summary').innerHTML =
    `<b>${correct+wrong+skip}/200</b> decisions recorded &nbsp;·&nbsp; ` +
    `✓ ${correct} correct &nbsp; ✗ ${wrong} wrong &nbsp; ~ ${skip} skip<br>` +
    `📝 ${withNotes} entries have notes`;
  document.getElementById('export-overlay').style.display = 'block';
}

function getExportData() {
  return ENTRIES.map(e => ({
    idx:              e.idx,
    name:             e.name,
    birth_year:       e.by,
    death_year:       e.dy,
    migration_status: e.status,
    sample_group:     e.group,
    decision:         decisions[e.idx] || 'unseen',
    note:             userNotes[e.idx] || '',
    url:              e.url,
  }));
}

function downloadJSON() {
  const blob = new Blob([JSON.stringify(getExportData(), null, 2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'validation_v2_6_results.json'; a.click();
  document.getElementById('export-count').textContent = 'Downloaded.';
}

function downloadCSV() {
  const data   = getExportData();
  const header = ['idx','name','birth_year','death_year','migration_status','sample_group','decision','note','url'];
  const lines  = [header.join(',')];
  data.forEach(r => lines.push(header.map(k => JSON.stringify(r[k]??'')).join(',')));
  const blob = new Blob([lines.join('\n')], {type:'text/csv'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'validation_v2_6_results.csv'; a.click();
}

function copyToClipboard() {
  navigator.clipboard.writeText(JSON.stringify(getExportData(), null, 2))
    .then(() => { document.getElementById('export-count').textContent = 'Copied to clipboard!'; });
}

// ── Init ──
renderList();
updateStats();
if (ENTRIES.length > 0) showEntry(ENTRIES[0].idx);
</script>
</body>
</html>
