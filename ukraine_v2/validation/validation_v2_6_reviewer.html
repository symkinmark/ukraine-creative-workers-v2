ткові відомості Основні праці А. С. Грибоедов: литературное окружение и восприятие (XIX — нач. XX в.). Ленинград, 1983; Д. В. Григорович — писатель и искусствовед. Ленинград, 1985; Жизнь и деяния Александра Грибоедова. Москва, 1989; Введение в ли­­тературоведение: Основы теории лите­­ратуры: Учеб. 3-е изд. Москва, 2013. Завантажити статтю"}, {"idx": 99, "name": "Басенко Олександр Антонович", "by": "1938.0", "dy": "1997.0", "status": "non_migrated", "reasoning": "Born in Mykolaiv 1938, died in Kharkiv 1997; no evidence of emigration, forced displacement, or transfer to another Soviet republic; career apparently based in Ukrainian SSR.", "notes": "(23. 07. 1938, Миколаїв – 22. 05. 1997, Харків) – співак (баритон). Лауреат Респ. конкурсу камер. виконавців у Києві (1983, 1-а премія). Закін. Харків. політех. інститут (1961). Вокал. освіту здобув у Харків....", "url": "https://esu.com.ua/article-40685", "group": "INCLUDE", "bio": "БАСЕ́НКО Олександр Антонович (23. 07. 1938, Миколаїв&nbsp;— 22. 05. 1997, Харків)&nbsp;— спів­ак (баритон). Лауреат Респ. конкурсу камер. виконавців у Києві (1983, 1-а премія). Закін. Харків. політех. ін­ститут (1961). Вокал. освіту здобув у Харків. ін­ституті мистецтв (1962–68; кл. опер. співу М. Долідзе). У 1968–71&nbsp;— соліст Свердлов., 1971–76&nbsp;— Казах., 1976–97&nbsp;— Харків. театрів опери та балету. У концертах виконував твори укр., рос. та зарубіж. композиторів, а також нар. пісні. Б. був притаман­ний лірико-драм. баритон, багатий на обертони, зі зворушливими емоційно наснаженими інтонаціями. Наслідував екс­пресивну італ. школу, володів bel canto, що знаходило від­биток у концертному репертуарі (неаполітанські пісні, романси укр. композиторів). Додаткові відомості Основні партії Султан («Запорожець за Дунаєм» С. Гулака-Артемовського), Микола («Наталка Полтавка» М. Лисенка), Єлецький («Пікова дама» П. Чайковського), Скарпіа («Тоска» Дж. Пуччіні), Жермон, Ріґолетто, ді Поза, Ренато («Травіата», «Ріґолетто», «Дон Карлос», «Бал-маскарад» Дж. Верді), Ескамільо («Кармен» Ж. Бізе), Сільвіо, Тоніо («Паяци» Р. Леонкавалло), Генріх («Лючія ді Ламмермур» Г. Доніцетті), Головний Жрець («Самсон і Даліла» К. Сен-Санса). Завантажити статтю"}, {"idx": 100, "name": "Лопатто Михайло Осипович", "by": "1892.0", "dy": "1981.0", "status": "migrated", "reasoning": "Died in Florence, Italy (1981), indicating settlement outside the Soviet sphere after substantial adult life.", "notes": "(06(18). 09. 1892, м. Вільно, нині Вільнюс – 26. 01. 1981, м. Флоренція, Італія) – поет, літературознавець. Закін. істор.-філол. факультет Петрогр. університету (нині С.-Петербург, 1917). Учень С. Венгерова. У...", "url": "https://esu.com.ua/article-56441", "group": "INCLUDE", "bio": "ЛОПА́Т­ТО Михайло Осипович (06(18). 09. 1892, м. Вільно, нині Вільнюс&nbsp;— 26. 01. 1981, м. Флоренція, Італія)&nbsp;— поет, літературо­знавець. Закін. істор.-філол. факультет Петрогр. університету (нині С.-Петербург, 1917). Учень С. Венгерова . У грудні 1915 ініціював створе­н­ня Пушкін. істор.-літ. товариства, працював над дослідж. «Повести Пушкина: Опыт введения в теорию прозы» (сб. «Пушкинист», Петро­град, 1918; Петро­град; О., 1918). Був чл. бурлеск. гуртка «Омфалітичний Олімп», який 1916 заснував у Петро­граді видавництво «Ом­фалос», після більшов. пере­вороту 1917 пере­базоване в Одесу, діяло 1918–19, зокрема випустило кн. Л. про повісті О. Пушкіна і колектив. зб. «Омфалитический Олимп. Забытые поэты» (1918). Після закінче­н­ня університету пере­їхав до Одеси, викладав заг. мово­знавство у Новорос. університеті, долучився до видавн. діяльності «Омфалоса». Від 1920&nbsp;— у Стам­булі, від 1921&nbsp;— у Флоренції, де за­ймався комерц. діяльністю. Сві­домо ізолювався від літ. життя як на батьківщині, так і за кордоном. Під час 2-ї світової війни брав участь у антифашист. русі. Автор зб. віршів, написаних у дусі поетики акмеїзму, «Избы­ток» (Петро­град, 1916), «Круг­лый стол» (Петро­град; О., 1919), «Стихи» (Париж, 1959). У 1977 у Флоренції ви­йшов перший роман Л. з трилогії «Чертов сын. Рос­сия: 1904–1928» (2-у частину не закін. через хворобу). Рекомендована література Эджертон В. Ю. Г. Оксман, М. И. Лопатто, Н. М. Бахтин и вопрос о книгоиздательстве «Омфалос»: (Переписка и встреча с М. И. Лопатто) // Пя­тые Тынянов. чтения. Рига, 1990. Google Scholar Internet Гардзонио С. Новое о Лопатто // Седьмые Тынянов. чтения. Рига; Москва, 1995–96. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 101, "name": "Іконников Анатолій Васильович", "by": "1941.0", "dy": "2008.0", "status": "non_migrated", "reasoning": "Born in Kyiv 1941, studied at Kyiv Art Institute (1967), worked in Kyiv from 1974, died in Kyiv 2008; no evidence of emigration, forced displacement, or transfer to another Soviet republic.", "notes": "(22. 06. 1941, Київ – 15. 03. 2008, там само) – художник театру, живописець. Чоловік В. Калиновської. Член НСХУ (1982). Закін. Київський художній інститут (1967; викл. С. Грош, В. Касіян). Працював у Києві: від 1974...", "url": "https://esu.com.ua/article-13030", "group": "INCLUDE", "bio": "ІКО́Н­НИКОВ Анатолій Васильович (22. 06. 1941, Київ&nbsp;— 15. 03. 2008, там само)&nbsp;— художник театру, живописець. Чоловік В. Калиновської . Член НСХУ (1982). Закін. Київський художній ін­ститут (1967; викл. С. Грош , В. Касіян ). Працював у Києві: від 1974&nbsp;— гол. ред. від­ділу кіноплаката «Укр­рекламфільм», від 1985&nbsp;— художник комбінату монум.-декор. мистецтва. Основні галузі&nbsp;— живопис (жанри&nbsp;— порт­рет, пейзаж) та сцено­графія. Створював також емалі, монум. мозаїки. Персон. ви­ставка&nbsp;— у м. Спа (Бельгія, 1998). Оформив балети: «Русалонька» О. Костіна (1993), «Чіпол­ліно» К. Хачатуряна (1995), «Ві­денський вальс» Й. Штраус­са (2001), «Даніела» М. Чемберджі (2006; усі&nbsp;— Нац. опера України, Київ). Додаткові відомості Основні твори живопис — «В. Калиновська.Партія Кармен» (1995), «Російський балет очима японців» (1996), «В. Калиновська. Партія Кітрі в балеті “Дон Кіхот” Л. Мінкуса» (1998), «Ісус Христос» (2000). Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 102, "name": "Малишевський Іван Юрійович", "by": "1967.0", "dy": "2003.0", "status": "non_migrated", "reasoning": "Born in Kyiv 1967, educated at Kyiv Art Institute (1991), died in Kyiv 2003; no evidence of emigration or forced displacement, remained in Ukrainian SSR/Ukraine throughout life.", "notes": "(25. 02. 1967, Київ – 24. 09. 2003, там само) – живописець, графік, реставратор. Син Юрія, брат Аліни Малишевських. Закін. Київський художній інститут (1991). На творчій роботі. Учасник всеукр. худож....", "url": "https://esu.com.ua/article-65609", "group": "INCLUDE", "bio": "МАЛИШЕ́ВСЬКИЙ Іван Юрі­йович (25. 02. 1967, Київ&nbsp;— 24. 09. 2003, там само)&nbsp;— живописець, графік, ре­ставратор. Син&nbsp; Юрія , брат&nbsp; Аліни &nbsp;Малишевських. Закін. Київський художній ін­ститут (1991). На творчій роботі. Учасник всеукр. худож. ви­ставок від 1990-х рр. Основні галузі&nbsp;— живопис, графіка, декор.-ужитк. мистецтво. Створював акварел. натюрморти, тяжів до абстрактно-асоціатив. композицій, акцентуючи увагу на ритмі лінії, кольор. плямах. За­ймався також різьбле­н­ням на кістці. Додаткові відомості Основні твори графіка — «Надія», «Родина»; живопис — «Натюрморт», «Києво-Печерська лавра»; різьблення — композиція «Древо добра і зла» (усі — 1990). Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 103, "name": "Петрович Василь", "by": "1880.0", "dy": "1914.0", "status": "excluded_pre_soviet", "reasoning": "Died before 1921 (death_year=1880) — pre-Soviet, outside study scope.", "notes": "(справжнє — Сеник; 01. 01. 1880, с. Іванівці, нині Стрийського р-ну Львівської обл. — 31. 10. 1914, Львів) — актор, співак (тенор). Чоловік Л.-В. Петровичевої. 1897—1914 працював у Театрі товариства «Руська...", "url": "https://esu.com.ua/article-885259", "group": "EXCLUDE", "bio": "ПЕТРО́ВИЧ Василь (справжнє&nbsp;— Сеник; 01. 01. 1880, с. Іванівці, нині Стрийського р-ну Львівської обл.&nbsp;— 31. 10. 1914, Львів)&nbsp;— актор, спів­ак (тенор). Чоловік Л.-В. Петровичевої . 1897–1914 працював у Театрі товариства «Руська бесіда» у Львові. Спів­ав в операх й оперетах М. Лисенка, Ф. Легара, К. Цел­лера, Й. Штраус­са. Додаткові відомості Основні ролі Микола («Наталка Полтавка» І. Котляревського), Гнат («Назар Стодоля» Т. Шевченка), Гриць («Ой не ходи, Грицю, та й на вечорниці» М. Старицького), Золотницький («Хазяїн» І. Карпенка-Карого), Артем’єв («Живий труп» Л. Толстого), Де Сільва («Уріель Акоста» К. Гуцкова). Завантажити статтю"}, {"idx": 104, "name": "Матеєвич Олексій", "by": "1888.0", "dy": "1917.0", "status": "excluded_pre_soviet", "reasoning": "Died before 1921 (death_year=1888) — pre-Soviet, outside study scope.", "notes": "(Mateevici Alexei, справж. – Матвієвич; 27. 03. 1888, с. Кайнари Бендер. пов. Бессараб. губ., нині місто Каушан. р-ну, Молдова – 24. 08. 1917, Кишинів) – молдовський поет і перекладач, церковний діяч. Закін. Київ....", "url": "https://esu.com.ua/article-66915", "group": "EXCLUDE", "bio": "МАТЕЄ́ВИЧ Олексій (Mateevici Alexei, справж.&nbsp;— Матвієвич; 27. 03. 1888, с. Кайнари Бендер. пов. Бес­сараб. губ., нині місто Каушан. р-ну, Молдова&nbsp;— 24. 08. 1917, Кишинів)&nbsp;— молдовський поет і пере­кладач, церковний діяч. Закін. Київ. дух. академію (1914), під час навч. в якій здійснив числен­ні пере­клади молдов. мовою зі словʼян. літ-р, що справило від­чут. вплив на його поет. творчість. Вірші почав писати у шкіл. роки. 1907 у перших номерах г. «Basarabia» («Бес­сарабія») опублікував поезії «Ţăranii» («Селяни»), «Eu cînt» («Я спів­аю»), «Ţara» («Країна»), а також ст. «Sfîntul Vasile&nbsp;— Anul Nou în obi­ceiurile moldovenilor basarabeni» («Святий Василій&nbsp;— Новий рік у звичаях бес­сарабських молдован») і «Din cîntecele poporane ale Basarabiei» («З народних пісень Бес­сарабії»). 1915 М. мобілізов. до рос. армії як військ. священик і від­правлений на Галиц., а згодом&nbsp;— Румун. фронти. У червні 1917 написав ві­домий вірш «Limba noastră» («Наша мова»), що став гімном Молдови. У поезіях оспівував горе й надію молдован, прославляв рідну мову, його хвилювало майбутнє свого краю. Глибоке ви­вче­н­ня М. літ-ри попередників, істор. і культур. минулого свого народу помітне у ста­т­тях, опубл. 1910–12 у часописі «Kişineovkie eparhialinîe vedomosti» («Кишинівські єпархіальні ві­домості»): «Momente ale influenţei bisericeşti asupra originii şi dezvoltării istorice a limbii moldoveneşti» («Моменти церковного впливу в походжен­ні й історичному роз­витку молдовської мови»), «Motive reli-gioase în credinţele şi obiceiurile moldovenilor basarabeni» («Релігійні мотиви в повірʼях і обрядах бес­сарабських молдован»), «Bocetele funerare moldoveneşti» («Молдовські похорон­ні голосі­н­ня»), «Schiţă a traducerilor moldo-veneşti religioase şi de trai» («Нарис молдовських релігійно-побутових пере­казів»). У ж. «Lumi­natorul» («Просвітитель», 1913, № 8–11) опублікував працю «Mitropolitul Gavril Bănulescu-Bodoni» («Митрополит Гавриїл Бенулеску-Бодоні»). Літ. доробок М. вміщено в двотомнику «Ope­re» (Chişinău, 1993). Помер від висип. тифу. На його могилі споруджено памʼятник (1934, скульп­тор О. Племедяле). У травні 2018 у Борис­піл. міській центр. б-ці (Київ. обл.) проведено ви­ставку «Renaştere. Від­родже­н­ня», присвяч. вшануван­ню 130-річчя від дня народж. М., на якій екс­поновано фотокопії архів. документів київ. періоду його життя (вступна заява до академії та листки з оцінками, випуск. альбом з його порт­ретом тощо). У Києві М. по­зна­йомився з майбут. дружиною&nbsp;— українкою Ф. Новицькою, з якою згодом пере­­­їхав до Кишинева. Додаткові відомості Основні твори Pentru feciorii gliei: poezie, proză, traduceri. 1988; În zarea anilor: poezie, proză, publicistică. 1998; Limba noastră. 2007 (усі — Кишинів). Рекомендована література G. Baciu. Viziuni asupra vieţii şi morţii poeţilor martiri Eminescu, Mateevici, Vieru. Chişinău, 2014. Google Scholar Internet L. Prisac, I. Xeno-fontov. Alexie Mateevici (1888–1917), autorul Imnului de Statal Republicii"}, {"idx": 105, "name": "Гарденін Семен Іванович", "by": "1867.0", "dy": "1929.0", "status": "internal_transfer", "reasoning": "Voluntary career movement within Soviet sphere: trained in St. Petersburg and Moscow conservatories, earned Honored Artist status (1924), died in Moscow as established pedagogue and performer.", "notes": "(справж. – Коваленко; 02(14). 02. 1867, Чернігів – 1929, Москва) – співак (лірико-драматичний тенор), педагог. Заслужений артист Респ. (1924). Співу навч. у Д. Корсі у С.-Петербурзі, у Моск. муз.-драм. училищі...", "url": "https://esu.com.ua/article-28726", "group": "INCLUDE", "bio": "ГАРДЕ́НІН Семен Іванович (справж.&nbsp;— Коваленко; 02(14). 02. 1867, Чернігів&nbsp;— 1929, Москва)&nbsp;— спів­ак (лірико-драматичний тенор), педагог. Заслужений артист Респ. (1924). Співу навч. у Д. Корсі у С.-Петербурзі, у Моск. муз.-драм. училищі (1891–92; кл. С. Біжеїча та О. Ніколаєва). Дебютував 1892 в учнів. ви­ставі на сцені Великого театру в Москві. 1892–93&nbsp;— соліст Тифліс. (нині Тбілісі), 1893– 94&nbsp;— Київ., 1894–96&nbsp;— Одес. опер, 1896–97&nbsp;— Казан.-Саратов. опер. товариства, 1897–1926&nbsp;— Великого театру в Москві. Володів голосом мʼякого тембру. Серед учнів&nbsp;— О. Дашковський, І. Стрельцов, О. Остроумов та ін. Додаткові відомості Основні партії Князь («Русалка» О. Даргомижського), Собінін, Баян («Життя за царя», «Руслан і Людмила» М. Глінки), Володимир Ігоревич («Князь Ігор» О. Бородіна), Синодал («Демон» А. Рубінштейна), Йонтек («Галька» С. Монюшка), Альмавіва («Севільський цирульник» Дж. Россіні), Гвідон («Золотий півник» М. Римського-Корсакова, 1-е виконання, Великий театр). Завантажити статтю"}, {"idx": 106, "name": "Міньківський Олександр Захарович", "by": "1900.0", "dy": "1979.0", "status": "non_migrated", "reasoning": "Born in Ukrainian village (Snizhnа, Kyiv region), died in Kyiv in 1979; held prestigious Soviet positions (Professor 1965, People's Artist of USSR 1960) indicating continuous career in Ukrainian SSR; no evidence of emigration or forced displacement.", "notes": "(13(25). 12. 1900, с. Сніжна Сквир. пов. Київ. губ., нині Погребищен. р-ну Вінн. обл. – 12. 04. 1979, Київ) – хоровий диригент, педагог, музично-громадський діяч. Професор (1965). Народний артист СРСР (1960)....", "url": "https://esu.com.ua/article-67788", "group": "INCLUDE", "bio": "МІНЬКІ́ВСЬКИЙ Олександр Захарович (13(25). 12. 1900, с. Сніжна Сквир. пов. Київ. губ., нині Погребищен. р-ну Вінн. обл.&nbsp;— 12. 04. 1979, Київ)&nbsp;— хоровий диригент, педагог, музично-громадський діяч. Професор (1965). Народний артист СРСР (1960). Державна премія УРСР ім. Т. Шевченка (1969). Від 1910 навч. у Київ. духов. училищі, від 1915&nbsp;— в учител. семінарії, де став пом. К. Стеценка , який керував хором і викладав теор. предмети. За його порадою 1918 вступив до Вищого муз.-драм. ін­ституту, де навч. у&nbsp; М. Вериківського &nbsp;та&nbsp; М. Леонтовича . Від 1921 учителював у селах на Київщині та Він­ничині. Закін. Київ. муз.-драм. ін­ститут (1930; кл.&nbsp; О. Климова , С. Тележинського ). Від­тоді викладав у пед., театр. і муз.-драм. технікумах у Києві. 1934–41&nbsp;— худож. кер. і гол. диригент хор. капели Укр. радіокомітету (Київ); 1942–44&nbsp;— науковий спів­робітник Ін­ституту нар. творчості та мистецтва АН УРСР (в евакуації у м. Уфа, РФ); 1943–46&nbsp;— директор і заст. худож. кер. Держ. укр. нар. хору під керівництвом Г. Верьовки; 1946–74&nbsp;— худож. кер. і гол. диригент Держ. капели бандуристів УРСР (обидва&nbsp;— Київ). Разом з капелою гастролював містами України, у Польщі, Румунії, Болгарії, Чехословач­чині, Японії. Від 1951&nbsp;— у Київ. консерваторії: 1960–72&nbsp;— зав., від 1974&nbsp;— професор кафедри диригува­н­ня. Був ректором Київ. нар. консерваторії, головою Київ. від­діл. муз. товариства УРСР. Упорядник зб. «Українські класичні хори» (1955), першого у СРСР ви­да­н­ня О. Кошиця «Українські народні пісні для мішаного хору» (1965; 1968; обидві&nbsp;— Київ). Додаткові відомості Основні праці Конструкція сучасних бандур // НТЕ. 1962. № 2; Поради хормейстерам. К., 1964; Класик української музики // Кирило Стеценко. Спогади. Листи. Матеріали. К., 1981; В учительській семінарії // Микола Леонтович. Спогади. Листи. Матеріали. К., 1982. Рекомендована література Матусевич Н. Олександр Захарович Міньківський. 1964. Google Scholar Internet Ященко Л. Державна заслужена капела бандуристів Української РСР. 1970. Google Scholar Internet Лаба Б. Олександр Міньківський. 1980. Google Scholar Internet Гордійчук М. Олександр Міньківський // Музика і час: Розвідки і ст. 1984 (усі — Київ). Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 107, "name": "Нижанківський Остап Йосипович", "by": "1863.0", "dy": "1919.0", "status": "excluded_pre_soviet", "reasoning": "Died before 1921 (death_year=1919) — pre-Soviet, outside study scope.", "notes": "(крипт.: О. Н., Є. Н., Н-ий; 24. 01. 1863, м. Стрий, нині Львів. обл. – 22. 05. 1919, там само) – композитор, хоровий диригент, культурний і громадсь­кий діяч, церковний діяч УГКЦ. Брат Олександра, батько...", "url": "https://esu.com.ua/article-72070", "group": "EXCLUDE", "bio": "НИЖАНКІ́ВСЬКИЙ Остап Йосипович (крипт.: О. Н., Є. Н., Н-ий; 24. 01. 1863, м. Стрий, нині Львів. обл.&nbsp;— 22. 05. 1919, там само)&nbsp;— композитор, хоровий диригент, культурний і громадсь­кий діяч, церковний діяч УГКЦ. Брат Олександра, батько Нес­тора і Степана, дід Олега Нижанківських, прадід Л.-А. Ни­жан­ківської-Кукс. 1876 вступив до Дрогоб. гімназії (нині Львів. обл.), звідки був від­рах. за конфлікт на нац. ґрунті із викл.&nbsp;— польс. шовіні­стом. Пере­бував на військ. службі у Львові (1882–84). Закін. Львів. укр. академ. гімназію (1888). Разом із друзями-гімназистами К. Студинським, О. Маковеєм та ще кількома належав до таєм. гуртка, де дис­кутували з про­блем укр. історії, літ-ри і мистецтва, виголошували реферати, святкували шашкевичів. і шевченків. дати. Особл. увагу Н. приділяв гімназій. хору&nbsp;— спершу як спів­ак, потім як диригент. Тоді ж по­зна­йомився з А. Вахнянином, І. Франком й активно долучився до укр. культур., перед­усім муз. життя. Поклав на музику «славень» ві­домої в Галичині культурно-просвітн. мандрівки студентів 1884&nbsp;— на сл. її учасника, І. Франка («Сонце по небі колує…»). 1885 на проха­н­ня І. Франка і на його текст написав кантату «Не гармати грають нині» (на честь 25-річчя творчості О. Ко­ниського), яку, як і свою композицію на сл. ювіляра «Вітер», виконав із гімназій. хором у Львові (ці твори не збереглися). Тоді ж заснував у Львові перше в Галичині нотне видавництво «Бібліотека музикальна», яке дебютувало його твором на сл. Ю. Федьковича «Гу­ляли» (для чол. квартету) і видало того ж року пісню А. Вахнянина на сл. І. Гушалевича «Наша жизнь» (для чол. хору) та «гімн» М. Лисенка на сл. О. Кониського («Боже великий, єдиний»; для жін. хору в су­проводі фортепіано). Вид-во пос­прияло роз­витку укр. муз. культури. У гімназійні роки Н. створив низку оригін. композицій, інтенсивно збирав пісен. фольклор, зайнявся обробкою нар. пісень (за порадою М. Лисенка, з яким листувався). 1887 ви­ступав із гімназій. хором на Поділ­лі та Буковині. 1888 І. Франко, говорячи про «взірці для створе­н­ня окремої школи національної української музики», наголошував: «Сучасними її пред­ставниками є українські композитори Лисенко і Ніщинський; в Галичині йде за ними молодий талановитий митець Нижанківський» (Франко І. «Зі­бра­н­ня творів», у 50-ти т., К., 1980, т. 27). У 1888–92 Н. навч. у Львів. духов. семінарії, де також керував хором. Крім того, створив групи спів­аків&nbsp;— т. зв. дванадцятки, потім&nbsp;— шістнадцятки, з якими концертував галиц. містами і м-ками, збираючи кошти на будівництво укр. нар. театру у Львові (нині Львів. театр опери та балету ім. С. Крушельницької). 1894–96 керував хором Львів. «Бояна». Після закінче­н­ня семінарії працював у м. Бережани (нині Терноп. обл.) як священик, водночас викладав спів у місц. гімназії. 1892 за допомогою адвоката, письмен­ника А. Чайковського заснував хор Бережан. «Бояна». 1894 пере­їхав до Львова, де працював у чол. учит. семінарії, згодом&nbsp;— в укр. академ. гімназії. 1896"}, {"idx": 108, "name": "Бобир Тетяна Олександрівна", "by": "1976.0", "dy": "", "status": "alive", "reasoning": "No death year — presumed alive or date unknown.", "notes": "(29. 05. 1976, м. Ніжин Черніг. обл.) – художник-монументаліст. Закін. Київ. худож.-пром. технікум (1996) та Нац. академію образотвор. мистецтва та архітектури (2002; майстерня монум. живопису О. Кожекова)....", "url": "https://esu.com.ua/article-35604", "group": "EXCLUDE", "bio": "БОБИ́Р Тетяна Олександрівна (29. 05. 1976, м. Ніжин Черніг. обл.)&nbsp;— художник-монументаліст. Закін. Київ. худож.-пром. технікум (1996) та Нац. академію образотвор. мистецтва та архітектури (2002; майстерня монум. живопису О. Кожекова). Виконала 1996 вітраж Покровської церкви (с. Біляки Семенів. р-ну Полтав. обл.), 2000–01&nbsp;— роз­писи інтерʼєрів Ген. штабу ЗС України та МО України. Учасниця ви­ставок у Полтаві (1996), Донецьку (2002); персон.: Чернігів (1995), Київ (2002). Роботи виконано у стилі екс­пресіонізму. Додаткові відомості Основні твори «Данило Галицький» (2000), триптих «Св. Юрій Змієборець» (2002); графіка — «Збирачі дубового листя» (1996–2001). Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 109, "name": "Жук Микола Петрович", "by": "1833.0", "dy": "1900.0", "status": "excluded_pre_soviet", "reasoning": "Died before 1921 (death_year=1833) — pre-Soviet, outside study scope.", "notes": "(псевд. – Хрущ, Микола Хрущ; 1833, с. Булахів, нині Козелец. р-ну Черніг. обл. – 20. 04(03. 05). 1900, там само) – поет. Був поміщиком. Дебютував 1862 у ж. «Основа» (кн. 8). Друкувався також у альманасі «Рада»...", "url": "https://esu.com.ua/article-18289", "group": "EXCLUDE", "bio": "ЖУК Микола Петрович (псевд.&nbsp;— Хрущ, Микола Хрущ; 1833, с. Булахів, нині Козелец. р-ну Черніг. обл.&nbsp;— 20. 04(03. 05). 1900, там само)&nbsp;— поет. Був поміщиком. Дебютував 1862 у ж. «Основа» (кн. 8). Друкувався також у альманасі «Рада» (1883), «ЛНВ» (1902, т. 17), «Антології руській», «Календарі ілюстрованому товариства “Просвіта”». Поема Ж. про нещасливе коха­н­ня «Чари» по­єд­нує у собі романт. та реаліст. мотиви; поема «Без­батченко», «немалий поетичний талант» автора якої від­значив І. Франко,&nbsp;— реаліст. оповідь про складне драм. становище освіченої молодої людини, позашлюбного сина поміщика і селянки. Ці обидві поеми вперше опубл. у зб. «Українські поезії» (Л., 1912) О. Афанасьєва-Чужбинського, котрого І. Франко (як упорядник збірки) помилково вважав їх автором. У стат­ті-трактаті «О жизни и духе» (ж. «Наука и жизнь», 1893, № 20–22, 35–38) Ж. виклав свої су­спільно-етичні по­гляди, об­стоюючи ідею самовдосконале­н­ня людини як шляху до роз­вʼяза­н­ня духов. суперечностей. Рекомендована література Гнатюк М. П. Микола Петрович Жук (Хрущ) // Афанасьєв-Чужбинський О. Поезії. К., 1972. Google Scholar Internet Сиваченко М. Є. Твори О. Афанасьєва-Чужбинського в редакції І. Франка, псевдонім «Микола Хрущ» та забутий поет Микола Жук // Сиваченко М. Є. Над текстами українських письменників. К., 1985. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 110, "name": "Пучко-Колесник Юлія Віталіївна", "by": "1973.0", "dy": "", "status": "alive", "reasoning": "No death year — presumed alive or date unknown.", "notes": "(22. 03. 1973, Київ) — хоровий диригент, педагог. Дочка В. Пучка. Кандидат мистецтвознавства (2009). Заслужений діяч мистецтв України (2014). Лауреатка Міжнародного хорового конкурсу імені В.-А. Моцарта...", "url": "https://esu.com.ua/article-886235", "group": "EXCLUDE", "bio": "ПУЧКО́-КОЛЕ́СНИК Юлія Віталіївна (22. 03. 1973, Київ)&nbsp;— хоровий диригент, педагог. Дочка В. Пучка . Кандидат мистецтво­знавства (2009). Заслужений діяч мистецтв України (2014). Лауреатка Між­народного хорового конкурсу імені В.-А. Моцарта (Прага, 2013). Дипломантка 2-го Всеукраїнського конкурсу молодих диригентів імені М. Леонтовича (Київ, 2001). Закінчила Національну музичну академію України (Київ, 1996; кл. О. Тимошенка) та асистентуру-стажува­н­ня при ній (1999), де від 1997 й працює: від 2009&nbsp;— доцент кафедри хорового диригува­н­ня. Водночас від 2008 викладає у Київському музичному ліцеї імені М. Лисенка, художній керівник камерного дівочого хору при ньому. Хор під керівництвом П.-К.&nbsp;— учасник багатьох всеукраїнських та між­народних фестивалів в Україні та за кордоном. Ви­ступає на українському телебачен­ні, дає благодійні концерти. Лауреат між­народних хорових конкурсів&nbsp;— у Празі (2009, 1-а премія; 2014, Ґран-Прі), Ріміні (Італія, 2010, 1-а премія), Дауґавпілсі (Латвія, 2017, 1-а премія); володар Ґран-Прі&nbsp;— у конкурсах в Кракові (Польща, 2011, 2013, 2014), всеукраїнського конкурсу духовної пісні «Аскольдів глас» (Київ, 2011), імені Ф. Шуберта (Ві­день, 2012), імені В.-А. Моцарта (Прага, 2013), у Каунасі (Литва, 2014), Римі (2016); «Ґран-Прі націй» (Німеч­чина, 2017). Ви­ступав у соборі святого Петра у Ватикані (2016). Пере­важно хор виконує про­грами а капела. У репертуарі&nbsp;— твори М. Лисенка, М. Леонтовича, Є. Станковича, М. Скорика, В. Зубицького, Г. Гаврилець, Й.-С. Баха, Ґ. Генделя, В.-А. Моцарта, Ф. Шуберта, Й. Брамса, Р. Твардовського, Р. Дубри, Е. Ешенвалдса та ін. Спеціально для цього хору були написані композиції І. Алексійчук (кантата-фантазія «Всещирий Миколаю», «Вербова дощечка», «Заспаладєвойка»), Ю. Іщенка («Псалом», «Щедрівка», «Реквієм памʼяті загиблих під Іловайськом»), Т. Яшвілі («Ангеле Христов», «Богородице діво», «Нині отпущаєш»). Як диригент П.-К. володіє високою технічною і художньою майстерністю, мистецтвом створе­н­ня хорового ансамблю, вишуканого виконавського нюансува­н­ня. Серед випускників&nbsp;— хор­мейстери Ж. Бугай, В. Гречко, А. Карпінець, О. Урсатій, В. Шемчук, диригент симфонічного оркестру Т. Сенько, професор Консерваторії у Сінхаї (Китай) В. Вакулішина. Додаткові відомості Основні праці Хорове мистецтво як об’єкт музичної культурології: соціокультурні функції хорової музики // Вісн. Держ. академії керів. кадрів культури і мист-в. К., 2004. № 4; Особливості професійних якостей диригента-хормейстера: мислення, емоції, воля // Мистецтвознавчі зап.: Зб. наук. пр. К., 2005. Вип. 7; Сучасна хорова музика: до питання інтерпретації // Київське музикознавство. 2007. Вип. 23; Сучасні духовно-музичні хорові композиції: культурологічні та хорознавчі аспекти інтерпретації // Там само. 2009. Вип. 30; Постать Олега Семеновича Тимошенка у формуванні та розвитку хорової освіти та культури на межі століть // Там само. 2012. Вип. 38; Кафедра хорового диригування НМАУ імені П. І. Чайковського: ві"}, {"idx": 111, "name": "Мордасевич Казімєж", "by": "1859.0", "dy": "1923.0", "status": "migrated", "reasoning": "Born in Minsk, died in Paris in 1923; settled in Western Europe (Paris) for substantial adult life as painter, graphic artist, and sculptor.", "notes": "(Казимир Львович; 23. 04. 1859, Мінськ – 20. 11. 1923, Париж) – живописець, графік, скульптор. Навч. у Рівнен. гімназії (1871–72). Від 1874 – на військ. службі у Києві, Луцьку, Вінниці, Кременці (нині Терноп....", "url": "https://esu.com.ua/article-69485", "group": "INCLUDE", "bio": "МОРДАСЕ́ВИЧ Казімєж (Казимир Львович; 23. 04. 1859, Мінськ&nbsp;— 20. 11. 1923, Париж)&nbsp;— живописець, графік, скульптор. Навч. у Рівнен. гімназії (1871–72). Від 1874&nbsp;— на військ. службі у Києві, Луцьку, Він­ниці, Кременці (нині Терноп. обл.). Учасник рос.-турец. вій­ни 1877–78. Навч. у Школі мистецтв у Варшаві (1881; викл. В. Ґерсон, О. Камінський), С.-Петербур. АМ (1882–88), де отримав 2 малі (1883), 2 великі (1885) срібні, золоту (1888) медалі. 1888–89 роз­писував олійні інтерʼєри двох костелів, палацу Колон­на в Римі. 1890–94 виконував порт­ретні замовле­н­ня в Прав­обереж. Україні. 1891 заснував у Варшаві студію порт­рет. живопису. Багато подорожував (Австрія, Італія, Німеч­чина, Швейцарія, Франція, Іспанія). 1895–96, 1901&nbsp;— у Кременці. Писав олійні, акварел. порт­рети, пейзажі у реаліст. стилі, картини на реліг. тематику. Створив малюнки для вид. «Księga pamiątkowa na ucz­czenie setnej rocznicy urodzin Ada­­ma Mickiewicza (1798–1898)» (War­szawa, 1898). Від 1901 викладав у школі Г. Токажевської, читав лекції у Худож. товаристві (обидва&nbsp;— Варшава). Пере­клав і написав вступ до праці Я. Блокса «Przewodnik dla artystów malarzy i miłośników obrazów» (Warszawa, 1905). У 1912–13 написав порт­рети Ярошинських і Ліпковських у Бабині Липовец. пов. (нині Вінн. обл.) та Ружині Сквир. пов. (нині Житомир. обл.). Екс­понував роботи на Всесвіт. ви­ставці в Парижі (1900), у варшав. Т-ві сприя­н­ня мистецтву (1890–91, 1897–1901, 1903–04, 1906, 1908–18). Персон.&nbsp;— у Парижі (1924, посмертна). Загинув у автоката­строфі. Додаткові відомості Основні твори скульптура — дві голови (1873–74); надгробок у Царському Селі (нині м. Пушкін С.-Петербур. міськради; 1885); погруддя — М. Тишкевич, дружини, ксьондза Маєвського (усі — 1905); живопис — «Мадонна» (1876; 1905; 1911), «Вид із вікна в Єрусалимських Алеях» (1882), «Св. Губерт» (1886), «Христос зцілює сліпих» (1888), «Розп’яття» (1889), «Барон де Ланваль» (1895), «Ядвіга» (1900), «Микола ІІ» (1904), «Ґ. Веджик» (1905), «Княгиня Марія Павлівна» (1907), «Веранда», «Алея» (обидва — 1909), «Етюди палацу в Ружині», «Вид із балкона палацу в Ружині» (обидва — 1913), «Лазєнки» (1915; 1918). Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 112, "name": "Аббакумов Степан  Тимофійович", "by": "1870.0", "dy": "1919.0", "status": "non_migrated", "reasoning": "Abbakumov was born in Kyiv in 1870, completed his education there in 1890, and died in Kyiv in 1919; no evidence of migration or forced displacement.", "notes": "(23. 11 (05. 12). 1870, Київ – 1919, там само) – диригент, композитор, педагог. Закін. Київське музичне училище (1890, кл. фортепіано Г. Ходоровського-Мороза і М. Листовничого, кл. віолончелі Ф. Мулерта),...", "url": "https://esu.com.ua/article-42152", "group": "INCLUDE", "bio": "АБ­БАКУ́МОВ Степан Тимофі­йович (23. 11 (05. 12). 1870, Київ&nbsp;— 1919, там само)&nbsp;— диригент, композитор, педагог. Закін. Київське музичне училище (1890, кл. фортепіано Г. Ходоровського-Мороза і М. Листовничого, кл. віолончелі Ф. Мулерта ), С.-Петербур. консерваторію (1898, кл. композиції М. Солов­йова). На­вчаючись у консерваторії, диригував на ви­ставах укр. драм. гуртка. 1903 удосконалювався в А. Нікіша (Ляйпциґ). 1904–05&nbsp;— диригент Па­вловського, 1907&nbsp;— Ялтин. симф. оркестрів. Від 1913&nbsp;— у Києві: диригував симф. концертами Київ. від­діл. РМТ, літніми концертами в Купецькому саду. Від 1916&nbsp;— диригент Київ. пере­сув. опер. театру, 1918&nbsp;— Держ. симф. оркестру ім. М. Лисенка. Автор вокал. та інструм. творів (не збереглися). Рекомендована література Современные деятели. Стефан Тимофеевич Аббакумов // Музыка и пение. 1906. № 8. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 113, "name": "Мако Олександр  Едуардович (Йосипович)", "by": "1851.0", "dy": "1925.0", "status": "internal_transfer", "reasoning": "Born in Barnaul (Russian Empire) and died in Tomsk (Russian Empire), both within the Russian sphere; no evidence of leaving Soviet territory or forced displacement.", "notes": "(14(26). 06. 1851, м. Ба­р­наул, нині Алтай. краю, РФ – 06. 02. 1925, м. Томськ, РФ) – живописець, скульптор і педагог. Батько С. Мако. Закін. Томську чол. гімназію (1869), навч. у Мюнхен. АМ. 1874 отримав звання...", "url": "https://esu.com.ua/article-60767", "group": "INCLUDE", "bio": "МАКО́ Олександр Едуардович (Йосипович) (14(26). 06. 1851, м. Ба­р­наул, нині Алтай. краю, РФ&nbsp;— 06. 02. 1925, м. Томськ, РФ)&nbsp;— живописець, скульптор і педагог. Батько&nbsp; С. Мако . Закін. Томську чол. гімназію (1869), навч. у Мюнхен. АМ. 1874 отримав зва­н­ня неклас. художника С.-Пе­тербур. АМ за надіслані полотна «Кінь при яслах», «Собака», «Різні речі». На­прикінці 1870-х рр. у Томську викладав у Маріїн. жін. гімназії (увів на уроках роз­пис на фарфорі, шовку та випалюва­н­ня на дереві), від­крив власну художню студію та ви­ставляв роботи. Серед учнів&nbsp;— С. Голубін, В. Оржешко. У серед. 1890-х рр. за­ймався конярством на Алтаї. 1905 пере­їхав до Києва. Спів­засн. Товариства художників-киян (1914). Учасник худож. ви­ставок у Києві (1910–13), 7-ї Осін. ви­ставки у С.-Петербурзі (1912), Томську (від 1917). Писав картини для князя Михайла Олександровича. Автор акварел. і живопис. пейзажів, етногр. композицій, мислив. і батал. сцен, рисунків олівцем та вугі­л­лям. Деякі полотна зберігаються у музеях Києва, Томських худож. і краєзн. музеях, Омському ХМ (РФ). Додаткові відомості Основні твори погруддя — П. Чайковського (1890-і рр., Томське відділ. Муз. товариства), О. Пушкіна (1899); живопис — серія «Полювання» (1912); «Бій під Рава-Руською» (1914), «Курляндська лягава» (1915), «Кіт дрімає» (1916), «У зимовому лісі» (1917), «Хорти» (1918). Рекомендована література Некролог: умер Александр Эдуар­­­дович Мако // КЗ. Томск, 1925, 8 фев. Google Scholar Internet Федина Т. Ю. Русско-украинские связи в художественной жизни Юга России (начало ХХ в.). Краснодар, 2009. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 114, "name": "Лівицька Марія Варфоломіївна", "by": "1879.0", "dy": "1971.0", "status": "unknown", "reasoning": "B2-reclassified (death_year corrected 1879.0→1971): api_error: \"Could not resolve authentication method. Expected either api_key or auth_token to be set. Or for on", "notes": "(дівоче – Ткаченко; 09. 04. 1879, м. Бердичів Київ. губ., нині Житомир. обл. – 16. 08. 1971, м. Йон­­керс, похов. у м-ку Бавнд Брук, шт. Нью-Джерсі, США) – громадсько-культурна діячка. Дружина А. Лівицького,...", "url": "https://esu.com.ua/article-55404", "group": "EXCLUDE", "bio": "ЛІВИ́ЦЬКА Марія Варфоломіївна (дівоче&nbsp;— Ткаченко; 09. 04. 1879, м. Бердичів Київ. губ., нині Житомир. обл.&nbsp;— 16. 08. 1971, м. Йон­­керс, похов. у м-ку Бавнд Брук, шт. Нью-Джерсі, США)&nbsp;— громадсько-культурна діячка. Дружина А. Лівицького , мати Н. Лівицької-Холодної та М. Лівицького . Член РУП, УСДРП. Закін. Фундуклеїв. жін. гімназію у Києві (1897). Працювала приват. учителем у Києві (1898–99), зай­­ма­­лася громад. та парт. діяльністю. Була чл. київ. студент. громади, до якої входили Д. Антонович , В. Вин­ниченко , О. Ско­­ропис-Йолтухівський , А. Лівицький, разом із Л. Старицькою-Черняхівською , М. Грінченко та ін. брала активну участь у діяльності Укр. жін. громади, в рев. подіях 1905–07. У 1920 виїхала до Варшави, де очолювала Союз укр. емі­гранток у Польщі. На­­­при­­кінці 2-ї світової війни пере­бралася у Німеч­чину, мешкала у Карлс­руе, Етлінґені. Від 1957&nbsp;— у США. Авторка спогадів «На гра­­ні двох епох» (Нью-Йорк, 1972), в яких детально описала родин­ні звʼязки полтав. дворян Лівицьких, характери, смаки та пере­кона­н­ня чл. родини, побут. атмо­сферу, умови життя на тлі істор. подій, що від­бувалися в Україні у перші роки 20 ст. Висвітлювала особисте життя письмен­ників, держ. і громад.-політ. діячів, зокрема В. Вин­ниченка, П. Крата , М. Міхновського , М. Пор­­ша , Б. Мартоса , В. Дорошенка , В. Шемета , в динаміці роз­крила їхні образи, характери, побут, літ. смаки, уподоба­н­ня. Цікаво пере­повіла про дит. роки й навч. своїх дітей. Рекомендована література Померла Марія Лівицька, вдова по президенті УHP в екзилі Андрієві Лівицькому: [некролог] // Свобода, 1971, 19 серп. Google Scholar Internet Павловський В. Перше українське жіноче об’єднання в Києві (1901–1905) // Наше життя. 1998. № 5. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 115, "name": "Пер’є Генрик-Карл", "by": "1863.0", "dy": "1928.0", "status": "excluded_galicia_pre_annexation", "reasoning": "Born in Galicia, died 1928 — before 1939 USSR annexation of western Ukraine. Never under Soviet rule.", "notes": "(1863, Львів — 25. 02. 1928, там само) — скульптор. Батько К. Пер’є. Закінчив Реальну школу у Львові; здобував освіту у Львівській політехніці на будівельному відділі (1887—88). Крім навчання в батька,...", "url": "https://esu.com.ua/article-879287", "group": "EXCLUDE", "bio": "ПЕРʼЄ́ Генрик-Карл (1863, Львів&nbsp;— 25. 02. 1928, там само)&nbsp;— скульптор. Батько К. Перʼє . Закінчив Реальну школу у Львові; здобував освіту у Львівській політехніці на будівельному від­ділі (1887–88). Крім на­вча­н­ня в батька, скульптора А.-М.-Ш. Перʼє, до липня 1884 працював челядником у фірмі Л. Шимзера, а від 1885 як патентований різьбяр на камені очолив власну майстерню на вул. Пекарська, № 87 (за сучасною нумерацією&nbsp;— № 73), де 1887 працювало 13 робітників, 1894&nbsp;— 35; художній керівник&nbsp;— скульптор А. Рудзевич. Стилістика творів цього часу є типовою для історизму, з мотивами неоренесансу, неоготики та необароко. Фірма П. швидко стала однією з провід­них в Галичині з виготовле­н­ня цвинтарних памʼятників. Майстри використовували полянський пісковик, камінь з с. Дичків (по­близу Тернополя) і закордон­ний мармур. 1886 за проєктом П. було завершено памʼятник пов­станцям 1830–31: камʼяний саркофаг, оздоблений гербами Польщі, Галицької Русі та Литви, увінчаний орлом, що спирається на уланський шолом і зламаний меч. 1889 на могилі Л. Шимзера П. по­ставив над­гробок, що імітував увінчаний ампірним хрестом пень дерева, обвитий квітами, дубовими гілками, папоро­т­тю й плющем (такі елементи П. пізніше по­вторював у над­гробках М. Кораб-Бжозовському, 1891; Е. Головкевичу, 1892; Г. Стшелецькому, 1901). Після викона­н­ня 1891 над­гробка директору львівського театру Я. Добжанському діапазон продукції фірми значно роз­ширився; почали використовувати привезені зі Швеції лабрадорит з ефектами іризації, чорний граніт, червоний порфір, зелений сієніт, світлий мармур. Характерним прикладом нової продукції став обеліск з блакитного каменя на могилі барона Й.-К. фон Гіл­лера (1899). Фірма П. по­ставила в цей час над­гробні памʼятники з мармуровими порт­ретними медаль­йонами (авторства А. Рудзевича) О. Огоновському (1896), Й. Маркову (1909). На межі 19–20 ст. у майстерні П. за­ймалися й оздобле­н­ням церков, зокрема 1898 виконано камʼяну статую Богоматері для костелу в Борщовичах (по­близу Львова, не збережена) і неоготичний різьблений хор у львівському костелі кларисок. На Ви­ставці літургійного промислу 1909 у Львові екс­понували рисунки П. з ескізами релігійних скульптур. У кінці 1906 П. при­дбав будинок і майстерню Л. Шимзера, за­провадив найновіші технічні досягне­н­ня в каменярстві й продовжував встановлювати над­гробки пере­важно на Личаківському цвинтарі. До проєктува­н­ня за­прошував місцевих та іноземних митців. У червні 1906 урочисто від­крито памʼятник М. Шашкевичу&nbsp;— на фоні камʼяної стели з рельєфним хрестом пред­ставлено виконану з ебенового дерева й покриту мідною оболонкою фігуру плакальниці з урною, яка сидить на саркофазі (модель мюнхенського скульптора Р. Тіле). 1900–28 в майстерні П. створили низку памʼятників з пісковику з типовим мотивом плакальниці, яка сидить чи стоїть біля зламаної колони або постаменту (памʼятники К. та Я. Ріделів (1907–08), вбитому 1910 керівнику ви­ступу українських студентів А. Коцку (1912); "}, {"idx": 116, "name": "Мироненко Віктор Павлович", "by": "1953.0", "dy": "", "status": "alive", "reasoning": "No death year — presumed alive or date unknown.", "notes": "(30. 01. 1953, с. Ков’яги Валків. р-ну Харків. обл.) – архітектор. Доктор архітектури (2000), професор (2004), член-кореспондент Укр. академії архітектури (2004). Закін. Харків. інж.-буд. інститут (1980), де...", "url": "https://esu.com.ua/article-64567", "group": "EXCLUDE", "bio": "МИРО́НЕНКО Віктор Па­влович (30. 01. 1953, с. Ковʼяги Валків. р-ну Харків. обл.)&nbsp;— архітектор. Доктор архітектури (2000), професор (2004), член-кореспондент Укр. академії архітектури (2004). Закін. Харків. інж.-буд. ін­ститут (1980), де від­тоді й працює (нині тех. університет будівництва та архітектури): 1988–90&nbsp;— за­ступник декана, 1990–2001 та від 2014&nbsp;— декан архіт. ф-ту, водночас 1996–2014&nbsp;— зав., від 2014&nbsp;— професор кафедри дизайну архіт. середовища. Роз­робляє пита­н­ня теорії архіт. ергономіки. Додаткові відомості Основні праці Эргономика в архитектуре. Москва, 1988; Эргономические принципы архитектурного проектирования. Х., 1997; Архітектурна ергономіка: Підруч. К., 2009; 2011; Архитектура, дизайн, эргономика: Иллюстриров. терминол. слов.-справоч. Белгород, 2009; Архитектурная эргономика: Учеб. Белгород, 2013; Анализ современных тенденций и подходов к проблеме проектирования динамической архитектуры // Вісн. Донбас. академії будівництва і архітектури. 2014. Вип. 2 (спів­авт.). Рекомендована література Мироненко Віктор Павлович // Вісн. Харків. академії дизайну та мистецтв. Мистецтвознавство, архітектура. 2012. № 10. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 117, "name": "Пстрак Ярослав Васильович", "by": "1878.0", "dy": "1916.0", "status": "excluded_pre_soviet", "reasoning": "Died before 1921 (death_year=1916) — pre-Soviet, outside study scope.", "notes": "(24. 03. 1878, м-ко Гвіздець, нині с-ще Коломийського р-ну Івано-Франківської обл. — 16. 03. 1916, Харків) — живописець і графік. Навчався живопису в батька (скульптора і різьбяра на дереві), М. Левицького...", "url": "https://esu.com.ua/article-887961", "group": "EXCLUDE", "bio": "ПСТРАК Ярослав Васильович (24. 03. 1878, м-ко Гвіздець, нині с-ще Коломийського р-ну Івано-Франківської обл.&nbsp;— 16. 03. 1916, Харків)&nbsp;— живописець і графік. На­вчався живопису в батька (скульптора і різьбяра на дереві), М. Левицького (рідного дядька), а також у В. Крицинського , К. Устияновича . Закінчив Мюнхенську АМ (Німеч­чина, 1899), де захопився пастельним живописом. Згодом пере­їхав у Львів; став ві­домим як порт­ретист, ілюстратор журналів і гумористично-сатиричних ви­дань «Комар» та «Зеркало» (1900–08). Учасник ви­ставок Товариства роз­вою руської штуки у Львові (1898, 1900). Автор пейзажів і композицій на побутові теми; у низці картин від­творив архітектурні памʼятки Львова («Вид на вулицю Руську», «Львівський оперний театр», «Львів. Вежа Корнякта» тощо). 1901 подорожував Західною Європою. Про­ілюстрував читанку західноукраїнського письмен­ника А. Крушельницького, повісті «Захар Беркут» І. Франка (1902), «Тарас Бульба» М. Гоголя (1907) та ін. За оригіналами робіт П. 1912–14 ви­друковано понад 120 поштових листівок, зокрема з порт­ретом Т. Шевченка до 100-ліття від дня його народже­н­ня (1914), а великодні й різдвяні листівки пере­видавали 1920–30. Пере­буваючи певний час на Гуцульщині, створив низку порт­ретів селян, виконав серію робіт, присвячену народним звичаям і місцевим традиціям, роз­писав церкви в селах Роз­токи, Ільці (разом із художником О. Куриласом ), Верховина. Остан­ні 7 робіт П., що датовані 1915 і збереглися,&nbsp;— це міфологічні сцени в академічній манері з рисами класицизму. Від 1915&nbsp;— у Харкові, де лікувався у військовому шпиталі. 30 його робіт зберігають у Національному музеї народного мистецтва Гуцульщини та Поку­т­тя (Коломия). До 125-річчя від дня народже­н­ня митця в Коломиї влаштували пʼяту ви­ставку його творів. Іменем П. на­звано Коломийську дитячу художню школу, вулиці у Львові, Івано-Франківську, Коломиї. Додаткові відомості Основні твори «Жіночий портрет», «Косар», «Портрет хлопчика» (усі — 1890-і рр.), «Над Прутом», «Портрет гуцула в клепані», «Мадонна з дитятком» (усі — 1900), «Портрет жінки» (1904), «Дідусь із свічкою» (1906), «Професор Ян Око» (1908), «Старий гуцул» (1909), «Вид на веж пович", "by": "1871.0", "dy": "1936.0", "status": "excluded_galicia_pre_annexation", "reasoning": "Born in Galicia, died 1936 — before 1939 USSR annexation of western Ukraine. Never under Soviet rule.", "notes": "(19. 08. 1871, м. Долина, нині Івано-Фр. обл. – 14. 01. 1936, с. Гологірки, нині Золочів. р-ну Львів. обл.) – композитор, лікар. Учасник 1-ї світової вій­ни. У Львові навч. у Д. Вінцковського та Л. Саєвич. Закін....", "url": "https://esu.com.ua/article-56427", "group": "EXCLUDE", "bio": "ЛОПАТИ́НСЬКИЙ Ярослав Йосипович (19. 08. 1871, м. Долина, нині Івано-Фр. обл.&nbsp;— 14. 01. 1936, с. Гологірки, нині Золочів. р-ну Львів. обл.)&nbsp;— композитор, лікар. Учасник 1-ї світової вій­ни. У Львові навч. у Д. Вінцковського та Л. Саєвич. Закін. мед. факультет Віден. університету (1898), де був чл. муз. гуртка укр. студент. товариства «Січ», «Німецько-ав­стрійсь­кого союзу» (видавництво якого опублікувало низку творів Л.). Пере­буваючи у Відні, брав уроки композиції у С. Майкапара. Від 1898 працював лікарем у селах Поморяни (нині смт Золочів. р-ну) та Гологорах. 1905 разом із Я. Ярославенком ініціював створе­н­ня видавництва «Торбан» при Союзі любителів музики у Львові. Від 1913&nbsp;— чл. Укр. лікар. товариства. Під час 1-ї світової вій­ни працював військ. лікарем. 1915 разом зі шпиталем еваку­йов. до Києва. 1921 заарешт., після звільне­н­ня 1922&nbsp;— лікар у клініці Укр. Червоного хреста. Від 1923 мешкав і працював у Гологорах. У репертуарі&nbsp;— опери, оперети, муз. комедія, камерно-інструм. твори, соло­співи та ін. Додаткові відомості Основні твори опери — «Еней на мандрівці» (1911, лібрето М. Курцеби за поемою І. Котляревського), «Оксана» (1914, незакінчена, текст втрачено під час 1-ї світової вій­ни), «Казка скель» (1926, власне ліб­рето), дит. опера «Зірка щастя» (1920-і рр., незавершена); оперета «Склянка води» (1911, за Е. Скрібом); хор «Вставай, Україно!» (1905, сл. С. Яричевського); солоспіви — «Давня весна» (1887, сл. Лесі Українки), «Сон» (1904, сл. "url": "https://esu.com.ua/article-881630", "group": "EXCLUDE", "bio": "ПОПА́ТЕНКО Василь Васильович (1841, м. Керч Таврійської губ., нині АР Крим&nbsp;— 09. 01. 1920, м. Перм, РФ)&nbsp;— архітектор. Закінчив Санкт-Петербурзьке будівельне училище (1864). Від­тоді працював у Таврійській губернській будівельній і шляховій комісії (Сімферополь). Від 1865 за­ймався приватними роботами у Санкт-Петербурзі. 1867–70&nbsp;— у будівельному від­ділі Рязанського губернського правлі­н­ня; 1870–73&nbsp;— Скопинський земський і міський архітектор (Рязанська губ.); від 1873&nbsp;— у будівельному від­ділі Пермського губернського правлі­н­ня (усі&nbsp;— Росія): 1878–1912&nbsp;— губернський архітектор. Від 1891&nbsp;— дійсний член Пермського від­діле­н­ня Російського технічного товариства. Від 1912 значний період мешкав у Москві. Використовував форми еклектики, зокрема й т. зв. це­гляного та неоросійського стилів. Серед реалізованих проєктів у Пермі&nbsp;— міський театр (нині театр опери та балету, 1874–80, спільно з Р. Карвовським, у 1957–59 докорін­но реконстру­йований), Олексіївське реальне училище (нині авіаційний технікум, 1880, у 1934 надбудовано 3-й поверх), каплиця Стефана Великопермського (1882–87), жіноча учительська семінарія (нині Будинок дитячої творчості, 1885), імператорське музичне училище (нині приватні фірми, 1902), Єкатерино-Петровське училище (нині музичний коледж, 1903), Будинок працелюбства (нині школа № 84, 1912). Рекомендована література Тимофієнко В. Зодчі України кінця 18 — початку 20 століть. К., 1999. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 124, "name": "Лещук Осип Микитович", "by": "1894.0", "dy": "1949.0", "status": "unknown", "reasoning": "B3-reclassified: api_error: \"Could not resolve authentication method. Expected either api_key or auth_token to be set. Or for on", "notes": "(06. 01. 1894, с. Стаї, нині Стаївка Сокал. р-ну Льві  по­ступу, морал.-етич. удо­сконале­н­ня. У пед. практиці дотримувався засад взаємозвʼяз­ку морал.-етич. вихова­н­ня з навч. процесом, єд­ності школи і сімʼї, впливу громадськості на формува­н­ня особистості. У фун­дам. філос.-реліг. працях висвітлив пита­н­ня люд. буття і моралі, філос. ро­зумі­н­ня вічно­сті, місії людини на землі, значе­н­ня духов. цін­ностей: «Догматика», «Етика», «Катехиз», «Ви­шкіл Марійських дружин» (усі&nbsp;— Львів, 1937; 1994), «Християнське вихова­н­ня молоді» (Пе­ремишль, 1939; Л., 1994). Роз­робив пед. систему, осн. принципами якої є загальнодо­ступність освіти; по­єд­на­н­ня чотирьох аспектів жит­тєвої і діял. позиції людини: аналіт. спри­йма­н­ня дійсності, прагне­н­ня до узагальне­н­ня досягнень, синтез дії і поведінки через морал.-етичну позицію (у її формуван­ні виходив від ідеї до матеріал. вираже­н­ня, від намагань до влаштува­н­ня справедливого соц. ладу, від найкращих прикладів з історії України та всесвіт. історії громад). Спілкувався з митрополитом Андреєм Шептицьким , О. Маковеєм , Б. Лепким , М. Возняком . Увʼязн. на­прикінці 1945. Закатов. у сталін. вʼязниці побл. Пол­тави. 1994 у рідному селі школі присвоєно імʼя Л. та від­крито його музей, встановлено па­мʼят. хрест на"}, {"idx": 125, "name": "Барвінський Павло  Якович", "by": "1862.0", "dy": "1908.0", "status": "excluded_pre_soviet", "reasoning": "Died before 1921 (death_year=1862) — pre-Soviet, outside study scope.", "notes": "(літ. псевд. – Ізраїльтенко; 1862, слобода Борисовка, нині смт Бєлгород. обл., РФ – 21. 08(03. 09). 1908, там само) – актор, драматург. Навч. у Моск. консерваторії. Працював в укр. трупах М. Кропивницького,...", "url": "https://esu.com.ua/article-40504", "group": "EXCLUDE", "bio": "БАРВІ́НСЬКИЙ Павло Якович (літ. псевд.&nbsp;— Ізраїльтенко; 1862, слобода Борисовка, нині смт Бєлгород. обл., РФ&nbsp;— 21. 08(03. 09). 1908, там само)&nbsp;— актор, драматург. Навч. у Моск. консерваторії. Працював в укр. трупах М. Кропивницького , М. Садовського , О.
