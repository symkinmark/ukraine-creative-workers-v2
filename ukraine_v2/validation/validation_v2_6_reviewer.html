ію (1915), навч. на приват. курсах рисунку ім. А. Баранецького (1913–16; кер. В. Водзінський, П....", "url": "https://esu.com.ua/article-69674", "group": "INCLUDE", "bio": "МІЛЯ́Н Наталія (12. 04. 1896, Львів&nbsp;— 29. 09. 1942, м. Краків, Польща)&nbsp;— скульпторка, графік. У Кракові закін. учител. семінарію (1915), навч. на приват. курсах рисунку ім. А. Баранецького (1913–16; кер. В. Водзінський, П. Стахевич), Худож.-пром. школі (1917–18) та АМ (1919–25; кер. К. Лящка). Викладала рисунок в укр. гімназії та семінарії василіянок у Дрогобичі (нині Львів. обл., 1926–28). Від 1929&nbsp;— у Кракові. Член і учасниця ви­ставок гуртка «Зарево» (від 1932). Створювала у глині, гіпсі та дереві порт­рети, погру­д­дя, монум. композиції, барельєфи, побут. й алегор. сцени. У жін. образах надавала пере­вагу спокій. руху, тонкій емоційності заг. на­строю, гармоній. пропорціям лаконіч. лінії силуету, гладкій фактурі. У 1920-і рр. це були «роденів.» статуї, після подорожі 1930 Італією створювала композиції під впливом А. Ма­йоля, А. Бурделя. Іноді стилізувала зразки мистецтва флорентій. (рельєф «Мадон­на», 1934; «Від­починок», «Русалка», «Чека­н­ня») або давньоєгипет. («Адам і Єва», 1938) скульптури. У гіпс. порт­ретах сві­домо від­мовлялася від психологізації, шукаючи синтет. форму й за­мкнену кон­струкцію. Учасниця львів. конкурсу проектів памʼятника І. Франку на Личаків. цвинтарі (1928–31). Виконувала рисунки олівцем, чорною крейдою, сангіною, пером. Померла від тифу. Посмертно її скульптури екс­поновані 1943 на ви­ставці Спілки праці укр. образотвор. митців у Львові. Де­які роботи зберігаються у Нац. музеї у Львові, Львів. галереї мистецтв. Додаткові відомості Основні твори скульптура — «Андріянка» (1920-і рр.), «Пробудження» (1924), «Сестра», «О. Корвач», «Л. Цегляж», «Б. Лепкий», «Студент», «Рабиня» (усі — 1930-і рр.), «Материнство» (1930), «Лісовик» (1934), «На річці», «Чотири стихії» (обидва — 1937), «Страх» (1939); медальйони — з портретами Т. Шевченка, І. Франка, Лесі Українки, О. Кобилянської, В. Стефаника (усі — 1930-і рр.); графіка — «Автопортрет», «Жінка в хустині», «Подруга», «Старий єврей», «Гуцульські дівчата», «Танок», «Материнство» (усі — 1924–39). Рекомендована література Денисюк О. Скульптор Наталія Мілян // ОМ. 2007. № 2. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 43, "name": "Павликів Марія Теофілівна", "by": "1865.0", "dy": "1930.0", "status": "excluded_galicia_pre_annexation", "reasoning": "Born in Galicia, died 1930 — before 1939 USSR annexation of western Ukraine. Never under Soviet rule.", "notes": "(01. 06. 1865, Львів — бл. 1930, там само) — співачка (сопрано), педагог. Дочка Т. Павликіва. Вокальну освіту здобула в школі співу А. Пасхаліс і А. Соувестрі у Львові (1888). Дебютувала того ж року партією...", "url": "https://esu.com.ua/article-880746", "group": "EXCLUDE", "bio": "ПАВЛИ́КІВ Марія Теофілівна (01. 06. 1865, Львів&nbsp;— бл. 1930, там само)&nbsp;— спів­ачка (сопрано), педагог. Дочка Т. Павликіва . Вокальну освіту здобула в школі співу А. Пасхаліс і А. Соувестрі у Львові (1888). Дебютувала того ж року партією Рахілі в опері «Дочка кардинала» Ф. Галеві на сцені Львівського оперного театру, де ви­ступала (епізодично) до 1906. П. критики давали таку характеристику: «голос сильний, металічний, колоратура вирівняна і заокруглена, як у витонченої спів­ачки, анотува­н­ня тонів чисте, добра декламація і вимова, чудова зовнішність» («Kurjer Lwowsky», 1889, № 5). У 1882–1901 ви­ступала на багатьох українських концертах у Львові (1882, 1884, 1887, 1891), Кракові, Рогатині (нині Івано-Франківська обл., 1888), Трускавці (нині Львівська обл., 1899). У 1882 у концертах під керівництвом А. Вахнянина виконувала пісню «Купи мені, мамо, намисто» М. Лисенка, арії з опери «Запорожець за Дунаєм» С. Гулака-Артемовського та ін. Брала участь у концертах товариств «Лютня», «Муза»; у ювілейних вечорах, присвячених М. Шашкевичу у 50-річчя «Русалки Дністрової» (1888). У репертуарі&nbsp;— соло­співи «На прю», «Мені однаково», «Садок вишневий», «Тебе, моя любко, єдина» М. Лисенка, «Красна зоре» І. Лаврівського, «Ой, зозуле» М. Вербицького, «Минули літа молодії» О. Нижанківського, «В садочку» Є. Купчинського, арії з опер тощо. У 1909–10 викладала у Вищому музичному ін­ституті у Львові. Композитор С. Невядомський присвятив спів­ачці пісню «Пісенька з саду» (слова С. Рос­совського). Додаткові відомості Основні партії Одарка («Купало» А. Вахнянина), Галька (однойменна опера С. Монюшка), Аїда, Леонора, Амелія («Аїда», «Трубадур», «Бал-маскарад» Дж. Верді), Норма (однойменна опера В. Белліні), Сантуцца («Сільська честь» П. Масканьї), Марґарита («Фауст» Ш. Ґуно), Манон Леско («Манон» Ж. Массне), Валентина («Гуґеноти» Дж. Мейєрбера), Аїда (однойменна опера Дж. Верді). Рекомендована література S. Pepłowski. Teatr polski we Lwowie. 1884–1890. Lwόw, 1891. Google Scholar Internet Медведик П. Діячі української музичної культури: Мат. до біо-бібліогр. слов. // Зап. НТШ: Пр. Музикознав. комісії. Л., 1993. Т. 232. Google Scholar Internet Паламарчук О. З історії Львівського оперного театру // Вісн. Львів. ун-ту. Сер. Мист-во. 2003. Вип. 3. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 44, "name": "Бакум Юрій Павлович", "by": "1952.0", "dy": "", "status": "alive", "reasoning": "No death year — presumed alive or date unknown.", "notes": "(26. 02. 1952, м. Комсомольськ-на-Амурі Хабаров. краю, РФ) – актор. Народний артист України (2009). Закін. Харків. інститут мистецтв (1979; викл. М. Борисенко), відтоді працює у Запоріз. укр. муз.-драм....", "url": "https://esu.com.ua/article-41095", "group": "EXCLUDE", "bio": "БАКУ́М Юрій Па­влович (26. 02. 1952, м. Комсомольськ-на-Амурі Хабаров. краю, РФ)&nbsp;— актор. Народний артист України (2009). Закін. Харків. ін­ститут мистецтв (1979; викл. М. Борисенко), від­тоді працює у Запор 1995). Член НСКінУ (1957). Закін. радіофакультет Одес. консерваторії (1930). Грав 1923–29 у театрах Одеси. 1933–37&nbsp;— ред. і нач. сценар. від­ділу, 1947–97&nbsp;— кінодраматург Одес., 1937–41&nbsp;— реж. Київ. кіностудій худож. фільмів. 1945–47&nbsp;— худож. кер. Одес. театру мініатюр. Спів­пра­­цював із кіностудіями Грузії, РФ, Молдови, Азербайджану, Таджики­стану. Автор сценаріїв х/ф: «Коли Геб­бельс не бреше», «Смі­т­тя і зірки», «Зо­­лота стежка», «У далекому плаван­ні» (оби­­два&nbsp;— 1945), «Голубі дороги» (1947), «Максимко» (1952), «Ко­­мандир корабля» (1955; усі&nbsp;— реж. В. Браун), «Діти партизана» (1954, реж. Л. Голуб, М. Фігуровський), «Сорок перший» (1956, реж. Г. Чухрай; спец. премія Мкф у Кан­нах, 1957), «Невід­правлений лист» (реж. М. Калатозов, спів­автор сценарію), «Над­звичайна подія» (2 се­­рії; обидва&nbsp;— 1958, спів­автор сце­­нарію), «Гадюка» (1965; Респ. премія України ім. Т. Шевченка, 1967; обидва&nbsp;— реж. В. Івченко), «Зелений фургон» (1959, реж. Г. Габай), «Помста» (1960, реж. І. Поплавська; премія «Золоті ворота» Мкф у Сан-Франциско, шт. Каліфорнія, США, 1961), «Маріан­на» (1967, реж. В. Паскар), «Оповіда­н­ня про Рустама» (1971; Державна премія Таджики­­­стану ім. А. Рудакі, 1973), «Рустам і Сухраб» (1972), «Оповідан­ня про Сіявуша» (1976; диплом Мкф країн Азії, Африки і Лат. Америки, Ташкент, 1976; усі&nbsp;— реж. Б. Кімягаров), «Витоки» (1973, реж. І. Лукинський), «При­­­значаєшся онукою» (1975, реж. Я. Лапшин), наук.-популяр. стрі­­чок: «Помилка Наташі Нікітіної» (1953), «Радянське шампансь­­ке» (1958). Зняв фільми за влас. сценаріями: у циклі «Українські пісні на екрані» (1936)&nbsp;— «Ой пря­­ду, пряду», «Над річкою-береж­­ком», «Гриць», «Про пана Лебеденка»; «Чорна чайка» (1962), «Спокуса Дон Жуана» (1985, спів­­­реж.). Написав кн.: «Кинжал» (1988, опубл. 2009), «Пятый грех: записки полуинтел­лигента» (1998; обидві&nbsp;— Одеса). К.&nbsp;— яскравий пред­ставник романтизму у кіномистецтві. 2004 на будівлі Одес. кіностудії 4). Закінчила Косівське училище прикладного мистецтва (1967; викл. Ю. Соломченко ). Працювала в екс­периментальній майстерні сувенірних виробів (Севастополь, 1968–71); у Київській творчій майстерні комплексного оформле­н­ня (1971–76); потім&nbsp;— на Комбінаті монументально-декоративного мистецтва Творчо-виробниче обʼ­єд­на­н­ня «Художник» Художнього фонду СХУ. Учасниця республіканських, всесоюзних, між­народних ви­ставок від 1963. Працювала в галузі скульптури малих форм. Від 1976&nbsp;— на творчій роботі. Роботи зберігаються у фондах Міністерства культури і мистецтв України. Додаткові відомості Основні твори «Українська сім’я» (1974), «Бандурист», «Їхав козак за Дунай» (обидва — 1986); панно — «Лісова пісня» (1980), «Свято», «Лукаш» (обидва — 1981), «Дерево життя» (1983), «Перемога» (1986), «Двоє» (1990). Рекомендована література Узлян А. Косовский орнамент // Україна. 1967. № 16. Google Scholar Internet Спадкоємці народного скарбу // Молодь України. 1968, 16 черв. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 51, "name": "Завадський Василь Григорович", "by": "1863.0", "dy": "1918.0", "status": "excluded_pre_soviet", "reasoning": "Died before 1921 (death_year=1918) — pre-Soviet, outside study scope.", "notes": "(1863, м. Чигирин, нині Черкас. обл. – 1918, там само) – хоровий диригент, композитор, педагог. Навч. в Одес. духов. семінарії. Працював регентом в училищах і Новорос. університеті в Одесі. Водночас...", "url": "https://esu.com.ua/article-14980", "group": "EXCLUDE", "bio": "ЗАВА́ДСЬКИЙ Василь Григорович (1863, м. Чигирин, нині Черкас. обл.&nbsp;— 1918, там само)&nbsp;— хоровий диригент, композитор, педагог. Навч. в Одес. духов. семінарії. Працював регентом в училищах і Новорос. університеті в Одесі. Водночас ставив у навч. закладах дит. опери. Зі спец. трупою гастролював в м. Ананьїв (нині Одес. обл.), Єлисавет­граді (нині Кірово­град), Києві (1901–02), Одесі, Харкові. У репертуарі&nbsp;— опери-казки: «Сирітка», «Червона шапочка», «Снігурочка», «Кіт у чоботях», «Хлопчик-мізинчик» (1903). Створ. З. хор. капела (45 осіб) дебютувала 1904 в Одесі; 1905–15 капела дала бл. 3000 концертів, популяризувала пере­важно рос. і зх.-європ. музику. У репертуарі&nbsp;— твори М. Глінки, О. Бородіна, П. Чайковського, А. Рубінштейна, А. Аренського, О. Варламова, Й. Гайдна, Ш. Ґуно, власні твори, а також обробки рос. і укр. нар. пісень. Гастролі в Росії, Білорусі, країнах Балтії, Серед. Азії. Завантажити статтю"}, {"idx": 52, "name": "Дрекслер Люна-Амалія", "by": "1882.0", "dy": "1933.0", "status": "excluded_galicia_pre_annexation", "reasoning": "Born in Galicia, died 1933 — before 1939 USSR annexation of western Ukraine. Never under Soviet rule.", "notes": "(09. 11. 1882, Львів – 05. 11. 1933, там само) – скульпторка і живописець. Сестра І.-Т. Дрекслера. Навч. у приватній школі М. Гарасимовича у Львові (1899–1903; викл. скульптури А. Попель), у Е.-А. Бурделя в Парижі...", "url": "https://esu.com.ua/article-21731", "group": "EXCLUDE", "bio": "ДРЕ́КСЛЕР Люна-Амалія (09. 11. 1882, Львів&nbsp;— 05. 11. 1933, там само)&nbsp;— скульпторка і живописець. Сестра І.-Т. Дрекслера . Навч. у приватній школі М. Гарасимовича у Львові (1899–1903; викл. скульптури А. Попель), у Е.-А. Бурделя в Парижі (1907–09), Рим. (1909) і Мюнхен. (1910–11) АМ. Працювала у Львові, Німеч­чині, Швейцарії (1913–17), у 1917 повернулася до Львова. Спів­організаторка і чл. Союзу польс. художниць у Львові (1917). Учасниця мистецьких ви­ставок у Львові від 1906 (персон.&nbsp;— 1934, посмертна). Виконала понад 200 скульптур. порт­ретів, побут., алегор., реліг. композицій у тонов. гіпсі, мармурі, камені, бронзі, фаянсі. У ран­ній період творчості використовувала при­йоми ім­пресіонізму, символізму і сецесії (модерну). Синхронізувала пластичні та живописні враже­н­ня, лаконічно й мʼяко моделювала динам. форми, за­стосовувала особливі фактурні ефекти, поліхромію&nbsp;— рожеві, жовті, зелені, чорні тони. Пере­давала динаміку та асиметрію люд. тіла, прагнула під­вищити ступінь вираже­н­ня емоц. сфери людини. Після 1912 цікавилася архаїзацією під впливом Е.-А. Бурделя, захоплювалася окультизмом і філософією Р. Штейнера. Для творів пізнього періоду характерні стилізація готики й ран­нього ренесансу, спроще­н­ня композиції, складність символіки. Створювала олійні порт­рети, краєвиди, офорти й літо­графії. Роботи зберігаються у Львів. галереї мистецтв, музеях Польщі. Додаткові відомості Основні твори «Задума», «Сирітка», «Погруддя дівчини» (усі — 1905), «Турбота (Мати з дитиною)», «Стара француженка», «Маруся» (усі — 1906), «Художниця Е. Модраковська», «Дама у капелюсі (Відпочинок)», «Погруддя молодої жінки» (усі — 1907), «Дівчина у кріслі», «Блакитний хлопець», «Голова дитини», «Думка», «Дівчина з лялькою», «Автопортрет», «Українка», «Сестри» (усі — 1908), «Священик Ю. Бокановський» (1909), «Ф. Шопен», «С. Монюшко», «У ложі (Дама з хутром)», «Маскарон», «Єва», «Брат», «Композитор Л. Ружицький», «Іоланта», «Largo», «Homo sapiens» (усі — 1910), «Психея (Самопізнання)», «Архієпископ Ю. Теодорович», «М. Конопніцька» (проект нагробка на Личаків. цвинтарі), «Маска» (усі — бл. 1910–13); живопис — «Автопортрет» (1906), «Стара жінка» (1917), «Автопортрет у святині» (1923); мемор. таблиця П. Скарги (1912); «Мадонна на троні» (1917), «Мадонна з немовлям» (для каплиці на цвинтарі Орлят у Львові, 1924), «Проповідь Христа» (1923); статуя Мадонни перед костелом у м. Стрий; «Архангел Михаїл», «Введення у таємницю» (усі — 1927), «Св. Георгій» (1929). Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 53, "name": "Вітошинський Модест  Петрович", "by": "1856.0", "dy": "1901.0", "status": "excluded_pre_soviet", "reasoning": "Died before 1921 (death_year=1901) — pre-Soviet, outside study scope.", "notes": "(01. 01. 1856, с. Нижня Вовча, нині Старосамбір. р-ну Львів. обл. – 12. 08. 1901, Київ) – співак (баритон). Закін. консерваторію Галиц. муз. товариства у Львові (1882; кл. В. Висоцького). Артист. діяльність...", "url": "https://esu.com.ua/article-35004", "group": "EXCLUDE", "bio": "ВІТОШИ́НСЬКИЙ Модест Петрович (01. 01. 1856, с. Нижня Вовча, нині Старосамбір. р-ну Львів. обл.&nbsp;— 12. 08. 1901, Київ)&nbsp;— спів­ак (баритон). Закін. консерваторію Галиц. муз. товариства у Львові (1882; кл. В. Висоцького ). Артист. діяльність роз­почав 1880 солістом Львів. чол. хору «Торбан» (під керівництвом А. Вахнянина). 1884–90&nbsp;— соліст хору товариства «Лютня», 1891–92&nbsp;— Львів. «Бояна». 1893–1900 ви­ступав у концерт. ансамблях Києва. У репертуарі&nbsp;— сольні партії з опер «Запорожець за Дунаєм» С. Гулака-Артемовського, «Наталка Полтавка» М. Лисенка, «Купало» А. Вахнянина. Виконував також камерно-вокал. твори А. Вахнянина, О. Нижанківського, Д. Січинського, П. Чайковського. Брав участь у Шевченків. та ін. концертах у Львові та Києві. Рекомендована література М. П. Вітошинський: Некролог // Діло. 1901, 16 верес. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 54, "name": "Левицький Володимир Лукич", "by": "1856.0", "dy": "1938.0", "status": "excluded_galicia_pre_annexation", "reasoning": "Born in Galicia, died 1938 — before 1939 USSR annexation of western Ukraine. Never under Soviet rule.", "notes": "(псевд.: Ва­силь Лукич, Володимир Лукич, Л. Лукич; 02. 09. 1856, с. Белзка, нині Гончарівка Золочів. р-ну Львів. обл. – 06. 10. 1938, м. Вин­ники, нині Львів. міськради) – публіцист, видавець, редактор,...", "url": "https://esu.com.ua/article-53761", "group": "EXCLUDE", "bio": "ЛЕВИ́ЦЬКИЙ Володимир Лукич (псевд.: Ва­силь Лукич, Володимир Лукич, Л. Лукич; 02. 09. 1856, с. Белзка, нині Гончарівка Золочів. р-ну Львів. обл.&nbsp;— 06. 10. 1938, м. Вин­ники, нині Львів. міськради)&nbsp;— публіцист, видавець, редактор, літературо­знавець, культурно-освітній діяч. Дійсний член НТШ (1926). Народився у сімʼї священика. Закін. юрид. факультет Львів. університету (1879). Від 1880 за­ймався нота­ріал. справами у містах Болехові, Стрию, Станіславі (нині Івано-Франківськ) та у Вин­никах (від 1896). Поділяв по­гляди народовців, значну увагу приділяв налагоджен­ню літ. і культур. взаємин Галичини і Над­дні­прян. України, ви­ступав за єдину літ. мову на всіх укр. землях. Ще у студент. роки став актив. чл. гуртка академ. молоді, був чл. редколегії ж. «Друг» (від 1876), брав активну участь у під­готовці альманаху «Дністрянка» за 1877, спів­працював із г. «Правда» за ред. В. Барвінського. 1880 Л. опублікував у «Зорі» істор.-літературозн. роз­­відку про Марусю Чурай, 1881 разом з І. Франком та І. Белеєм упорядкував «Руську антологію», а 1883 у товаристві «Просвіта» за його ред. під­готовлено кн. «Опо­ві­да­н­ня К. Михайлишина», яку конфіскувала прокуратура. 1885 спільно з Ю. Сельським видав довід­ник для селян «Руський правотар домовий», що був написаний «чи­стою народною мо­вою». 1887 під­готував і видав у Стрию літ.-наук. альманах «Ватра», присвяч. памʼяті Т. Шевченка та 25-річчю літ. діяльності Ю. Федьковича. В альманасі опубліковано оповіда­н­ня Панаса Мирного «Лови» та І. Франка «Місія», які свого часу були від­хилені в «Зорі» Г. Це­глинським з причин неморальності змісту, уривок роз­відки М. Драгоманова «З історії віршів на Україні»&nbsp;— праці про важливість для історії укр. літ. духов. віршів в Україні у 17–18 ст., вірш О. Маковея «Дум­ка» та два сонети Уляни Кравчен­ко, поеми С. Ру­данського «Мазе­па», «Павло Полуботок», а також різножанр. твори Ю. Федьковича, Данила Млаки, І. Нечуя-Левицького, О. Барвінського, О. Огоновського, Панаса Мир­ного, Б. Грінченка, П. Куліша, В. Самійленка. Цін­ним дослідж. у наук. частині альманаху є роз­відка Л. про Угор. Русь, де «впер­ше зі­брано силу цікавих і роз­порошених ві­домостей про цю малові­дому і майже забуту частину українського народу». Най­пліднішими у творчості Л. як публіциста були роки редагува­н­ня «Зорі» (1890–96). У цей період він під­тримував тісні наук. та літ. звʼязки з І. Франком, який високо оцінив його творчі можливості, О. Барвінським та ін. Брав активну участь у діяльності товариства «Просвіта» (від 1907&nbsp;— голо­ва вин­ниц. осередку, від 1925&nbsp;— почес. чл.). 1880–85, 1890, 1893, 1916–18 випустив ілюстров. ка­лендарі товариства, до яких готував пе­реробки та пере­клади оповідань, написав низку есеїв про ві­домих письмен­ників. «Просвіта» видала низку ілюстров. літ. збірників Л., зокрема «Рідний зільник» (1891), «Левада» (1892), «Рідна стріха» (1894), «Рокова хвиля» (1917). Серед народозн. дослідж.&nbsp;— роз­відки «Як живе­ться українському народови в Австрії» (Ві­д"}, {"idx": 55, "name": "Валента Олександр Родіонович", "by": "1944.0", "dy": "1997.0", "status": "non_migrated", "reasoning": "Born in Volyn, Ukraine in 1944, trained at Lutsk Art School (1965), worked as methodologist in regional cultural department, died in Lutsk (1997) with no evidence of emigration or forced displacement.", "notes": "(06.  02. 1944, с. Чорніїв Турій. р-ну Волин. обл. – 06. 12. 1997, Луцьк) – живописець. Обл. мист. премія ім. Й. Кондзелевича (1996). Закін. Луцьку художню школу (1965; викл. П. Сензюк). Працював методистом відділу...", "url": "https://esu.com.ua/article-32968", "group": "INCLUDE", "bio": "ВАЛЕ́НТА Олександр Родіонович (06. 02. 1944, с. Чорніїв Турій. р-ну Волин. обл.&nbsp;— 06. 12. 1997, Луцьк)&nbsp;— живописець. Обл. мист. премія ім. Й. Кондзелевича (1996). Закін. Луцьку художню школу (1965; викл. П. Сензюк). Працював методистом від­ділу образотвор. та декор.-ужитк. мистецтва обл. Будинку нар. творчості. Учасник міських, обл. та респ. худож. ви­ставок від 1966. Персон.&nbsp;— у Луцьку (1971, 1995). Пере­осмисливши структуру виражал. мови пуантелізму, наповнив його яскраво-індивідуал., специфічно волин. звуча­н­ням; виробив своєрід. «фольк-оп-арт», по­знач. фольклор. мотивами, декоративністю виріше­н­ня форми, орнаментальністю побудови композиції. Роботи зберігаються у Волин. крає­знав. музеї. Додаткові відомості Основні твори «Дощить» (1964), «В автобусі», «Індустріальний пейзаж», «Пробудження» (усі — 1965), «Натюрморт із кавуном» (1967), «Берізки», «Риба Варнад» (обидва — 1968), «Луцьк. Рожевий сніг» (1969), «Кам’янець-Подільський. Козацькі могили» (кін. 1970-х рр.), «Вечірній Луцьк», «Червоне літо», «Червень» (усі — 1973), «Вечірня вулиця» (1975), «Писанки» (1984), «Грушки» (1985), «Зима», «Весна» (обидва — 1989), «Осінь» (1994). Рекомендована література Каталог виставки творів О. Валенти. Лц., 1971. Google Scholar Internet Навроцька З. Живописець власної уяви // Віче. 1995, 31 берез. Google Scholar Internet Степанюк Ф. Добра душа Олександра Валенти // Нар. справа. 1995, 14 квіт. Google Scholar Internet Мельник В. Світлої пам’яті Олександра Валенти // Феномен. 1998, 21 лют. Google Scholar Internet Навроцька З. В сірому підвалі з тьмяними вікнами його творчість сягнула небувалої висоти // Терен. 2003. № 4. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 56, "name": "Нестайко Всеволод Зиновійович", "by": "1930.0", "dy": "2014.0", "status": "non_migrated", "reasoning": "Born in Berdychiv, died in Kyiv; no evidence of emigration, forced displacement, or work outside Ukrainian SSR.", "notes": "(30. 01. 1930, м. Бердичів, нині Житомирської обл. – 16. 08. 2014, Київ) – прозаїк, драматург. Член НСПУ (1956). Премії ім. О. Копиленка (1980), ім. Лесі Українки (1982), ім. М. Трублаїні (1988). Орден князя Ярослава...", "url": "https://esu.com.ua/article-73735", "group": "INCLUDE", "bio": "НЕСТА́ЙКО Всеволод Зинові­йович (30. 01. 1930, м. Бердичів, нині Житомирської обл.&nbsp;— 16. 08. 2014, Київ)&nbsp;— прозаїк, драматург. Член НСПУ (1956). Премії ім. О. Копиленка (1980), ім. Лесі Українки (1982), ім. М. Трублаїні (1988). Орден князя Ярослава Мудрого 5-го ступ. (2010). Закінчив Київський університет (1952). Від 1951 працював літ. редактором у ж. «Барвінок», видавництві «Молодь», від 1956&nbsp;— завідувач редакції для молодших школярів видавництва «Веселка». Від 1987&nbsp;— на творчій роботі. Від 1996 на Національному радіо України вів про­граму «Радіобайка Всеволода Нестайка». Його вважають класиком сучасної української дитячої літератури. Автор бл. 30-ти книжок оповідань, казок, повістей і пʼєс. Пере­важно вони пригодницькі, веселі, гостросюжетні, проте не лише роз­важальні, а й виховують високі моральні якості&nbsp;— вірність у дружбі, чесність, порядність, мужність, людяність, доброту, любов до рідної землі. Для його творів характерний оптимістичний пафос і гумористичне обі­грава­н­ня імен та антропонімів. Креативність текс­тів як «майстра композиції» (за Л. Овдійчук) зумовлена пригодницькою, авантюр. фабулою, оригінальною композиційною будовою, специфічною наративною (оповід­ною) структурою, а також присутністю фантастичного компонента. Спільною рисою для текс­тів письмен­ника по­стає актуалізація зображуваної ситуації, дихотомність персонопар у системі образів, викори­ста­н­ня при­йому антитези на різних рівнях художності. Активно екс­периментує із художньою мовою, насичує текс­ти тропами&nbsp;— порівня­н­нями, алегоріями, гіперболами, літотами. Послуговується транзитивними міфологічними, фольклорними й казковими архетипами, мотивами та образами, а також інтертекс­туальними при­йомами. Осердя персоно­­сфери текс­тів складають образи активних, сміливих, креативних дітей. Нестайко, який створив т. зв. літературну педагогіку (за В. Костюченком), порушує тему соціалізації дітей у своєму й чужому контекс­ті (родичі, друзі, однокласники). Окремі його текс­ти вміщено до шкільних під­ручників, хрестоматій з української літератури. Дебютував 1954 оповіда­н­ням для дітей у ж. «Барвінок» (хоча своє перше оповіда­н­ня, за спогадами письмен­ника, написав у 8-річному віці), публікувався також у ж. «Піонерія». 1956 у Києві ви­йшла друком перша його книжка «Шурка і Шурко», 2009&nbsp;— оста­н­ня прижит­тєва «Найновіші пригоди Косі Вуханя та Колька Колючки». Найпопулярніший твір&nbsp;— трилогія «Тореадори з Васюківки» («Пригоди Робінзона Кукурузо», 1964; «Не­зна­йомець з 13-ї квартири», 1966; «Таємниця трьох неві­домих», 1970), яку 1979 Між­народною радою з дитячої та юнацької літератури внесено до Особливо почесного списку Г.-К. Андерсена. Книги Нестайка пере­кладені понад 20-ма мовами світу й витримали чимало пере­ви­дань, пʼєси («Марсіанський жених», «Вітька Магел­лан», «Інопланетяни», «Кіностріха діда Гаврила», «Пере­садка серця» та ін.) по­ставлено українською, рос. та вірмен. мовами в багатьох українських театрах, пʼєси-казки («Загадкови"}, {"idx": 57, "name": "Донцов Матвій Олексійович", "by": "1877.0", "dy": "1974.0", "status": "non_migrated", "reasoning": "Born in Zolotonosha, worked in Ukraine throughout life (member of Kiev artists societies 1918-1944), died in Irpin near Kyiv; no evidence of emigration or forced displacement.", "notes": "(14(26). 11. 1877, м. Золотоноша Полтав. губ., нині Черкас. обл. – 24. 06. 1974, м. Ірпінь Київ. обл.) – живописець. Член Товариства київ. художників (1918), Асоц. художників Червоної України (1927–31), СХУ (1944). Навч....", "url": "https://esu.com.ua/article-20909", "group": "INCLUDE", "bio": "ДОНЦО́В Матвій Олексі­йович (14(26). 11. 1877, м. Золотоноша Полтав. губ., нині Черкас. обл.&nbsp;— 24. 06. 1974, м. Ірпінь Київ. обл.)&nbsp;— живописець. Член Товариства київ. художників (1918), Асоц. художників Червоної України (1927–31), СХУ (1944). Навч. у Київ. худож. училищі (1911–13; викл. В. Менк ). У довоєн. період викладав у школах і Полтав. дит. колонії. Створював пейзажі та натюрморти в ім­пресіоністич. стилі. Екс­понував власні твори на ви­ставках у Києві (1918, 1937), Полтаві (1926), Харкові (1927), Москві (1938), на 1-й пере­сув. (Ізюм–Охтирка–Суми–Богодухів, 1928–29), 2-й пере­сув. «Культпохід на Донбас» (Харків, 1930) худож. ви­ставках. Персон.&nbsp;— у Києві (1957, 1962, 1967, 1969, 1970, 1973), Полтаві (1963). Маляр. композиції дагог, громадсько-культурний діяч. Член Спілки українських...", "url": "https://esu.com.ua/article-888310", "group": "INCLUDE", "bio": "СТЕ́ЦІВ Степан Онуфрі­йович (28. 10. 1905, с. Добрівляни, нині Дрогобицького р-ну Львівської обл.&nbsp;— 10. 11. 1964, м. Санкт-Кетеринс, провінція Онтаріо, Канада)&nbsp;— художник, педагог, громадсько-культурний діяч. Член Спілки українських образотворчих мистців у Львові (1942–44), Української спілки образотворчих мистців (1956). Закінчив Королівську академію мистецтв у м. Льєж (Бельгія, 1928), Вищу школу малярства А. Терлецького у Кракові (Польща, 1932), педагогічний курс Варшавського університету (1934). Працював учителем малюва­н­ня в Українській жіночій гімназії сестер василіянок, Українській гімназії імені І. Франка та Польській учительській семінарії в Дрогобичі, гімназії згромадже­н­ня купців у Лодзі (Польща). Член Українського мистецького гуртка «Спокій» (Варшава). У роки 2-ї світової війни пере­бував у Коломиї (нині Івано-Франківська обл.), працював директором Школи деревного промислу, згодом&nbsp;— семикласної школи с. Печеніжин (нині с-ще Коломийського р-ну). Після 2-ї світової війни пере­бував у таборі пере­міщених осіб у м. Ландек (Австрія). Від 1948&nbsp;— у Канаді, де викладав, брав участь у ви­ставках. Працював у галузі станкового, сакрального малярства та скульптури. Тяжів до реалістичного під­ходу трактува­н­ня форми із вжива­н­ням постім­пресіоністичної манери письма. Твори С. зберігаються в приватних колекціях України, Канади та США. Додаткові відомості Основні твори «Заздрість», «Є. Бараниківна» (обидва — 1931), «Гуцульщина» (1937), «Орачі» (1939), «Гуцулочка. Портрет дружини Ольги», «Гуцульське село», «Дівчина у вінку. Портрет дружини Ольги», «Селянка» (усі — 1930-і рр.), «Братова», «Печеніжин», «Директор Кушніревич» (усі — 1941), «Вівці на дорозі» (1942), «Замок у Верфені» (1945), «Біженці» (1946), «Біля піано. Сини Ігор та Орест» (1951), «Під хрестом» (1952), «Мертва природа» (1953), «Буря на морі» (1954), » Ю. Косача, «Я і моя сестра» Д. Берра, Л. Вернеля, «Лукреція» А. Обе, «На полі крові», «Йоган­на&nbsp;— жінка Хусова» Лесі Українки, «Отаман Пісня» М. Чирського, «При­йшов ін­спектор» Дж.-Б. Прістлі, «Неві­домий воїн» П. Рейналя. 1961&nbsp;— сцено­граф Санта Фе Опери (шт. Нью-Мексико); 1962–63, 1966–91&nbsp;— Метрополітен-опери (Нью-Йорк), де оформив оперу «Антоній і Клеопатра» С. Барбера і створив декорації для понад 60 опер. Мист. кер. у фільмах «Таємниці Тихого океану» (1958, реж. Дж. Логан), «Спартак» (1960, реж. С. Кубрик), «Вестсайдська історія» (1961, реж. Р. Вайз, Дж. Роб­бінс), «Клеопатра» (1963, реж. Дж.-Л. Манкевич). Виконав сцено­графію для театрів Амер. балету (Нью-Йорк), Ґранд Кабукі (Японія), Фін. нац. театру (Гельсинкі), декорував павіль­йон Гол­лівуду на світ. ви­ставці у Нью-Йорку (1964–65). Спів­працював 1988–98 зі Студією мист. слова під керівництвом Л. Крушельницької (Нью-Йорк), оформив ви­стави «Ярослав Мудрий» І. Кочерги, «Патетична соната» М. Куліша, «Лісова пісня» Лесі Українки, роз­робив проект сцено­графії до ви­стави «Ревізор» М. Гоголя (1999). У Театрі В. Шашаровського (м. Філадельфія, шт. Пенсильванія) 1989 оформив ви­ставу «Княгиня Ольга» І. Чижа. 1991–94 створив декорації до опер у театрі Нью-Рошелл Опера (Нью-Рошелл). 1993 до 100-річчя Укр. Нар. Союзу виготовив велике панно для сцени Карнеґі-Голлу (Нью-Йорк); 1998 для опер. фестивалю у Харкові здійснив проекти оформле­н­ня опер «Аріадна на Наксосі» Р. Штраус­са і «Богема» Дж. Пуч­чіні. Початк. період творчості у традиц. реаліст. манері, пізніше&nbsp;— у кон­структивно-екс­пресіоніст. та ім­пресіоніст. стилях; ві­домий також як живописец"}, {"idx": 66, "name": "Верейський Георгій Семенович", "by": "1886.0", "dy": "1962.0", "status": "internal_transfer", "reasoning": "Voluntary career-motivated relocation from Ukrainian SSR (Khmelnytsky, studied Kharkiv) to Leningrad within Soviet system; achieved high Soviet honors (People's Artist RSFSR, Stalin Prize) indicating established career in destination.", "notes": "(18(30). 07. 1886, м. Проскурів, нині Хмельницький – 19. 12. 1962, Ленінград, нині С.-Петербург) – графік. Народний художник РРФСР (1962). Дійсний член АМ СРСР (1949). Сталінcька премія (1946). Навч. у Харків....", "url": "https://esu.com.ua/article-33526", "group": "INCLUDE", "bio": "ВЕРЕ́ЙСЬКИЙ Георгій Семенович (18(30). 07. 1886, м. Проскурів, нині Хмельницький&nbsp;— 19. 12. 1962, Ленін­град, нині С.-Петербург)&nbsp;— графік. Народний художник РРФСР (1962). Дійсний член АМ СРСР (1949). Сталінcька премія (1946). Навч. у Харків. університеті та приват. худож. студії Є. Шрейдера (1895, 1900–04), закін. С.-Петербур. університет (1912), навч. у С.-Петербур. новій худож. майстерні у М. Добужинського, Є. Лансере, Б. Кустодієва, А. Остроумової-Лебедєвої (1913–16). Від 1915 брав участь у худож. ви­ставках. 1918–30&nbsp;— керівник від­ділу малюнку та гравюр Держ. ермітажу у С.-Петербурзі. Проф. ВДХУТЕМАСу в Петро­граді (нині С.-Петербург, 1921–23). Основа реаліст. творчості В.&nbsp;— по­глиблене ви­вче­н­ня натури, точність трактува­н­ня форми; порт­ретам властива психол. виразність, глибина роз­кри­т­тя образу. Автор статей з питань мистецтва. Роботи зберігаються в ДТГ (Москва), Київ. музеї рос. мистецтва, Харків. ХМ. Порт­рети В. виконали Б. Кустодієв (1917, 1924), Є. Єгоров (1958). У Хмельницькому 1980 від­крито Худож.-мемор. музей В. Додаткові відомості Основні твори серія графіч. портретів — В. Леніна (1920), Й. Сталіна (1941), М. Калініна (1932), В. Молотова, К. Ворошилова, В. Гіляровського (усі — 1934), рад. льотчиків (бл. 250 робіт, 1932–36), академік Й. Орбелі та Є. Тарле, Героя Рад. Союзу С. Осипова (усі — 1942), Л. Руднєва (1943), Є. Лансера, А. Герасимова, Б. Йогансона (усі — 1944), Н. Морозова (1945); «Вітряк» (1904), «Український пейзаж із вітряком», «Харків. За столом» (обидві — 1928), «Український пейзаж» (1929), «Ромни», «Пасіка», «Пристань човнів у Ромнах» (усі — 1930). Рекомендована література Воронихина Л. Н. Георгий Семенович Верейский: Альбом. Ленинград, 1987. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 67, "name": "Кілессо Сергій Костянтинович", "by": "1931.0", "dy": "2012.0", "status": "non_migrated", "reasoning": "Born in Kyiv 1931, died in Kyiv 2012; career credentials (candidate 1966, academy member 1993) and professional activity documented within Ukrainian SSR; no evidence of emigration, forced displacement, or relocation to another Soviet republic.", "notes": "(28. 03. 1931, Київ – 30. 06. 2012, там само) – архітектор, реставратор і мистецтвознавець. Батько Т. Кілессо-Контан. Канд. архітектури (1966). Дійсний член Укр. академії архітектури (1993). Заслужений...", "url": "https://esu.com.ua/article-6841", "group": "INCLUDE", "bio": "КІЛЕ́С­СО Сергій Костянтинович (28. 03. 1931, Київ&nbsp;— 30. 06. 2012, там само)&nbsp;— архітектор, ре­ставратор і мистецтво­знавець. Батько Т. Кілес­со-Контан . Канд. архітектури (1966). Дійсний член Укр. академії архітектури (1993). Заслужений архітектор України (1994). Державна премія України у галузі архітектури (1997, 2007). Закін. Київський художній ін­ститут (1957; майстерня В. Заболотного ). Працював 1957–2007 у НДІ теорії та історії архітектури і містобудува­н­ня (Київ): 1985–2004&nbsp;— завідувач від­ділу сучас. архітектури і містобудува­н­ня, 2004–07&nbsp;— завідувач від­ділу забудови і рекон­струкції істор. міст. Серед реаліз. проектів&nbsp;— ре­ставрація надбрам. Троїц. церкви та корпусів собор. старців і клірошан Києво-Печер. лаври (1958–65), комплексу Мотронин. монастиря (1964–69), Іллін. церкви-усипальниці Б. Хмельницького в с. Суботів Чигирин. р-ну Черкас. обл. (1977; 1995&nbsp;— іконостас), консервація та від­будова бастіону П. Дорошенка Чигирин. фортеці, від­творе­н­ня на основі креслень А. Захарова Присутствен. місць (нині музей Б. Хмельницького) в Чигирині (1994–96); житл. будинки на вул. Велика Житомирська, № 14 (1968) та на вул. Січових Стрільців, № 70 (1975), каплиця св. Покрови в Чигирині (1995), архіт. частини памʼятників Лесі Українці в Луцьку (1977), Б. Хмельницькому в Суботові (1995). Досліджував памʼятки архітектури України, творчість архітекторів В. Городецького, В. Заболотного, Я. Сокола. Автор низки статей в ЕСУ. Додаткові відомості Основні праці Черкаси: Істор.-архіт. нарис. К., 1966; Керамика в архитектуре Украины. К., 1968; Канів: Істор.-архіт. нарис. К., 1969; Мистецтво будівничих. К., 1971; Киево-Печерская лавра: Памятники арх-ры и искусства. Москва, 1975; Донецк: Истор.-архит. очерк. К., 1982 (співавтор); Архитектура Крыма. К., 1983; Київ архітектурний. К., 1989; Архітектурні і мистецькі скарби Богданового краю. К., 2002; Києво-Печерська лавра. К., 2003; Історія української архітектури. К., 2004 (співавтор). Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 68, "name": "Чернишова Тетяна Миколаївна", "by": "1928.0", "dy": "1993.0", "status": "non_migrated", "reasoning": "Born and died in Kyiv (1928–1993), spending her entire life in Soviet Ukraine with no signals of deportation, emigration, or forced relocation.", "notes": "(08. 01. 1928, Київ — 02. 03. 1993, там само) — літературознавець, мовознавець, перекладачка. Дружина А. Білецького. Кандидат філологічних наук (1958). Золота медаль СП і перекладачів Греції (1987). Працювала...", "url": "https://esu.com.ua/article-883086", "group": "INCLUDE", "bio": "ЧЕРНИШО́ВА Тетяна Миколаївна (08. 01. 1928, Київ&nbsp;— 02. 03. 1993, там само)&nbsp;— літературо­знавець, мово­знавець, пере­кладачка. Дружина А. Білецького . Кандидат філологічних наук (1958). Золота медаль СП і пере­кладачів Греції (1987). Працювала в Київському університеті (1953–83). Авторка праць з ново­грецької діалектології, фольклору греків Надазовʼя, сучасної грецької та кіпрської літератури: «Новогреческий говор сел Приморского (Урзуфа) и Ялты Первомайского ра­йона Донецкой области» (1958), «Грецький фольклор на Україні» (1960), «Тюркські елементи в соціальній сфері лексики грецьких говірок Донеч­чини» (1975; усі&nbsp;— Київ), серії статей про грецьких письмен­ників Й. Сеферіса, Я. Ріцоса, О. Елітіса, К. Варналіса, К. Кавафіса, Н. Казандзакіса, М. Лудеміса, Е. Алексіу, А. Самаракіса та ін. у журналі «Всесвіт», «Шевченківському словнику» (т. 1–3), «Українській літературній енциклопедії» (т. 1–3), «Истории всемирной литературы» (т. 3, 4). Пере­кладачка з ново­грецької мови романів Н. Казандзакіса «Олександр Македонський» (1986), А. Самаракіса «Прорахунок» (1965), «Сигнал небезпеки» (1983; усі&nbsp;— Київ). Популяризувала українську літературу в Греції та на Кіпрі: стат­ті про Т. Шевченка, І. Франка, Лесю Україну в газеті «Augh» («Зоря»), журналі «Nea epoch» («Нова епоха»). Додаткові відомості Основні праці Вибрані праці. К., 2013. Рекомендована література Чайковський В. Золота медаль — Тетяні Чернишовій // Всесвіт. 1992. № 10. Google Scholar Internet Клименко Н. Елліністка з ласки Божої (До 70-річчя з дня народження Т. М. Чернишової) // Зап. істор.-філол. т-ва «А. Білецький». 1999. Вип. 2. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 69, "name": "Гушалевич Євген Іванович", "by": "1864.0", "dy": "1907.0", "status": "excluded_pre_soviet", "reasoning": "Died before 1921 (death_year=1907) — pre-Soviet, outside study scope.", "notes": "(28. 11. 1864, Львів – 29. 05. 1907, м. Кьольн, Німеччина) – співак (драматичний тенор). Син відомого укр. письменника І. Гушалевича. Навч. у Львів. університеті та Віден. консерваторії (1888–91; кл....", "url": "https://esu.com.ua/article-25058", "group": "EXCLUDE", "bio": "ГУШАЛЕ́ВИЧ Євген Іванович (28. 11. 1864, Львів&nbsp;— 29. 05. 1907, м. Кьольн, Німеч­чина)&nbsp;— спів­ак (драматичний тенор). Син ві­домого укр. письмен­ника І. Гушалевича. Навч. у Львів. університеті та Віден. консерваторії (1888–91; кл. Генсбахера). Удосконалював вокал. майстерність у В. Висоцького . Спів­ав в опер. театрах Братислави, Берліна, Брно, Праги, Будапешта, Львова та ін. Ви­ступав також на опер. сценах Польщі та Німеч­чини. Володів рідкісним щодо краси, сили і гнучкості голосом великого діапазону металевого тембру. Мистецтво Г. від­значалося першокласною дикцією, блискучим фразува­н­ням, неабиякою інтонацією та драм. талантом. У репертуарі&nbsp;— українські народні пісні, а також романси М. Лисенка, А. Вахнянина, Д. Січинського та ін. 1901 фірма «Зонофон» (Ві­день) випустила грамплатівки із записами низки арій з опер зарубіж. композиторів (зокрема Р. Ваґнера) у виконан­ні Г. Додаткові відомості Основні партії Манріко, Радамес («Трубадур», «Аїда» Дж. Верді), Каніо («Паяци» Р. Леонкавалло), Турідду («Сільська честь» П. Масканьї), Тангейзер, Лоенґрін, Ерік («Тангейзер», «Лоенґрін», «Летючий голландець» Р. Ваґнера), Рауль, Пророк, Васко да Ґама («Гуґеноти», «Пророк», «Африканка» Дж. Мейєрбера), Арнольд («Вільгельм Телль» Дж. Россіні), Флорестан («Фіделіо» Л. ван Бетговена). Рекомендована література Є. Гушалевич у Відні // Діло. 1890, 18 трав. Google Scholar Internet Оперний співак Євген Гушалевич // Там само. 1894, 2 верес. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 70, "name": "Макаренко Олексій Дмитрович", "by": "1936.0", "dy": "2005.0", "status": "non_migrated", "reasoning": "Born in Brusilov (Zhytomyr region) in 1936, received honors within Ukrainian SSR (Honored Master 1988, All-Ukrainian prize 1995), and died in Zhytomyr in 2005 with no evidence of emigration or forced displacement.", "notes": "(21. 09. 1936, с. Брусилів, нині смт Житомир. обл. – 02. 05. 2005, Житомир) – художник декоративного розпису. Заслужений майстер народної творчості УРСР (1988). Всеукр. премія ім. І. Огієнка (1995). У 1941 фашисти...", "url": "https://esu.com.ua/article-60628", "group": "INCLUDE", "bio": "МАКА́РЕНКО Олексій Дмитрович (21. 09. 1936, с. Брусилів, нині смт Житомир. обл.&nbsp;— 02. 05. 2005, Житомир)&nbsp;— художник декоративного роз­пису. Заслужений майстер народної творчості УРСР (1988). Всеукр. премія ім. І. Огієнка (1995). У 1941 фашисти скинули його на гранітні скелі над р. Тетерів. Унаслідок пере­лому хребта та пʼяти ребер став інвалідом, до паралічу ніг згодом додався туберкульоз. Середню освіту здобув у Житомир. інтернаті, закін. факультет малюнка і живопису Моск. заоч. нар. університету мистецтв (1965). Знач. вплив на творчість М. справило зна­йомство 1972 з художником&nbsp; В. Кобилінським . Працював у Житомирі: художник іграшк. ф-ки, вчитель позаклас. роботи інтернату для дітей-сиріт, викл. малюва­н­ня у школах. Учасник міських, обл., всеукр., зарубіж. мистецьких ви­ставок від 1976. Персон.&nbsp;— у Житомирі (1978), Львові (1980), Ленін­граді (нині С.-Пе­тербург), Смоленську (РФ; обидві&nbsp;— 1983). Продовжуючи традиції нар. декор. роз­писів, М. виробив влас. стиль, на­званий мистецтво­знавцями «пелюстковізм» або «платковізм», в основі якого лежить своєрідне асоціат. спри­йма­н­ня світу. Його квітковий дивосвіт сповнений духом нар. казок і легенд, євангел. сюжетів; роботам притаман­ні вивіреність пропорцій, лаконічні узагальне­н­ня, гармонія. У казк.-алегор. композиціях через зображе­н­ня рослин. мотивів порушував складні філос. про­блеми. Створював картини на теми творів Т. Шевченка, Лесі Українки, І. Огієнка, В. Стуса, Ю. Словацького. Деякі роботи зберігаються у Житомир. краєзн. музеї, Літ.-мемор. музеї Лесі Українки (м. Ново­град-Волинський), Кмитів. музеї образотвор. сучас. мистецтва (Коростишів. р-ну; обидва&nbsp;— Житомир. обл.), Львів. музеї нар. архітектури та побуту, Нац. музеї Т. Шевченка, Нац. центрі нар. культури «Музей І. Гончара», Нац. музеї нар. архітектури та побуту України (усі&nbsp;— Київ). Додаткові відомості Основні твори цикли — «Лісова пісня», «Шевченкіана», «У кожного цвіту обличчя своє», «Портрети-характери», «Україна. Реквієм» (усі — 1980–2000-і рр.), «Знаки Зодіаку» (2005); «Цить, капосне!» (1985), «Сова» (1986), «Давай потанцюємо!», «Чорнобильська Мадонна» (обидва — 1991), «Архангел Михаїл» (1993), «Ангел-флейтист», «Жар-птиця» (обидва — 2003). Рекомендована література Чайковська В., Шевчук А. І усмі­хнулась доля буйнолистом // ОМ. 1991. № 4. Google Scholar Internet Олексій Макаренко: [Некролог] // Там само. 2005. № 3. Google Scholar Internet Шевчук А. Платковізм зоряного неба Олексія Макаренка // Укр. мова й література в серед. школах, г-зіях, ліцеях та колегіумах. 2006. № 2. Google Scholar Internet Олексій Макаренко: Альбом. К., 2006. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 71, "name": "Яремко Михайло Йосипович", "by": "1961.0", "dy": "", "status": "alive", "reasoning": "No death year — presumed alive or date unknown.", "notes": "(05. 09. 1961, с. Церковна Болехівського р-ну Станіславської обл., нині Калуського р-ну Івано-Франківської обл.) — живописець. Заслужений майстер народної творчості України (2016). Член НСМНМУ (1992),...", "url": "https://esu.com.ua/article-888540", "group": "EXCLUDE", "bio": "ЯРЕ́МКО Михайло Йосипович (05. 09. 1961, с. Церковна Болехівського р-ну Станіславської обл., нині Калуського р-ну Івано-Франківської обл.)&nbsp;— живописець. Заслужений майстер народної творчості України (2016). Член НСМНМУ (1992), НСЖУ (2011). Закінчив від­діле­н­ня художнього різьбле­н­ня на дереві Львівського ПТУ № 14 (1980), архітектурний факультет Львівського сільськогосподарського ін­ституту (1985; викладачі С. Соколов , М. Ілку ). Працював за фахом у Тернопільській обл. (1985–90, 1996–2008); інженером Тернопільського ін­ституту «Агро­проєкт» (1991–93); головним архітектором м. Теребовля (Тернопільська обл., 1993–95) та Теребовлянського р-ну (2009–11); приватним під­приємцем (2011–21); від 2021&nbsp;— у Тернопільському центрі народної творчості. Створює роботи в жанрах пейзажу, порт­рета, натюрморту, сюжетної картини, ікони. Учасник мистецьких  Маріуполь Донец. обл.&nbsp;— 11(24). 07. 1910, С.-Пе­тербург)&nbsp;— живописець, пе­дагог. Працював ретушером у фото­графів у Маріуполі, Одесі, 1860–65&nbsp;— у фотостудії С. Ісаковича (м. Таганрог, Росія). 1866 при­їхав до С.-Пе­тербурга, де був ретушером у фотоательє та вільним від­відувачем АМ (1868–72; викл. І. Айвазовський). Пра­цю­вав у ній: від 1892&nbsp;— проф., від 1893&nbsp;— академік, 1894–97&nbsp;— проф.-кер. худож. училища. 1873 від­відав Німеч­чину, Францію, Велику Бри­танію, Швейцарію, Австрію. По­чаток творчості К. спів­пав із нац.-де­мократ. під­несе­н­ням у рос. куль­турі, діяльністю Товариства пере­сув. худож. ви­ставок (у його складі&nbsp;— 1875–79). Зближе­н­ня з художниками І. Крамським, І. Рєпіним , В. Васнецовим ви­значило сусп. і творчу позицію К. Майстер пейзаж. живопису у реаліст. сти­лі. Спочатку пере­важали заг. на­строї суму та без­просвітності, що від­ображало певну соц.-крит. тенденцію, згодом створював пейзажі у неоромант. стилі. Май­стерно пере­давав най­складніші ефекти ден­ного та нічного освітлень; використовуючи гра­дації напів­тонів, досягав повної оптич. ілюзії. «Очищеність» зобра­жуваного від жит­тєво-випадко­вого надає його полотнам ра­ціонально-сконстру­йов., ство­реного, а не побаченого у природі. Зображував ландшафти з висоти пташиного лету; перший план залишав від­критим, створюючи естет. ди­станцію, а осн. мотив&nbsp;— освітлену галявину, хати на горі, річку в місяч. сяйві&nbsp;— на серед. плані. У багатьох полотнах звеличив природу України. 1909 пожертвував Імператор. товариству за­охоче­н­ня художників 11 700 рублів на премії з пейзаж. живопису. З ініціативи К. та на його кошти 1909 у С.-Петер­бур­зі створ. Товариство рос. художників (пере­дав 150 000 рублів і заповів влас. маєток у Криму; згодом&nbsp;— ім. К., діяло до 1937). Серед учнів&nbsp;— К. Богаєвський , М. Реріх , В. Роз­вадовський , Г. Світлицький . У Маріуполі 1984 К. встановлено погру­д­дя, 1999 створ. Між­нар. фонд ім. К. Деякі роботи зберігаються у ДТГ  Сім’я переїхала 1926 на Херсонщину до євр. с.-г. колонії. Закін. у Херсоні...", "url": "https://esu.com.ua/article-11172", "group": "INCLUDE", "bio": "КА́ЦЕВ Арон-Абрам ( ; 28. 12. 1915(10. 01. 1916), с. Чернин Київ. губ., нині Таращан. р-ну Київ. обл.&nbsp;— 05. 12. 2000, Ізраїль)&nbsp;— єврейський поет. Член СП СРСР (1973). Сімʼя пере­їхала 1926 на Херсонщину до євр. с.-г. колонії. Закін. у Херсоні євр. школу (1932), Одес. пед. ін­ститут (1937). Учителював. Викладав євр. та рос. літ-ри у євр. школах Сум., Хмельн. і Херсон. обл. Писав мовою їдиш. Дебютував 1931 віршем у євр. дит. г. « » («Бути напоготові», Харків). Друкував дит. вірші в євр. ви­да­н­нях: « » («Правда»), « » («Жовтеня»), « » («Бути напоготові»), « » («Молода гвардія»), ж. « » («Радянська Батьківщина»). Перша збірка віршів « » («Дитячі пісеньки», К., 1940)&nbsp;— із напут. словом Л. Квітка . Автор зб. лірики « » («Добре слово», 1980; російською мовою&nbsp;— 1983; обидві&nbsp;— Москва). Тематика творчості К.&nbsp;— краса рідної землі, люд. взаємини, нелегке дитинство. Вдало використовував нар. гумор; писав політ. сатиру, байки. Твори К. пере­кладали А. Кацнельсон і М. Братан. Пере­кладав із рос. (зокрема байки І. Крилова) та укр. мов. В остан­ні роки життя від­давав пере­вагу біблій. темам. 1990 ви­їхав до Ізраїлю. Рекомендована література Дегтярьов П. Вулиця поета // ЛУ. 1972, 10 жовт. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 80, "name": "Рихтицький Любомир", "by": "1921.0", "dy": "1983.0", "status": "migrated", "reasoning": "Writer born in Drohobych, Ukrainian SSR (1921) who died in Chicago, USA (1983), indicating substantial emigration to the Western diaspora.", "notes": "(псевдоніми: Степан Любомирський, Степан Емерсон, Микола Хортиця; 21. 06. 1921, м. Дрогобич, нині Львівської обл. — 16. 07. 1983, м. Чикаґо, США) — письменник, художник-графік. Чоловік Д. Рихтицької. Член...", "url": "https://esu.com.ua/article-886279", "group": "INCLUDE", "bio": "РИХТИ́ЦЬКИЙ Любомир (псевдоніми: Степан Любомирський, Степан Емерсон, Микола Хортиця; 21. 06. 1921, м. Дрогобич, нині Львівської обл.&nbsp;— 16. 07. 1983, м. Чикаґо, США)&nbsp;— письмен­ник, художник-графік. Чоловік Д. Рихтицької . Член ОУН, учасник 2-ї світової війни&nbsp;— старшина Першої української дивізії УНА. Автор збірки новел та оповідань про під­пі­л­ля й ОУН «Сон літньої ночі» (Ріміні, 1946), нарисів «Без­страшні. Вітер і дим» (Торонто; Лондон, 1990), повісті «Хай роз­судить меч» (Мехелен, 1948), романів «Жорстокі світанки» (Він­ніпеґ, 1947), «Племʼя вовків» (1951), «Таємний фронт» (1952), «Велика гра», «Між славою і смертю» (усі&nbsp;— Мюнхен), «Доба страхіть» (Він­ніпеґ; усі&nbsp;— 1953), «Прометеїв вогонь» (Лондон, 1977), «Ніколи не забуду» (1984), трилогії «Слідами Заповіту» (1985; обидва&nbsp;— Торонто; Лондон), роману-епопеї «Під молотом війни» (Мюнхен, 1952–56) у 4-х книгах («Гад від­ходить», «Ще одна ніч», «Полумʼяні душі», «Кривавий вир»). Усі прозові твори Р. україноцентричні, спроєктовані на висвітле­н­ня історичної правди, зокрема створе­н­ня УПА, життя України в період 2-ї світової війни. За його сценарієм у Канаді знято кіно­стрічки «Ніколи не забуду» (1969; режисери Б. Паздрій, В. Бачинський), «Заш­уміла Верховина» (1976; режисер О. Ковальський). Упорядкував, зредагував, про­ілюстрував книжку спогадів колишнього вояка Першої Української дивізії УНА Р. Лазурка «На шляхах Європи» (Чикаґо, 1971). Упродовж 1949–83 керував Під­пільною поштою України (Мюнхен—Чикаґо). Неофіційне поштове ві­домство в рамках Закордон­ного поштового від­ділу Закордон­них частин ОУН видало близько 3700 типів українських недержавних поштових марок, конвертів, 470 блоків, бофонів (під­пільних грошей). Над малюнками також працювали М. Черешньовський, З. Гординський, Л. Гуцалюк, Е. Козак, Б. Крюков. Під­пільна пошта виготовляла спеціальні конверти з сюжетами, що від­дзеркалювали протест мирян проти більшовицької дис­кримінації Церкви в Україні. Марки ві­домства, що ним керував Р., наклеювали на листи поряд з державними марками. Листівки пере­давали багато побутових деталей пов­станського життя&nbsp;— одяг, зброю, жит­тєві ситуації; у зміст марок вкладали символ глибокої поваги до християнських цін­ностей, незламність українського духу і боротьби за незалежність України. Під­пільна пошта спрямовувала кошти на під­тримку боротьби в Україні. Рекомендована література Стебельський Б. Вступне слово: [про Любомира Рихтицького] // Любомирський С. Ніколи не забуду: роман. Торонто; Лондон, 1984. Google Scholar Internet Мацько В. Пріоритетні жанрові модуси в діаспорній прозі XX століття // Мацько В. Українська еміграційна проза XX століття. Хм., 2009. Google Scholar Internet Талант, офіруваний Україні: Любомир Рихтицький у дослідженнях і публіцистиці. Дрогобич, 2021. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 81, "name": "Будневич Віктор Георгійович", "by": "1891.0", "dy": "1957.0", "status": "non_migrated", "reasoning": "Born in Poltava region, died in Chernivtsi (both within Ukrainian SSR); no evidence of emigration, forced displacement, or career-based transfer to another Soviet republic.", "notes": "(1891, с. Мечеть Полтав. губ. – 20. 10. 1957, Чернівці) – оперний співак (баритон), режисер. Заслужений артист УРСР (1934). Навч. в Муз.-драм. школі ім. М. Лисенка (1912–14; кл. В. Астаф’євої), закін. Київ....", "url": "https://esu.com.ua/article-36547", "group": "INCLUDE", "bio": "БУДНЕ́ВИЧ Віктор Георгі­йович (1891, с. Мечеть Полтав. губ.&nbsp;— 20. 10. 1957, Чернівці)&nbsp;— оперний спів­ак (баритон), режисер. Заслужений артист УРСР (1934). Навч. в Муз.-драм. школі ім. М. Лисенка (1912–14; кл. В. Астафʼєвої ), закін. Київ. консерваторію (1916; кл. В. Цвєткова ). Соліст Казан. (1917–18), Одес. (1918–20, 1921– 22) та Ростов. (1920–21) опер, 1923–24&nbsp;— Опери С. Зиміна (Москва), 1924–25&nbsp;— Свердлов., 1925–26&nbsp;— Київ., 1922–23 та 1927–51&nbsp;— Харків. театрів опери та балету (від 1940&nbsp;— реж., від 1946&nbsp;— гол. реж.). Худож. кер. Чернів. обл. філармонії (1951– 57). Володів сильним голосом широкого діапазону, спів­ав також басові партії. 1912 на польс. фірмі «Сирена» записав кілька укр. нар. пісень («Без тебе, Олесю», «Ой не шуми, луже», «Ой я нещасний», «Сонце низенько» та ін.). Додаткові відомості Основні партії Остап («Тарас Бульба» М. Лисенка), Тугар Вовк («Золотий обруч» Б. Лятошинського), Ігор («Князь Ігор» О. Бородіна), Сусанін («Життя за царя» М. Глінки), Демон, Віндекс («Демон», «Нерон» А. Рубінштейна), Онєгін, Мазепа («Євгеній Онєгін», «Мазепа» П. Чайковського), Грязной («Царева наречена» М. Римського-Корсакова), Мельник («Русалка» О. Даргомижського), Ескамільо («Кармен» Ж. Бізе), Скарпіа («Тоска» Дж. Пуччіні), Сен-Брі («Гуґеноти» Дж. Мейєрбера), Телль («Вільгельм Телль» Дж. Россіні), Амонасро («Аїда» Дж. Верді). Основні вистави «Наймичка» М. Вериківського (1945), «Кармен» Ж. Бізе (1947), «Казка про царя Салтана» М. Римського-Корсакова (1949), «В бурю» Т. Хрєнникова (1950), «Мазепа», «Пікова дама» П. Чайковського (обидві — 1951). Рекомендована література В. Г. Будневич (Некролог) // Рад. Буковина. 1957, 22 жовт. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 82, "name": "Кошиць Ніна Павлівна", "by": "1894.0", "dy": "1892.0", "status": "excluded_bad_dates", "reasoning": "Died in Santa Ana, California, USA in 1965, indicating emigration from Soviet sphere and substantial settlement in the United States.", "notes": "(справж. – Порай-Кошиць; 18(30). 12. 1894, за ін. даними – 17. 01. 1892, Київ – 14. 05. 1965, м. Санта-Ана, шт. Каліфорнія, США) – співачка (лі­рико-драматичне сопрано), пе­дагог. Дочка П. Кошиця. Закін. Моск....", "url": "https://esu.com.ua/article-1727", "group": "EXCLUDE", "bio": "КО&#769;ШИЦЬ Ніна Павлівна (справж.&nbsp;— Порай-Кошиць; 18(30). 12. 1894, за ін. даними&nbsp;— 17. 01. 1892, Київ&nbsp;— 14. 05. 1965, м. Санта-Ана, шт. Каліфорнія, США)&nbsp;— спів­ачка (лі­рико-драматичне сопрано), пе­дагог. Дочка П. Кошиця . Закін. Моск. консерваторію (1913; кл. вокалу У. Мазет­ті, фортепіано&nbsp;— Н. Шишкіна, К. Ігумнова). Того ж року дебютувала партією Тетяни («Євгеній Онєгін» П. Чайковсько­го) в Опері С. Зиміна (Москва), де спів­ала до 1918. Також ви­ступа­ла у Маріїн. театрі у С.-Пе­тер­бурзі. Брала участь як солістка у премʼєрі кантати С. Танєєва «Піс­ля прочита­н­ня псалма» (1915). Бл. 1914 гастролювала у Казані (Ро­сія), Києві, Баку, Тифлісі (нині Тбі­лісі). 1915–17 ви­ступала із соль­ними камер. концертами (су­про­від С. Рахманінова ) у Петро­граді (нині С.-Пе­тербург), Москві, Киє­ві, Кисловодську (Росія), що мали над­звич. успіх. 1920 виїхала до США, де 1921 вперше ви­ступила у концерті Детройт. оркестру та виконала партію Фата Морґани («Любов до трьох апельсинів» С. Прокофʼєва) у Чиказ. опері. Ви­ступала як солістка з укр. репертуаром у концертах Укр. нац. хору під керівництвом О. Ко­шиця в Америці (1922). Того ж року брала участь у гастрол. ви­с­тавах Приват. рос. опери. Висту­пала на опер. сценах Буенос-Айреса (1924), Парижа («Ґранд-Опера», 1925, 1927), Брюс­селя, Амстердама, Риґи, Вільно (нині Вільнюс), Стокгольма та ін.; з най­кращими симф. оркестрами США&nbsp;— Філадельфій. та Бостонським. 1926 у Нью-Йорку органі­зувала концерти з творів рос. композиторів, де ви­ступала із С. Рахманіновим, О. Глазуновим, О. Гречаніновим , М. Метнером. 1929–30 разом із М. Метнером концертувала у Нью-Йорку й Фі­ладельфії. Володіла сильним, рів­ним, рідкіс. краси й тембру го­ло­сом, вибагливим худож. сма­ком, природ. музикальністю й артис­тизмом. У камер. репертуарі&nbsp;— тво­ри рос. композиторів М. Глін­ки, О. Даргомижського, М. Мусорг­ського, О. Бородіна, М. Ба­лакі­ре­ва, М. Римського-Корсакова, П. Чайковського, С. Рахманінова, С. Прокофʼєва, І. Стравинського, М. Мясковського. Мистецтво К., її артистич. шарм, творчу натуру високо цінували кол ­ставлені пʼєси М. Кропивницького «Дві сімʼї», «Сорочинський ярмарок» і «Суєта». У сценічному репертуарі українська тематика і в подальшому за­ймала помітне місце. Зимовий сезон 1909–10 від­крився ви­ставами трупи Б. Бродерова (70 осіб), виконували популярні українські ви­стави «Запорожець за Дунаєм», «Наталка Полтавка» і її продовже­н­ня «Весі­л­ля Терпелихи з Возним» та ін. Незабаром колектив Б. Бродерова змінила трупа антре­пренера П. Серова. Крім акторської й антре­пренерської діяльності П. за­ймався драматургією. Серед його ві­домих пʼєс&nbsp;— «З-під вінця в труну», «Боговід­ступниця», «Зрада». В Армавірі також працював пред­ставником редакції катеринодарської газети «Новая заря». 1911 П. залишив посаду директора театру і на чолі української трупи здійснив гастрольну по­їздку провінційними містами Росії. У березні і квітні 1915 разом зі своєю трупою він знову ви­ступав у театрі в Армавірі, де були по­ставлені ви­стави: «Ой не ходи Грицю, та й на вечерниці» М. Старицького, «Свата­н­ня на Гончарівці» Г. Квітки-Основʼяненка, «Невольник» М. Кропивницького, «Майська ніч» за М. Гоголем та ін. Про долю П. після більшовицького пере­вороту 1917 ві­домо мало. За по­становою Армавірського ревкому від 26 вересня 1920 і Армавірського виконкому від 2 травня 1922 домоволоді­н­ня П. були муніципалізовані (тобто захоплені). На той час артист пере­бував на гастролях. Остан­ні ві­домості про П. датовані 20 серпня 1925, коли він, пере­буваючи в Барнаулі (РФ) в Літньому театрі колективу українських артистів під керува­н­ням А. Бунчука, надіслав в армавірську комісію з муніципалізації заяву, у якій звертався з проха­н­ням повернути належне йому житло в Армавірі. 30 грудня 1925 від­ділом місцевого господарства Армавірського окружного виконкому була ухвалена по­станова про неможливість поверне­н­ня П. його домоволоді­н­ня. Рекомендована література Ктиторов С. Українські сторінки в історії першого зимового театру на Кубані (Штрихи біографії антрепренера П. В. Прохоровича) // Донец. ві б-ки Флорів. та Покров. монастирів. Член Софій. комісії ВУАН для обслідува­н­ня та охорони Софій. собору (1921), роз­почав опис та взяв на облік його бібліотеку. 1922&nbsp;— в. о. зав. друкарні Києво-Печер. лаври, 1922–25&nbsp;— ст. бібліотекар Всенар. б-ки України&nbsp;— зав. б-ки митрополита Флавіана і фундам. б-ки Києво-Печер. лаври. Організував Музей культів та побуту на тер. Києво-Печер. лаври, куди було пере­дано колекцію Церк.-археол. музею Київ. духов. академії, памʼятки церк. старовини та мистецтв закритих церков Києва та Київщини. Висунув ідею створе­н­ня на тер. Києво-Печер. лаври Музей. м-ка, завдяки чому вдалося врятувати саму лавру та низку цін­них памʼяток від знище­н­ня, 1923–25&nbsp;— його гол. зберігач, хоча офіційно містечко створ. лише 1926. Від 1925&nbsp;— у Ленін­граді: н. с. Музей. фонду та Рос. музею, 1933–61&nbsp;— Ермітажу. Зібрав велику колекцію фото церк. старожитностей. Рекомендована література Щеглов Г. Э. Хранитель. Жизнен­ный путь Федора Михайловича Морозова. Минск, 2012. Google Scholar Internet Чередниченко А. М. Ф. І. Шміт та Ф. М. Морозов: біля витоків Музею культів та побуту на території Києво-Печерської лаври (1920-ті рр.) // Лавр. альм. 2013. Вип. 3. Google Scholar Internet Історія української бібліотечної справи в іменах (кінець ХІХ ст. — 1941 р.): Мат. до біобібліогр. слов. К., 2017. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 91, "name": "Шкуропат Олександр Йосифович", "by": "1964.0", "dy": "2008.0", "status": "non_migrated", "reasoning": "Born in Kazakhstan (likely to Ukrainian deportee/settler family) but died in Odesa region, Ukraine — lived and worked in Ukraine, no emigration signals.", "notes": "(18. 04. 1964, с. Безводне Павлодарської обл., Казахстан, нині зняте з обліку — 17. 11. 2008, с. Фонтанка Лиманського, нині Одеського р-ну Одеської обл.) — живописець, графік, іконописець, різьбяр. Член...", "url": "https://esu.com.ua/article-887218", "group": "INCLUDE", "bio": "ШКУРОПА́Т Олександр Йосифович (18. 04. 1964, с. Без­водне Павлодарської обл., Казах­стан, нині зняте з обліку&nbsp;— 17. 11. 2008, с. Фонтанка Лиманського, нині Одеського р-ну Одеської обл.)&nbsp;— живописець, графік, іконописець, різьбяр. Член молодіжної організації НСХУ (1988). Закінчив Одеське художнє училище (1988; викладач Д. Єгоров ). Працював художником-оформлювачем у с. Шевченкове Одеської обл. (1980–82), спец­школи с. Фонтанка (1982, 1984). Майстер малюнка олівцем. Віртуозно володів акваре­л­лю по-мокрому; створив без­ліч яскравих квіткових композицій у цій техніці. Уміло використовував темперу в роз­крит­ті фольклорних, гумористичних, міських та сільських сюжетів. У живописі надавав пере­вагу прямокутним рівно­сторон­нім полотнам великих роз­мірів і втілював у життя найсміливіші й новаторські для свого часу задуми. Екс­периментував зі світлом, ракурсом, пер­спективою та горизонтом. У своїх картинах художник роз­міщував обʼєкт нібито на окремій декоративній маленькій планеті. Цей під­хід він за­стосовував для концентрації уваги глядача, спонука­н­ня його до філософських роз­думів, посиле­н­ня емоційного впливу на нього головної теми полотна. Автор ікон, різьблених рам для картин. Учасник міських, обласних, всеукраїнських мистецьких ви­ставок від 1986. Персональні&nbsp;— в Одесі (1986, 1991, 1994, 1996–97, 2001–02, 2005, 2024&nbsp;— меморіальна). Деякі твори Ш. зберігаються в Одеському художньому музеї, храмах м. Пів­ден­не (Одеська обл.) та с. Фонтанки, а також у Канаді, США, Німеч­чині, Швейцарії, Австрії, Японії. Про життя і творчість Ш. знято документальні фільми «Олександр Шкуропат. Від­родже­н­ня. (Історія однієї колекції)» (реж. Д. Кон­стантинова, YouTube-канал «Kvitka-day»), «Уникальные люди. Одес­са. Художник Александр Шкуропат» (реж. Ю. Скорик, YouTube-канал «Zootrop_Odessa»), «Ретро­спективная вы­ставка живописи и графики Александра Иосифовича Шкуропата (1964–2008)» та «Эдуард Ратушняк: кураторская экскурсия по вы­ставке Александра Шкуропата “Від­родже­н­ня”» (обидва&nbsp;— реж. В. Богатирьов, YouTube-канал «VladimirBogatyrov»; усі&nbsp;— 2024). Трагічно загинув. Додаткові відомості Основні твори «Спокій» (поч. 1990-х рр.), «Віха народної пам’яті» (1994), «Яблука на сонці. Радісний натюрморт» (1998), «Час багрянця» (1999), «Умиротворення. Рефлексія на античну грецьку легенду про викрадення Європи» (2005), «Чорна риба. Живопис у стилі американського художника Дж. Поллока», триптих «Муки ангелів», «Сум. Двір в очікуванні мешканців» (усі — 2007); цикли — «Одеса та її околиці», «Моя Україна», «Вилківські легенди», «Замки мого дитинства», «Екологічні етюди», «Риб’ячі алегорії», «Персонажі села Рубань», «Викрадення Європи», «Натюрморти на столі». Рекомендована література Кохріхт Ф. Все ще попереду // Прапор комунізму. 1986, 22 черв. Google Scholar Internet Александр Шкуропат. Живопись: Каталог. О., 1993. Google Scholar Internet Ильницкая О. Конец эпохи рыб // Вечерняя Одесса. 1993, 6 фев. Google Scholar Internet Рашковецький М. З пов"}, {"idx": 92, "name": "Катик Арон Ілліч", "by": "1883.0", "dy": "1942.0", "status": "internal_transfer", "reasoning": "Karaim writer and religious figure who relocated from Crimea (Yevpatoriya) to Leningrad within the Soviet Union for professional/religious work; no evidence of forced displacement or settlement outside Soviet sphere.", "notes": "(справж. – Сарибан-Катик; 25. 04(07. 05). 1883, м. Євпаторія, нині АР Крим – 20. 05. 1942, Ленінград, нині С.-Петербург) – караїмський письменник, священик, громадський діяч. Навч. у І. Казаса. Закін....", "url": "https://esu.com.ua/article-11060", "group": "INCLUDE", "bio": "КАТИ́К Арон Ілліч (справж.&nbsp;— Сарибан-Катик; 25. 04(07. 05). 1883, м. Євпаторія, нині АР Крим&nbsp;— 20. 05. 1942, Ленін­град, нині С.-Петербург)&nbsp;— караїмський письмен­ник, священик, громадський діяч. Навч. у І. Казаса . Закін. Олександрів. караїм. училище (м. Євпаторія), Новорос. університет в Одесі (1911). Учителював. 1912–16&nbsp;— ст. газ­зан у Феодосії. Від 1916&nbsp;— ін­спектор і викл. заг. предметів Олександрів. училища. Член Таврій. та Одес. караїм. духов. правлі­н­ня. Редагував ж. «Известия Таврического и Одес­ского караимского духовного правления» (1917–18). На поч. 1920-х рр. пере­їхав до Москви. 1922–28&nbsp;— ст. газ­зан і вчитель караїм. початк. школи. Викладав рос. мову та літературу; працював коректором у видавництвах Товариства колиш. політкаторжан і «Северная Азия». Брав активну участь у житті феодосій., євпаторій. та моск. караїм. громад. Від 1932&nbsp;— у Ленін­граді. Викл. математики, лат. мови юрид. ін­ституту (від 1938); коректор у видавництвах «Молодая гвардия», «Художествен­ная литература». Писав караїм. і рос. мовами. У ж. «Караимская жизнь» 1911 опубл. «Записки мидрашника» та оповіда­н­ня «Учитель». Особливо популярним був жартів. вірш «Султан тота» («Тітонька Султана»). Видав «Песнь евпаторийского пирожника Кара-Мошу» (ж. «Караимская жизнь», 1912, кн. 8–9). У драмі «Кто прав?» (1912, згодом&nbsp;— перекл. караїм.) порушив про­блему батьків та дітей. У пʼєсі «Алышмаган башка калпак йарашмаз» («На не­звичну голову шапка не лізе», 1913) висміяв людей, які прагнуть лише до зовн. європ. манер та одягу. Автор сатир.-гуморист. кн. «Записки жениха» (1913). У комедії «Яддес» (1918) викори­став караїм. прислівʼя, приказки, пісні й танці (по­ставлено в Олександрів. караїм. училищі). Намага­н­ням караїм. учителів впровадити нові європ. способи вихова­н­ня присвячено пʼєсу «Йаны йака эски тон» («Новий комір до старої шуби», 1918). Тяжкі наслідки нерівного шлюбу пред­ставлені у пʼєсі «Мет­танасыз» («Без­при­дан­ниця», 1920). Про­блемі шлюбу присвячено також комедії «Амма да кийув» («Ось так наречений», 1923), «Дынсызнын хакын­дан имансыз келыр» («Від без­божництва приходить невіра», 1924; обидві&nbsp;— Москва). У пʼєсі «Ачлык» («Голод», 1923) зобразив голодне життя караїма-вчителя в Євпаторії. Трагедії молодого караїма, який вирішив взяти за дружину іновірку, присвячено пʼєсу «Донме» («Від­ступник», 1921). Пʼєси «Поезд» (1926), «Бахчи-базырганы» («Торговець фруктами), «Санки-пролетар» («Лже­пролетарій», 1927)&nbsp;— про торгашів під маскою пролетар. походже­н­ня. Автор істор. нарису для юнацтва «Римский цирк» (О., 1909), числен. статей, промов, гуморист. віршів. У рукописах залишилися промова «Поэтические и философские прои­зведения И. И. Казаса как отражение его светлой личности» (1917), повість «Муса Бурма». Видав «Краткий обзор моей литературной деятельности» // ж. «Бизым йол»&nbsp;— «Наш путь» (Сф., 1927). Рекомендована література Арон Ильич Катык — выдающийся писатель и педагог // Вест. караим. общины: Сб. мат. Феодос"}, {"idx": 93, "name": "Млодницький Кароль", "by": "1835.0", "dy": "1900.0", "status": "excluded_pre_soviet", "reasoning": "Died before 1921 (death_year=1900) — pre-Soviet, outside study scope.", "notes": "(27. 09. 1835, с. Дашава, нині смт Стрий. р-ну Львів. обл. – 01. 03. 1900, Львів) – живописець, графік і педагог. Чоловік В. Монне-Млодницької. Навч. у Я.-І. Машковського у Львові, Мюнхен. АМ (1857–59), у Дрездені...", "url": "https://esu.com.ua/article-69533", "group": "EXCLUDE", "bio": "МЛОДНИ́ЦЬКИЙ Кароль (27. 09. 1835, с. Дашава, нині смт Стрий. р-ну Львів. обл.&nbsp;— 01. 03. 1900, Львів)&nbsp;— живописець, графік і педагог. Чоловік В. Монне-Млодницької. Навч. у Я.-І. Машковського у Львові, Мюнхен. АМ (1857–59), у Дрездені (1859–60), Парижі у Л. Коньє (1861–63). Працював у Львові учителем рисунку в гімназії ім. Франца-Йосифа, чол. та жін. учител. семінаріях (1871–92). Спів­засн. (1867) і дир. (1881–83) львів. Товариства приятелів красних мистецтв, засн. і віце-голова львів. Літ.-худож. гуртка, голова Товариства живописців і скульпторів у Львові (від 1893). Разом з Я. Антоневичем-Болозом організував ретро­спективну ви­ставку польс. мистецтва 1764–1886 як частини Галиц. кра­йової ви­ставки 1894. Брав участь у львів. ви­ставках 1868–76, 1879–81, 1884–87, 1894. Його твори екс­понували у Львові 1937 на ви­ставці «Сто років львів. живопису». Писав порт­рети, істор., алегор. і побут. сцени, ілюстрації до літ. творів, краєвиди під впливом романтизму та ран­нього символізму, використовуючи конт­расти світлотіні, насичені кольори. 1876 намалював за­престол. образи Діви Марії та Ісуса Христа для деревʼяної церкви Спаса у м. Миколаїв на Львівщині. Ілюстрував львів. часописи «Strze­cha» (1870–73), «Różowe domino» (1882). Створював рисунки олівцями, крейдою, тушшю, вугі­л­лям. Автор перед­мови до альбому ре­продукцій творів А. Ґрот­тґера «Kredka і paleta» (1887). Деякі роботи зберігаються у Львів. галереї мистецтв, музеях Польщі. Серед учнів&nbsp;— Ю. Зубер, М. Рейзнер, Я. Стика. Додаткові відомості Основні твори графіка — «К. Машковський» (1857), «Автопортрет» (1859), «Закладення наріжного каменя кургану Люблінської унії» (1869), «Дружина» (1871), «Надгробок К. Шайнохи» (1872), «На Гетьманських Валах» (1873), «Г. Родаковський у львівській майстерні» (1875), «Шлюбна пара у Східній Галичині», «Церква у Миколаєві» (обидва — 1876), «Старий єврей» (1878), «Циган-скрипаль» (1886); живопис — «Зліт поета у сфери думки» (1859), «Г. Венявський», «Франц-Йосиф» (обидва — 1860), «Останні хвилі життя М. Мнішек», «В. Дулемба» (обидва — 1867), «Фантастичний краєвид», «Меланхолія та іронія», «Сільська церква» (усі — 1868), «Повернення з маскараду» (1869), «На ринку в Чернівцях» (1871), «Похід у Сибір» (1873), «Євреї та вдова», «Гуцульський скрипаль» (обидва — 1874), «Дружина Ванда і донька Марія» (1875), «Наречена на Галицькій Русі», «Хлопець з околиць Львова» (обидва — 1876), «Автопортрет» (1878), «Твардовський викликає дух Б. Радзивілл» (1879), «Жінка з околиць Стрия» (1880). Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 94, "name": "Чистилін Павло Леонідович", "by": "1929.0", "dy": "1986.0", "status": "internal_transfer", "reasoning": "Voluntarily moved from Kyiv to Crimea for art school (1956) and established his career there as a museum researcher and graphic artist; no evidence of coercion or emigration from Soviet sphere.", "notes": "(11. 03. 1929, Київ — 19. 04. 1986, Сімферополь) — графік. Закінчив Кримське художнє училище (Сімферополь, 1956). Відтоді працював у Сімферополі: науковий співробітник художнього музею (1957—58), на...", "url": "https://esu.com.ua/article-887623", "group": "INCLUDE", "bio": "ЧИСТИ́ЛІН Павло Леонідович (11. 03. 1929, Київ&nbsp;— 19. 04. 1986, Сімферополь)&nbsp;— графік. Закінчив Кримське художнє училище (Сімферополь, 1956). Від­тоді працював у Сімферополі: науковий спів­робітник художнього музею (1957–58), на Кримському художньому комбінаті (1967–86). Створював графічні мініатюрні пейзажі, де основною темою був Крим, його природа, памʼятки архітектури. Учасник обласних мистецьких ви­ставок від 1960. Персональні&nbsp;— у Сімферополі (1985, 1999), Бахчисараї (АР Крим, 2009). Окремі роботи зберігаються у Сімферопольському та Бахчисарайському художніх музеях, Музеї історії міста Сімферополя. Додаткові відомості Основні твори «Бахчисарай» (1960-і рр.), «Сімферополь. Салигир. Біля мосту» (1970), «Бахчисарай. Старе місто» (1978), «Чуфут-Кале. Східна брама», «Тепе-Кермен» (обидва — 1979), «Зимова Ай-Петрі» (1981), «Будинок у глухому куті. Алушта» (1983), «Міський пейзаж», «Стара набережна Салгіру», «Сімферополь. Старий двір» (усі — 1984); серія — «Старий Сімферополь» (1984). Рекомендована література Альбом естампів. Сімферополь 1784–1984. Сф., 1984. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 95, "name": "Лейн Адольф Ілліч", "by": "1925.0", "dy": "1989.0", "status": "non_migrated", "reasoning": "Studied in Feodosia (1936-41), participated in WWII, and died in Simferopol (1989) with no evidence of emigration or forced displacement beyond Soviet borders.", "notes": "(17. 02. 1925, м. Фео­досія, нині АР Крим – 24. 07. 1989, Сімферополь) – графік. Учасник 2-ї світової вій­ни. Навч. у Феодосій. худож. студії при галереї І. Айвазовського (1936–41; викл. М. Барсамов). Створював...", "url": "https://esu.com.ua/article-54098", "group": "INCLUDE", "bio": "ЛЕЙН Адольф Ілліч (17. 02. 1925, м. Фео­досія, нині АР Крим&nbsp;— 24. 07. 1989, Сімферополь)&nbsp;— графік. Учасник 2-ї світової вій­ни. Навч. у Феодосій. худож. студії при галереї І. Айвазовського (1936–41; викл. М. Барсамов ). Створював пере­важно пла­­кати. Додаткові відомості Основні твори «Синам і внукам — мир і слава» (1964), «Мир, нащадки, бережіть!» (1965), «Не забудемо» (1966), «Будь достойний батьків» (1967), «Ти — честь і совість нашої епохи» (1968). Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 96, "name": "Позняков Гаврило Петрович", "by": "1857.0", "dy": "1917.0", "status": "excluded_pre_soviet", "reasoning": "Died before 1921 (death_year=1917) — pre-Soviet, outside study scope.", "notes": "(1857 — 03. 11. 1917, Київ) — архітектор. Закінчив Санкт-Петербурзький інститут цивільних інженерів (1882). Відтоді працював у Товаристві Південно-Західних залізниць; 1883—93 — у будівельному...", "url": "https://esu.com.ua/article-881577", "group": "EXCLUDE", "bio": "ПОЗНЯКО́В Гаврило Петрович (1857&nbsp;— 03. 11. 1917, Київ)&nbsp;— архітектор. Закінчив Санкт-Петербурзький ін­ститут цивільних інженерів (1882). Від­тоді працював у Товаристві Пів­ден­но-Західних залізниць; 1883–93&nbsp;— у будівельному від­ділен­ні Київського губернського правлі­н­ня. Був делегатом 3-го зʼ­їзду російських архітекторів (1900). У 1910-х рр.&nbsp;— староста Володимирського собору. Обирався головою Київського зі­бра­н­ня домо­власників, що впливало на створе­н­ня принципів веде­н­ня міського домобудівництва та формува­н­ня єдиної квартирної плати. У 1890-х рр. заснував у Києві власну проєктувальну фірму. Використовував пере­важно форми неоренесансу та еклектики. Спроєктував і збудував у Києві прибутковий будинок із готелем на вулиці Театральна (нині М. Лисенка), № 1 (1892), комплекс центральних лазень з гідропатичною установкою і житловим будинком на вулиці Мала Житомирська, № 3а, 3/4 (1893–94), комплекс садиби на вулиці Нестерівська (нині І. Франка), № 19 (головний будинок, 1898; нині Міністерство культури і туризму України), № 19б (нині різні установи) та № 19в (нині Державне територіально-галузеве обʼ­єд­на­н­ня «Пів­ден­но-Західна залізниця»; обидва&nbsp;— 1902–03), готель на вулиці Трьохсвятительська, № 13, житловий будинок на вулиці Михайлівська, № 24в (обидва&nbsp;— 1911–12), прибутковий будинок в садибі Олександрівського костелу на вулиці Трьохсвятительська, № 7 (1913–14) та ін. Автор низки публікацій з питань технології будівництва. Рекомендована література Тимофієнко В. Зодчі України кінця 18 — початку 20 століть. К., 1999. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 97, "name": "Перепелиця Ліна Володимирівна", "by": "1971.0", "dy": "", "status": "alive", "reasoning": "No death year — presumed alive or date unknown.", "notes": "(19. 12. 1971, Київ) — скульпторка. Дружина М. Перепелиці. Членкиня НСХУ (2005). Закінчила Республіканську художню школу в Києві (1990). На творчій роботі від 1993. Учасниця міських, всеукраїнських та...", "url": "https://esu.com.ua/article-881219", "group": "EXCLUDE", "bio": "ПЕРЕ­ПЕЛИ́ЦЯ Ліна Володимирівна (19. 12. 1971, Київ)&nbsp;— скульпторка. Дружина М. Пере­пелиці . Членкиня НСХУ (2005). Закінчила Республіканську художню школу в Києві (1990). На творчій роботі від 1993. Учасниця міських, всеукраїнських та між­народних мистецьких ви­ставок від 1994. Персональна&nbsp;— у Києві (2011). Для творів П. характерна реалістична манера; з метою під­кресле­н­ня та роз­кри­т­тя образів екс­периментує з форми. Роботи вирізняються філософським і психологічним під­текс­том. Основна тематика&nbsp;— релігійна й міфологічна. Разом з чоловіком працювала над створе­н­ням памʼятників та декоративних композицій в Києві та Україні. До
