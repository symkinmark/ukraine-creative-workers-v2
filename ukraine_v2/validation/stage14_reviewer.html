ва&nbsp;— 02. 12. 1986, Ужгород, похований в Києві)&nbsp;— актор, режисер, сценарист. Народний артист УРСР (1960). Сталінська премія (1950). Член СКін УРСР (1958). Державні нагороди СРСР. На­вчався на акторському від­ділен­ні Київського театрального ін­ституту (1937–41). Від 1938 під­тримував тісні звʼязки з О. Довженком , вони неодноразово зу­стрічалися, листувалися. На естраді ви­ступав від 1940 разом із Ю. Березіним . 1941–45&nbsp;— учасник фронтового ансамблю. 1945–86&nbsp;— артист естради. За сумісництвом 1948–49 і 1953–54&nbsp;— артист «Мосфільму»; 1953–58&nbsp;— артист і режисер Київської кіностудії художніх фільмів. Знімався в кіно від 1939: «Гомони, містечко» (1939, сурмач), «Центр нападу» (1946, кореспондент), «Паді­н­ня Берліну» (1949, Зайченко), «Далеко від Москви» (1950, теле­графіст), «Веселі зірки» (1954), «Доля Марини» (фотокореспондент), «Зірки на крилах» (старшина Клочко; обидва&nbsp;— 1955), «Калиновий гай» (1956, Кандиба), «Година несподіваних подорожей», «Двадцять з гаком», «Добрий день, Києве!», «Поема про море» (1958), «Зелений фургон» (1959, Грищенко), «Легке життя» (1964), «Від і до» (1976) тощо. Т. був автором і спів­автором сценаріїв власних фільмів, знятих у спів­авторстві з Ю. Березіним: «Тарапунька і Штепсель під хмарами» (1954), «Пригоди з піджаком Тарапуньки» (1955), «Штепсель одружує Тарапуньку» (1957), «Їхали ми, їхали» (1962), «Поїдемо нав­простець» (1962), «Смеханічні пригоди Штепселя і Тарапуньки» (1971), «Від і до» (1976), «Хвилюйтесь, будь ласка» (1980), «Моя хата з краю» (1986). Рекомендована література Безручко О. Тимошенко Юрій (Георгій) Трохимович // Безручко О. В. Невідомий Довженко. К., 2008. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 63, "name": "Фуклев Микола Петрович", "birth_year": "1905.0", "death_year": "1938.0", "migration_status": "deported", "reasoning": "Fuklev was arrested by Soviet authorities on 10 February 1938 and sentenced to death by shooting on 28 October 1938 on charges of counter-revolutionary activity. He died in Kharkiv on 4 November 1938. This constitutes forced displacement through state persecution and execution by Soviet authorities, meeting the criteria for DEPORTED classification. He was later rehabilitated in 1956, confirming th", "article_url": "https://esu.com.ua/article-888288", "bio": "ФУ́КЛЕВ Микола Петрович (19. 12, за іншими даними&nbsp;— 10. 05. 1905, с. Преслав Бердянського пов. Таврійської губ., нині Бердянського р-ну Запорізької обл.&nbsp;— 04. 11. 1938, Харків)&nbsp;— прозаїк, пере­кладач, журналіст. З походже­н­ня болгарин. Член ВУСПП (1930). Після закінче­н­ня філологічного факультету Харківського ІНО (1927) працював секретарем болгарськомовної газети «Колективист» у Коларівському р-ні Дні­пропетровської (згодом Запорізької) обл.; 1932–35&nbsp;— від­повід­альний секретар благоївської ра­йон­ної газети «Ком­мунар» в Одеській обл.; 1935–38&nbsp;— літературний редактор харківської газети «Колективист» та, за сумісництвом, консультант зі словʼянських питань, писемності та літератури у Харківському методичному кабінеті Наркомосу України. Керівник болгарської секції Харківського правлі­н­ня СПУ (1936–38); учасник методичних нарад щодо виробле­н­ня рекомендацій ви­вче­н­ня словʼянських, зокрема болгарської, мов. 1934 під­тримав від­кри­т­тя першого в СРСР державного болгарського драматичного театру в Одесі та брав активну участь у його діяльності. Автор роману «На позлатената земя» (1934), що зробив Ф. популярним в Україні, числен­них публіцистичних нарисів, оповідань болгарською та російською мовами. У доробку&nbsp;— стат­ті «Шевченко і Христо Ботев», «Добролюбов у болгарській літературі» тощо; пере­клади українською та російською мовами творів болгарських письмен­ників Х. Ботева і Л. Каравелова, болгарською мовою&nbsp;— Т. Шевченка та А. Міцкевича тощо. 1927–30 за його редакцією у «Вестнике академии литературы СССР» публікували болгарські приказки й прислівʼя. Приятелював із українськими письмен­никами П. Тичиною, М. Рильським, В. Сосюрою, П. Панчем та ін., а також болгарськими письмен­никами-політ­емі­грантами та педагогами (І. Колев, К. Стойков, Р. Кандева, Марко Марков, П. Аджаров, К. Кюлявков, Генчо Кристев та ін.). Багато ви­ступав перед жителями болгарських сіл із нотатками про творчість радянських письмен­ників, зокрема українських класиків Панаса Мирного, І. Франка, Лесі Українки, В. Стефаника. Заарештований 10 лютого 1938, за звинуваче­н­ням у «діяльності контр­революційного Болгарського націоналістичного центру на чолі з С. Міцевим» 28 жовтня того ж року засуджений до роз­стрілу. Реабілітований 1956. Рекомендована література Станчев М. Г. «Дело 13-ти» (о процессе 1937–1938 гг. над так называемой «Болгарской контрреволюционной националистической организацией в Украине») // Дриновський збірник. 2013. Т. 6. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 64, "name": "Цуканова Марія Михайлівна", "birth_year": "1905.0", "death_year": "1998.0", "migration_status": "migrated", "reasoning": "Марія Цуканова voluntarily emigrated from Soviet territory, first fleeing to Germany in 1944 (where she was in displaced persons camps), then emigrating to Argentina in 1949, and finally settling in the United States in 1961 where she died. This represents permanent voluntary settlement outside Soviet/post-Soviet borders, not forced displacement.", "article_url": "https://esu.com.ua/article-886302", "bio": "ЦУКА́НОВА Марія Михайлівна (дівоче&nbsp;— Скоромна; 20. 10. 1905, Харків, за іншими даними&nbsp;— м. Ялта, нині АР Крим&nbsp;— 28. 09. 1998, Вашинґтон)&nbsp;— письмен­ниця. Мати М. Благовіріва . Закінчила Харківський ін­ститут музичної культури (1926). Ви­ступала з концертами в театрах і робітничих клубах, працювала піаністкою в естрадному бюро (1935–41). Перше оповіда­н­ня «Ковзани» на­друкувала в журналі «Службовик» (1930), цього ж року ви­йшла повість «Святий хутір». 1943 пере­їхала до Львова, 1944&nbsp;— до Німеч­чини, пере­бувала в таборах для пере­міщених осіб. 1949 емігрувала до Арґентини, 1961 пере­їхала до сина у США. Твори друкувала в часописах «Наші дні», «До­зві­л­ля», «Український засів», «Українські вісті», «Наше життя». Авторка збірок оповідань «Шовкова рукавичка» (1946), «Бузковий цвіт» (1951), повістей «Їхня таємниця» (1943), «На грані двох світів» (1949–50), незавершеного роману «Проба» (1947), пʼєс «Проліски» (1944), «Слава», «Завтра знову зійде сонце» (1968), мемуарів «Мої спогади» (1993). У романах Ц. простежується синтез мистецтв, крізь призму якого спри­ймається світ. Живописні, графічні та музичні лінії під­силюють моделюва­н­ня внутрішнього та зовнішнього образу персонажів. У «малій» прозі літературні герої шукають і проходять власний шлях подола­н­ня самотності, ненависті до ворогів саме через моральне очище­н­ня, творчість, сповід­ува­н­ня християнських цін­ностей. При­значе­н­ня і місце жінки в су­спільному житті, традиційне та феміністичне баче­н­ня самореалізації українок поза межами батьківщини створено в оповідан­ні «Сторінка одного життя». Листувалася з В. Вин­ниченком, Г. Костюком, Д. Гумен­ною, Л. Бурачинською та ін. Додаткові відомості Основні твори Їхня таємниця. К., 1992. Рекомендована література Л. Б. (Лідія Бурачинська). Нові видання // Наше життя. 1953. № 9. Google Scholar Internet Онацький Є. Марія Цуканова — зворушлива людяність // Цуканова М. Їхня таємниця. Буенос-Айрес, 1991. Google Scholar Internet Гавриш І. Марія Цуканова: штрихи до портрета: (До 100-річчя з дня народж. письменниці) // Зб. Харків. істор.о-філол. т-ва. 2005. № 647. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 65, "name": "Шопінський Василь Мартинович", "birth_year": "1887.0", "death_year": "1967.0", "migration_status": "migrated", "reasoning": "Vasyl Shopinskyy voluntarily emigrated to the USA in 1908 and settled permanently there, dying in New York in 1967. There is no evidence of forced displacement by Soviet authorities; his emigration was a deliberate choice made before the Soviet period, and he maintained literary activity in Ukrainian diaspora communities throughout his life.", "article_url": "https://esu.com.ua/article-886768", "bio": "ШОПІ́НСЬКИЙ Василь Мартинович (інші псевдоніми: Шило, Тремп; справжнє&nbsp;— Жоночин; 22. 07. 1887, с. Терешівці Летичівського пов. Подільської губ., нині Хмельницького р-ну Хмельницької обл.&nbsp;— 26. 08. 1967, м. Нью-Йорк, США)&nbsp;— письмен­ник, громадський діяч. 1908 емігрував до США. Працював робітником на під­приємствах. 1917 роз­почав літературну діяльність публікаціями поезій в українській американській пресі, згодом працював в жанрах прози та драматургії. Спів­працював з радянською періодикою («Червоний шлях», «Плужанин», «Молодняк»). У 20-х рр. Ш. належав до філії письмен­ницької організації «Гарт». Автор пʼєси «Самопалка» (Нью-Йорк, 1921), новели «Фабрична неволя» (1925), пʼєс «Жебрацька Америка» (обидві&nbsp;— Х., 1930), «Bred Lain» (1929), «Малий Тарас» (1930), «Змова пінкертонівців» (усі&nbsp;— Нью-Йорк, 1931). Пере­клав з російської працю О. Голубкова «Науковий і утопічний соціалізм» (Нью-Йорк: Ви­да­н­ня української федерації американської соціалістичної партії, 1919). У пʼєсі «Самопалка» художніми засобами роз­крито революційні події в Україні. Вірші і проза пере­важно присвячена робітничій тематиці, автор пере­ймається важкою долею простих американців, українських емі­грантів, засуджує визискувачів. У поезії «Фабричному братові» поет закликає трудящих здобути щастя в класовій боротьбі. Схилявся до соціалістичного способу життя, рівноправності роботодавців і робітників. Був членом соціалістичної партії США. Додаткові відомості Основні твори Умер поет: пам’яті Івана Франка // Свобода. 1917, 2 січ.; Праці раб; Фабричному братові: Поезії // Укр. щоденні вісті. 1920, 9 жовт.; Білий порошок: Нарис // Червоний шлях. 1924. № 1–2; Shop is my home (Магазин — мій дім): з американського робітничого життя // Там само. № 4–5; В лісі // Там само. 1927. № 6; Бурлака з Колорадо // Там само. 1930. № 7–8; Пеони // Молодняк. 1930. № 9; На жнивах // Плужанин. 1926. № 4–5; Там, де проливається піт // Там само. 1927. № 3; Маленька робітниця // Жовтень. 1959. № 8. Рекомендована література Мацько В. Василь Шопінський // Радянське Поділля. 1987, 14 серп. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 66, "name": "Юрченко Валентина Тимофіївна", "birth_year": "1910.0", "death_year": "2001.0", "migration_status": "migrated", "reasoning": "Valentyna Yurchenko voluntarily emigrated to the USA in 1950, settling permanently in North Port, Florida, where she died in 2001. She had fled Ukraine during WWII to Germany (as a displaced person, not forcibly deported by Soviet authorities) and subsequently chose to emigrate to America rather than return to Soviet Ukraine, establishing a permanent life abroad as a poet and writer in the Ukraini", "article_url": "https://esu.com.ua/article-886088", "bio": "Ю́РЧЕНКО Валентина Тимофіївна (дівоче&nbsp;— Святенко; 19. 09. 1910, м. Кременчук, нині Полтавської обл.&nbsp;— 22. 09. 2001, м. Норт-Порт, шт. Флорида, США, похована у м-ку Бавнд Брук, шт. Нью-Джерсі, США)&nbsp;— поетеса. Закінчила Харківський планово-економічний ін­ститут. Під час 2-ї світової війни виїхала із сімʼєю до Німеч­чини, де пере­бувала в таборах для пере­міщених осіб. 1950 емігрувала до США. Була членом редакційної колегії журналу «Крилаті». Авторка збірок для дітей «Веселі цвіркуни», «Вечірні етюди» (Торонто, 1996), автобіо­графічної повісті «Очі материнські» (1976). Тематика творчості: рідна природа, доля українців на еміграції, майбутнє на рідній землі. Спів­працювала з часописами «Веселка», «Нові дні», «Віра», «Наш світ», «Свобода». Творчості Г. Кирпи присвятила ста­т­тю «Жінка у від­роджен­ні української духовності» («Наше життя», 1998). Рекомендована література Паньків Г. Сумна вістка з Норт-Порту // Свобода. 2001, 26 жовт. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 67, "name": "Ауслендер Роза", "birth_year": "1901.0", "death_year": "1988.0", "migration_status": "migrated", "reasoning": "Ausländer voluntarily emigrated from Chernivtsi to the USA in 1921 and settled permanently outside Soviet borders, working and publishing there for a decade. Although she returned to Chernivtsi in 1931 and endured the Holocaust in the ghetto, she again voluntarily emigrated to the USA after WWII (1945) and subsequently relocated to Düsseldorf, West Germany in 1965, where she remained until her dea", "article_url": "https://esu.com.ua/article-44635", "bio": "АУСЛЕ́НДЕР Роза (Ausländer Rose, справж.&nbsp;— Rosalie Beatrice Scherzer; 11. 05. 1901, Чернівці&nbsp;— 03. 01. 1988, Дюс­сельдорф, ФРН)&nbsp;— німецькомовна поетеса єврейського походже­н­ня. Народилася в сімʼї ав­стрій. чиновника. Навч. у ліцеї, у 1919–20 студіювала філософію в Чернів. університеті. 1921 разом зі своїм другом І. Ауслендером емігрувала до США, де працювала банків. службовцем, спів­працювала в німецькомов. ви­да­н­нях («Westlicher Herold Kalender», «America Herold») і опублікувала свої перші вірші. 1931 повернулася в Чернівці. Протягом 30-х рр. за­ймалася журналіст. діяльністю, давала приватні уроки англ. мови, на­друкувала низку віршів у буковин. газетах і журналах («Czernowitzer Morgenhblatt», «Der Tag», «Klingsor»). 1939 у Чернівцях ви­йшла перша зб. віршів «Der Regenbogen» («Веселка»), витримана в дусі неоромантизму. Під час 2-ї світової війни пере­ховувалася в чернів. гетто (цикл віршів «Мотиви гетто»). У повоєн. час емігрувала до США (Нью-Йорк), де працювала секр. в одній з торг. фірм і писала вірші лише англ. мовою. У 1957, подорожуючи Європою, зу­стрічалася в Парижі з П. Целаном, якого знала ще з воєн. років у Чернівцях. Під його впливом знову почала писати нім. мовою, кардинально змінила стилістику і поет. форму своїх віршів, від­мовилась від класич. строфіки і звернулась до верлібру та асоціатив. техніки. Цими рисами по­значена кн. поетеси «Blinder Sommer» («Незряче літо», 1965), яка зʼявилася після 25-річної пере­рви у Відні. Того ж 1965 поетеса залишає США і пере­селяється до Дюс­сельдорфа, де мешкає в пансіоні ім. Неллі Закс, що належить євр. общині (остан­ні 10 р.&nbsp;— паралізована і прикута до ліжка). На­ступні книги утвердили високу поетичну репутацію А. і вивели її в когорту провід. пред­ставників повоєн. нім. лірики: «36 Gerechte» («36 праведників», Гамбурґ, 1967); «Inventar» («Інвентар», Дуйсбурґ, 1972); «Ohne Visum» («Без візи», Крефельд, 1974); «Andere Zeichen» («Інші знаки», Дюс­сельдорф, 1975); «Noch ist Raum» («Є ще про­стір», Дуйсбурґ), «Gesammelte Gedichte» («Зі­брані поезії», Леверкузен; обидві&nbsp;— 1976). Найбільша творча активність поетеси припадає на остан­ні 10 р. життя. А. видала понад пів­тора десятка книг: «Doppelspiel» («По­двійна гра», Кельн, 1977); «Aschensommer» («Попелясте літо», Мюнхен, 1978); «Mutterland» («Материзна»); «Es bleibt noch viel zu sagen» («Ще треба багато сказати»; обидві&nbsp;— Кельн, 1978); «Ein Stück weiter» («Трохи вперед», Кельн, 1979); «Einverständnis» («Згода», Пфафенвейлер, 1980); «Mein Atem heißt jetzt» («Мій подих значить нині»), «Im Atemhaus wohnen» («Жити в оселі подиху», обидві&nbsp;— Франкфурт-на-Майні, 1981); «Einen Drachen reiten» («Осідлати дракона», Пфафенвейлер, 1981); «Mein Venedig versinkt nicht» («Моя Венеція не тоне», Франкфурт- на-Майні); «Südlich wartet ein wärmeres Land» («На пів­дні чекає тепліша земля», Пфафенвейлер; обидві&nbsp;— 1982); «So sicher atmet nur Tod» («Так упевнено дихає тільки смерть», Пфафенвейлер, 1983); «Ich zähl die Sterne meiner Worte» («Я лічу зорі своїх слів», Франкфурт-на-Майні, 1985); «Ich spiele noch» («Я ще граю»); «Der Traum hat offene Augen» («Сон має роз­плющені очі»; обидві&nbsp;— Франкфурт-на-Майні, 1987). А. удостоєна числен. літ. премій (А. Дросте-Гюльсгофф, 1967; Іди Демель, 1977; А. Гріфіуса, 1977; літ. премій Бавар. АМ, 1984 та ін.). Темат. спектр поезії А. охоплює космос, критику дійсності, пейзажі, речі, людей, на­строї, мову. Мотив утрати мови, зневаженої нацистами, багатократно варіюється у її віршах і дає змогу прослідкувати еволюцію поет. самосві­домості. В умовах гетто «квітучі слова зівʼяли», образна палітра повоєн. поезій стає дедалі стриманішою, барвистість тропів по­ступається тверезим, зваженим структурам з філос. під­текс­том. Однак «зорі» її ран­ніх чернів. поезій не зникають остаточно, вони ви­ступають пізніше в нових констеляціях. Лейтмотив Буковини як парадигма втраченої вітчизни присутній у багатьох віршах поетеси («Батько», «Садагурський хасид», «Чернівці І-ІІ», «Papey», «Кимполунґ у снігу», «Прут», «Буковина І-ІV», «Заповіт» та ін.). Чимало поезій присвяч. буковин. літераторам та митцям (Е. Штейнберґу, І. Манґеру, А. Марґул-Шперберу, Д. Ґольдфельду, П. Целану, Б. Редеру тощо). У деяких віршах зу­стрічаються укр. мотиви («Село на Буковині»). 1998 у Чернівцях П. Рихло пере­клав українською мовою і видав з паралел. текс­тами книгу вибр. поезій А. «Phönixzeit» («Час фенікса»). Додаткові відомості Основні твори Gesammelte Werke in 8 Bänden. Frankfurt am Main, 1977–90; Werke in 16 Bänden. Frankfurt am Main, 1991– 95; укр. перекл. — Вірші // Буковин. віче. 1991, 31 січ.; Спогади про одне місто // «Ї»: Незалеж. культурол. часопис (Львів). 1997. № 9. Рекомендована література Rose Ausländer. Materialien zu Leben und Werk. Frankfutr am Main, 1991. Google Scholar Internet Worte stark wie der Atem der Erde: Beiträge zu Leben und Werk der jüdischen Dichterin Rose Ausländer. Trier, 1994. Google Scholar Internet C. Helfrich. «Es ist ein Aschensommer in der Welt». Rose"}, {"idx": 68, "name": "Бердичевський Миха-Йосеф", "birth_year": "1865.0", "death_year": "1921.0", "migration_status": "excluded_pre_soviet", "reasoning": "Berdichevski died in 1921, before the establishment of the Soviet Union (December 1922). While he was born in Ukraine and had significant literary activity, he died in Berlin before the Soviet period began, making him outside the scope of a study focused on Soviet-era migration patterns.", "article_url": "https://esu.com.ua/article-39174", "bio": "БЕРДИЧЕ́ВСЬКИЙ Миха-Йосеф ( ; псевд. Миха-Йосеф Бін-Ґоріон&nbsp;— ; 19. 08. 1865, с-ще Меджибіж Поділ. губ., нині смт Летичів. р-ну Хмельн. обл.&nbsp;— 18. 11. 1921, Берлін)&nbsp;— єврейський прозаїк, публіцист. Отримав традиц. євр. реліг. вихова­н­ня, але в ран­ньому віці захопився письмен­никами Гаскали (Просвітництва). Навч. у Бреслав. університеті (Німеч­чина, нині Вроцлав, Польща; від 1890). Від 1892 жив у Берліні, працював стоматологом. Збирав та обробляв євр. нар. легенди; низку оригінал. досліджень та есе присвятив юдаїзму і християнству. Автор понад 150-ти оповідань мовою іврит, низки новел на ідиші та кількох творів нім. мовою. Осн. теми творчості&nbsp;— життя євр. містечок Сх. Європи в остан­ні десятиріч­чя 19 ст. та життя студентів-євреїв у містах Центр. і Зх. Європи. Б.&nbsp;— один із най­яскравіших пред­ставників нової іврит. літ-ри. В його творах втілене по­двійне ставле­н­ня до традиц. юдаїзму та європ. культури. Б. ви­ступав проти традиц. євр. реліг. вихова­н­ня, пропагував необхідність засвоє­н­ня євр. культурою заг.-люд. цін­ностей, закликав подолати прірву між приписами юдаїзму та живим жи­т­тям. Водночас знаходив у євр. нар. творчості, Біблії, хасидизмі і фольклорі євр. містечка невичерп. потік жит­тєвих сил та велич морал. під­валин. Автор збірок публіцист. статей, повістей («Два табори», 1899) та « » («Нісенітниця», 1900), кн. « » («З близького минулого», 1909; усі&nbsp;— Варшава), зб. легенд « » («Із скарбів Аґади», Берлін, 1913–14, т. 1–2), зб. есе « » («На полі літератури», 1921), зб. оповідань («Поза блідістю», 1922–23; обидві&nbsp;— Ляйпциґ), а також філос. студій щодо взаємозвʼязків між етикою та естетикою. Ви­дано повне зі­бра­н­ня творів Б. у 20-ти т. (Берлін, 1921–25), зб. («Ідиш-твори від далекого родича», Берлін, 1924) та « » («З джерела Ізраїлю», у 5-ти т., Тель-Авів, 1939–45). Рекомендована література S. Werses. M. J. Berdiczewski as a Yiddish writer // Micha Josef Bin-Gorion [Berdiczewski]. Yiddish works of a distant relative. Jerusalem, 1981. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 69, "name": "Галич Олександр Аркадійович", "birth_year": "1918.0", "death_year": "1977.0", "migration_status": "migrated", "reasoning": "Oleksandr Halych was a Soviet Ukrainian creative worker (dramatist, poet, songwriter) born in Dnipropetrovsk in 1918. He was expelled from Soviet creative unions in the late 1960s for his politically dissident songs criticizing the Soviet regime. In 1974, he voluntarily emigrated to Norway, then moved to Munich (1975) and permanently settled in Paris (1976), where he died in 1977. This constitutes", "article_url": "https://esu.com.ua/article-28388", "bio": "ГА́ЛИЧ Олександр Аркаді­йович (Галич Александр Аркадьевич; справж.&nbsp;— Гинзбург; Ґінзбурґ; 19. 10. 1918, Дні­пропетровськ&nbsp;— 15. 12. 1977, Париж)&nbsp;— російський драматург, поет. Член СП СРСР (1955–71, поновлено 1988), СКін СРСР (1958–72, поновлено 1988). Навч. у Літ. ін­ституті в Москві (1935– 36); Оперно-драм. студії К. Станіславського (1935–38). У 1940 пере­вівся до Моск. театр. студії (викл. В. Плучек, О. Арбузов). Під час 2-ї світової війни Г.&nbsp;— один із засн. і акторів Комсомол. фронт. театру (Москва). Дебютував 1932 як поет, проте ви­зна­н­ня принесла по­становка ви­стави «Міста на світанку» (1941). Створив низку пʼєс: «Вас вызывает Таймыр» (1948; у спів­авт. з К. Ісаєвим), «Пути, которые мы выбираем» (ін. назва&nbsp;— «Под счастливой звездой», 1954), «Походный Марш» (ін. назва&nbsp;— «За час до рас­света», 1957), «Пароход зовут “Орленок”» (1958) та ін. За сценаріями Г. знято фільми: «Вірні друзі» (у спів­авт.; 1954, реж. М. Калатозов, «Мосфільм»), «На семи вітрах» (1962, реж. С. Ростоцький, Кіностудія ім. М. Горького), «Дайте книгу скарг» (1965, реж. Е. Рязанов, «Мосфільм»), «Третя молодість» (1965, реж. Ж. Древіль, «Ленфільм» та «Фільм-Альянс», Франція), «Та, що біжить по хвилях» (1967, реж. П. Любимов, Центр. студія дит. і юнац. фільмів ім. М. Горького та Софій. кіностудія худож. фільмів). На­прикінці 60-х рр. ві­домий як автор і виконавець пісень-новел «Ми не гірші за Горація», «Нічний дозір», «Червоний трикутник», «Промовч», «Памʼяті Пастернака», «Петербурзький романс» та ін., тематика яких&nbsp;— протест проти рад. режиму, памʼять і від­повід­альність за минуле, пафос&nbsp;— злободен­ність та чітка політ. скерованість. За це був виключений з обох спілок. Автор повісті-сповіді «Генеральная репетиция» (1973). У 1974 вимушено емігрував до Норвегії, де записав диск «Крик шепоту» (1974), працював на радіо «Свобода». 1975&nbsp;— у Мюнхені, 1976 пере­їхав до Парижа, де за його сценарієм знято д/ф «Біженці ХХ столі­т­тя» (1976). Трагічно загинув. 1988 у Москві знято д/ф «Олександр Галич. Ви­гна­н­ня» (реж. І. Пастернак, кіностудія «Фора-Фільм»). Додаткові відомості Основні твори Поколение обреченных. Франкфурт-на-Майне, 1972; Когда я вернусь. Франкфурт-на-Майне, 1981; Избранные стихотворения. Москва, 1989. Рекомендована література Я выбираю свободу. Москва, 1991. Google Scholar Internet Заклинание добра и зла. Александр Галич: [Сб. воспоминаний]. Москва, 1992. Google Scholar Internet Фризман Л. «С чем рифмуется слово истина...»: О поэзии А. Галича. С.-Петербург, 1992. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 70, "name": "Ґінцберг Ашер-Гірш", "birth_year": "1856.0", "death_year": "1927.0", "migration_status": "migrated", "reasoning": "Ґінцберг (Achad Ha'am) was born in Ukraine in 1856 and initially lived in Odesa from 1884, but voluntarily emigrated to settle permanently outside Soviet borders — moving to London in 1907 and then to Palestine in 1922, where he died in Tel Aviv in 1927. This represents voluntary emigration and permanent settlement outside Soviet/post-Soviet territory.", "article_url": "https://esu.com.ua/article-25633", "bio": "ҐІ́НЦБЕРҐ Ашер-Гірш (גינצברג אשר-הירש; псевд.&nbsp;— Ахад-га-Ам; אחר העם ; 18. 08. 1856, містечко Сквира, нині місто Київ. обл.&nbsp;— 02. 01. 1927, Тель-Авів)&nbsp;— єврейський письмен­ник-публіцист, філософ. Отримав традиц. євр. освіту, само­стійно ви­вчав філософію, іноз. мови. 1882–84 слухав лекції в університетах Відня, Берліна, Вроцлава (Польща). Від 1884 мешкав в Одесі, де став прихильником палестинофіл. руху. У ви­ступах і ста­т­тях доводив необхідність тривалої вихов. роботи серед євреїв задля під­вище­н­ня нац. сві­домості майбутніх пере­селенців, котрі від­роджуватимуть Палестину. Від­відавши Палестину 1891 і 1893, ви­ступив з гострим крит. оглядом екон., соц. і духов. життя євр. поселень країни. Від 1896 очолював видавництво «Ахіасаф» і ред. ж. «השילוח» («Га-Шілоах», Одеса). Ґ. вважав, що нац. література повин­на бути присвяч. лише пита­н­ням від­родже­н­ня євр. культури і духов. суті єврейства. Після 1-го Сіоніст. кон­гресу (1897) Ґ., вказуючи на від­чуженість лідерів Т. Герцля і М. Нордау від духов. цін­ностей євр. культури і традиції, під­дав різкій критиці теор. й прагмат. аспекти їхньої концепції політ. сіонізму. Від­тоді Ґ. очолив напрям, який отримав назву «духов. сіонізм»: духовні цін­ності, створювані в духов. центрі єврейства, на який пере­творять країну предків ті, хто поселиться в ній, живитимуть весь євр. народ у діаспорі і зберігатимуть його єд­ність у країнах роз­сія­н­ня. Від 1903 Ґ. за­ймався тільки літ.-публіцист. діяльністю. 1907 пере­їхав до Лондона, 1922 оселився у Палестині. По­гляди Ґ. значно вплинули на сіонізм усіх напрямів, а його творчість ві­діграла вагому роль у роз­витку євр. думки, у становлен­ні сучас. літ-ри івритом, була одним із вирішал. чин­ників від­родже­н­ня євр. нац. культури та від­новле­н­ня євр. державності. Рекомендована література על פרשת דרכי ם. 4 כ ר’. אדעססא, תרנ\" ה-תרע\"ג (На роздоріжжі. В 4 т. О., 1895–1913); התורה והעבודה: (לזכר מלאת 10 שנים למות הד\"ר פינסקר). ברלין, תרס\"ד.(Тора та праця: до 10-ї річниці смерті д-ра Пінскера. Берлін, 1904); שלטון השכל,: (לזכר הרמב\"ם). תרס\"ה קרקו ב, (Влада розуму: на пам’ять про Рамбама. Краків, 1905); געקליבענע שריפטען. אדעס, תרע\"ט (Вибрані твори. О., 1919); מאמרים. ירושלם, תרפ\"ז (Статті. Єрусалим, 1927); נבחרים מאמרים ואגדות . תל-אביב, תרפ\"ז (Вибрані статті. Тель-Авів, 1927); פרקי זכרונות ואגרות. תל-איב, תרצ\"א (Глави спогадів та сказань. Тель-Авів, 1931); כל כתבי אחד העם. תל-אבי ב, תשי\" ד (Всі твори Ахад-га-Ама. Тель-Авів, 1954). Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 71, "name": "Ґрінберґ Урі-Цві", "birth_year": "1896.0", "death_year": "1981.0", "migration_status": "migrated", "reasoning": "Ґрінберґ was born in Ukraine (Білий Камінь, Золочів district) in 1896 and initially lived in Lviv and Warsaw. However, in 1924 he permanently relocated to Palestine, where he settled for the remainder of his life until his death in Tel Aviv in 1981. This constitutes voluntary emigration and permanent settlement outside Soviet/post-Soviet borders, with no evidence of forced displacement.", "article_url": "https://esu.com.ua/article-25805", "bio": "ҐРІ́НБЕРҐ Урі-Цві (גרינברג אורי-צבי; псевд.&nbsp;— Тур-Малка; 22. 09. 1896, містечко Білий Камінь, нині Золочів. р-ну Львів. обл.&nbsp;— 08. 05. 1981, Тель-Авів)&nbsp;— єврейський поет і публіцист. Син цадика. Отримав традиц. євр. освіту. 1912 вірші Ґ. мовою ідиш опубл. у г. «דער יידישער ארבעטער» («Єврейський робітник», Львів), на івриті&nbsp;— у ж. «השילוח» («Га-Шілоах», Одеса). 1915 мобілізов. до австр. армії, брав участь у боях у Чорногорії; 1917 втік із фронту і повернувся до Львова. Зб. віршів Ґ. «אין צייטנס רויש» («В кипін­ні часів», Л., 1919; роз­ширена ред.&nbsp;— під на­звою «קריג אויף דער ערד»&nbsp;— «На землі війна», Варшава, 1923) став одним із перших в літературі мовою ідиш худож. від­гуком на події війни. Від 1920 у Варшаві Ґ. при­єд­нався до поетів-екс­пресіоністів, спільно з П. Маркішем і М. Равичем утворив літ. групу «Халястра» («Ватага»). 1922 заснував мовою ідиш ж. «סָארטאבלא» («Альбатрос»), вид. якого після заборони у Польщі 1923 продовжив у Берліні (№ 3–4); зокрема на­друкував у ньому поему «אין מלכות פון צלם» («У царстві хреста»), в якій перед­бачав війну та голокост. 1924 пере­їхав до Палестини, де від­тоді писав виключно івритом, а з заснува­н­ням г. «דבר» («Слово», 1925) став її по­стій. спів­робітником. Ви­ступав з різкою критикою теорії «мистецтва для мистецтва», закликаючи до актив. включе­н­ня поезії у боротьбу за під­йом нац. духу і свободу євр. народу. 1931–36 у Варшаві Ґ. видавав тижневик «די וועלט» («Світ»), а від 1938 до закінче­н­ня війни редагував г. «דער מאמענט» («Момент»). Після проголоше­н­ня держави Ізраїль Ґ. став депутатом Кнесету 1-го склика­н­ня (1949–51) від партії «Херут». 2-томне зібр. творів Ґ. мовою ідиш («שריפטן יידישע») ви­йшло 1979 в Єрусалимі. Від­знач. премією ім. Х.-Н. Бялика (1947), Державною премією Ізраїлю (1957). Рекомендована література Антологія єврейської поезії: Укр. перекл. з їдишу. К., 2007. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 72, "name": "Долинов Анатолій Іванович", "birth_year": "1869.0", "death_year": "1945.0", "migration_status": "migrated", "reasoning": "Долинов was a Russian actor who had an active career in Russian Imperial theatres (St. Petersburg's Alexandrinsky Theatre 1897-1918, theatres in Odesa and Kyiv). The biography explicitly states \"Від 1923 — за кордоном\" (From 1923 — abroad), indicating he voluntarily emigrated after the Soviet period began, working in Berlin and Paris. This represents permanent settlement outside Soviet borders fol", "article_url": "https://esu.com.ua/article-20609", "bio": "ДО́ЛИНОВ Анатолій Іванович (Долинов Анатолий Иванович; справж.&nbsp;— Котляр; 1869–1945)&nbsp;— російський актор, режисер, педагог. Сценічну діяльність роз­почав 1885. До 1897 грав у провід. рос. театрах України, зокрема у Харкові, Одесі, Києві (1888–93 у театрі «Соловцов»). 1897–1918 (з пере­рвою)&nbsp;— актор і реж. Александрин. театру (С.-Петербург). 1902–06&nbsp;— антре­пренер у театрах Одеси; 1906–07&nbsp;— в Одес. міському театрі, де водночас очолював драм. курси. Мав амплуа комедій. коханців (Молчалін у ви­ставі «Горе з ро­зуму» О. Грибоєдова), грав ролі простаків і фатів. 1908–13&nbsp;— викладач С.-Петербур. театр. училища. Пере­клав російською мовою окремі пʼєси нім. драматургів. Автор навч. посібників з худож. чита­н­ня та декламації. Від 1923&nbsp;— за кордоном. У Берліні працював у театрі «Синій птах», 1923 заснував кабаре «Золотий пів­ник», після його закри­т­тя пере­їхав до Парижа. Завантажити статтю"}, {"idx": 73, "name": "Єлагін Іван", "birth_year": "1918.0", "death_year": "1987.0", "migration_status": "migrated", "reasoning": "Ivan Yelahin voluntarily left Soviet Ukraine in 1943 with his wife, spent time in a displaced persons camp in Germany (1943-1950), and then permanently settled in the United States from 1950 onwards, where he lived until his death in 1987. This represents voluntary emigration and permanent settlement outside Soviet/post-Soviet borders.", "article_url": "https://esu.com.ua/article-17603", "bio": "ЄЛА́ГІН Іван (Елагин Иван; справж.&nbsp;— Матвєєв Іван Венедиктович; Матвеев Иван Венедиктович; 01. 12. 1918, м. Владивосток, Росія&nbsp;— 08. 02. 1987, м. Пiт­тсбурґ, шт. Пенсильванія, США)&nbsp;— російський поет. Навч. у Київ. мед. ін­ститутi (до 1941). У 1943 разом із дружиною О. Анстей ви­їхав з Києва, пере­бував у таборі для пере­мiщ. осiб Шлесгайм (побл. Мюнхена, Німеч­чина). Від 1950&nbsp;— у США. Здобув ступ. д-ра в Нью-Йорк. університеті (1969), читав лекції з російської мови та літ-ри у Пiт­тсбур. університеті. Об­стоював принципи поет. класики. Його вірші сповнені мотивами самотності, тривож. роз­думами про сенс буття, про за­грозу, яку несе людству тех. цивілізація, по­збавлена духов. орієнтирів. Помiтне мiсце у творчостi Є. посiдає й укр. тема: поема «Память» (ж. «Грани», 1980, № 116), цикл віршів, присвяч. окупованому Києву. Додаткові відомості Основні твори По дороге оттуда. Мюнхен, 1947; Нью-Йорк, 1953; Отсветы ночные. Нью-Йорк, 1963; Косой полет. Нью-Йорк, 1967; Дракон на крыше. Роквиль, 1973; Под созвездием Топора. Франкфурт-на-Майне, 1976; В зале Вселенной. Анн-Арбор, 1982; Тяжелые звезды. Анн-Арбор, 1986; Курган. Франкфурт-на-Майне, 1987; Собрание сочинений: В 2 т. Москва, 1998. Рекомендована література Титова Л. Мне казалось, мы будем жить на свете вечно...: (Из неопубликованных воспоминаний об Иване Елагине). К., 1995. Google Scholar Internet Синкевич В. «Вы повстречаете меня, читатели-наследники…» // Новый журн. 2008. № 252. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 74, "name": "Кауфман Бел", "birth_year": "1911.0", "death_year": "1922.0", "migration_status": "excluded_bad_dates", "reasoning": "The death year of 1922 is impossible — the biography clearly states the person moved to the USA \"from 1922\" and subsequently published works in the 1930s-1940s, attended college in 1934-1936, and lived until at least 2004 when memoirs were published. The dates are chronologically contradictory.", "article_url": "https://esu.com.ua/article-11117", "bio": "КА́УФМАН Бел (Kaufman Bell; справж.&nbsp;— Койфман Белла Михайлівна; 10. 05. 1911, Берлін)&nbsp;— американська письмен­ниця, журналістка. Онука Шолом-Алейхема . У дитинстві жила в Одесі, від 1922&nbsp;— у США. Закін. Гантер-коледж (Нью-Йорк, 1934), Колумбій. університет (1936, голова від­діл. мови їдиш при ньому). Учителювала. Володіє англ., рос., нім. та франц. мовами. Дебютувала 1921 поемою «Весна» в одес. ж. «Колокольчики». У США від кін. 1930-х рр. публікувала коротку прозу, у 1940-х рр.&nbsp;— роз­повіді і скетчі у ж. «Esquire». У сатир. автобіогр. романі «Up the Down Staircase» («Угору сходами, що ведуть униз», опубл. у г. «Saturday Review», 1962, 17 november; окремо&nbsp;— Нью-Йорк, 1965; заг. наклад пере­ви­дань&nbsp;— 7 млн прим.; у рос. перекл. К. Іванової та С. Шайкевич вміщено у ж. «Иностран­ная литература», 1967, № 6; екранізовано 1967, реж. Р. Мал­ліган, у гол. ролі&nbsp;— С. Ден­ніс; 1969 написала однойм. пʼєсу) у жанрі «роману в листах» від­творила мас­штабну картину буднів тогочас. амер. школи, гостро висміяла властиві їй прояви бюрократизму, формалізму, від­чуженість шкіл. керівництва від учнів. про­блем. Ці ж риси знач. мірою притаман­ні роману «Love. Etc» («Коха­н­ня й таке інше», Нью-Джерсі, 1979). Авторка зб. «Abroad in America» («В Америці за кордоном», 1976) та повісті «Sunday in the Park» («У неділю в парку», 1985). Від 1991 неодноразово від­відувала Україну. Видала спогади «Odessa Memories» («Одеські мемуари», О., 2004, спів­авт.). Активно пропагує творчість свого діда, організовуючи щорічні «Шолом-Алейхемівські чита­н­ня». К.&nbsp;— чл. ради директорів, її чоловік С. Ґлак&nbsp;— президент «Фонду Шолом-Алейхема» (Нью-Йорк), під егідою якого проводять фестивалі, присвяч. памʼяті видат. євр. письмен­ника (2005&nbsp;— у Києві, згодом&nbsp;— у Парижі, Празі). Рекомендована література Кауфман Бел: «Все, что написано и снято про школу, это — повторение “Вверх по лестнице, ведущей вниз”»: [Интервью с А. Орлянской] // OpenSpace. 2011, 11 jan. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 75, "name": "Кон Нафтоле-Герц", "birth_year": "1910.0", "death_year": "1971.0", "migration_status": "migrated", "reasoning": "Kon Naftole-Hertz voluntarily emigrated to Israel in 1965 and settled there permanently until his death in Jerusalem in 1971. While he experienced forced displacement (arrests in 1937 and 1948 as a Soviet prisoner), his final migration to Israel was voluntary and represents his permanent settlement outside Soviet borders, which takes precedence in the classification hierarchy as his ultimate migra", "article_url": "https://esu.com.ua/article-4645", "bio": "КОН Нафтоле-Герц (נאפטאָלע-הערץ קאָן; справж.&nbsp;— Шерф Яків Давидович; 1910, м. Сторожинець, нині Чер­нів. обл.&nbsp;— 04. 07. 1971, м. Єруса­лим, Ізраїль)&nbsp;— єврейський поет. Член СПУ (1934). Через рев. діяль­ність змушений 1929 емігрувати до Польщі, де заарешт., а 1932 за обміном висланий до СРСР. Жив у Харкові. 1937 заарешт. і за­судж. за звинуваче­н­ням у шпигунстві, 1941 звільн. У Москві публікувався в г. «אײניקײַט» («Єд­на­н­ня»)&nbsp;— органі Євр. антифашист. комітету. 1948 знову заарешт. і за звинуваче­н­ням у націоналіз­мі засудж. до 25-ти р. таборів. 1956 реабіліт. 1959 ви­їхав до Польщі, де заарешт. знову. Від 1965&nbsp;— в Ізраїлі. Дебютував 1929 у г. «טשערנאוויעער בלעטער» («Чернівецькі листки»). У Єрусалимі 1966 ви­йшли його спогади «פארשריבן אין זיקאָרן» («Записано в памʼяті»). Додаткові відомості Основні твори укр. перекл. — Демонстрація в тюрмі // ЧШ. 1935. № 5. Завантажити статтю"}, {"idx": 76, "name": "Корн Рахіль", "birth_year": "1898.0", "death_year": "1982.0", "migration_status": "migrated", "reasoning": "Rakhil Korn was born in Galicia (then Austria-Hungary) in 1898 and lived in various locations including Vienna, Przemysl, Kyiv, Moscow, and Łódź during the Soviet period. Crucially, in 1948 she voluntarily emigrated to Canada, where she settled permanently in Montreal until her death in 1982. There is no evidence of forced displacement by Soviet authorities; her movements during WWII (evacuation t", "article_url": "https://esu.com.ua/article-3704", "bio": "КОРН Рахіль (Рахель) ( ; справж.&nbsp;— Герінґ Рохл; 15. 06. 1898, с. Під­ліски, Галичина&nbsp;— 09. 09. 1982, м. Монреаль, провінція Квебек, Канада)&nbsp;— єврейська письмен­ниця. Член СП СРСР (1941), Між­нар. ПЕН-клубу (1946). Отримала домашню освіту. Під час 1-ї світової війни мешкала у Від­­ні, 1918–41&nbsp;— у м. Пере­мишль (нині Під­карпат. воєводство, Польща), під час 2-ї світової вій­ни&nbsp;— у Києві, на евакуації в Узбе­ки­стані, від 1944&nbsp;— у Мос­кві, від 1946&nbsp;— у м. Лодзь (Поль­ща). 1948 емігрувала до Ка­нади. Публікувалася від 1918 польс. мовою у сіоніст. г. «Novy Dziennik» та соціаліст. ж. «Glos Przemyski», від 1919&nbsp;— мовою їдиш (дебютувала поемою в г. « » у Львові). Перші зб. поезій « » («Село», Вільно, 1928), « » («Чер­воний мак», 1937) та оповідань « » («Земля», 1936; обидві&nbsp;— Варшава) сповнені яскравими пейзажами, драм. протиріч­чями сільс. життя та любов. лірикою, просякнуті ідиліч. ясністю по­гляду на природу рідної Галичини. Авторка зб. поезій « » («Дім і без­домність», Буенос-Айрес, 1948), « » («Доля», 1949), « » («Девʼять оповідань», 1957; оби­дві&nbsp;— Монреаль), « » («З іншого боку поезії», 1962), « » («Милість світу», 1968), « » («Вістря миті», 1972), « » («Змінена дійсність», 1977; усі&nbsp;— Тель-Авів). У Києві незадовго до оку­пації ви­йшла зб. віршів « » («Лідер»). В еміграції гол. мотивами творчості К. стали туга за батьківщиною, увічне­н­ня памʼя­ті про загиблих на війні. В ос­тан­ні роки життя звер­нулася до символізму. Добірка віршів К. у перекл. укр. мо­вою В. Богуслав­ської уві­йшла до «Антології єврейської поезії» (К., 2007). Завантажити статтю"}, {"idx": 77, "name": "Кушніров Арон", "birth_year": "1890.0", "death_year": "1949.0", "migration_status": "internal_transfer", "reasoning": "Kushnirov was born in Boyarka (near Kyiv) in 1890 and moved to Moscow in 1922, where he remained active as a writer, editor, and translator until his death in Moscow in 1949. There is no evidence of forced displacement (deportation, arrest, Gulag) — his relocation to Moscow appears to have been voluntary as part of his literary career within the Soviet Union. Since he moved within Soviet borders a", "article_url": "https://esu.com.ua/article-52581", "bio": "КУШНІ́РОВ Арон ( справж.&nbsp;— Кушнірович Арон Давидович; 07. 01. 1890, с. Боярка, нині міс­­то Києво-Святошин. р-ну Київ. обл.&nbsp;— 07. 09. 1949, Москва)&nbsp;— єврейський поет. Учасник 1-ї і 2-ї світ. воєн, воєн. дій 1918–20 і громадян. війни в Іспанії 1936–39. Здобув традиц. євр. освіту. Писав мовою їдиш. Дебютував 1920 у г. («Комуніст», Харків). Перша його зб. («Стіни», К., 1921) пройнята рев. пафосом. Від 1922&nbsp;— у Москві. У ж. («Потік») опубл. цикл віршів про євр. погроми в Україні («Поминальна», 1922). Один із засн. євр. секції Рос. асоц. пролетар. письмен­ників (1925), у альманасі якої («Октябер», 1925, вип. 1) опублікував оповіда­н­ня («Діти єдиного народу»; окремі вид.&nbsp;— Москва, 1928; Х.; К., 1932), утверджуючи ідеї нац. братерства. Темі будівництва нового життя присвяч. зб. («Броді­н­ня», Мінськ, 1928), цикл вір­­шів («Поїзд», 1930). Драма у віршах («Гірш Лек­керт», К., 1929; Х., 1930, російською мовою пере­клав Е. Багрицький)&nbsp;— про рев. боротьбу робітн. класу. У повоєн. період К. був ред. г. («Єд­на­н­ня»), альманаху («Ра­­дянська батьківщина», 1947–48, 7 вип.). Подіям 2-ї світової вій­­ни присвяч. зб. («Бать­­ко-командир», Москва, 1948). Пере­клав мовою їдиш «Слово о полку Ігоревім», низку поезій Т. Шевченка, Лесі Українки, О. Пушкіна, М. Лермонтова, М. Горького, М. Некрасова, «Сперанцу» Б. Пільняка, окремі твори В. Шек­спіра, «Овече дже­­рело» Лопе де Веґи та ін. Добірка віршів К. у перекл. українською мовою В. Богуславської опубл. в «Анто­­логії єврейської поезії» (К., 2007). Посмертно ви­йшла зб. («Улюблені вірші», Тель-Авів, 1975). Додаткові відомості Основні твори укр. перекл. — Мертвий сопух. Х., 1930; Х.; К., 1931; Тверда земля. Х., 1930. Завантажити статтю"}, {"idx": 78, "name": "Лефлер Чарльз-Мартін", "birth_year": "1861.0", "death_year": "1935.0", "migration_status": "migrated", "reasoning": "Charles Martin Loeffler was born in Berlin in 1861 and spent his childhood in Ukraine (Smila, Cherkasy region), Hungary, and Switzerland. He voluntarily emigrated to the United States in 1881, where he established a permanent career as a violinist and composer, debuting that same year and serving as concertmaster of the Boston Symphony Orchestra (1882-1903). He died in Medfield, Massachusetts in 1", "article_url": "https://esu.com.ua/article-54491", "bio": "ЛЕ́ФЛЕР Чарльз-Мартін (Loeffler Char­les Martin; псевд.&nbsp;— Торнов; Tornow; 30. 01. 1861, округ Шенеберґ, нині у межах Берліна&nbsp;— 19. 05. 1935, м. Медфілд, шт. Мас­сачусетс, США)&nbsp;— американський композитор, скрипаль. Дитинство провів в Україні (м-ко Сміла, нині місто Черкас. обл.), Угорщині й Швейцарії. Навч. у Берліні у Й. Йоахима (скрипка) та в Парижі у Е. Ґіро (композиція). Грав в орке­страх Франції, Швейцарії, США. Від 1881 мешкав у США, де того самого року дебю­тував як скрипаль, виконавши з орке­стром сюїту «Українські бабусі». 1882–1903&nbsp;— 2-й концерт­мейстер Бостон. симф. оркестру. Від 1903 за­ймався ком­по­зицією, частково педагогікою. Більшість творів про­грамна, засн. на літ. творчості і написана у формі концерт. пʼєс для солюючого інструмента (або голосу) з орке­стром. Написав сюїту для скрипки «Українські вечори» (за М. Гоголем, 1891), симф. поему «Спогади дитинства» (за мотивами укр. нар. пісень для оркестру, 1924). У деяких творах від­чутний вплив франц. ім­пресіонізму. Автор праці «Скрипкові етюди для роз­витку лівої руки» (1936). Рукописи 2-х опер та низка неопубл. творів зберігаються в Б-ці Кон­гресу. Рекомендована література P. Rosenfeld. An hour with Ame­rican music. Philadelphia, 1929. Google Scholar Internet G. Chase. America’s music. New York; Toronto; Lon­­don, 1955. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 79, "name": "Кримський Андрій Іванович", "birth_year": "1905.0", "death_year": "1942.0", "migration_status": "deported", "reasoning": "Andrii Krymskyy was arrested on September 12, 1937 by Soviet authorities on charges of counter-revolutionary agitation, sentenced to 10 years imprisonment on November 20, 1937, and forcibly relocated to labor camps in the Russian Far East (Dalekoskhidni tabory), where he died in 1942. This constitutes forced displacement by NKVD authorities during the Great Terror, fitting the definition of deport", "article_url": "https://esu.com.ua/article-1088", "bio": "КРИ&#769;МСЬКИЙ Андрій Іванович (30. 11(13. 12). 1905, с. Триліси, нині Олександрів. р-ну Кіровогр. обл.&nbsp;— 06. 09. 1942)&nbsp;— письмен­ник. Закін. Черкас. пед. технікум (1931), Одес. пед. ін­ститут (1937). Від 1931&nbsp;— у м. Чигирин (нині Черкас. обл.): учителював, зав. пед. частини зразк. школи, зав. райметодкабінету. Дебютував 1925 у г. «Радянська думка» (Черкаси). Автор віршів «Колектив восени» (1926), «На від­починку» (1927), «Осін­ні думи» (1928), «У степу» (1929; усі&nbsp;— у ж. «Нова громада»), «Захід і Схід» (ж. «Червоні квіти», 1930; обидва&nbsp;— Харків); оповідань «Дорога криниця» (ж. «Но­ва громада», 1928), «Зра­да» (ж. «Все­світ», 1929, Харків), «В дорозі» (колектив. зб. «Літературна молодь», К., 1938), «Санта Лючія», «Лариса», «Юні втікачі» (усі&nbsp;— 1939–41) та роману «Рекорд» (1931; усі&nbsp;— не опубл.) на теми сучасності. 12 вересня 1937 заарешт., 20 листопада того ж року за звинуваче­н­ням у контр­рев. агітації засудж. до 10-ти р. увʼязне­н­ня; покара­н­ня від­бував у Далекосх. таборах (РФ), де й помер. Реабіліт. 1963. Про його життя А. Кримський написав худож.-докум. повість «Реабілітований посмертно» (у зб. «Недогризки душ: Поезії, проза, дра­ми», Кр., 2000). Завантажити статтю"}, {"idx": 80, "name": "Кріпченко Віктор Іванович", "birth_year": "1948.0", "death_year": "2019.0", "migration_status": "non_migrated", "reasoning": "Viktor Kripchenko was born in Lviv in 1948 and died in Kyiv in 2019, remaining within Ukrainian territory throughout his life. While he studied in Moscow (1974), this was temporary education at an official Soviet film institute (VDIK), not permanent relocation or forced displacement. His entire professional career as a cinematographer was conducted in Kyiv, working for Ukrainian studios and media", "article_url": "https://esu.com.ua/article-2066", "bio": "КРІ́ПЧЕНКО Віктор Іванович (10. 07. 1948, Львів&nbsp;— 22. 10. Київ&nbsp;— 22. 10. 2019)&nbsp;— кіно­оператор. Заслужений діяч мистецтв України (2007). Державні пре­мії СРСР (1989), України ім. Т. Шев­ченка (1993). Член НСКінУ (1981). Закінчив ВДІК (Москва, 1974; май­стерня Р. Ільїна). Пра­цював у Києві: оператор студії «Укркінохроніка» (1973–95); викл. Ін­ституту театрального мистецтва (1995–96); на телека­налах «ЮТАР» (1997–2001), «К-1» (2008–09), «Інтер» (2009–10), «НТН» (від 2010). Зняв кіножурнал «Україна сьогодні» (1974, реж. Ю. Ткаченко), стрічки: «Радянська Україна. Роки боротьби і пере­мог» (фільми «Початок шляху», 1974, «Шлях звершень», 1977, реж. В. Шевченко, І. Грабовський), «Суперкубок» (1975), «Вишивки краса нетлін­на» (1978; обидві&nbsp;— реж. Ю. Ткаченко), «Сад, повний сонця» (реж. Л. Букін), «Олександр Бойченко» (реж. М. Юдін; обидві&nbsp;— 1977), «Вір­­ність» (реж. А. Микульський), «Вячеслав Па­влович Губенко, хірург» (реж. Р. Сергієнко; обидві&nbsp;— 1978), «Марія з Малої землі» (спів­­авт.), «Живи, людино!» (обидві&nbsp;— 1980; 2-й приз 14-го Вкф, Вільнюс, 1981), «Слухайте, слухайте Бетюка!», «Яка Марія без Івана» (обидві&nbsp;— 1981), «Не­старіюче серце поета» (1982; усі&nbsp;— реж. А. Слісаренко), «Чорнобиль: хроніка важких тижнів» (1986, реж. В. Шевченко, спів­­авт.; Золота медаль ім. О. Дов­­женка, 1987, Нац. рос. премія «Ніка», 1989); «Липневі грози» (фільми «Страйк» 1990, «Викид», 1992, реж. В. Шкурін, А. Карась, спів­­авт.), «Неви­даний альбом» (обидва&nbsp;— 1991; призи Мкф у м. Краків, Лодзь, 1991; обидва&nbsp;— Польща), «Оглянися з осені» (1993; обидва&nbsp;— спів­­авт., спів­реж.). Творчій манері притаман­не вдумливе спо­гля­да­н­ня світу водночас із умі­н­ням майстер. проведе­н­ня репортаж. зйомки. Створені ним стрічки від­різняються проникливим по­глядом у матеріал, широкою палітрою кінообразності. Рекомендована література Нечипоренко Ю. Оглянися з Чорнобиля // Говорить і показує Україна. 1998. № 29. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 81, "name": "Круглов Олексій Миколайович", "birth_year": "1866.0", "death_year": "1902.0", "migration_status": "excluded_pre_soviet", "reasoning": "Krugloy was born in 1866 and died in 1902, entirely before the establishment of the Soviet Union in 1922. While he was a Ukrainian creative worker (opera singer) who performed across the Russian Empire, his career and death predate the Soviet era, placing him outside the scope of this study on Soviet-era migration patterns.", "article_url": "https://esu.com.ua/article-2190", "bio": "КРУГЛО&#769;В Олексій Микола­йович (Круглов Алексей Николаевич; 1866, Москва&nbsp;— 04(17). 09. 1902, м. Сер­гієв Посад, нині Загорськ, РФ)&nbsp;— спів­ак (баритон). Брав уроки співу у С. Капел­лі. Закін. Муз.-драм. училище Моск. філармон. товариства (1889). Сценічну діяльність роз­почав в антре­призі О. Орлова-Соколовського у Казані (нині Татар­стан, РФ). Згодом ви­ступав в Одесі, Києві, Харкові, Казані, Тифлісі (нині Тбілісі), Вільно (нині Вільнюс), С.-Пе­тербурзі, Москві, Пермі (нині РФ). Володів сильним голосом красивого тембру, рівним в усіх регі­страх, а також сценіч. обдарува­н­ням. Додаткові відомості Основні партії Борис Годунов (однойм. опера М. Мусоргського), Руслан («Руслан і Людмила» М. Глінки), Демон (однойм. опера А. Рубінштейна), Грязной («Царева наречена» М. Римського-Корсакова), Кочубей («Мазепа» П. Чайковсь­кого), Князь Ігор (однойм. опера О. Бо­родіна), Фіґаро («Севільський цирульник» Дж. Россіні). Рекомендована література Поплавский И. А. Н. Круглов // Театр и искусство. 1902. № 38. Google Scholar Internet Шка­фер В. П. Сорок лет на сцене русской оперы. Воспоминания. 1890–1930 гг. Ленинград, 1936. Google Scholar Internet Майбурова Е. В. Му­­зыкальная жизнь дореволюционной Перми // Из муз. прошлого. Москва, 1960. Вып. 1. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 82, "name": "Кузневич Григорій Микитович", "birth_year": "1871.0", "death_year": "1948.0", "migration_status": "migrated", "reasoning": "Kuznevych voluntarily emigrated to the USA in 1907–1912, where he worked as a sculptor decorating buildings and Ukrainian churches (including in Philadelphia). He returned to Ukraine in 1919 and settled in his native village, then later moved to Polyana-Horynets (now Poland) in 1928, where he died in 1948. This represents voluntary emigration followed by return and resettlement, making him a migra", "article_url": "https://esu.com.ua/article-1330", "bio": "КУЗНЕ&#769;ВИЧ Григорій Микитович (30. 09. 1871, с. Старе Брусно (ліквідовано) Під­карп. воєводства, нині Польща&nbsp;— 09. 01. 1948, с. Ганачівка Пере­мишлян. р-ну Львів. обл.)&nbsp;— скульптор. Закін. у Льво­ві худож.-пром. школу (1896), водночас навч. у Ю. Марковсько­го (1892–96), в Римі&nbsp;— в АМ та майстернях Е. Фер­рарі, Т. Риґера (1899–1900). В Італії 1900 виконав скульптури «Перший ріль­ник» і «Грецький гончар» (ре­тельно модельована у стилі італ. веризму, закуплена Львів. ху­дож.-пром. музеєм, знищена 1952). Повернувся 1902 до Льво­ва, отримав майстерню. Брав участь у конкурсі скульптур для фасаду нового львів. залізнич. вокзалу. 1902–03 виконав 6 але­гор. горельєфів із динам. схоп­ле­н­ням руху в архівольтах вікон на фасаді худож.-пром. музею (не збережено). 1903 вирізьбив у мармурі порт­рет. медаль­йон З. Олесницької на над­гробку Олес­ницьких (цвинтар у м. Стрий, нині Львів. обл.; гіпс. від­ливи зберігаються у Львів. галереї мистецтв і Нац. музеї у Львові). Автор памʼятника нафт. промис­ловцю С. Щепановському на Личаків. цвинтарі у Львові (1903). Після смерті Ю. Марковського К. закінчив 1905 памʼятник В. Ґло­вацькому-Бартошу у Львові. Ка­мʼяну статую пов­станця з косою у руках було встановлено на фундаменті з камі­н­ня, видобутого з Чортової скелі. Для каплиці єпис­копа Ю. Вебера у Львові вирізав із дерева дві ста­туї (1905); у м. Сокаль (нині Львів. обл.) оздобив церкву св. Петра і Павла (арх. В. Нагірний) ка­мʼя­ними статуями апостолів біля входу і фігурою Христа над тим­паном фронтону (1906). Автор. репліку фігури Христа К. по­ставив 1908 на могилі А. Шеленбер­ґа на Личаків. цвинтарі. 1907–12 пере­бував у США, де оздобив скульптурами кілька будинків, укр. церков (зокрема виконав статуї, орнам. ліпнину в гре­ко-катол. церкві у Філадельфії). Взяв участь у 3-му конкурсі про­ектів памʼятника Т. Шевченкові в Києві: зробив версії цього нереалізованого монумента (1913–14 для м. Богородчани (нині Івано-Фр. обл.) і Станіславова (нині Івано-Франківськ). Вплив модерну та символізму від­бився у стилістиці над­гроб. па­мʼят­ника нач. львів. пожеж. охорони І. Еліясевича на Личаків. цвинтарі (1913). 1914 виконав два ве­ликі гіпс. горельєфи з порт­ретами Т. Шевченка та М. Лисенка у Великому концерт. залі Муз. ін­ституту у Львові, узгодивши їх із сецесій. мотивами роз­писів і вітражів М. Сосенка. Ремонтував годин­ники в Одесі. Пере­їхав 1919 до рідного села. Створив 1928 у м. Полянка-Горинецька (нині Польща) памʼятник на честь полеглих у польс.-укр. війні 1919. У між­воєн. час працював небагато, із робіт цього періоду від­о­мі над­гробок родині Жарських, ікони. Рекомендована література Крип’якевич І. П. Григорій Кузневич // Ілюстров. Україна. 1913. № 12. Google Scholar Internet Максисько Т. Шевченкіана Григорія Кузневича // ОМ. 1971. № 5. Google Scholar Internet Балда В. Двічі забутий скульптор // Наше сяйво. 2011, 11 верес. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 83, "name": "Кулябка Сергій Миколайович", "birth_year": "1842.0", "death_yea  in Czechoslovakia where he studied (1927-32) and lived in Mukachevo (1932-39). He died in Kosiv in 1942, having spent approximately two decades permanently settled outside Soviet borders in interwar Eastern Europe, representing clear voluntary emigration rather than forced displacement or internal movement.", "article_url": "https://esu.com.ua/article-51872", "bio": "КУРИЛЕ́НКО Василь Прокопович (псевд.: Старий Кінь, Віллі Кейленк та ін.; 25. 04. 1903, м. Короп Кролевец. пов. Черніг. губ., нині смт Черніг. обл.&nbsp;— 04. 06. 1942, м. Косів, нині Івано-Фр. обл.)&nbsp;— публіцист, громадський діяч. Брат М. Куриленка . Закін. Короп. г-зію. Брав участь у нац.-визв. боротьбі. Після поразки 1921 емі­­грував до Польщі, а згодом&nbsp;— до Чехо-Словач­чини. 1927–32 навч. на факультеті лісівництва Укр. госп. академії у Подєбрадах. 1932–39 жив у м. Мукачеве (нині Закарп. обл.). Працював у видавництві «Уніо», організовував і роз­будовував укр. нац. життя на Закарпат­ті, зокрема був актив. чл. т-в «Про­­світа» та «Українська громада», брав участь у роботі драм. студії «Рід­­на нива» та укр. театрі «Нова сцена». К.&nbsp;— один із творців укр. преси на Закарпат­ті, спів­пра­­цю­­вав із ред. часопису «Свобода» та учител. ж. «Світло» тощо. У 1930-х рр. під псевд. Віллі Кей­­ленк опублікував чимало цікавих сатир. та гуморист. статей у часописі «Український голос»: «Свято в Білках» (1933, ч. 6), «Учи­­телі (фото­графії-моментики)» (1933, ч. 7–9; 1934, ч. 1), «Хто збанкрутував» (1934, ч. 6), «Рішив» (1937, ч. 12). Як фахівець-лісівник написав рец. на роз­діл «Лісівництво», вміщений в «Укра­­їнській Загальній Енцикльо­­пе­­дії». Помер від туберкульо­­зу. Рекомендована література Наріжний С. Українська емігра­­ція: Культурна праця української еміграції між двома світовими війнами. Прага, 1942. Ч. 1. Google Scholar Internet [Некролог] // Укр. вісті. 1942. Ч. 141. Google Scholar Internet Періодика Західної України 20–30-х рр ХХ ст.: Мат. до біб­­ліографії. Л., 2001. Т. 4. Google Scholar
