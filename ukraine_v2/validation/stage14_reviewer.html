кер. Р. Ґлієр). 1938–41&nbsp;— викладач Кон­серваторії, 1949–72&nbsp;— ст. ред. видавництва «Музика» в Москві. Серед творів&nbsp;— опери «Тарасова ніч» за Т. Шевченком (лібрето власне і Я. Галицького, 1940–41, 1943), «Тіні» («Земля рухається» за А. Гідашу, лібрето власне); для солістів, хору й симф. оркестру&nbsp;— ораторія «Вітчизняна війна» (сл. О. Суркова, 1941), кантата «По­двиг» (сл. О. Твардов­ського, 1940); для симф. орке­стру&nbsp;— Поема (1939), Симфонія (1968); для оркестру нар. інструментів&nbsp;— Сюїта (1948); 5 романсів на сл. Т. Шевченка (1947), 6&nbsp;— на сл. Л. Первомайського (1949), пісня на сл. М. Рильського (1947). Завантажити статтю"}, {"idx": 89, "name": "Левченко Гаврило", "birth_year": "1879.0", "death_year": "1925.0", "migration_status": "excluded_bad_dates", "reasoning": "The biography contains contradictory death date information (\"після 1925\" [after 1925] with alternative \"1937\"), making it impossible to determine precise mortality timing. Additionally, the text states he was \"Репрес. 1937\" (repressed in 1937), but the official death year is listed as 1925, creating a logical impossibility that prevents accurate classification of his migration status.", "article_url": "https://esu.com.ua/article-53943", "bio": "ЛЕ́ВЧЕНКО Гаврило (26. 03(07. 04). 1879, с. Козел, нині Михайло-Коцюбинське Черніг. р-ну Черніг. обл.&nbsp;— після 1925, за ін. даними&nbsp;— 1937)&nbsp;— письмен­ник, педагог, культурний діяч. Закін. учит. ін­ститут. Учителював у Васильків. пов. Київ. губ. У 1910-х pp.&nbsp;— голова «Укр. громади» (м. Пирятин, нині Полтав. обл.). Організовував земські школи, кооперації, б-ки, театр. гуртки. За рев. і просвітн. діяльність за­знавав арештів. Друкувався від 1905, зокрема у ж. «Рідний край». У комедіях та драмах «На межі» (1907), «День правди» (1909), «За друзі своя» (1912; обидві&nbsp;— у спів­авторстві з В. Товстоносом), «Цивільний шлюб», «Шахрай» (обидві&nbsp;— 1914), «Як журавлі кричать» (1915), «Юрко Огневик» (1918) постають гос­трі конфлікти в житті укр. села. У пʼєсі «Світова справа» (1916) зображено нові су­спільно-екон. процеси, істор. давнині присвяч. трагедію «Князь Хорив» (1912), роз­думами про сутність життя сповнено драму «Смерть» (1914). Пʼєси Л. входили до репертуару профес. театр. труп та аматор. колективів. Автор зб. лірики «Стогін життя» (1913), зб. оповідань «Московка» (1914; обидві&nbsp;— Київ), «Щось більше од коха­н­ня та інші оповіда­н­ня» (1916), «Оповіда­н­ня», «Чернігівські силуети» (усі&nbsp;— Пирятин), зб. «Драматичні твори» (Рокитне; усі&nbsp;— 1918). У роз­відці «Народна освіта і земство на Україні» (1914) ви­ступив за роз­виток освіти українською мовою, за нац. від­родже­н­ня України. Ре­прес. 1937. Реабіліт. Рекомендована література Ротач П. Матеріали до українсь­кого біографічного словника. Літературна Полтавщина // Архіви України. 1966. № 4. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 90, "name": "Лижичко Руслана Степанівна", "birth_year": "1973.0", "death_year": "1973.0", "migration_status": "excluded_bad_dates", "reasoning": "The biographical entry shows birth year 1973 and death year 1973, which is impossible (a person cannot be born and die in the same year as an infant). Additionally, the biography describes extensive professional activity, awards, and achievements throughout the 1990s, 2000s, and 2010s, confirming this person was alive well beyond 1973. The death year data is clearly erroneous.", "article_url": "https://esu.com.ua/article-54610", "bio": "ЛИЖИ́ЧКО Руслана Степанівна (сцен.&nbsp;— Руслана; 24. 05. 1973, Львів)&nbsp;— естрадна спів­ачка, композитор, музично-громадська діячка. Дру­жина О. Ксенофонтова . Народний артист України (2004). Народний депутат України (2006–07). Пере­можець конкурсу «Євробаче­н­ня–2004» (Стамбул). Ґран-Прі всеукр. телевіз. фестивалю популяр. музики «Мелодія» (1994), Між­нар. фестивалю мистецтв «Сло­вʼянський базар» (м. Вітебськ, Білорусь, 1996), фестивалю «Тав­рійські ігри» (м. Нова Каховка Херсон. обл., 1997). Лауреатка Всеукр. фестивалю сучас. пісні та популяр. музики «Червона рута» (Донецьк, 1993). Премія ім. В. Стуса (2014). Закін. Вищий муз. ін­ститут у Львові (1995). Водночас 1994–98&nbsp;— звукорежисер, продюсер і заст. дир. студії «Люксен» у Львові. 1996 започаткувала проект «Дзвінкий вітер», у якому по­єд­нала різні істор. традиції, зокрема середньовічну баладу і сучасну музику, старовин­ну арх-ру та сучасну звуко- і світлотехніку, традиц. симф. оркестр і рок-гурт. 1998 провела концерт. тур замками України, щоб привернути увагу до про­блем ре­ставрації середньовіч. замків. За участі Л. знято муз. ві­деофільм «Дзвін­кий вітер Олеського замку» (1997, Ґран-Прі телевіз. фестивалю «Золота ера»), теле­про­грами «Подорож у дитинство», «Різдво з Русланою», «Різдвяні легенди» та ін. Записала компакт-диски: «Мить весни» (1998), «Найкраще» (2001), «Дикі танці», «Добрий вечір, тобі...» (обидва&nbsp;— 2003), «Амазонка», «Дика енергія» (обидва&nbsp;— 2008), «Мій брат» (2012). Як громад. діячка брала участь у Віден. форумі з питань торгівлі людьми (2007), була спів­засн. благодій. фонду з під­тримки потерпілих від повені на Львівщині (2008), активісткою Євромай­дану (2013–14). Завантажити статтю"}, {"idx": 91, "name": "Літневський Геннадій Євгенович", "birth_year": "1951.0", "death_year": "1989.0", "migration_status": "internal_transfer", "reasoning": "Літневський was born in Kazakhstan (Pavlodar Oblast) in 1951 but spent his formative and professional years in Ukraine (Zaporizhzhia Oblast), where he established himself as a writer and published extensively. He died in Romania in 1989, but this appears to be accidental (car accident while traveling) rather than voluntary permanent settlement. His primary life and career were conducted within Sov", "article_url": "https://esu.com.ua/article-55837", "bio": "ЛІТНЕ́ВСЬКИЙ Ген­надій Євгенович (16. 11. 1951, м. Іртиськ Павлодар. обл., Казах­стан&nbsp;— 14. 05. 1989, тер. Румунії, похов. у Києві)&nbsp;— письмен­ник-гуморист. Член СПУ (1984). Закін. Запоріз. пед. ін­ститут (1973). Дит. та юнац. роки минули у с. Хитрівка (нині у складі смт Комишуваха Оріхів. р-ну Запоріз. обл.). Учителював, був кор. г. «Комсомолець Запоріж­жя». Друкувався в обл. і респ. періодиці, колектив. збірниках та аль­манахах. Спів­працював із ж. «Пе­рець». Твори Л. по­значені оригінальністю думки та своєрідністю форми, вирізняються ла­конічністю викладу, динамізмом, несподіваністю сюжет. поворотів і фіналів, тонкою спо­сте­режливістю. У сатир. і гуморист. оповіда­н­нях таврував бюрократів, демагогів, хапуг, пʼя­ниць, нероб. Загинув в автоката­строфі. Додаткові відомості Основні твори Листи до запитання. К., 1979; Літо. Дн., 1983; Полюси. К., 1988; Тіль­ки без паніки! К., 1990; Еліксир істини: Сатира, гумор. К., 1991; Вибране. Дн., 2005. Рекомендована література Рекубрацький А. Він знову при­йшов усміхненим // Запоріз. правда. 1991, 14 лют. Google Scholar Internet Зоря і смерть Геннадія Літневського // Київ. 2014. № 3–4. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 92, "name": "Лозовський Лесь", "birth_year": "1900.0", "death_year": "1922.0", "migration_status": "excluded_pre_soviet", "reasoning": "Lozovskyi died in 1922 at age 22, before the Soviet Union was formally established (December 1922). Although he had some activity during the early Soviet period (1917-1922), the vast majority of his documented life and artistic career occurred during the Ukrainian National Republic and Ukrainian Soviet Socialist Republic transition period. More critically, he died in Kyiv with no evidence of migra", "article_url": "https://esu.com.ua/article-56284", "bio": "ЛОЗО́ВСЬКИЙ Лесь (справж.&nbsp;— Олександр Кирилович; 30. 08(12. 09). 1900, Київ, за ін. даними&nbsp;— Погребищен. пов. Київ. губ.&nbsp;— 22. 03. 1922, Київ)&nbsp;— графік. Навч. у Київ. худож. училищі (1910-і рр.; викл. М. Козик ), Строганов. вищому худож.-тех. училищі (Москва), Укр. АМ (Київ, від 1917; викл. М. Бойчук , О. Екс­тер , В. Мел­лер , Г. Нарбут ). Учасник мистецьких ви­ставок у 1920-х рр. Притаман­ні худож. мові Л. лаконічність, декоративність, оригінальність роз­робленого ним «шрифту Л.» зробили його роботи класич. зразками мистецтва книги 1920-х рр. Оформив бл. 30-ти вид., зокрема обкладинки до поет. зб. «Сонячні кларнети», «Плуг», «Замість сонетів і октав» П. Тичини, «Мій дар» В. Кобилянського (усі&nbsp;— 1920), кн. «По Києву і його околицях» М. Шарлеманя, «Французьке мистецтво ХІХ столі­т­тя» Я. Тугендхольда, «Заповіт» Т. Шевченка (з музикою К. Стеценка), нот. зб. «Українські народні пісні» Я. Степового та «Десять українських пісень» М. Вериківського (усі&nbsp;— 1921), «В холодку» С. Васильченка (1922; усі&nbsp;— Київ). Створені Л. обкладинки книжок та журналів вирізняються ясністю побудови, красою і чіткістю шрифтів, декоративністю ліній, узагальненістю форм, викори­ста­н­ням яскравих кольорів, що засвідчує глибоке засвоє­н­ня ним традицій укр. нар. мистецтва. Брав участь у ви­дан­ні «самвидав.» гуморист. ж. «Елеас», створивши низку акварелей. У НХМ (Київ) зберігаються малюнки «Чим повинен бути футурист» та «Порт­рет моєї душі» (обидва&nbsp;— 1920-і рр.). Л. товаришував із Г. Нарбутом (на поч. 1920 завершив його плакат до літ.-худож. ви­ставки, присвяч. па­мʼяті Т. Шевченка в Києві), Лесем Курбасом , К. Пі­скорським, М. Семенком. 1921 написав порт­рети Г. Сковороди, В. Леніна (не збережено). Задушений у влас. помешкан­ні за незʼясов. об­ставин. Рекомендована література Білокінь С. Другий після Нарбута: Невідоме про Леся Лозовського // Україна. 1989. № 5. Google Scholar Internet Лагутенко О. Українська книжкова обкладинка першої третини ХХ століття. К., 2005. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 93, "name": "Лотоцький Казимир", "birth_year": "1882.0", "death_year": "1942.0", "migration_status": "deported", "reasoning": "The biography explicitly states \"Помер на засланні\" (died in exile/banishment). Lototsky died on 04.04.1942 in the Russian Federation (РФ), which combined with the exile notation indicates forced displacement by Soviet authorities rather than voluntary migration. The timing (1942, during WWII/Stalin era) and location of death in RF strongly suggest deportation.", "article_url": "https://esu.com.ua/article-56535", "bio": "ЛОТО́ЦЬКИЙ Казимир (05. 03. 1882, с. Малі Шумляни, нині Під­лісне Бережан. р-ну Терноп. обл.&nbsp;— 04. 04. 1942, РФ)&nbsp;— живописець, графік. Закін. Самбір. учител. семінарію (нині Львів. обл., 1901). Навч. живопису у Б. Ріхтер-Яновської у Старому Сончі (нині Малопольс. воєводства, Польща), у Я.-Ґ. Ста­ніславського у Кракові, у С. Батовського-Качора у Львові (1911–12), у львів. Вільній академії (1912–22; викл. Ф. Виґживальсь­кий, В. Вітвіцький , С.-Л. Обст, К. Ольпінський ), графіку студію­вав на курсах Л. Тировича (1930). Викладав у школах Нового Сонча (1901–11), учител. семінарії у Львові (1911–39) та на Вищих учител. курсах (1923–25). Учасник мистецьких ви­ставок від 1912. Персон.&nbsp;— у Львові (1919, 1922, 1924, 1929). Спів­засн. Союзу львів. графіків та Львів. профес. союзу пластиків (1932). Створював пере­важно пейзажі в ім­пресіоніст. стилі з викори­ста­н­ням елементів архітектури. Помер на заслан­ні. Деякі роботи зберігаються у Львів. галереї мистецтв. Додаткові відомості Основні твори живопис — «Капличка» (бл. 1912), «Жнива» (1917), «Похилене збіжжя» (1919), «Верби при греблі», «Копиці в полі» (обидва — 1921), «Сніг над урвищем» (1922), «Аркада Вірменського собору у Львові» (1923), «Збіжжя» (1926), «Вид Львова» (1930), «Вид на Львів із Цитаделі» (1931), «Соняшники», «Хати», «Ріка» (усі — 1930-і рр.), «Сухий будяк» (бл. 1932), «Краєвид із Личакова» (1933), «Після грози» (бл. 1937); графіка — «Порохова вежа» (1920-і рр.), «Костел домініканців у Львові з вулиці Підвальна», «Латинська катедра» (обидва — 1925), «Площа Ринок увечері», «Королівський арсенал», «Вид Святоюрської гори з центра міста», «Мотив із Гетьманських валів» (усі — 1930-і рр.). Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 94, "name": "Лужанін Максим", "birth_year": "1909.0", "death_year": "1909.0", "migration_status": "excluded_bad_dates", "reasoning": "The biography contains an internal chronological impossibility — it states birth year 1909 and death year 1909, yet the detailed dates show birth on 20 October (2 November) 1909 and death on 13 October 2001. The death year field (1909.0) is clearly erroneous and makes the record unreliable for classification purposes.", "article_url": "https://esu.com.ua/article-59043", "bio": "ЛУЖА́НІН Максим (Лужанін Максім; справж.&nbsp;— Каратай Аляксандар Амвросьевіч; 20. 10(02. 11). 1909, с. Пруси, нині Мінської обл.&nbsp;— 13. 10. 2001, Мінськ)&nbsp;— білоруський письмен­ник і пере­кладач. Член СП СРСР (1943). Заслужений діяч мистецтв Білоруської РСР (1969). Учасник 2-ї світової війни. Закін. Білорус. університет (Мінськ, 1931). Працював у часописі «Ўзвыш­ша» (1930–31) та на Білорус. радіо (1931–33). У березні 1933 за­арешт. за контр­рев. діяльність і засудж. до 2-х р. засла­н­ня, однак незабаром звільнений. 1935–41&nbsp;— спів­роб. Гол. ред. літ-ри з машинобудува­н­ня у Москві. Від 1944 працював у пресі, був референтом Якуба Коласа в АН Білоруської РСР. 1967–72&nbsp;— гол. ред. кіностудії «Білорусьфільм». Автор поет. зб. «Крокі» (1928), «Галасы гарадоў» (1932), «Шы­­рокае поле вайны» (1945), «Па­­размаўляй са мной, зямля» (1983; усі&nbsp;— Мінськ) та ін., оповідань, повістей, спогадів, есе, літ. порт­ретів, крит. статей. Писав пере­важно про людей праці, їхній героїзм під час 2-ї світової війни тощо. У ст. «Известный в мире» («Полымя», 1961, № 3) та «Уста народа» («Литературная газета», 1961, 9 марта), нарисі «Писатели Беларуси о Кобзаре» («Знамя юности», 1964, 28 марта) висвітлив вплив творчості Т. Шевченка на багатьох білорус. поетів. Пере­кладав з укр., рос. та польс. мов. У пере­кладі Л. у Мінську ви­йшли «Пере­яславська рада» Н. Рибака (1954–55), а також окремі поезії П. Тичини, М. Рильського, В. Сосюри, А. Малишка, С. Олійника, С. Крижанівського, оповіда­н­ня М. Стельмаха, Є. Гуцала. Твори Л. пере­кладали В. Сосюра, М. Нагнибіда, П. Усенко, М. Руденко, О. Ющенко, В. Швець, В. Корж та ін. Реабіліт. 1956. Додаткові відомості Основні твори Збор твораў. Мінск, 1968–70. Т. 1–3; 1979–81. Т. 1–4; укр. перекл. — [Вірші] // Пісні з Білорусі. К., 1957; [Вірші] // Білорус. рад. поезія: Антологія. Т. 1. К., 1971. Рекомендована література Відомий у світі // Шевченкова дорога в Білорусь: Літ.-публіцист. зб. Л., 2004. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 95, "name": "Лур’є Ноте", "birth_year": "1906.0", "death_year": "1987.0", "migration_status": "deported", "reasoning": "Lurye was arrested in 1950 in Odesa on charges of Jewish nationalism and alleged collaboration with American intelligence, and was sentenced to 15 years imprisonment in a labor camp (Kolyma). He was rehabilitated in late 1955 and returned to Odesa, indicating forced displacement by Soviet authorities rather than voluntary emigration. He remained in the Soviet Union until his death in 1987.", "article_url": "https://esu.com.ua/article-59345", "bio": "ЛУРʼЄ́ Ноте (Натан Михайлович; 02(15). 01. 1906, с. Роз­кішне, нині Гуляйпіл. р-ну Запоріз. обл.&nbsp;— 26. 11. 1987, Одеса)&nbsp;— письмен­ник. Народився у сімʼї ремісника. Закін. пед. технікум у Мінську (1926), літ. від­діл. 2-го Моск. університету (1931). Працював у ред. газет і журналів, у пере­двоєн­ні роки вчителював в Одесі. Дебютував оповіда­н­ням «Вночі на пасовищі» (1929). Публікація роману «Степ кличе» (1932) принесла ви­зна­н­ня офіц. критики: євр. біднота після воєн. дій 1918–20 створює у степ. селі колективне госп-во, починає жити по-радянськи. У серед. 1930-х рр. твір пере­кладено з їдишу укр., рос., молдав. мовами і ви­дано у Києві, Мос­кві, Мінську, Тирасполі. Л. на установ. зʼ­їзді рад. письмен­ників (1934) одержав член. квиток з рук М. Горького . «Одеський Шолохов» дописує другу частину роману (1941), далі третю&nbsp;— доопрацьов. варіант опубл. 1948. Під час 2-ї світової війни працював у військ. пресі. Спів­працював з Євр. антифашист. комітетом, з колективами євр. театрів. 1950 разом з групою євр. діячів культури Одеси (зокрема письмен­никами Х. Вайнерманом , І. Друкером ) був заарешт. За звинуваче­н­ням у євр. націоналізмі та спів­праці з амер. роз­відкою засудж. до 15-ти р. увʼязне­н­ня. В одному з концтаборів на Колимі по­зна­йомився з рос. поетом А. Жигуліним . Реабіліт. на­прикінці 1955, повернувся до Одеси. Але навіть на межі 1970–80-х рр. цензура викидала з роману «Перед грозою» (К., 1983) сторінки про сталін. ре­пресії щодо «космополітів». Л. пере­глянув свої творчі орієнтири, зосередився на принципах гуман­ності, морал. від­повід­альності перед читачем. Новий етап творчості знаменують романи і повісті «Історія одного коха­н­ня» (1978), «Лише море та небо» (1978), «В дорозі» (1986), «Дні і роки» (1988; усі&nbsp;— Одеса). Про творчість Л. (понад 40 книжк. вид.), його нариси і публіцистику писали Олесь Гончар , І. Дузь , А. Зорич , Г. Полянкер , А. Незвідський , А. Вергеліс та ін. Рекомендована література Ременик Г. Ноте Лур’є — 70 // ЛУ. 1976, 16 січ. Google Scholar Internet Борщаговский А. А. Нотэ Лурье — 75 // Горизонт. О., 1982. Google Scholar Internet Чернего Н. М. Ноте (Натан Михайлович) Лур’є: Біобібліогр. покажч. О., 1991. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 96, "name": "Луців Володимир Гаврилович", "birth_year": "1929.0", "death_year": "2019.0", "migration_status": "migrated", "reasoning": "Луців was born in Ukraine (Nadvirna) in 1929 but voluntarily left during WWII, settling permanently in Western Europe. He lived in Poland (during WWII), Germany (1944-1948), and then permanently in Britain from 1948 onwards, where he established his career as a singer and bandura player, eventually dying in London in 2019. This represents voluntary emigration and permanent settlement outside Sovie", "article_url": "https://esu.com.ua/article-59433", "bio": "ЛУ́ЦІВ Володимир Гаврилович (псевд.&nbsp;— Тіно Вальді; 25. 06. 1929, м. На­двірна, нині Івано-Фр. обл.&nbsp;— 07. 09. 2019, Лондон)&nbsp;— спів­ак (ліричний тенор), бандурист, музично-громадський діяч. Лауреат між­нар. конкурсу «Євробаче­н­ня» (Бельгія, 1961, 1-а премія), премія ім. В. Вин­ниченка Укр. фонду культури (1993). Орден «За заслуги» 3-го (2001) та 2-го (2008) ступ. У роки 2-ї світової вій­ни пере­бував у Польщі, від 1944&nbsp;— у Німеч­чині, де після вій­ни навч. в укр. гімназії. 1946–48 опановував гру на бандурі в капелі бандуристів ім. М. Леонтовича під керівництвом Г. Назаренка (м. Ґосляр, Німеч­чина). Від 1948 мешкав у м. Брадфорд (Велика Британія), де брав приватні уро­ки співу в Г. Горнера, працював у від­ділі Укр. радіо, ви­ступав у концертах перед укр. емі­грантами. 1951 навч. у Лондон. муз. коледжі Святої Трійці (кл. проф. С. Бейтса). 1952 на стипендію архі­єпис­копа І. Бучка вступив до консерваторії «Санта-Чечілія» (Рим, 1957), після її закінче­н­ня роз­почав концертну діяльність в Італії та за її межами. Від 1958 мешкав у Лондоні, де продовжив навч. у Г. Захера, ви­ступав як спів­ак і бандурист у концерт. залах, на радіо, телебачен­ні, гастролював у країнах Європи, Пн. Америки та в Австралії, виконував укр. нар. думи та пісні, твори укр. композиторів, зокрема з бандурою, що сприяло популяризації укр. музики. На­прикінці 1980-х рр. при­пинив концертну діяльність. Л. брав участь в організації ви­ставки укр. художників у Великій Британії, гастролей укр. мист. колек­тивів у країнах Європи, Пн. Аме­рики, а також ви­ступів зарубіж. твор. колективів в Україні, зокрема 1985&nbsp;— амер. хору «Думка» в Європі, 1988 організував великий концерт у лондон. залі «Альберт-Ґоля» і урочисту Літургію у Соборі св. Петра у Римі з нагоди 1000-ліття Хреще­н­ня України-Русі, 1990&nbsp;— перший ви­ступ в Україні «Візантійського хору» М. Антоновича (Київ, Львів; ви­ступав також як соліст і бандурист), 1991&nbsp;— поверне­н­ня голови УГКЦ кардинала М. Любачівського в Україну, 1992&nbsp;— пере­похова­н­ня тут Патріарха УГКЦ Йосифа Сліпого, 1995&nbsp;— гастролі Ансамблю пісні і танцю МВС України у США, 2000, 2008&nbsp;— концерти хору ім. М. Лисенка (Нідерланди) в Україні. Автор кн. «Від Бистриці до Темзи: (Спо­гади, документи, публікації, лис­ти)» (Л., 1999), низки статей про укр. музикантів, художників, твор­чі колективи в лондон. пресі. Записав 5 грамплатівок. У 2002 у рідному місті засн. культ.-мист. фонд його імені, що опікується молод­дю Прикарпа­т­тя. Рекомендована література Кавка М. Володимир Луців — амбасадор української культури // Сво­бода. 1986, 7–9 жовт. Google Scholar Internet Гринджук І. Його талант належить Україні // Нар. воля. 1991, 30 берез. Google Scholar Internet Хмельовський Л. Володимир Луців — патріот, співак, меценат // Свобода. 2007, 26 жовт. Google Scholar Internet Антонюк-Слізанська Л. З Україною в серці назавжди // Діалог. Кременець, 2008, 17 трав. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 97, "name": "Любин Яків Мойсейович", "birth_year": "1889.0", "death_year": "1914.0", "migration_status": "excluded_pre_soviet", "reasoning": "This person died in 1914, before the establishment of the Soviet Union (1921), and the biography contains no evidence of significant Soviet-era activity or forced displacement by Soviet authorities. The classification criteria require assessment of migration status during the Soviet period, which does not apply here.", "article_url": "https://esu.com.ua/article-59814", "bio": "ЛЮ́БИН Яків Мойсе­йович (справж.&nbsp;— Машкович; ?&nbsp;— 24. 05(05. 06). 1914)&nbsp;— спів­ак (лірико-драматичний тенор), педагог. Закін. Бухарест. реал. училище, навч. у С.-Пе­­тербур. консерваторії (1880–83; кл. К. Еверарді). Із 17-ти р. мешкав у Одесі, брав уроки співу в одес. педагогів. Дебютував 1883 на опер. сцені у С.-Петербурзі, 1887&nbsp;— партією Фауст в однойм. опері Ш. Ґуно у Великому театрі в Москві. Ви­ступав на опер. сценах Казані (Росія, 1884–86, антре­приза П. Медведєва), Києва, Харкова, Одеси, Тифліса (нині Тбілісі), Вільно (нині Вільнюс), Варшаві, Самарі (Росія), Ризі, С.-Петербурзі (1889&nbsp;— антре­приза О. Картавова; 1893&nbsp;— Маріїн. театр; 1894–95&nbsp;— Панаїв. театр; 1899&nbsp;— Товариство рос. опер. арт.; від 1901&nbsp;— Нар. дім, де також очолював оперу). 1895–99 разом із М. Салтиковим створив оперну трупу, з якою гастролював містами України, Росії, Латвії. Володів невеликим, але приєм. тембру голосом. Серед партнерів&nbsp;— М. Максаков, С. Тамарова, Ф. Шаляпін. 1902 здійснив по­становку опери «Орлеанська діва» П. Чайковського на сцені Нар. дому в С.-Петербурзі. За­ймався також пед. діяльністю. Серед учнів&nbsp;— П. Цесевич. Додаткові відомості Основні партії Собінін («Життя за царя» М. Глінки), Ленський («Євгеній Онєгін» П. Чайковського), Синодал («Демон» А. Рубінштейна), Князь («Русалка» О. Даргомижського), Альфред, Манріко, Радамес («Травіата», «Трубадур», «Бал-маска­­рад» Дж. Верді), Фауст (однойм. опера Ш. Ґуно), Хозе («Кармен» Ж. Бізе). Рекомендована література Пружанский А. Отечественные певцы 1750–1917. Москва, 1991. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 98, "name": "Любительський Людвиг Олександрович", "birth_year": "1888.0", "death_year": "1938.0", "migration_status": "deported", "reasoning": "Lyudvig Lyubelskyi was an architect who worked in Odesa during the Soviet period and was repressed in 1938 under false accusations (\"наклепниці звинувачення\"), dying during imprisonment (\"загинув під час ув'язнення\"). This constitutes forced displacement/detention by Soviet authorities (NKVD), meeting the criteria for deportation classification.", "article_url": "https://esu.com.ua/article-59780", "bio": "ЛЮБЕ́ЛЬСЬКИЙ Лю­двиг Олександрович (1888, Київ&nbsp;— після 1938)&nbsp;— архітектор. Один із найвиразніших пред­ставників кон­структивізму в Україні, проектував також будівлі у стилі неокласицизму. Працював тривалий час в Одесі, де брав участь у зведен­ні житл. будинків на вул. І. Мечникова, № 92 (1927, разом з В. Кабіо­льським) та Кінна, № 2/4 (1928–34, з О. Дубініним і Л. Шенкером), рекон­струкції житл. будинку на вул. Комітетська, № 8/10 (1926–27, з М. Лінецьким і Я. Ґольденберґом). Виконав проект надбудови 4-го поверху житл. будинку на вул. Середня, № 39 (1927). У 1938 за наклепниц. звинуваче­н­ням ре­прес., ймовірно, загинув під час увʼязне­н­ня. Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 99, "name": "Майроніс", "birth_year": "1862.0", "death_year": "1862.0", "migration_status": "excluded_non_ukrainian", "reasoning": "Maironis (Jonas Mačiulis) was Lithuanian, not Ukrainian. While he studied in Kyiv and had some connection to Ukrainian literary circles, he was a Lithuanian poet, dramaturg, and theologian who lived and worked primarily in Lithuania (Kaunas). He does not qualify as a Ukrainian creative worker for this study.", "article_url": "https://esu.com.ua/article-60536", "bio": "МАЙРО́НІС (Maironis; справж.&nbsp;— Mačiulis Jo­­nas, Мачюліс Йонас; 21. 10(02. 11). 1862, маєток Пасандравіс, нині село Расейняй. р-ну, Литва&nbsp;— 28. 06. 1932, Каунас)&nbsp;— литовсь­кий поет, драматург, теолог. Доктор теології (1904). Народився у родині вільних селян. Навч. у Каунас. гімназії (1873–83), Університеті св. Володимира у Києві (1883–84), закін. Каунас. духовну семінарію (1888), С.-Пе­тербур. катол. духовну академію (1892), у 1894–1909&nbsp;— проф. цієї академії; 1909–32&nbsp;— ректор Каунас. духов. семінарії (від 1911&nbsp;— прелат); водночас 1922–32&nbsp;— завідувач кафедри морал. теології Каунас. університету. Вважається найвидатнішим пред­ставником литов. романтизму, творчість якого справила знач. вплив на литов. поезію 1-ї пол. 20 ст. Писав литов. і польс. мовами. Автор зб. «Pavasario balsai» («Весняні голоси», Тильже, 1895; єдина його поет. зб., яку з кожним вид. поповнював новими віршами й редагував старі: 1-е вид. вміщувало 37, а 6-е (1930)&nbsp;— 131 вірш; за життя М. ви­йшло 6 вид., 2012 у Вільнюсі&nbsp;— 28-е вид. з компакт-диском); поем «Tarp skausmų į garbę» («Через страж­да­н­ня до слави», Тильже, 1895), «Z nad Biruty» («З гори Біруте», Бруклін, 1904, польс. мовою), «Jaunoji Lietuva» («Молода Литва», 1907), «Raseinių Magdė» («Маґ­­де з Расейняя», 1909), «Mūsų vargai» («Наші злигодні», 1920); істор. віршов. драм. трилогії «Kęs­­tučio mirtis» («Смерть Кястутіса», 1921), «Vytautas pas kryžiuočius» («Вітовт у хрестоносців», 1925) і «Didysis Vytautas&nbsp;— karalius» («Вітовт Великий&nbsp;— король», 1930); балад «Čičinskas» («Чичинськас», 1919) і «Jūratė ir Kastytis» («Юрате і Кастітіс», 1920; усі&nbsp;— Каунас); лібрето опер «Kame išganymas?» («У чому спасі­н­ня душі?», Тильже, 1895), «Nelaimingos Dangutės vestuvės» («Весі­л­ля нещасної Данґуте», Каунас, 1930) та ін. 1926–30 у Каунасі ви­йшло зібр. творів М. у 5-ти т., 1987–88 у Вільнюсі&nbsp;— твори в 3-х т. У ліриці та поемах М. виражено ідеологію литов. нац. від­родже­н­ня, від­творено боротьбу з хрестоносцями, звеличено народ, селянство. Пейзажна і філос. поезія М. від­значається екс­пресивністю, мило­звучністю. М. утвердив у литов. поезії силаботонічне вір­шува­н­ня, збагатив її вірш. жанрами. На ран­ній ліриці литов. поета поміт. вплив Т. Шевченка, творчість якого М. високо оцінив у вид. «Paskaitoje apie vysk. Ant. Baranauską» («Лекції про єпис­копа Ант. Баранаускаса», 1923). М. належить праця «Trumpa visuotinės literatūros istorija» («Короткий курс історії світової літератури», 1926; обидва&nbsp;— Каунас). Багато поезій М. покладено на музику, деякі стали нар. піснями. Іменем М. у Литві на­звані вулиці, йому по­ставлені па­­мʼятники, порт­рет М. зображено на банкноті 20 літів. В Україні памʼять М. вшановано мемор. дошкою на стінах Київ. університету (2012). Окремі вірші М. пере­клали П. Тичина, Д. Білоус, Д. Чередниченко. Додаткові відомості Основні твори укр. перекл. — Де води Шешупе і Німан гойдає... // Вітчизна. 1947. № 4; [Вірші] // ЛУ. 1987, 22 жовт.; [Вірші] // Білоус Д. Вибране. К., 1990; Б’є, але й гартує лихо... // ЛУ. 1991, 24 січ. Рекомендована література V. Zaborskaitė. Maironis. Vilnius, 1987. Google Scholar Internet Славинскайте И. Майронис. 1862 — 1932. Вильнюс, 1987. Google Scholar Internet Білоус Д. Зоря в небі Литви // ЛУ. 1987, 22 жовт. Google Scholar Internet Непокупний А. П. На київському порозі: (До 130-річчя від дня народж. Майроніса) // Там само. 1992, 12 листоп. Google Scholar Internet Його ж. Майроніс і Київський університет: чи постать поета кидає тінь на його Alma Mater? // Вісн. АНУ. 1993. № 3. Google Scholar Internet A. Ruseckaitė. Šešėlis JMM. Maironio gyvenimo meniniai biografiniai etiudai. Vilnius, 2016. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 100, "name": "Макара Марія Степанівна", "birth_year": "1900.0", "death_year": "1993.0", "migration_status": "deported", "reasoning": "Mariya Makara was forcibly displaced in 1945 when she was deported to the village of Lugi (Western Poland) and only returned to her native village after 10 years. This constitutes forced displacement by Soviet authorities during the post-WWII period, meeting the criteria for deportation classification.", "article_url": "https://esu.com.ua/article-60578", "bio": "МАКА́РА Марія Степанівна (Гойсак; 02. 08. 1900, с. Висова, нині Малопольс. воєводства, Польща&nbsp;— 12. 04. 1993, там само)&nbsp;— спів­ачка. Походила з лемків. родини. Лауреатка фестивалю «Лемківська ватра» (с. Бортне, Польща, 1-а премія). Володіла від природи добре по­ставленим голосом, знала багато пісень. 1912 з її голосу&nbsp; Ф. Колес­са &nbsp;записав низку лемків. пісень, які уві­йшли до його зб. «Народні пісні з Галицької Лемківщини» (Л., 1929). Від неї згодом записували пісні також Р. Райнфус ,&nbsp; О. Гижа ,&nbsp; Я. Полянський ,&nbsp; М. Мушинка &nbsp;(понад 300). У рідному селі М. була чл. товариства «Просвіта», сільс. та церк. хорів, а також драм. гуртка. 1945 депортована у с. Луги (Зх. Польща) і лише через 10 р. повернулася до рідного села, спів­ала у місц. церкві. Рекомендована література Мушинка М. Лемківська співачка Марія Макара // Наша культура. 1980. № 2. Google Scholar Internet Його ж. Умерла найстарша лемківська співачка Марія Макара // Лемківщина. 1993. № 2. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 101, "name": "Маренков Олексій Васильович", "birth_year": "1886.0", "death_year": "1942.0", "migration_status": "non_migrated", "reasoning": "Маренков was born in Oryol, Russia in 1886, but conducted his entire professional career within Ukraine (studied at Kyiv Art School, taught at Kharkiv Art Institute from 1922 onwards, worked with Ukrainian cultural institutions). He died in 1942 and was repressed in 1938, indicating he remained in Soviet Ukraine throughout the Soviet period with no evidence of voluntary emigration or forced deport", "article_url": "https://esu.com.ua/article-65695", "bio": "МАРЕНКО́В Олексій Васильович (13(25). 03. 1886, м. Орел, Росія&nbsp;— 1942)&nbsp;— графік і педагог. Член Асоц. художників Червоної України (1926). Малювати навч. в&nbsp; О. Гофмана , закін. Київ. художнє училище (1912; викл.&nbsp; Г. Дядченко , І. Селезньов ,&nbsp; Ф. Кричевський ). Про­ілюстрував перший випуск літ.-худож. збірника Орлов. філіалу Пролеткульту «Красное утро» (1919). Викладав у Харків. худож. ін­ституті (1922&nbsp;— поч 30-х рр.). Основні галузі&nbsp;— станк. і книжк. графіка. Створив обкладинки та іл. до творів Т. Шевченка (і порт­рет Кобзаря, 1928), Марка Вовчка, В. Блакитного, Ю. Яновського, Ю. Будяка. Роз­робив марки з порт­ретом Кобзаря (1920, спільно з&nbsp; М. Івасюком ; 1923&nbsp;— з Б. Порай-Кошицем). Серед учнів –&nbsp; Й. Дайц ,&nbsp; В. Нерубенко , О. Сиротенко, М. Фрадкін , О. Щеглов . Ре­прес. 1938. Реабіліт. Деякі роботи зберігаються у Харків. ХМ. Додаткові відомості Основні твори плакати — «Київ — Сербії й Чорногорії 4 та 5 січня 1915» (1914), «Комуністична партія України створила Робітничо-селянську Українську державу», «Кримський павук має бути розчавлений!» (обидва — 1920), «Орися ж ти, моя ниво…» (1921), «На базі колективізації знищимо куркуля», «Чому ти ще не в колективі?» (обидва — 1931), «Всі на вибори до Верховної Ради УРСР!» (1938); монум. розписи — в інтер’єрах ВУЦВК, готелю «Червоний» у Харкові (1920-і рр.). Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 102, "name": "Мареш Віктор Францович", "birth_year": "", "death_year": "1943.0", "migration_status": "migrated", "reasoning": "Viktor Mareş was a Czech-origin cellist and pedagogue who worked in Russian cities (Tambov, Astrakhan) before relocating to Zhytomyr, Ukraine, where he taught from 1914–1943. In 1943, he voluntarily emigrated with his wife to Czechoslovakia, representing a permanent settlement outside Soviet borders. This constitutes voluntary emigration rather than forced displacement or internal movement.", "article_url": "https://esu.com.ua/article-63607", "bio": "МА́РЕШ Віктор Францович (?&nbsp;— після 1943)&nbsp;— віолончеліст, педагог. З походже­н­ня чех. Від поч. 20 ст. працював як педагог, соліст та ансамбліст (учасник струн. квартету) у Тамбов. та Астрахан. від­діл. Імператор. РМТ (Росія), викл. Астрахан. муз. училища. Згодом пере­їхав до Житомира, де 1914–43 викладав гру на віолончелі у Муз. училищі, брав участь у концертах. Від 1919 працював у створ. М. Скорульським вокал. студії. 1943 разом з дружиною, піаністкою Н. Мареш, ви­їхав до Чехо­словач­чини. Рекомендо , "article_url": "https://esu.com.ua/article-68574", "bio": "МОРУ́ГA Василь Васильович (13. 06. 1947, с. Сонцеве Старобешів. р-ну, нині Донец. обл.&nbsp;— 14. 05. 1989, тер. Румунії, похов. у Києві)&nbsp;— поет, пере­кладач, журналіст. Член СПУ (1975). Дит. та юнац. роки провів у с. Чубарівка Пологів. р-ну Запоріз. обл. Закін. Київський університет (1970). Працював у Києві: на заводі «Арсенал»; був на комсомол. роботі; від 1974&nbsp;— завідувач від­ділу літ-ри та мистецтва г. «Комсомольское знамя», згодом&nbsp;— ред. від­ділу поезії ж. «Дні­про», 1984–89&nbsp;— гол. ред. ж. «Барвінок». Писати вірші почав у шкіл. роки, друкуватися&nbsp;— у пологів. рай. газеті. Кращі його твори опубл. у ж. «Дні­про», «Україна», г. «Літературна Україна», «Молодь України», а також у колект. зб. «Молода пісня» (Дн., 1965) та «Вітрила» (К., 1971). Дебютував зб. «Грозові­т­тя» (К., 1969), у якій критики від­значили філософічність поезій, по­значених щирістю і над­звичайною вкоріненістю у рідний ґрунт. У своїх віршах звертається до героя-трудівника, людини зрілих громадян. пере­конань. Помітне місце в творчості поета належить інтим. і пейзаж. ліриці. Для дітей написав докум. повість «Роз­кажи мені, поле» (1978) та казку «Пригода на городі» (1986; обидві&nbsp;— Київ). М. пере­клав окремі твори болгар., польс., кубин., рос., білорус. поетів. Провід­не місце у доробку М. за­ймає Болгарія&nbsp;— їй присвяч. цикли поезій, здійснено низку перекл. з болгар. мови: зб. віршів болгар. та укр. поетів «Жовтнем осяяна» (1987), «Вереснева зоря» (1989; обидві&nbsp;— Одеса; Варна). Упорядник зб. молодої болгар. поезії «Вересневі Балкани» (1981) та «Яворов Пейо. Лірика» (1988; обидві&nbsp;— Київ). Загинув в автоката­строфі дорогою з Болгарії побл. румун. с. Пріпонєшть Галац. пов. У рідному селі організовано музей поета. Додаткові відомості Основні твори Ключі до тиші. К., 1972; Портрет Землі. К., 1977; Юності бентежні ешелони. К., 1978; Чебрецеві острови. К., 1984; Дорога над лугом. К., 1985; Відблиск миті н­ником у свій час, однак на­вряд щось залишиться в його книжках для майбутнього. Писав також для дітей. Додаткові відомості Основні твори Моя земля. Х., 1949; У широкім степу. Х., 1951; Подих життя. К., 1956; Діла хлоп’ячі. К., 1958; Полудень. Х., 1959; Вітер часу. Х., 1960; Здрастуйте, люди! К., 1962; Що воно за штука? К., 1964; Повісті північної прохідної. Х., 1967; Осокорова заметіль. К., 1970; Купальський вогонь. Х., 1972; Заводська сторона. К., 1974; Я стверджуюсь! Х., 1979; Десь тут мати моя: Вибр. поезії. К., 1980; Одолінь трава. Х., 1981; При шляхах маки цвітуть. К., 1982; Слово о полку нашім. К., 1987. Рекомендована література Герасименко Ю. Г. «Оберемок холодного сіна» // Герасименко Ю. Г. Знай високе місце своє: Літ.-крит. нариси. К., 1979. Google Scholar Internet Должанська Ю. В. Концепт батьківщини в поетичній спадщині С. Мушника // Вісн. Луган. університету. Сер. Філол. науки. 2013. № 4, ч. 2. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 114, "name": "Непорожня Надія Олександрівна", "birth_year": "1948.0", "death_year": "2004.0", "migration_status": "migrated", "reasoning": "Непорожня Надія Олександрівна was born in Ukraine (Yahotyn, Poltava region) in 1948 and initially lived and worked there (taught at Kyiv University 1976-89). From the early 1990s onwards, she voluntarily settled permanently in Vilnius, Lithuania, where she lived until her death in 2004, establishing herself as a prominent figure in Lithuanian-Ukrainian cultural relations and working in educational", "article_url": "https://esu.com.ua/article-73665", "bio": "НЕПОРО́ЖНЯ Надія Олександрівна (09. 09. 1948, смт Яготин Полтав., нині місто Київ. обл.&nbsp;— 27. 11. 2004, Вільнюс, похов. в Яготині)&nbsp;— пере­кладачка, літературо­зна­вець, педагог. Дочка О. Непорожнього. Кандидат філологічних наук (1977). Член НСПУ (1989), СП Литви і Між­нар. ПЕН-центру. Закін. Київський університет (1971), де й викладала 1976–89 на каф. словʼян. філології. Досліджувала укр.-литов. та укр.-сербо-хорват. літ. звʼязки, окремі пита­н­ня богемістики. Від поч. 1990-х рр. жила у Вільнюсі. Учителювала, працювала у пед. університеті, ви­вчала вілен. періоди життя М. Смотрицького, Т. Шевченка, Я. Головацького, пропагувала їхню творчість. Голова Асоц. україністів Литви (від 1992), засн. Ли­тов.-укр. фонду ім. Т. Шевченка. У Вільнюсі 1993 пере­видала фототипією раритетну збірку поезій Т. Шевченка у польс. пере­кладах В. Сирокомлі («“Коbzarz” Ta­rasa Szewczenki», Wilno, 1863), су­проводивши її доклад. післямовою «Кобзареві думи, пере­співані сільським лірником». Упорядкувала й видала в своєму пере­кладі зб. «Литовські прислівʼя та приказки» (К., 1975). Серед пере­кладів Н. із литов. літ-ри&nbsp;— кн. публіцистики «Лунає дзвін Вільнюської вежі» Р. Будріса (1973), зб. оповідань і повістей «Білий вітер» В. Бубніса (1982), повісті «Моя ненависть сильніша» В. Жилінскайте (1983), «Садиба під кленом» (1989) та «Білий вінок для чорного паровоза» (1991) Р. Ґранаускаса, роман «В тіні вівтарів» В. Міколайтіса-Путінаса (1985). У періодиці друкувала пере­клади окремих творів Й. Авіжюса, А. Венуоліса, А. Венцлови та ін. Одна з пере­кладачів зб. «Литовське радянське оповіда­н­ня», «Сучасна югославська повість» (обидві&nbsp;— 1981). Із літ-р народів колиш. Югославії пере­клала повість боснійця Д. Сушича «На­йманець» (1981; усі&nbsp;— Київ), оповіда­н­ня чорногорця Ч. Вулевича «Палата № 23» («Всесвіт», 1991, № 6; 2016, № 11–12), окремі твори сербів Б. Чопича та М. Алечкович, хорвата М. Божича, словенців Ф. Бевка та Б. Юрци. Авторка цін­них ст. «Тарас Шевченко литовською мовою» (1981), «Вук Караджич і культура України» (1987), «Шлях Чюрльоніса на Україну» (1988), «Українська поетична класика литовською» (1990), а також низки гасел про класиків литов. літ-ри в УЛЕ та ЕСУ, публікацій у ЗМІ, напр., у г. «Літературна Україна»&nbsp;— «З криниць литовських [В. Бичко&nbsp;— пере­кладач литов. поезії]» (1974, 15 березня), «П XT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 115, "name": "Нитченко Дмитро Васильович", "birth_year": "1905.0", "death_year": "1944.0", "migration_status": "migrated", "reasoning": "Nitchenko was a Ukrainian creative worker who voluntarily emigrated after WWII, initially to Germany (1944-49) and then permanently to Australia (from 1949 onwards), where he established himself as a writer, educator, and cultural organizer until his death in Melbourne in 1999. There is no evidence of forced deportation by Soviet authorities; his departure was voluntary following his escape from G", "article_url": "https://esu.com.ua/article-74059", "bio": "НИ́ТЧЕНКО Дмитро Васильович (справж.&nbsp;— Ниценко, від 1944&nbsp;— Ніценко; псевд.: Дмитро Чуб, Остап Зірчастий, Микола Срібний; 08(21). 02. 1905, м. Зіньків, нині Полтав. обл.&nbsp;— 15. 09. 1999, м. Мельбурн, Австралія)&nbsp;— письмен­ник, журналіст, видавець, літературо­знавець, мово­знавець, пере­кладач, культурно-освітній і громадський діяч. Батько Л. Богуславець та Г. Кошарської , дід Ю. Ткача. Дійсний член НТШ (1975). Літературна премія ім. Лесі Українки (1994).&nbsp; Народився у заможній селянській родині, яка під час роз­куркуле­н­ня за радянської влади була змушена ви­їхати до м. Пʼятигорськ на Терщину (нині Ставроп. край, РФ), де мешкало багато українців. На­вчався у Зіньківській індустр.-технічній школі (1922–24), на українському від­ділен­ні робітфаку в м. Краснодар (РФ, 1926–27, від­рахований через «приховува­н­ня свого соціального походже­н­ня»), закінчив технікум чужоземних мов (1934) та ІНО (1940) у Харкові. Тут деякий час працював робітником на фабриці, від 1929&nbsp;— обліковцем, секретарем Державного видавництва України, згодом&nbsp;— видавництва «Література і мистецтво» (до 1934), учителював. Від початку німецько-радянської вій­ни&nbsp;— на фронті, 10 жовт­ня 1941 потрапив в оточе­н­ня та німецький полон, пере­бував у концтаборі м. Кричев (Могильов. обл., Білорусь), завдяки досконалому володін­ню німецькою мовою 8 листопада того ж року йому вдалося звільнитися. Повернувся до Харкова, спів­­працював із редакцією г. «Нова Україна».&nbsp; 1944–49&nbsp;— на еміграції в Німеч­чині (м. Берлін, Мюнхен, Новий Ульм), де за­ймався журналістикою, освітньою діяльністю, дописував до ж. «Рідне слово» (Мюнхен), г. «Українські вісті» УРДП (Новий Ульм). Від 1949&nbsp;— в Австралії (м. Ньюпорт, Мельбурн), де очолював філію Обʼ­єд­на­н­ня українських письмен­ників «Слово». Працював на електро­станції (до 1971), водночас від 1952&nbsp;— директор та вчитель української мови і літератури в суботній школі у Ньюпорті. Голова Української центральної шкільної ради Австралії (1953–63; за його керівництва кількість укр. шкіл зросла від 13-ти до 50-ти). 1954 створив і очолив Літературно-мистецький клуб, що у різних містах Австралії проводив літературні вечори, на яких, зокрема, читав доповіді («Про життя і творчість Івана Франка», «Як Москва русифікує Україну» тощо). Заснував у Мельбурні видавництво «Ластівка» (1953), у якому від 1954 під його едицією виходив альманах «Новий обрій», а також на­друкував серію своїх дитячих пригодниц. оповідань: «На гадючому острові» (1953), «Вовченя» (1954), «Це трапилося в Австралії» (1955) та ін.&nbsp; Літературний дебют&nbsp;— вірш у г. «Голос Полтавщини» (1927). Від 1930 друкувався у ж. «Політфронт», був чл. одно­ймен­ної літ. організації. Перша зб. віршів «Поезія індустрії» ви­йшла 1931, потім зʼявилися кн. нарисів «На прикордон­ні» (1932) та поет. зб. «Склепі­н­ня» (1933; усі&nbsp;— Харків). Н. опуб­лікував низку книг худож. прози, літ.-крит., мовозн. праць (зокрема «Український правописний словник», 1968; «Український орто­графічний словник», 1975; обидва&nbsp;— Мельбурн), а також мемуарів&nbsp;— «В лісах під Вязьмою» (Мюнхен, 1958; Мельбурн, 1983), «Від Зінькова до Мельборну» (1990), «Під сонцем Австралії» (1994; обидва&nbsp;— Мельбурн). Видав памʼятну кн. «Українці в Австралії» (1965; спільно з М. Болюхом), кн. «200 листів Б. Антоненка-Давидовича» (1986; обидві&nbsp;— Мельбурн), зб. «Листи письмен­ників» (Мельбурн, 1992; Ніжин, 1998; К., 2001), упорядковував зб. «З-під евкаліптів» (Мельбурн, 1976; початк. назва&nbsp;— «Українські поети в Австралії»). Ві­домий і як популяризатор творчості укр. письмен­ників (І. Багряний, Б. Антоненко-Давидович, Микола Лазорський, Ю. Вухналь та ін.). Приділяв багато часу редагуван­ню книг та написан­ню до них перед­мов, пере­кладав російських письмен­ників та поезії німецьких авторів, залишив велику епістолярну спадщину.&nbsp; У 2000 р. Лігою українських меценатів та родиною Нитченків засновано літературну премію його імені. Додаткові відомості Основні праці Шевченко в житті. Регенсбург, 1947; Живий Шевченко. Мюнхен, 1963; 3-є вид. Мельбурн, 1987 (англ. перекл. — Shevchenko the Man. 1985); Стежками пригод. Мельбурн, 1975; К., 1993; Елементи теорії літератури і стилістики. Мельбурн, 1975; 1979; Полтава, 1993; З новогвінейських вражень. Лондон, 1977; На життьовому і творчому шляху В. Ґжицького. К.; Торонто, 1978; Б. Антоненко-Давидович: Життя і творчість. Мельбурн, 1979; Літературна спадщина Івана Багряного. К.; Торонто, 1980; Люди великого серця. Мельбурн, 1981; У дзеркалі життя й літератури. Мельбурн, 1982; Як Мос­ква русифікує Україну. Мельбурн, 1982; Відлуння великого голоду в спогадах очевидців і українській літературі. К.; Торонто, 1982; Слідами Миклухи-Маклая. К., 1993; Силуети. Ніжин, 1996. Рекомендована література Зернецька О. Дмитро Нитченко: Життя навпіл. Патріарх першої генерації українців в Австралії // Всесвіт. 1992. № 5–6. Google Scholar Internet Чумаченко В. Австралийский Иван Франко // Кубан. новости [Краснодар]. 1993, 21 фев"}, {"idx": 116, "name": "Німчук Дмитро", "birth_year": "1897.0", "death_year": "1945.0", "migration_status": "deported", "reasoning": "Німчук was arrested and tortured (\"закатований\") by the Gestapo following the Hungarian occupation of Transcarpathia in 1939. This constitutes forced displacement under foreign occupation authority during WWII, meeting the criteria for forced removal from his residence and ultimately his death in custody in 1945.", "article_url": "https://esu.com.ua/article-72415", "bio": "НІМЧУ́К Дмитро (04. 10. 1897, с. Ясіня Мараморос. комітату, нині смт Рахів. р-ну Закарп. обл.&nbsp;— 1945)&nbsp;— громадсько-політичний і культурний діяч. Закін. Ужгород. торг. академію (діяла у 1922–25), де по­зна­йомився з патріотично налаштованими діячами краю і захопився ідеєю від­родже­н­ня укр. державності. У період існува­н­ня в Ясіні Гуцульської республіки (листопад 1918&nbsp;— червень 1919) був особистим радником її кер. С. Клочурака. Згодом брав активну участь у культ.-осв. діяльності, зокрема заснував у рідному селі читальню товариства «Просвіта», організував спортивний клуб «Січ», проводив зʼ­їзди закарп. молоді, редагував часописи «Вперед» і «Лісовий робітник». Від 1937&nbsp;— за­ступник голови кра­йового від­діл. товариства «Просвіта», деякий час працював за фахом у Під­карп. банку (Ужгород). У часи становле­н­ня Карпатської України (жовтень 1938)&nbsp;— чл. 1-ї Руської центр. нар. ради, спів­­автор зверне­н­ня до премʼєр-міністра Чехо-Словач­чини Я. Сирови з вимогою на­да­н­ня автономії краю та створе­н­ня його уряду. Тоді ж при­знач. дир. кра­йового уряду з питань забезпече­н­ня робітників на Закарпат­ті. У листопаді 1938 уві­йшов до складу оператив. групи, що під час на­ступу угор. військ за­ймалася евакуацією держ. майна з Ужгорода до нової столиці краю&nbsp;— м. Хуст (нині Закарп. обл.). На поч. 1939 став чл. проводу Укр. нац. обʼ­єд­на­н­ня та Карпат. Січі. 12 лютого 1939 обраний послом Сойму Карпат. України, 15 березня того ж року взяв участь у першому його засі­дан­ні. Після окупації Закарпа­т­тя угор. військами ви­їхав до Братислави. За­арешт. і закатований ґестапо. Рекомендована література Белень М. Карпатська Україна у портретах. 1998. Google Scholar Internet Довганич О. Карпатська Україна в боротьбі за незалежність: репресії проти її оборонців та керівників. тинського р-ну, АР Крим&nbsp;— 12. 06. 2008, АР Крим)&nbsp;— кримськотатарський письмен­ник, журналіст. Член НСПУ (1980). Студіював на факультеті кримськотатарської мови і літератури Сімферопольського педагогічного ін­ституту (1939–41). Через хворобу змушений був залишити на­вча­н­ня, повернувся в рідне село, учителював. Під час 2-ї світової війни депортований до Середньої Азії, працював 1944–65 електриком, арматурником, монтажником; 1965–84&nbsp;— у редакції газети «Ленин байрагъы» («Ленінський прапор»), що видавали кримськотатарською мовою в Узбеки­стані. Згодом повернувся до Криму. Дебютував 1939 оповіда­н­нями в алуштинській ра­йон­ній газеті. Автор прозових книг «Къан ве чечек» («Кров та квітка», 1970), «Юрек эмиринен» («За велі­н­ням серця», 1975), «Йылдызлы геджелер» («Зоряні ночі», 1978), «Бир афта» («Один тиждень», 1983), «Алтын боялар» («Золоті фарби», 1988; усі&nbsp;— Ташкент), «Джанлы нишан» («Жива мішень», Сф., 1998). Майстерно описував важку долю свого народу, кожним своїм сюжетом, просякнутим кримськотатарським духом, спонукав читача до роз­думів. Завантажити статтю"}, {"idx": 120, "name": "Пекар Володимир Павлович", "birth_year": "1928.0", "death_year": "1990.0", "migration_status": "non_migrated", "reasoning": "Volodymyr Pekar was born in Kozova, Ternopil region and remained in Ukraine throughout his life, working in Lviv (1953-1978) and then Rivne (1978-1990) where he died. There is no evidence of forced displacement, voluntary emigration, or movement outside Soviet/Ukrainian borders—his entire career as a choral conductor and pedagogue was conducted within Ukraine.", "article_url": "https://esu.com.ua/article-879265", "bio": "ПЕ́КАР Володимир Па­влович (24. 02. 1928, м-ко Козова, нині смт Тернопільського р-ну Тернопільської обл.&nbsp;— 22. 07. 1990, Рівне)&nbsp;— хоровий диригент, педагог. Доцент (1981). Заслужений діяч мистецтв УРСР (1969). Закінчив Львівську консерваторію (1962; кл. Є. Вахняка ). Був керівником хору Львівського педагогічного училища № 1 (1953–57), засновником і художнім керівником хорової капели Львівського політехнічного ін­ституту (1957–67). У 1967–78&nbsp;— художній керівник і головний диригент Державної хорової капели УРСР «Трембіта» (Львів), з якою ви­ступив 1969 на Декаді української літератури й мистецтва в Москві. У репертуарі&nbsp;— українська і зарубіжна музична класика, твори українських сучасних композиторів, монументальні вокально-симфонічні композиції, оригінальні хорові твори й обробки народних пісень, зокрема Є. Козака, М. Колес­си, А. Кос-Анатольського, С. Людкевича, Р. Сімовича. Від 1978 викладав у Рівненському ін­ституті культури: 1979–81&nbsp;— виконувач обовʼязки завідувача, 1981–87&nbsp;— завідувач, 1987–90&nbsp;— доцент кафедри хорового диригува­н­ня; був засновником і керівником хорової капели при Ін­ституті. Рекомендована література Лащенко А. Хоровая культура: аспекты изучения и развития. К., 1989. Google Scholar Internet Столярчук Б. Незабутні постаті хорового мистецтва Рівненщини. Р., 2010. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 121, "name": "Перейма-Клим Ака Андріївна", "birth_year": "1927.0", "death_year": "2013.0", "migration_status": "migrated", "reasoning": "Ака Перейма was born in Poland (Siedlce) in 1927 and moved to Ukraine (Kopychnytsi) during childhood. From 1949 onwards, she lived permanently in the USA (Troy, Ohio), where she received formal artistic education, worked professionally, and remained until her death in 2013. This represents voluntary emigration from Soviet/post-Soviet territory to the United States with permanent settlement.", "article_url": "https://esu.com.ua/article-885242", "bio": "ПЕРЕ­́­ЙМА-КЛИМ Ака Андріївна (30. 09. 1927, м. Седльце, Польща&nbsp;— 2013)&nbsp;— скульпторка і живописець. Сестра Т. Осадцої-Клим , мати Х. Пере­йми-ОʼНіл . Заслужений художник України (2001). Дитячі роки про­йшли в м. Копичинці (нині Чортківський р-н Тернопільської обл.), де дід мав цегельню. Від 1949 мешкала в США, від 1959&nbsp;— в м. Трой. На­вчалася в Мистецьких школах при Ін­ститутах мистецтва в Дейтоні (1960–63; отримала диплом зі скульптури 1966; обидва&nbsp;— шт. Огайо) та Чикаґо (шт. Іл­лінойс, 1963–64); ви­вчала електрозварюва­н­ня при Технологічному ін­ституті «Гобарт» у м. Трой. 1970–80 працювала координатором про­грами електрозварюва­н­ня для скульпторів у цьому ж Ін­ституті. Авторка декоративно-паркової та станкової пластики, зокрема абстрактних металевих скульптур, а також керамічних творів, декоративного живопису, графічних композицій з орнаментами, запозиченими з писанок, українського народного мистецтва. Учасниця мистецьких ви­ставок у США, Канаді, Україні. Персональні&nbsp;— у США, Києві (1993). Додаткові відомості Основні твори живопис — «Зимова фантазія» (1960), «Боротьба і мудрість» (1970), «Посланці Божі» (1972), «Писанкові інтер’єри» (1975), «Унадився журавель» (1987), «Олень», «Павутиння» (обидва — 1989), «Два кольори мої» (1991), «Простір у вимірі кленового листка» (1999); графічні композиції — «Леда і Либідь», «Жінка» (обидві — 1964); скульптури — «Пара», «Драбина Якоба», «Затьміння» (усі — 1968), «Ерос» (1969), «Екліпс» (1974), «Хрест», «Лелека» (обидва — 1980), «Захисник» (1987), «Велика птаха» (1990); писанки — «Гори», «Вовчий зуб»; декоративна тарілка «Дерево життя» (2010). Рекомендована література Федорук О. Душа і форма. Пластика А. Перейми: Каталог виставки. К., 1993. Google Scholar Internet Його ж. Дивосвіт Аки Перейми. К., 1996. Google Scholar Internet Ака Перейма: Альбом. К., 1997. Google Scholar Internet Прядка В. Вічне і молоде в мистецтві Аки Перейми // Нар. мист-во. 2000. № 1–2. Google Scholar Internet Горбачов Д., Папета С. Ака Перейма — її модель світу // Образотворче мист-во. 2004. № 3. Google Scholar Internet Федорук О. Ака Перейма, Павлина Клим, Вака Фаррара-Перейма, Ірма Осадца: Кераміка. К., 2011. Google Scholar Internet Стельмащук Г. Українські митці у світі: Мат. до історії укр. мист-ва ХХ ст. Л., 2013. Google Scholar Internet Федорук О. Перейма оберігала континент мистецтва // Образотворче мист-во. 2014. № 2. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 122, "name": "Пестременко Андрій", "birth_year": "1936.0", "death_year": "2005.0", "migration_status": "migrated", "reasoning": "Andriy Pestremenko was born in Levice, Slovakia (then part of Czechoslovakia) in 1936 and died in Břeclav, Czech Republic in 2005, never living in Ukraine proper. He voluntarily settled and worked as a professional translator in Czechoslovakia/Czech lands from the 1980s onward, translating Ukrainian literary works into Slovak, representing permanent voluntary settlement outside Soviet/post-Soviet", "article_url": "https://esu.com.ua/article-880157", "bio": "ПЕСТРЕ́МЕНКО Андрій (14. 06. 1936, м. Левиці, нині Нітранс­ького краю, Словач­чина&nbsp;— 13. 12. 2005, м. Бpжецлав Пів­ден­номоравського краю, Чехія)&nbsp;— пере­кладач, прозаїк. На­вчався на медичному факультеті Університету імені Я. Коменського у Братиславі (1954–57), закінчив філософський факультет Університету імені П. Шафарика у Пряшеві (нині Словач­чина, 1968), в якому пере­бував на науково-викладацькій роботі. Від 1980-х рр. працював професійним пере­кладачем. Пеpекладав винятково з укpаїнських оpигіналів, а не за посеpедництва pосійського пеpекладу. Пере­клав словацькою мовою низку творів українських письмен­ників: «Паpашутистом в Каpпатах» М. Сабадоша («Padáky nad Karpatmi», 1974), «Хіба pевуть воли...» Панаса Мирного та І. Білика («Premrhaná sila», 1978), «Шовковий шнуpок» («Hodvabná šnúra», 1982) та «Князь Кий» («Knieža Kyj», 1988) В. Малика, «Pозгін» («Rozlet», 1982) і «Левине сеpце» («Levie srdce», 1983) П. Загребельного, «Вишневі усмішки» Остапа Вишні («Polievka z divej kačice», 1985), «Веpнися в дім свій» Ю. Мушкетика («Návrat») та «Інна Сівеpська, суддя» В. Дрозда («Sudkyňa»; обидва&nbsp;— 1988), а також антологію українських оповідань «Strom života» (1986), що вмістила твори 20-ти авторів. Разом із Ю. Андpічіком та Й. Маpушіаком бpав участь у пеpекладі вибpаного з твоpчості О. Довженка «Začarovaná Desna» тощо. Його пере­кладам притаман­на професійна точність, досконале зна­н­ня української мови, реалій пере­кладених творів та літературного контекс­ту. Рекомендована література Юрчо Я. Нотатки до перекладів А. Пестременка // Дукля. 1991. № 3–4. Google Scholar Internet Кундрат Ю. Перекладацький ужинок Андрія Пестременка // Там само. 2007. № 3. Google Scholar Internet Ľ. Babotová. Pestremenko Andrej // Slovník slovenských prekladateľov umeleckej literatúry. L–Ž. Bratislava, 2017. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 123, "name": "Пікор Стефан", "birth_year": "1888.0", "death_year": "1944.0", "migration_status": "non_migrated", "reasoning": "Pikор Stefan was born in Vienna (1888) but spent his entire documented creative and professional life in Ukrainian Galicia (Lviv, Brody, and briefly in Polish Brzessko for teaching). He worked as an art teacher in Lviv schools (1919–39) and participated regularly in Lviv exhibitions through 1939. There is no evidence of forced displacement, voluntary emigration to settle permanently outside Soviet", "article_url": "https://esu.com.ua/article-879413", "bio": "ПІ́КОР Стефан (1888, Ві­день&nbsp;— після 1944)&nbsp;— живописець. Закінчив гімназію, потім на­вчався в Художньо-промисловій школі (1905–06; обидві&nbsp;— Львів). Продовжив студії в Краківській академії мистецтв (Польща, 1907–13; викладачі Ю. Унєжиський, В. Вайс). 1911 був у Мюнхені. Працював учителем малюва­н­ня в гімназіях м. Броди (нині Львівська обл., 1913–16), м. Бжесько (нині Малопольське воєводство, Польща, 1916–19), Львова (1919–39). Учасник львівських ви­ставок 1910, 1921, 1924–26, 1931–39. Створював олійні й акварельні пейзажі («З околиць Львова», 1924; «Етюд з Делятина», 1932), натюрморти, релігійні композиції (зокрема для актового залу гімназії № 9 у Львові&nbsp;— «Богоматір», 1911; «Св. Ян з Кент», 1938). Особливо увагу приділяв порт­ретам, в яких стилізував мистецтво 15–16 ст., за­стосовував алегорії та літературні асоціації: порт­рети дружини (1922, 1924), автопорт­рети («Рінальдо й Арміда» (з дружиною), 1926; «Пейзажист», 1931; «Св. Юрій», 1933). Деякі твори П. зберігаються в Національному музеї у Кракові. Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 124, "name": "Плаксін Євген Фролович", "birth_year": "1945.0", "death_year": "2020.0", "migration_status": "non_migrated", "reasoning": "Plaksin was born in Basdorf, Germany in 1945 (likely a displaced person camp or Soviet-controlled zone post-WWII), but there is no evidence of forced deportation by Soviet authorities. He completed his education in Kharkiv in 1966 and worked his entire career at the Kharkiv Ukrainian Drama Theatre until his death in Kharkiv in 2020, indicating he lived and worked within Ukraine throughout his prof", "article_url": "https://esu.com.ua/article-878997", "bio": "ПЛАКСІ́Н Євген Фролович (20. 03. 1945, м. Басдорф, Німеч­чина&nbsp;— 12. 10. 2020, Харків)&nbsp;— актор. Заслужений артист України (1997). Закінчив Харківський ін­ститут мистецтв (1966; викладач Я. Азімов). Від­тоді працював у Харківському українському драматичному театрі імені Т. Шевченка. П. притаман­на екс­пресивна манера по­да­н­ня персонажів, гострий зовнішній малюнок ролей, романтичне забарвле­н­ня образів класичного репертуару. Додаткові відомості Основні ролі Скворцов («Шельменко-денщик» Г. Квітки-Основ’яненка), Проценко («Повія» за Панасом Мирним), Гнат, Іван («Безталанна», «Суєта» І. Карпенка-Карого), Філч («Тригрошова опера» Б. Брехта), Чорний («Голубі олені» О. Коломійця), Чувалов («Не стріляйте в білих лебедів» за Б. Васильєвим), Герцог Ольбанський («Король Лір» В. Шекспіра), Раймондо («Моя професія — синьйор з вищого світу» Дж. Скарначчі, Р. Тарабузі), Ленцман («Молода господиня Ніскавуорі» Х. Вуолійокі), Ферапонт («Три сестри» А. Чехова). Завантажити статтю"}, {"idx": 125, "name": "Подолянко Богдан Степанович", "birth_year": "1921.0", "death_year": "2000.0", "migration_status": "migrated", "reasoning": "Podolyanko was a Ukrainian creative worker (writer, translator, journalist) who voluntarily left Soviet-controlled territory in 1944, emigrated through Austria and Germany, and permanently settled in Sydney, Australia from 1949 onwards, where he remained until his death in 2000. There is no evidence of forced deportation; his departure was connected to his OUN nationalist activities and represente", "article_url": "https://esu.com.ua/article-880199", "bio": "ПОДОЛЯ́НКО Бог­дан Степанович (псевдонім&nbsp;— Австралюк; 30. 01. 1921, м-ко Ожидів, нині село Золочівського р-ну Львівської обл.&nbsp;— 20. 10. 2000, м. Сідней, шт. Новий Пів­ден­ний Велс, Австралія)&nbsp;— письмен­ник, пере­кладач, журналіст, громадський діяч. На­вчався (до 1939) у Львівській учительській семінарії. 1937 вступив до ОУН, 1939 за націоналістичну діяльність був увʼязнений у тюрмі «Бригідки» у Львові. 1942–43 як учасник під­пі­л­ля працював у нелегальній друкарні Проводу ОУН «Прага» на Львівщині. 1944 емігрував до Відня, 1945&nbsp;— до Ін­нсбруку (Австрія), 1946&nbsp;— до Мюнхена (Німеч­чина), де очолив видавництво «Українська трибуна» (1946–49), на­вчався в Університеті та був кореспондентом газети «Українська трибуна» (пізніше «Український само­стійник», від 1948). Від 1949&nbsp;— в Австралії, оселився в Сіднеї. У тому ж році разом із В. Шумським започаткував у м. Беррі (шт. Новий Пів­ден­ний Велс) першу українську газету в Австралії&nbsp;— тижневик «Вільна думка». Входив до її редколегії (1949–70), по­стійно дописував на громадсько-політичні теми (деякі під псевдонімом). Секретар Обʼ­єд­на­н­ня українців Австралії (1951–52). Автор книг оповідань «Любіть життя» (1982), «Сповідь» (1984), «Фантастична втеча Мирослава Січинського» (1987; усі&nbsp;— Сідней). Пере­клав українською мовою працю польського публіциста Л. Василевського «Україна та її про­блеми» (польське ви­да­н­ня&nbsp;— Краків, 1911; пере­клад&nbsp;— Сідней, 1988). Додаткові відомості Державний архів Центральний державний архів-музей літератури і мистецтва України. Ф. 1350, оп. 1. Завантажити статтю"}, {"idx": 126, "name": "Познанський Борис Станіславович", "birth_year": "1841.0", "death_year": "1841.0", "migration_status": "excluded_bad_dates", "reasoning": "The biography contains an internal date contradiction — it states the person was born in 1841 and died in 1841, which is impossible. Additionally, the birth date is listed as 25.04(07.05).1841 and death as 27.09(10.10).1906 in the text itself, indicating the death year should be 1906, not 1841. These conflicting dates make reliable classification impossible.", "article_url": "https://esu.com.ua/article-880459", "bio": "ПОЗНА́НСЬКИЙ Борис Станіславович (криптонім&nbsp;— П-ский Б.; 25. 04(07. 05). 1841, м. Стародуб Чернігівської губ., нині місто Брянської обл., РФ&nbsp;— 27. 09(10. 10). 1906, Пів­нічний Кавказ)&nbsp;— письмен­ник, етно­граф. Походив зі стародавнього подільського шляхетського роду. Деякий час його батько вчителював у Полтаві, а сам він на­вчався у місцевій гімназії. Закінчив Білоцерківську гімназію (нині Київська обл., 1859), студіював в Університеті святого Володимира в Києві (1859–61). Збирав етно­графічні матеріали, особливо його приваблювали місцевості, повʼязані з історією козацтва, належав до гуртка «хлопоманів», згодом був членом «Старої громади». Залишивши на­вча­н­ня, оселився в с. Дударі (побл. Канева, нині Черкаська обл.). Тут він на­вчав грамоті селян, читав їм українські книжки, пояснював основні положе­н­ня реформи 1861, а також за­ймався народо­знавством, записував пісні; на­друкував в «Основі» нарис «Лист з Дударів». П. не поривав звʼязків зі своїми друзями з українофільського руху В. Антоновичем, Т. Рильським та ін. У квітні 1861 був заарештований, у су­проводі двох солдат побував на пере­похован­ні Т. Шевченка на Чернечій горі біля Канева. Після звільне­н­ня повернувся в Дударі. Працював на Київщині та Катеринославщині, де 5 липня 1866 був знову заарештований і згодом засланий під суворий на­гляд поліції у Воронезьку губ. 1870 йому до­зволили жити «у всіх містах імперії, крім столиць, столичних губерній і Західного краю». Мешкав спочатку в Па­вловську, потім&nbsp;— в Острогозьку (обидва&nbsp;— Росія), де був повіреним у судових справах при окружному суді, пізніше оселився на Пів­нічному Кавказі. Проводив етно­графічні дослідже­н­ня серед місцевого українського населе­н­ня. З початком виходу журналу «Киевская старина» став її активним автором. На­друкував у ньому українські пісні «Ой на біду, на горе козак уродився» та «Бондарівна», записані у 1860-х рр. на Канівщині («Две старые украинские песни и по поводу их», 1885, т. 13, № 10), а також стат­ті «Воспоминание из недалекого прошлого: (О школе и грамотности в Киевской губернии)» (1885, т. 11, № 2), «Воронежские хохлы: (Из случайных заметок, воспоминаний и наблюдений)» (там само), «Воспоминания о польском вос­стании в Украине 1863 года» (там само, т. 13, № 11, 12), «Разбойник Тараненко» (1890, т. 30, № 7, «Документы, известия и заметки»), «Картины моего прошлого» (1892, т. 36, № 2, 3; т. 37 , № 4), повість «Попок: [из быта донских малорос­сов]» (частина 1&nbsp;— 1894, т. 44, № 1–3; т. 45, № 5; т. 46, № 8, 9; частина 2&nbsp;— 1898, т. 63, № 10–12; 1899, т. 64, № 1, 3; т. 65, № 4, 5; т. 66, № 7), пʼєсу «Картынкы сучасного селянського побыту: (Не задля кону)» (1900, т. 68, № 2), роз­відки «По поводу статьи Ц. Г. Не­ймана о Бондаривне» (1902, т. 77, № 5, «Документы, известия и заметки»), «Кое-что о козач­чине на Украине в 1855 году» (1905, т. 89, № 4) та ін. У часописі «Зоря» (1886, № 7, 8, 13, 24) вмістив ста­т­тю «Весна в українському селі», у «Трудах XII Археологического съезда в Харькове 1902 г.» (т. 3, Москва, 1905)&nbsp;— працю «Одежда малорос­сов». Посмертно побачили світ «Воспоминания Б. С. По­знанского» (журнал «Украинская жизнь», 1913, № 1–5; окремий від­биток&nbsp;— Москва, 1913) та «Дополнения и материалы по истории написания воспоминаний» (там само, 1913, № 10; 1914, № 3, № 8–10). Його іменем на­звані вулиця та провулок у Дні­прі. Рекомендована література Григорович М. [Рец. на «Воспоминания»] // Рада. 1913. № 169. Google Scholar Internet Михальчук К. П. Из украинского былого: (К воспоминаниям Б. С. Познанского) // Украинская жизнь. 1914. № 5–6. Google Scholar Internet Міяковський В. Б. С. Познанський: Народник 60-х рр. // Україна. 1926. № 1. Google Scholar Internet Ротач П. Побутописець Борис Познанський // Український календар: 1971. Варшава, 1970. Google Scholar Internet Короткий В., Ульяновський В. Познанський Борис Станіславович (1841–1906) // З іменем Святого Володимира: Київський університет у документах, матеріалах та спогадах сучасників: У 2 кн. Кн. 2. К., 1994. Google Scholar Internet Мелентьев М. Мой час и мое время. Санкт-Петербург, 2001. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 127, "name": "Покришкін Петро Петрович", "birth_year": "1870.0", "death_year": "1922.0", "migration_status": "excluded_pre_soviet", "reasoning": "Pokryshkin was born in 1870 and died in 1922, with the vast majority of his significant professional activity (education 1895, teaching 1900-1919, archaeological work 1895-1918) occurring before or during the early Soviet period. Most importantly, he died in 1922, barely one year into the Soviet era, and there is no evidence of forced displacement—his final move to the Lukoyanov monastery in 1920", "article_url": "https://esu.com.ua/article-881579", "bio": "ПОКРИ́ШКІН Петро Петрович (22. 07(03. 08). 1870, м. Іркутськ, Росія&nbsp;— 05. 02. 1922, м. Лукоянов, нині Нижьогородської обл., РФ)&nbsp;— архітектор-ре­ставратор. Академік архітектури (1909). Дійсний член Російського археологічного товариства (1904). Закінчив Вище художнє училище Санкт-Петербурзької академії мистецтв (1895), де 1900–19 й працював: викладач нарисної геометрії, професор історії архітектури та будівництва. Від 1895 брав участь в екс­педиціях Імператорської археологічної комісії (1902–18&nbsp;— її член). 1897–1900 по­глиблював зна­н­ня у Франції й Італії. Автор низки праць у фахових ви­да­н­нях. 1920 рукопокладений на священика. Від­тоді служив у Лукояновському Тихонівському монастирі. Досліджував та виконував ре­ставраційні роботи архітектурних памʼяток України: Юрʼєвої божниці в м. Остер (нині Чернігівської обл., 1907), Свято-Василівського собору в м. Овруч (нині Коростенського р-ну Житомирської обл., 1908–12, допомагав О. Щусєву ), церкви Спаса на Берестові у Києві (1913, спів­автор В. Пещанський ), мурованої вежі в м. Острог (нині Рівненського р-ну Рівненської обл., 1913–15, спів­автор В. Леонтович ), мечеті Хан-Джамі й ін. споруд Бахчисарайського палацу (нині АР Крим, поч. 20 ст.). 1915 брав участь у роз­копках Золотих воріт в Києві. Рекомендована література Тимофієнко В. Зодчі України кінця 18 — початку 20 століть. К., 1999. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 128, "name": "Портенко Андрій Панасович", "birth_year": "1910.0", "death_year": "1943.0", "migration_status": "internal_transfer", "reasoning": "Andrii Portenko was born in Odesa (Ukraine) in 1910 and died in Tbilisi (Georgia) in 1943. While he died outside Ukraine, this was within the Soviet Union during WWII when many Soviet citizens were relocated or fled eastward. There is no evidence of forced deportation by Soviet authorities (no mention of arrest, Gulag, or NKVD deportation order), and no indication of voluntary permanent emigration", "article_url": "https://esu.com.ua/article-885301", "bio": "ПОРТЕ́НКО Андрій Панасович (1910, Одеса&nbsp;— 24. 12. 1943, Тбілісі)&nbsp;— поет. Член СПУ (1934). П о, де від 1939 працювала солісткою. 1944–50 викладала вокал у Львівському, 1950–67&nbsp;— у Рівненському музичних училищах. Додаткові відомості Основні партії паж Оскар («Бал-маскарад» Дж. Верді), Мімі («Богема» Дж. Пуччіні), Маргарита («Фауст» Ш. Ґуно), Євдоксія («Дочка кардинала» Ф. Галеві), Сільва («Сільва» І. Кальман). Рекомендована література Медведик П. Діячі української музичної культури: Мат. до біо-бібліогр. слов. // Зап. НТШ: Пр. Музикознав. комісії. Л., 1993. Т. 232. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 130, "name": "Селезінка Василь Михайлович", "birth_year": "1933.0", "death_year": "1933.0", "migration_status": "excluded_bad_dates", "reasoning": "The biography contains a clear internal contradiction: the birth year is listed as 1933, but the death year is also listed as 1933, with a specific death date of 11 November 2017. This is chronologically impossible. The correct death year should be 2017, making the dates internally inconsistent and unreliable for classification purposes.", "article_url": "https://esu.com.ua/article-879311", "bio": "СЕЛЕЗІ́НКА Василь Михайлович (14 (за паспортом&nbsp;— 26). 10. 1933, с. Іспас, нині Спас Коломийського р-ну Івано-Франківської обл.&nbsp;— 11. 11. 2017, Чернівці)&nbsp;— актор, режисер, журналіст, педагог, громадсько-культурний діяч. Заслужений діяч мистецтв України (2006). Член НСЖУ (1973). Закінчив Київський ін­ститут театрального мистецтва (1956), факультет журналістики Львівського університету (1967). У 1956–63 працював у Рівненському музично-драматичному театрі, де здійснив по­становку пʼєси-казки «Біла троянда» Б. Юнґера; за сумісництвом викладав у педагогічному ін­ституті, був позаштатним кореспондентом обласної газети «Червоний прапор», лектором товариства «Зна­н­ня». 1963–95&nbsp;— керівник режисерсько-по­становочної групи Чернівецької студії телебаче­н­ня; від 1994&nbsp;— головний режисер телебаче­н­ня, за сумісництвом&nbsp;— художній керівник Чернівецького музично-драматичного театру імені О. Кобилянської, де здійснив по­становки пʼєси «Лови на ловців» С. Ярчевського і комедії «Ні, це не біс у ребро» М. Полоцького. Від 1999&nbsp;— редактор від­ділу художніх і пі­знавальних теле­про­грам, за авторський цикл «Місто моєї любові» здобув міську премію імені Йосипа Главки (2001). Водночас від 1992 очолював літературний Народний театр Будинку естетики та до­зві­л­ля Чернівців, для якого написав понад 10 пʼєс та літературних композицій; від 1999 викладав у Вищому художньому профучилищі № 5. В оперному народному театрі Центрального палацу культури (Чернівці) по­ставив «Наталку Полтавку» М. Лисенка і «Катерину» М. Аркаса. Літературною творчістю захоплювався з дитинства, першу пʼєсу написав і по­ставив на сільській сцені ще в 5-му класі («Украдений син»), інсценізував «Запорожців» П. Панча. Перша гумореска опублікована 1960. Майже 50 фрашок-придибашок уві­йшло до збірки «Грабовий масаж» (Чц., 2006). Додаткові відомості Основні твори Золотої нитки не згубіть. 2001; Місто моєї любові. 2002. Ч. 1; 2008. Ч. 2; Світло Цецинської гори. Штрихи до історії Чернівецької студії телебачення. Ч. 1. 2002 (співавт.); Житіє моє та нечиста сила. 2009 (усі — Чернівці). Рекомендована література Довбуш О. Воскресіння навмисно забутого // Український театр. 1997. № 2. Google Scholar Internet Васильчук М. Коломийський азбуковник: Друкарство, журналістика, література 1939–1999 рр.: Бібліогр. слов. Коломия, 2000. Google Scholar Internet Іванюк М. Літературно-мистецька Вижниччина: Бібліогр. довід. Вижниця, 2001. Google Scholar Internet Щербанюк Л. Місто його любові // Буковин. віче. 2003, 24 жовт. Google Scholar Internet Росинська О. Фрашки-придибашки від Василя Селезінки // Свобода слова. 2006, 26 жовт. Google Scholar Internet Глід В. Грабовий гумор на всі випадки // Буковин. журн. 2007. Ч. 1. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": const STORAGE_KEY = 'ukraine_s14_decisions';
const NOTES_KEY   = 'ukraine_s14_notes';

let decisions = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
let userNotes  = JSON.parse(localStorage.getItem(NOTES_KEY)   || '{}');
let current    = 0;
let noteTimer  = null;

function saveDecision(idx, d) {
  decisions[idx] = d;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(decisions));
}
function saveNote(idx) {
  const txt = document.getElementById('note-input').value;
  userNotes[idx] = txt;
  localStorage.setItem(NOTES_KEY, JSON.stringify(userNotes));
  const s = document.getElementById('note-saved');
  s.style.display = 'inline';
  setTimeout(() => s.style.display = 'none', 1200);
}
function scheduleNoteSave(idx) {
  clearTimeout(noteTimer);
  noteTimer = setTimeout(() => saveNote(idx), 600);
}

const STATUS_COLORS = {
  'migrated':'migrated','non_migrated':'non_migrated','deported':'deported',
  'internal_transfer':'internal_transfer','excluded_pre_soviet':'excluded_pre_soviet',
  'excluded_non_ukrainian':'excluded_non_ukrainian','excluded_bad_dates':'excluded_bad_dates'
};

function render() {
  const e = ENTRIES[current];
  const idx = e.idx;
  document.getElementById('pos-label').textContent = (current+1) + ' / ' + ENTRIES.length;
  document.getElementById('meta-line').textContent = 'idx=' + idx + ' | born ' + (e.birth_year||'?') + ' | died ' + (e.death_year||'?');
  document.getElementById('entry-name').textContent = e.name;
  const cls = STATUS_COLORS[e.migration_status] || '';
  document.getElementById('status-badge').innerHTML = '<span class="status-badge ' + cls + '">' + e.migration_status + '</span>';
  document.getElementById('entry-reasoning').textContent = e.reasoning || '(no reasoning)';
  document.getElementById('entry-bio').textContent = e.bio || '(no bio fetched)';
  const link = document.getElementById('esu-link');
  link.href = e.article_url || '#';
  link.style.display = e.article_url ? 'inline' : 'none';
  const noteEl = document.getElementById('note-input');
  noteEl.value = userNotes[idx] || '';
  const d = decisions[idx];
  const noteLabel = document.getElementById('note-label');
  noteLabel.className = (d === 'wrong') ? 'red' : '';
  noteLabel.textContent = (d === 'wrong') ? 'Note — describe the correct classification:' : 'Note (optional)';
  noteEl.oninput = () => scheduleNoteSave(idx);
  updateCounts();
  renderSidebar();
}

function decide(d) {
  const e = ENTRIES[current];
  saveDecision(e.idx, d);
  if (d === 'wrong') {
    const noteLabel = document.getElementById('note-label');
    noteLabel.className = 'red';
    noteLabel.textContent = 'Note — describe the correct classification:';
    document.getElementById('note-input').focus();
  } else {
    if (current < ENTRIES.length - 1) {
      setTimeout(() => { current++; render(); }, 350);
    }
  }
  updateCounts();
  renderSidebar();
}

function go(dir) {
  const newIdx = current + dir;
  if (newIdx >= 0 && newIdx < ENTRIES.length) { current = newIdx; render(); }
}

function updateCounts() {
  let correct=0, wrong=0, skip=0;
  for (const e of ENTRIES) {
    const d = decisions[e.idx];
    if (d === 'correct') correct++;
    else if (d === 'wrong') wrong++;
    else if (d === 'skip') skip++;
  }
  document.getElementById('n-correct').textContent = correct;
  document.getElementById('n-wrong').textContent = wrong;
  document.getElementById('n-skip').textContent = skip;
  document.getElementById('n-unseen').textContent = ENTRIES.length - correct - wrong - skip;
}

function renderSidebar() {
  const list = document.getElementById('sb-list');
  list.innerHTML = ENTRIES.map((e, i) => {
    const d = decisions[e.idx] || 'unseen';
    const cls = 'sb-' + d + (i === current ? ' sb-current' : '');
    const note = userNotes[e.idx] ? ' 📝' : '';
    const label = d === 'correct' ? '✓' : d === 'wrong' ? '✗' : d === 'skip' ? '–' : '·';
    return '<div class="sb-item ' + cls + '" onclick="current=' + i + ';render()">' +
      '<span>' + label + ' ' + (e.name||'').substring(0,18) + '</span><span>' + e.migration_status.substring(0,6) + note + '</span></div>';
  }).join('');
}

function exportData() {
  const out = ENTRIES.map(e => ({
    idx: e.idx,
    name: e.name,
    migration_status: e.migration_status,
    article_url: e.article_url,
    decision: decisions[e.idx] || 'unseen',
    note: userNotes[e.idx] || '',
  }));
  const blob = new Blob([JSON.stringify(out, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'stage14_validation_results.json';
  a.click();
}

render();
</script>
</body>
</html>
