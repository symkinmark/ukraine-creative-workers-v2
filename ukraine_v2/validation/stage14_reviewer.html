но), музично-гро­мадська діячка. Дочка М. Кузне­цова . Дебютувала в партії Мар­ґарити (опера «Фауст» Ш. Ґу­но) в антре­призі А. Церетелі (С.-Пе­тербург, 1904). Від 1905&nbsp;— солістка Маріїн. опери у С.-Пе­тер­бурзі. Ви­ступала з Ф. Шаляпіним , І. Тартаковим . Гастролювала в багатьох містах Росії, Франції, Великої Британії, Монако, США, Швеції, Італії, Іспанії, Японії. Брала уроки балет. майстерності у О. Преображен­ської, що дало змогу епізодично ви­ступати у низці балет. ви­став у С.-Пе­тербурзі і Москві, а також взяти участь у премʼєрі ба­лет. пантоміми «Легенда про Йосифа» Р. Штраус­са (Париж, «Рос. сезони С. Дягилєва», «Ґранд-Опера», 1914). Для К. написав оперу «Клеопатра» Ж. Мас­сне (вперше виконала 1914 у Монте-Карло). 1918 виїхала за кордон. Від 1919&nbsp;— солістка Королів. опер. театрів Швеції і Данії. Ви­ступала також на опер. сценах Парижа і Лондона. 1929 заснувала «Рос. приватну оперу в Парижі» з метою популяризації за кордоном рос. муз. культури. У складі цієї опери гастролювала в Іспанії, Німеч­чині, Італії, Бра­зилії, Арґентині. Деякий час меш­кала у Барселоні, де давала уро­ки і була муз. радником в опер. театрі. Остан­ні роки життя про­йшли в Парижі. Сильний, гнучкий голос широкого діапазону, актор. обдарува­н­ня, яскрава сце­нічна зовнішність до­зволили К. з однаковим успіхом втілювати різнохарактерні образи. У концертах виконувала нар. пісні, твори укр., рос. та зарубіж. ком­позиторів. Здійснила низку записів на грамплатівки. Додаткові відомості Основні партії Тетяна, Оксана («Євгеній Онє­гін», «Черевички» П. Чайковського), Оль­га («Русалка» О. Даргомижського), Ма­ша («Дубровський» Е. Направника), Антоніда, Горислава, Людмила («Життя за царя», «Руслан і Людмила» М. Глін­ки), Февронія («Сказання про невидимий град Кітеж» М. Римського-Корсакова), Джульєтта («Ромео і Джульєтта Ш. Ґуно), Віолетта («Травіата» Дж. Вер­ді), Ельза («Лоенґрін» Р. Ваґнера), Кар­мен (однойм. опера Ж. Бізе). Завантажити статтю"}, {"idx": 34, "name": "Лагуті Абулкасем", "birth_year": "1887.0", "death_year": "1957.0", "migration_status": "excluded_non_ukrainian", "reasoning": "Лагуті Абулкасем was an Iranian and Tajik poet born in Kirmanshah, Iran. While he lived in the Soviet Union from 1922 onwards (in Azerbaijan, Tajikistan, and Moscow), he was not Ukrainian by nationality or primary cultural identity. The study targets Ukrainian creative workers, and this person was Iranian/Persian by origin and Tajik by later Soviet affiliation. His inclusion would violate the nati", "article_url": "https://esu.com.ua/article-52869", "bio": "ЛАГУТІ́ Абулкасем (Лоҳутӣ Абулқосим; справж.&nbsp;— Қосим Аҳмадзода Кир­моншоҳӣ; 04. 12, за ін. даними&nbsp;— 12. 10. 1887, м. Кирманшах, Іран&nbsp;— 16. 03. 1957, Москва)&nbsp;— ірансь­кий і таджицький поет, пере­кла­дач, громадсько-політичний діяч. До 1922 жив в Ірані. У 16 р. здо­був ви­зна­н­ня серед земляків як поет-суфій, ді­ставши почесне літ. імʼя Л.&nbsp;— Просвітлений. Навч. у суфій. школі «Тарбіят» в Тегерані. Дебютував 1907 віршем у перс. г. «Хабл ал-Матін» у Калькут­ті. Учасник Перс. кон­ституц. революції 1905–11. Після придушен­ня революції та окупац. роз­ділу Ірану Росією та Великою Британією Л. був засудж. до смерт. кари, однак він утік і емігрував у Багдад. Після поверне­н­ня, 1916 випускав у Кирманшасі рев.-де­­мократ. г. «Бісотун». 1917 емігру­­вав до Стамбула, де 1918–21 ви­­давав ж. «Парс» перс. і франц. мовами. Повернувшись 1922 на батьківщину, очолив антиімперіаліст. 2-е Тебриз. пов­ста­н­ня, ві­доме в історії нац.-визв. боротьби в Ірані як «Пов­ста­н­ня Ла­­гуті-хана». Після придуше­н­ня пов­ста­н­ня Л. із залишками свого загону в 400 вершників від­ступив з іран. Азербайджану в рад. Азербайджан, де їх роз­зброїли більшовики. Жив у Нахі­чевані, Баку, Тбілісі та Москві, де очолював таджиц. секцію у Центр. видавництві народів СРСР (1923–25). Після утворе­н­ня Таджиц. АРСР Л. працював у Душанбе (1925–30) над організацією Таджиц. держ. видавництва, був заст. нар. комісара освіти Таджиц. РСР. Від 1931&nbsp;— кор. г. «Правда», від 1934&nbsp;— секр. СП СРСР у Москві. Творча спад­­щина Л. багата й різноманітна за жанрами: філос.-духовна, інтим­на й громадян. лірика, поеми, притчі, драми, проза, пере­клади. Майже всї свої твори написав в еміграції. У Стамбулі ви­­йшли книжки віршів і поем «Книга Наврузу&nbsp;— книга Ірану» (1918), «Веснянка» (1919), «Рубіни Лагуті» (1921). В Ірані поезія Л. пере­бувала під суворою забороною впродовж 20-річ. правлі­н­ня Реза-шаха Пехлеві (1922–41), і лише 1941 у Тебризі вперше на батьківщині ви­йшла збірка його поезій. У 1940-х рр. Л. жив у Таджики­стані й 1947 завершив один з найбільших, най­­значніших своїх творів&nbsp;— поему-алегорію «Пері щастя». За цю найдовершенішу в новіт. таджиц. літературі поему, написану в дусі нар. епіч. оповіді з при­йомами поет. інослівʼя, що є ви­значал. рисою нац. худож. мисле­н­ня іранців і таджиків, критики-космополіти роз­горнули в Таджики­стані кам­па­нію цькува­н­ня Л. Поет змуше­ний був знову пере­братися до Москви, але й там його не залишили в спокої. У роки замовчува­н­ня (1949–53) Л. написав цикл поезій-спогадів про Іран своєї юності, пройнятих тугою за батьківщиною, які згодом уві­­йшли до зб. «Поклик життя» (1956) та «Диван Абулкасема Лагуті» (1957). Після смерті Л. у Душан­бе ви­йшло повне зібр. його тво­рів у 6-ти т. (1960–1963), а 1987 до 100-річчя від дня народж.&nbsp;— у 7-ми т. Творчість Л. стала сполуч. ланкою між сучас. іран. й таджиц літ-рами&nbsp;— спадкоємицями ціліс. перс.-таджиц. пись­менства 10–15 ст. Л. вніс у сучасну таджиц. поезію свіжий ду­­ховно-філос. струмінь, увів нові строфічні форми, роз­міри, побудовані на фольклор. основі. Особливе місце в оригін. і пере­кладац. творчості Л. належить укр. культурі, чому сприяло його товаришува­н­ня з В. Сосюрою, П. Тичиною, які зокрема й пере­кладали його твори, а В. Сосюра залишив про Л. сердечні спогади в романі «Третя рота». Л.&nbsp;— перший пере­кладач і популяризатор поезії Т. Шевченка в Таджики­стані. У вересні 1933, їдучи через Україну в Крим на лікува­н­ня, пере­клав таджиц. мовою «Заповіт» Т. Шевченка, в якому тонко пере­дав зміст і пісен­ну форму оригіналу. Одночасно з пере­кладом написав вірш «Тарасу Шевченкові. Від­повідь на “Заповіт”» («Литературная газета», 1933, 10 октября). Після по­їздок в Україну у нарисах, листах, ви­ступах на Всесвіт. кон­гресі культури (Париж, 1935), на виїз. пленумі СП СРСР (Мінськ, 1936) Л. звертався до шевченків. доробку, зокрема роз­повід­ав про вшановува­н­ня його памʼяті, наводив факти з його біо­графії, порівнював значе­н­ня творчості Т. Шевченка в укр. культурі зі значе­н­ням О. Пушкіна для росіян і Сааді для таджиків. Імʼя укр. поета згадує у поезіях, присвяч. Україні,&nbsp;— «На березі Дні­пра» (1936), «Павлу Тичині» (1937), «Народові України, який бореть­ся», «Тарасів дім буде звільнений» (обидві&nbsp;— 1942), в яких викори­став мотиви та образи «За­­повіту» Т. Шевченка. Л. при­святив Україні чимало сторінок не­­завершеної автобіогр. книги, де поезія й проза становлять не­­роз­дільне ціле. Пере­клав тад­жиц. мовою окремі твори В. Шек­спіра, Лопе де Веґи, О. Пушкіна, О. Грибоєдова, М. Горького, В. Маяковського та ін. Твори Л. пере­кладено багатьма мовами світу, зокрема й укр.&nbsp;— перекл. М. Рильського, В. Мисика, Т. Ма­сенка, А. Глущака, П. Мовчана, Г. Халимоненка, О. Шокала, В. Ге­­расимʼюка, І. Римарука, І. Малковича, М. Василенка, О. Мо­кро­вольського, В. Неборака, І. Маленького, В. Па­влова, О. Пав­­лова. Додаткові відомості Основні твори укр. перекл. — Поезії. Х., 1932; Вибрані поезії. Х., 1934; Тарасу Ш"}, {"idx": 35, "name": "Ласовська-Крук Мирослава  Семенівна", "birth_year": "1919.0", "death_year": "1937.0", "migration_status": "migrated", "reasoning": "Ласовська-Крук was born in 1919 in western Ukraine (then under Polish control) and voluntarily emigrated, living in Argentina (1948–49) and then permanently settling in the United States (New York, later Michigan) from 1949 onward, where she maintained an active creative and community life until at least 1993. There is no evidence of forced Soviet displacement; her migration was entirely voluntary", "article_url": "https://esu.com.ua/article-53357", "bio": "ЛАСО́ВСЬКА-КРУК Мирослава Семенівна (дівоче&nbsp;— Сенів; 11. 03. 1919, с. Ясінка Масьова, нині Ясениця Турків. р-ну Львів. обл.)&nbsp;— письмен­ниця, громадська діячка, живописець. Дружина Б. Крука. Лауреатка трьох літ. нагород Фонду ім. І. Франка в Чикаґо. Закін. Сокал. гімназію (нині Львів. обл., 1937). У 1943 роз­почала мист. студії у Львові, продовжила навч. музики та співу в муз. школах Ін­нсбрука (Австрія, 1945–46), Парижа (1947–48), мистецтву в коледжі Монро (шт. Мічиґан, США, 1980–83). У 1948–49 мешка- ла в Арґентині, згодом емігрувала до США (Нью-Йорк), від 1970-х рр.&nbsp;— у м. Вор­рен (шт. Мі­чиґан), де працювала в школі україно­знавства, керувала театр. гуртком. Була актив. громад. діячкою: 1950–59&nbsp;— чл. Спілки укр. науковців, літераторів і мистців в Арґентині, від 1960&nbsp;— чл. Обʼ­єдн. укр. мистців Америки, за­ступник голови і секр. гол. управи Обʼ­єдн. жінок оборони чотирьох св­обід України, 1971–82&nbsp;— референтка в справах культури СФУЖО, водночас 1980–88&nbsp;— керівник Детройт. від­ділу Асоц. діячів укр. культури (шт. Мічиґан). 1992 від­відала Київ, була учасницею святкувань з нагоди 50-ї річниці УПА. Авторка пʼєс «Віщува­н­ня старого дуба» (Нью-Йорк, 1971), «Я повернусь» (1956), «Льодолом» (1960), «Поет і чорт» (1963), «Володимир Великий» (пере­кладено англ. мовою; Торонто, 1988), «День Мазепи» (зб. пʼєс для шкіл. театру ви­йшла 1993 у Львові), повісті «Під чорним небом» (1966), роману «Дзвінка молодість» (1982; обидва&nbsp;— Торонто). Ред.-упорядник дослідж. «Володимир Ласовський» (Торонто, 1980), авторка ст. «Володимир Івасюк&nbsp;— улюблений спів­ець України» (1983). Персон. та груп. ви­ставки у Канаді та США. Серед робіт&nbsp;— порт­рет Р. Шухевича (музей. екс­понат в с. Білогорща, нині у межах Львова), алегор. композиція «Героїня УПА», «Алегорія УПА» (оригінал листівки зберігається у Терноп. істор.-мемор. музеї політ. вʼязнів). Художні твори Л.-К. сповнені патріот. мотивами. У повісті «Під чорним небом» авторка змоделювала образ молодої українки, її долю під час рад. окупації Галичини. Центр. персонаж&nbsp;— Галя&nbsp;— з оптимізмом дивиться в майбутнє. З найбільшими труд­нощами і ката­строфами, що ви­­пали на її долю, бореться і пере­магає силою твердої віри, патріот. чину, глибокого почу­т­тя любові до рідної землі. Рекомендована література Чапленко Н. Зустріч з письменницями Нью-Йорку // Свобода. 1969, 6 груд. Google Scholar Internet Лещук Т. Мирослава Сенів-Ла­совська-Крук // Сокал. г-зія. Пропам’ятна книга. Л.; Сокаль, 2001. Google Scholar Internet Українська діа­спора: літ. постаті, твори, біо-бібліогр. відомості. Д., 2012. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 36, "name": "Левіна Розіна Яківна", "birth_year": "1880.0", "death_year": "1976.0", "migration_status": "migrated", "reasoning": "Rozina Levina was born in Kyiv in 1880 and initially had a successful career as a pianist across Europe (Vienna, St. Petersburg, Berlin). She lived in Berlin from 1914–1919, then voluntarily emigrated to the USA in 1919, where she settled permanently as a piano pedagogue and died in Glendale, California in 1976. This represents voluntary permanent emigration outside Soviet/post-Soviet borders with", "article_url": "https://esu.com.ua/article-53871", "bio": "ЛЕ́ВІНА Ро­зіна Яківна (дівоче&nbsp;— Бессі; 29. 03. 1880, Київ&nbsp;— 09. 11. 1976, м. Ґлендейл, шт. Каліфорнія, США)&nbsp;— піаністка, педагог. Від 1886 навч. приватно гри на фортепіано. Закін. Моск. консерваторію (кл. фортепіано В. Сафоно­ва, інструментува­н­ня&nbsp;— А. Аренського, гармонії&nbsp;— Н. Ладухіна), матем. факультет Моск. університету (обидва&nbsp;— 1898). Дебютувала з орке­стром 1895 Концертом Шопена для фортепіано № 1. Від­тоді активно концертувала із провід. оркестрами Європи у Відні (1910), С.-Пе­тербурзі (1911), Берліні (1912). У складі фортепіан. дуету разом зі своїм чоловіком Й. Левіним гастролювала у Росії, краї­нах Європи та Америки. Талант Л. високо цінували С. Рахманінов, К. Ігумнов, Ц. Кюї. 1914–19 мешкала у Берліні; від 1919&nbsp;— у США, де стала ві­домим фортепіан. педагогом: від 1938&nbsp;— викладач Джульярд. муз. школи у Нью-Йорку; від 1945&nbsp;— у класі вищої майстерності Лос-Анджелес. консерваторії. Серед учнів&nbsp;— лауреати між­нар. конкурсів піаністів Е. Ауер, Д. Браунінґ, Д. Пол­лак. Завантажити статтю"}, {"idx": 37, "name": "Левщенко Леонід Іванович", "birth_year": "1882.0", "death_year": "1954.0", "migration_status": "excluded_non_ukrainian", "reasoning": "Левщенко Леонід Іванович was a Belarusian (білоруський) literary scholar and publicist, not Ukrainian. Although he worked in Kyiv and was involved in Ukrainian cultural institutions, his nationality and primary identity were Belarusian, placing him outside the scope of this study which focuses on Ukrainian creative workers.", "article_url": "https://esu.com.ua/article-54006", "bio": "ЛЕ́ВЩЕНКО Леонід Іванович (Леўшчанка Леанід Іванавіч; псевд.&nbsp;— Лявон Леўш; 04. 08. 1882&nbsp;— 1954)&nbsp;— білоруський літературо­знавець, публіцист. Закін. фіз.-мат. факультет Університету св. Володимира у Києві (1910-і рр.). Входив у актив білорус. діаспори у Києві. Навесні 1917 брав участь у створен­ні першої білорус. нац. організації на території України&nbsp;— культ.-осв. гуртка «Зорка». На поч. 1919 намагався створити при Наркомосі УСРР білорус. літ.-видавн. від­діл. 1919&nbsp;— зав. літ.-видавн. від­ділу Наркомосу Литов.-Білоруської РСР (м. Бобруйськ, нині Білорусь). Уклав і видав під псевд. антологію «Дыя­менты беларускага прыгожага пісьменства» (Кіеў, 1919), де написав перед­мову «Гісторыя беларускага прыгожага мастацтва» і вмістив низку творів білорус. поетів, зокрема В. Дуніна-Марцинкевича, Якуба Коласа, Янки Купали, С. Полуяна, М. Бог­дановича, А. Гаруна. У ст. «Адбіткі класавага змага­н­ня ў беларускім пісьменстве» // «Школа и культура Советской Белорус­сии» (1919, № 2–3) про­аналізував тенденції у білорус. літературі у рев. період. 1936 заарешт., після звільне­н­ня працював у сільс. школі. Завантажити статтю"}, {"idx": 38, "name": "Липовецька Млада", "birth_year": "1897.0", "death_year": "1963.0", "migration_status": "migrated", "reasoning": "Липовецька Млада voluntarily emigrated from Ukraine (Volhynia) to Italy in 1914 to study singing, settled permanently in Turin/Rome where she lived and worked as a singer, translator, and journalist until her death in 1963. There is no evidence of forced displacement; her relocation was voluntary and she established a professional and creative life abroad.", "article_url": "https://esu.com.ua/article-54755", "bio": "ЛИПОВЕ́ЦЬКА Млада (ін. псевд.&nbsp;— Таїса Бельман, крипт.&nbsp;— M. L.; справж.&nbsp;— Нор­ляндер Раїса; 1897, Волинь&nbsp;— 1963, м. Турин, Італія)&nbsp;— спів­ачка, пере­кладачка, журналістка. Дружина&nbsp; Ч. Меано . Закін. Микол. ін­ститут для дівчат-сиріт у С.-Петербурзі (1914), того ж року виїхала до Італії на­вчатися співу. Ви­ступала з концертами, брала участь у концертах і конф. в Італії, пропагуючи укр. нар. пісню. Разом із І. Гриненком та В. Шебедевим заснувала Укр. центр. комітет у Римі. Член редколегії часопису «La voce dellʼUcraina» та інформ. бюлетеня «Ufficio Ucraino della Stampa» (1919–20), які заснувало Бюро укр. преси при дипломат. місії УНР (Рим). Втративши голос, від 1919 пере­кладала італ. мовою твори укр. письмен­ників, зокрема І. Котляревського, Т. Шевченка, Лесі Українки, І. Франка, Олек­сандра Олеся. Особливу увагу приділила популяризації твор­чості Т. Шев­ченка. 1919 у ча­сописі «La voce dellʼUcraina» опу­блікувала перші свої перекл. італ. мовою його поезії&nbsp;— «За­повіт» (№ 1), посла­н­ня «І мертвим, і живим», меди­тації «Чигрине, Чигрине» (№ 10). Перекл. Л. вір­ша «Заповіт» пізніше перед­руковано у книгах, присвяч. Укра­їні, Л. Майнарді (1933), Р. Бон­діолі (1939), Л. Сальвіні (1942). Авторка низки публіцист. статей з історії та культури Укра­їни у часописах «La voce dellʼUcraina», «Ucraina» (Турин) та ін. Спільно зі своїм чоловіком Ч. Меано пере­клала й під­готу­вала до друку зб. вибр. лірики із «Кобзаря»&nbsp;— «Taras Scevcenko. Liriche Scelte dal “Cobsar”» (Torino; Milano; Firenze; Roma; Napoli; Pa­lermo, 1926), яка містить 38 вір­шів і поем з ґрунт. перед­мовою Л. про життя і творчість поета, обсяг якої становить третину текс­ту вид. «Taras Scevcen­ko. Liriche ucraine» (Milano, 1941). Окремі перекл. творів Т. Шевченка («Доля», «Муза», «Слава», «Мені однаково, чи буду», «І небо невмите, і заспані хвилі», «Тарасова ніч», «Садок вишневий коло хати», «Кавказ», «Ой люлі, люлі, моя дитино») опубл. в італ. періодиці, зокрема у ж. «Ucraina» (1931, № 1–2; 1932, № 3). Від­новлюючи поему Т. Шев­ченка «Кавказ», Л. шукала не пря­моліній. лексич., а внутрішньо­сми­слових від­повід­ностей італ. й укр. слів та словосполучень, здійснила спробу зберегти звукопис оригіналу. У перекл. Л. вірш «Садок вишневий коло хати» називається «Вечір». Пере­клала італ. мовою також новелу «Кленові листки» В. Стефаника, драми «Брехня» та «Чорна Пантера і Білий Ведмідь» В. Вин­ниченка. Перекл. тяжіють до буквальності, хоча деякі реалії адаптовано в роз­рахунку на італ. читача. Л. концентрувала увагу на пере­даван­ні самого змісту, плину автор. думки, по­рівнянь, епітетів, метафор. Авторка роз­­відок про Лесю Укра­їнку, Н. Кобринську в італ. ви­да­н­нях. 1930 у Турині заснувала культурол., літ.-публіцист. жур­нал-збірник у формі брошури «Ucraina: Sei quaderni a cura di Mlada Lipovetzka», в якому публікувала до­вільні перекл. поезій Т. Шевченка зі своїми коментарями, су­проводом роз­думів про історію та літературу України. У зб. «Ucraina» (1932) праці Л. про­­аналізував проф. літ-ри Турин. університету академік А. Фарінел­лі. За сприя­н­ня й під­тримки С. Русової 20 травня 1923 була наймолодшим делегатом 14-го Між­нар. жін. кон­гресу, що проходив у Римі. Після пере­моги 1922 фашизму в Італії під­тримала модель побудови авторитар. су­спільства, вірила, що фашист. ідеологія силою пере­може біль­шовизм. Своє баче­н­ня висловила в апологет. роз­думах «Кіль­ка слів про фашизм» («ЛНВ», 1923, річник 22, кн. 2). Брала участь в ювіл. святі з нагоди проголоше­н­ня Соборно­сті Укра­їни 24 січ­ня 1959 у Римі за сприя­н­ня Укр.-італ. товариства. Ч. Меано присвятив Л. роман «Questa povera Arianna» (українською мовою&nbsp;— «Серця на гра­ні», Л., 1938). Рекомендована література Щебедів В. Українська справа в італійській пресі // Книга. 1921. № 1. Google Scholar Internet Омельченко М. Млада Липовецька та її «Ukraina» // Жін. доля. 1932. Ч. 11. Google Scholar Internet Онацький Є. По похилій площі: Записки журналіста і дипломата. Мюнхен, 1964. Ч. 1. Google Scholar Internet Богачевська М. Українська жінка та міжнародний фемінізм // Сучасність. 1984. № 7–8. Google Scholar Internet Ліндфорс-Михалевич Н. Софія Русова (1856–1940) // Наше життя. 1990. № 8. Google Scholar Internet Пахльовська О. Українсько-італійські літературні зв’язки XV–XX ст. К., 1990. Google Scholar Internet Сварник Г. Листування «вістниківців» в архіві Д. Донцова: досвід та перспективи публікації // Мат. засідань Істор.та Археогр. комісій НТШ в Україні. Вип. 2 (1995–1997 рр.). Л., 1999. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 39, "name": "Лисогір Марія", "birth_year": "1917.0", "death_year": "2004.0", "migration_status": "excluded_non_ukrainian", "reasoning": "Марія Лисогір was born in Shamokin, Pennsylvania, USA in 1917 and spent her entire life in the United States (died in Orlando, Florida in 2004). She was an American-born Ukrainian creative worker who never lived in Soviet or post-Soviet Ukrainian territory, making her outside the scope of a study focused on Ukrainian migration within/from Soviet borders.", "article_url": "https://esu.com.ua/article-54996", "bio": "ЛИСОГІ́Р Марія (дівоче&nbsp;— Полиняк; 08. 10. 1917, м. Шамокін, шт. Пенсильванія, США&nbsp;— 13. 06. 2004, м. Ор­ландо, шт. Флорида, США)&nbsp;— українська спів­ачка у США (ліричне сопрано). Дружина Й. Ли­согора . Вокальну освіту здобула у Нью-Йорку: приватно брала уроки співу у проф. Ф. Форде та Л. Карсон, навч. у Джульярд. муз. школі. Від 1938&nbsp;— солістка «Сіті-Сентер-Опера» у Нью-Йор­ку. Ви­ступала на опер. сценах США, зокрема в укр. опер. ансамблях. У репертуарі&nbsp;— твори укр. композиторів М. Лисенка, С. Гулака-Артемовського, М. Гай­воронського, В. Бар­вінського, С. Людкевича та ін. Гастролі у містах США, Канади, Пд. Америки та Європи. Мала записи на грамплатівках. Додаткові відомості Основні партії Оксана («Запорожець за Дунаєм» С. Гулака-Артемовського), Ганна («Утоплена» М. Лисенка), Катерина (однойм. опера М. Аркаса), Мікаела («Кармен» Ж. Бізе), Віолетта, Джільда («Травіата», «Ріґолетто» Дж. Верді), Бат­терфляй («Мадам Баттерфляй» Дж. Пуч­чіні), Лючія («Лючія ді Ламмермур» Ґ. Доніцетті), Розіна («Весілля Фіґаро» В.-А. Моцарта). Рекомендована література Рудницький А. Українська му­­зика. Мюнхен, 1963. Google Scholar Internet Померла Марія Лисогір // Свобода. 2004, 25 черв. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 40, "name": "Личко Іван Дмитрович", "birth_year": "1882.0", "death_year": "1937.0", "migration_status": "deported", "reasoning": "Ivan Lychko was repressed in 1933 (\"Репрес. 1933\") and died in the Solovets labour camps in the Soviet Union in 1937 (\"Загинув у Соловец. таборах\"). This constitutes forced displacement by Soviet authorities — he was arrested and died in a Gulag camp, not voluntary migration or internal transfer.", "article_url": "https://esu.com.ua/article-55343", "bio": "ЛИЧКО́ Іван Дмитрович (крипт.&nbsp;— И. В.; 1882&nbsp;— 1937)&nbsp;— письмен­ник, драматург, публіцист, літературний і театральний критик. Навч. у С.-Петербур. ліс. ін­ституті (1903–07). Активно публікувався у «Літературно-науковому віснику» (Львів, 1903–04, 1909). Був першим критиком першого опові­­дан­ня В. Вин­ниченка, прозор­ли­во вгадав майбут. мас­штаб таланту письмен­ника. Брав участь у ви­дан­ні с.-д. ж. «Вільна Україна», редагу­вав його перші номери (С.-Пе­тербург, 1906). У 1907 за участь у студент. заворуше­н­нях на декілька місяців увʼязнений у с.-пе­тербур. тюрмі «Хрести». На захист Л. ви­ступив часопис «Рада» (1907, 17 берез.). Після звільне­н­ня активно публікувався у цьому вид. (ст. «Антракт», «Театр і музика», «На виборах»). Брав участь у створен­ні укр. видавництва «Дзвін». Від поч. 1908&nbsp;— ред. г. «Кубанский курьер» (м. Катеринодар, нині Краснодар, РФ), яка під його впливом на 4 р. стала рупором українофільства, пропа­­ганди на Кубані творчості В. Вин­ниченка і М. Коцюбинського, укр. театру. 1912 повернувся у С.-Пе­тербург як вла­скор цієї газети. Деякий час продовжував публікувати в ній замітки із столиці. У Львові зу­стрічався з І. Франком. Учасник 1-ї світової війни. 1915 у ході літніх боїв потрапив у полон. Після війни жив у Відні, під­тримував звʼязки з СВУ. На­прикінці 1920-х рр. повернувся до Ленін­града (нині С.-Петербург). Літ. спадщина Л. невелика, але його публіцист. ви­ступи (полеміка з О. Ікон­никовим, Оленою Пчілкою) мали певний резонанс у су­спільстві. Опублікував низку статей («На захист малоруської культури», «Хитрість ро­зуму», «Із народної лектури»), поезій та оповідань у часописах «Вільна Украї­на», «Українська хата», «Южные записки», «Терновий вінок», в яких порушував про­блеми соц. і нац. становища українського народу, його боротьби проти духов. закріпаче­н­ня, ставав на захист українців від утисків цар. уряду. Автор багатьох заміток, оглядів, а також проз. і драм. творів: «В руїнах», «На могилі Шевченка» (обидва&nbsp;— 1907), «Степ» (1909), «Тайна» (1910), рец. на твори Л. Яновської (драму «Без віри» та оповіда­н­ня «Свято» й «Серед ночі»), В. Вин­ниченка, зб. оповідань М. Коцюбинського. Пере­клав російською мовою поему «Одно слово» Лесі Українки, кілька оповідань В. Вин­ниченка для «Кубанского курьера». У архіві І. Франка в Ін­ституті літ-ри НАНУ (Київ) зберігається рукопис знехтуваної «Літературно-науковим вісником» ран­ньої повісті Л. «Sіc transit gloria mundi», а також листи, адресовані в ред. і особисто І. Франку. Ін. частина архіву Л. (листи, рукописи) знаходиться у фонді О. Коваленка (Черніг. істор. музей). Ре­прес. 1933. Загинув у Соловец. таборах (РФ). Додаткові відомості Основні твори Талант чи випадковість? (Рец. на оповідання В. Винниченка «Краса і сила») // ЛНВ. 1903. Т. 21, ч. 2; List der Virnuft (Ответ А. Иконникову) // Южные зап. 1905, 26 июня; Чорний ворон (оповідання) // Вільна Україна. 1906. № 1; Молодое в украинской литературе (О творчестве В. Винниченко и М. Коцюбинского) // Кубан. курьер. 1908. № 94–98; Акбар-Аллах… Аллах-керим (З араб. легенд) // Терновий вінок. К., 1908; Памяти гениального горемыки // Кубан. курьер. 1909, 26 февр.; Степ (оповідання) // Літ. річник укр. і польс. авторів. [К.], 1909; Исповедь (рассказ) // Кубан. курьер. 1912, 1 янв.; Эволюция украинского театра (посвящение Н. К. Садовскому и его сотрудникам) // Студия. 1912. № 36–37, 38–39; Темный Петербург. Очерки столичной жизни // Кубан. курьер. 1912, 5 окт., 11 окт.; С берегов Невы // Там само. 1912, 18 окт., 24 окт. Рекомендована література Франко І. Огляд української літератури у 1906 р. III // Рада. 1907, 30 січ. Google Scholar Internet Нове українське видавництво «Дзвін» // Там само. 1907, 17 лип. Google Scholar Internet Украї­нство в чужій пресі // Укр. хата. 1909. № 1. Google Scholar Internet Єфремов С. З нашого життя // Рада. 1909, 28 берез. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 41, "name": "Лібкіс Діна Нохумівна", "birth_year": "1900.0", "death_year": "1962.0", "migration_status": "non_migrated", "reasoning": "Dina Libkis was born in Slovechne (Volhynia) and spent her entire Soviet-era life in Ukraine, primarily Kyiv, where she worked as a teacher, librarian, and writer. Although evacuated to Central Asia during WWII, she returned to Kyiv after the war and remained there until her death in 1962—there is no evidence of permanent settlement outside Soviet/post-Soviet borders or forced deportation by autho", "article_url": "https://esu.com.ua/article-55384", "bio": "ЛІ́БКІС Діна Нохумівна (הניד סיקביל; справж.&nbsp;— Кіпніс-Шапіро; 1900, с. Словечне Овруц. пов. Волин. губ., нині Овруц. р-ну Житомир. обл.&nbsp;— 1962, Київ)&nbsp;— поетеса, пере­кладачка. Сестра І. Кіпніса , дружина М. Шапіро . Член Асоц. євр. письмен­ників УРСР. Отримала традиц. освіту. Закін. євр. пед. курси у Києві. Працювала в дитбудинку, потім в євр. серед. школі, була заст. дир. євр. б-ки ім. М. Вінчевського у Києві. Під впливом брата почала писати вірші, дебютувала 1922 у ж. «ןאפ עשיטסינומאק» («Комуністичний прапор», Київ). Під псевд. Лібкіс поезії, вірші у прозі та байки друкувала в євр. періодиці: «ןרעטש» («Зірка»), «ףיורא גראב» («Угору», 1922–23), «עניארקוא» («Україна», 1926), «טלעוו עטיור יד» («Червоний світ»), «רוטארעטיל עשיטעוואס» («Радян­ська література»), «סעמע» («Правда») та ін. Пере­кладала з мови їдиш та на їдиш. Цикл віршів уві­­йшов в антологію «סנירעטכיד עשידיי» («Єврейські поети», Чикаґо, 1928) Е. Кормана. Під час 2-ї світової вій­ни еваку­йов. у Середню Азію. Піс­ля війни повернулася до Києва. Завантажити статтю"}, {"idx": 42, "name": "Лівицька Марія Варфоломіївна", "birth_year": "1879.0", "death_year": "1971.0", "migration_status": "migrated", "reasoning": "Марія Лівицька voluntarily left Ukraine in 1920, emigrating to Warsaw where she led the Union of Ukrainian Emigrant Women in Poland, then moved to Germany during WWII, and finally settled permanently in the USA from 1957 until her death in 1971. This represents sustained voluntary emigration and permanent settlement outside Soviet/post-Soviet borders, not forced displacement.", "article_url": "https://esu.com.ua/article-55404", "bio": "ЛІВИ́ЦЬКА Марія Варфоломіївна (дівоче&nbsp;— Ткаченко; 09. 04. 1879, м. Бердичів Київ. губ., нині Житомир. обл.&nbsp;— 16. 08. 1971, м. Йон­­керс, похов. у м-ку Бавнд Брук, шт. Нью-Джерсі, США)&nbsp;— громадсько-культурна діячка. Дружина А. Лівицького , мати Н. Лівицької-Холодної та М. Лівицького . Член РУП, УСДРП. Закін. Фундуклеїв. жін. гімназію у Києві (1897). Працювала приват. учителем у Києві (1898–99), зай­­ма­­лася громад. та парт. діяльністю. Була чл. київ. студент. громади, до якої входили Д. Антонович , В. Вин­ниченко , О. Ско­­ропис-Йолтухівський , А. Лівицький, разом із Л. Старицькою-Черняхівською , М. Грінченко та ін. брала активну участь у діяльності Укр. жін. громади, в рев. подіях 1905–07. У 1920 виїхала до Варшави, де очолювала Союз укр. емі­гранток у Польщі. На­­­при­­кінці 2-ї світової війни пере­бралася у Німеч­чину, мешкала у Карлс­руе, Етлінґені. Від 1957&nbsp;— у США. Авторка спогадів «На гра­­ні двох епох» (Нью-Йорк, 1972), в яких детально описала родин­ні звʼязки полтав. дворян Лівицьких, характери, смаки та пере­кона­н­ня чл. родини, побут. атмо­сферу, умови життя на тлі істор. подій, що від­бувалися в Україні у перші роки 20 ст. Висвітлювала особисте життя письмен­ників, держ. і громад.-політ. діячів, зокрема В. Вин­ниченка, П. Крата , М. Міхновського , М. Пор­­ша , Б. Мартоса , В. Дорошенка , В. Шемета , в динаміці роз­крила їхні образи, характери, побут, літ. смаки, уподоба­н­ня. Цікаво пере­повіла про дит. роки й навч. своїх дітей. Рекомендована література Померла Марія Лівицька, вдова по президенті УHP в екзилі Андрієві Лівицькому: [некролог] // Свобода, 1971, 19 серп. Google Scholar Internet Павловський В. Перше українське жіноче об’єднання в Києві (1901–1905) // Наше життя. 1998. № 5. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 43, "name": "Лубковська Марія Мечиславівна", "birth_year": "1858.0", "death_year": "1934.0", "migration_status": "migrated", "reasoning": "Maria Lubkovska was born in Kyiv in 1858 and voluntarily relocated to Warsaw, Poland in 1923, where she established her own singing school and remained until her death in 1934. This represents permanent settlement outside Soviet/post-Soviet borders through voluntary emigration, not forced displacement.", "article_url": "https://esu.com.ua/article-58930", "bio": "ЛУБКО́ВСЬКА Марія Мечиславівна (дівоче&nbsp;— Бардецька; 1858, Київ&nbsp;— 27. 06. 1934, Варшава)&nbsp;— спів­ачка (сопрано), педагог. Співу навч. у Київ. муз. училищі, у 1880-х рр.&nbsp;— у С.-Пе­тербурзі. На поч. 1890-х рр. удосконалювала вокал. майстерність у А. Ронці в Мілані. Дебютувала 1882 у Тифлісі (нині Тбілісі). 1882–84, 1887–89&nbsp;— солістка Тифліс., 1884–87, 1889–93&nbsp;— Київ., 1894–95&nbsp;— Львів. опер. На опер. сцені Києва вперше вико­нала партії Мікаели («Кармен» Ж. Бізе, 1885) і Ельзи («Лоенґрін» Р. Ваґнера, 1890). Ви­ступала також у театрі «Ла Скала» (Мілан, 1895). У 1898–1905&nbsp;— директор Італ. опери в Одесі. Від 1923 за­ймалася пед. діяльністю у Варшаві, де мала власну школу співу. Володіла голосом приєм. тембру, мала актор. талант. Гастролі у Москві, С.-Пе­тербурзі, а також Італії. Додаткові відомості Основні партії Марія, Ліза, Тетяна («Мазепа», «Пікова дама», «Євгеній Онєгін» П. Чайковського), Тамара («Демон» А. Рубінштейна), Розіна («Севільський цирульник» Дж. Россіні), Валентина, Селіка («Гуґеноти», «Африканка» Дж. Мейєрбера), Міньйон (однойм. опера А. Тома), Джільда («Ріґолетто» Дж. Верді), Марґарита («Фауст» Ш. Ґуно), Ганна («Зачарований замок» С. Монюшка), Манон («Манон Леско» Дж. Пуччіні). Рекомендована література «Кармен» в Киевской опере // Киев­лянин. 1885, 3 янв. Google Scholar Internet Ярон С. Воспо­мина­ния о театре (1867–87). К., 1898. Google Scholar Internet Шка­фер В. Сорок лет на сцене русской опе­ры: Воспоминания. 1890–1930. Ле­­нин­град, 1936. Google Scholar Internet Левик С. Записки оперного певца. Москва, 1962. Google Scholar Internet Гозенпуд А. Рус­ский оперный театр на рубеже 19–20 ве­ков и Ф. И. Шаляпин. 1890–1904. Ленин­град, 1974. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 44, "name": "Мак Ольга", "birth_year": "1913.0", "death_year": "1998.0", "migration_status": "migrated", "reasoning": "Olha Mak voluntarily emigrated from Soviet Ukraine after experiencing persecution (her husband's arrests and death in camps during Stalinist repression). She left through Austria (as a displaced person in 1947) and permanently settled outside Soviet borders—first in Brazil (1947-1970) and then in Canada (Toronto, 1970-1998), where she died. This represents voluntary emigration with permanent reset", "article_url": "https://esu.com.ua/article-60562", "bio": "МАК Ольга (дівоче&nbsp;— Петрова Ольга Нилівна; ін. псевд. і крипт.: Ольга Гец, О. Г.; 20. 07. 1913, м. Камʼя­нець-Подільський, нині Хмельн. обл.&nbsp;— 18. 01. 1998, м. Торонто, провінція Онтаріо, Канада)&nbsp;— письмен­ниця. Член Обʼ­єдн. «Слово» (1954) і СПУ (1994). Від­знака Укр. літ. фонду за драм. етюд «Дала дівчина хустину» (м. Чикаґо, США), нагорода СФУЖО за істор. оповіда­н­ня «Лебідка»&nbsp;— про князя Ігоря і княгиню Ольгу (м. Фі­ладельфія, США, 1960; опубл. у часописі «Наше життя», Нью-Йорк, 1961, ч. 2). Народилася в сімʼї урядовця, згодом родина пере­їхала до Києва, де проживала 1914–20, у 1920&nbsp;— до с. Віль­хівчик (нині Корсунь-Шевченків. р-ну Черкас. обл.), на поч. 1920-х рр. повернулася до рідного міста. Після закінче­н­ня 7-річ. школи (1929) працювала в рай. від­ділі освіти в м-ку Солобківці побл. Камʼянця-Поділь­ського, де по­зна­йомилася і ви­йшла заміж за&nbsp; В. Дорошенка &nbsp;та виїхала до Харкова. 1932–34 навч. у Харків. ін­ституті іноз. мов. 1934 разом із чоловіком пере­­їхала до Кривого Рогу, а 1936&nbsp;— до Ніжина, де закін. пед. ін­ститут (1938). Після кількох арештів чоловіка як «ворога народу» (загинув у таборах 1944) з двома дітьми поневірялася по містах Львівщини, згодом виїхала до Словач­чини, Австрії. В австр. таборі для пере­міщених осіб ви­йшла заміж за&nbsp; М. Ґеца , разом з ним 1947 емігрувала до Бразилії. Спершу жили в Ріо-де-Женейро, потім у Куритибі, від 1970&nbsp;— у Торонто. Перші літ. спроби М. припадають на часи навч. у Ніжині, від 1943 під псевд. і крипт. друкувалася в укр. емі­грант. періодиці («Український само­стійник», «Наше життя», «Міт­ла», «Нові дні», «Гомін України»). 1947 у г. «Свобода» опубл. серію її фейлетонів, уперше вони ви­йшли португ. мовою у перекл. о. В. Прийми (1949), 2-е вид.&nbsp;— українською мовою «В кігтях НКВД» (1953; обидва&nbsp;— Прудентополіс). До­опрацьовані фейлетони лягли в основу кн. спогадів «З часів єжовщини» (Мюнхен, 1954; фраг­менти у ніжин. г. «Просвіта», 1993–96, № 3–18), де вона від­творила моторошну картину арештів у Ніжин. пед. ін­ституті і трагічну долю чоловіка. Основу більшості творів М. складає особистісне начало люд. життя в умовах повоєн. сталін. режиму в Україні, зміцне­н­ня бюрократ. системи партії, примус. колективізації, штучно організов. голодомору, русифікації, нище­н­ня кращих пред­ставників укр. нації. Її індивід може й не такий мас­штаб. у плані предмет. сфери діяльності, рядовий, «не­примітний», але він ціліс. і само­стійний, має невичерп. люд. потенціал, у пошуках сенсу існува­н­ня і вибору жит­тєвих стратегій керується здоровою нар. мора­л­лю і християн. етикою, сповнений най­глибшого драматизму, стра­ж­да­н­ня, екзистенц. пере­жива­н­ня, пере­оцінки себе і світу. Фундамент для такої особистості, вважає письмен­ниця, заклали укр. духовні традиції, здорова сімейна атмо­сфера і любов батьків, нар. пісня, церква. У повісті «Чудасій» (Торонто, 1956; нім.&nbsp;— у перекл. о. М. Нички) порушено про­блему людини, носія свободи як вищого сенсу буття в умовах рад. дійсності на тлі насильниц. колективізації, голодомору і де­персоналізації (1958 цей твір номінов. на Нобелів. премію, але нагороду присудили Б. Па­стернаку). Роман «Проти пере­конань» (Торонто, 1959) ре­презентує реліг.-християн. світовід­чува­н­ня авторки; побудов. за діалог. принципом: у його основі проти­ставлено 2 картини світовід­чува­н­ня&nbsp;— реліг.-духовну, яку символізує родина Кобзаренків, і рац.-матеріа­ліст., за якою стоїть Ігор Березовський. Конфлікт пере­живань провокує доволі тривалу дис­кусію, яка ви­значає подальше життя персонажів, їх екзистенц.-морал. пере­жива­н­ня. Акцент на автентичності люд. буття в умовах по­гранич. ситуації характерний для повісті «Куди йшла стежка?» (Нью-Йорк; Філадельфія, 1961). Персонажі твору ніби пере­бувають поза собою, але у своїх вчинках, у своїй включеності в укр. нац. рух (йдеться про події революції і становле­н­ня рад. режиму) «виліплюють» себе, ситуація при­скореного істор. часу спонукає їх набути нац. ідентичності і від­повід­ати на екзистенц. виклики часу. Пріоритет особистості над жит­тєвою ситуацією і бу­т­тям взагалі є основою поведінки більшості героїв твору, дуже різних, наділених різними етич. імперативами. У повісті «Камі­н­ня під косою» (Торонто, 1973; К., 1994, 2004; англ. перекл. В. Качмарської&nbsp;— «Stones Under the Scythe», Bloomington, 2011) через етико-естет. аспекти від­творено одну з найбільших трагедій історії&nbsp;— штуч. голодомор 1932–33. До цієї теми письмен­ниця зверталася у своїх оповіда­н­нях і нарисах «Земля плаче», «Українське село під більшовиками», «Проциха», «Столиця голодного жаху», «У Великодню ніч» та ін. У повісті осмислено про­блеми взаємин людини і влади, місця селянина в системі рад. влади та про­грами колгосп. будівництва, роз­крито дегуманізацію рад. су­спільства та деформацію сусп. моралі, реконстру­йовано соціоідеол. та психобіол. начала люд. поведінки, що становлять у повісті «клубок» інтертекс­туал. пере­плетень, конотацій, контекс­туал. звʼязк"}, {"idx": 45, "name": "Макдіармід Г’ю", "birth_year": "1892.0", "death_year": "1978.0", "migration_status": "excluded_non_ukrainian", "reasoning": "Hugh MacDiarmid was a Scottish poet born in Scotland and died in Edinburgh, Scotland. He was not Ukrainian by nationality or origin; while he was a notable popularizer of Taras Shevchenko's work and participated in Shevchenko commemorations in Britain, this does not make him a Ukrainian creative worker subject to this study on Ukrainian migration patterns.", "article_url": "https://esu.com.ua/article-60716", "bio": "МАКДІАРМІ́Д Гʼю (Macdiarmid Hugh; справж.&nbsp;— Крістофер Маррі Ґрів, Chri­stopher Murray Grieve; 11. 08. 1892, містечко Ленголм побл. м. Дам­фріз, Шотландія&nbsp;— 09. 09. 1978, Единбурґ)&nbsp;— шотландський поет, пере­кладач. Закін. Единбур. університет (1909). Учасник 1-ї світової вій­ни. Працював журналістом. Послідовник Р. Бернса, тривалий час очолював рух шотланд. літ. Від­родже­н­ня, прагнув від­родити нар. традиції шотланд. поезії, роз­винути шотланд. літ. мову. По­єд­нував членство в Шотланд. націоналіст. партії та КП Великої Британії. Дебютував зб. вір­шів «A Drunk Man Looks at the Thistle» («Спʼянілий оглядає чор­тополох», 1926). Писав шотланд. діалектом, англ. мовою, користуючись традиц. балад. роз­мірами, верлібром. Оспівував природу Шотландії, її народ, історію; тема багатьох творів&nbsp;— заг.-люд. філос. про­блеми, почу­т­тя інтернаціоналізму (вірш «The Wea­pon»&nbsp;— «Зброя», 1930). Низку вір­шів, зокрема цикл «The Battle Continues» («Боротьба триває», 1957) присвячено героїч. бороть­бі іспан. народу проти фашизму. У багатьох поезіях продовжував сатир. тенденції Дж. Свіфта. Найви­значніший проз. твір&nbsp;— «Lucky Poet» («Щасливий поет», 1943; 1972; усі&nbsp;— Единбурґ) авто­біогр. характеру. Збирач та дослідник шотланд. фольклору&nbsp;— зб. нарисів «Sign of the Thistle» («Під знаком чортополоху», Лон­дон, 1934). Пере­кладав гельську поезію, твори Б. Брехта, поезію Р.-М. Рільке. Популяризатор творчості Т. Шевченка, актив. учасник шевченків. урочистостей у Великій Британії (1961, 1964), зокрема в Единбурзі 1964, де ви­ступив з доповід­дю про жит­тєвий шлях і творчість укр. поета. Укр. мовою деякі вірші М. пере­клав Є. Крижевич. Додаткові відомості Основні твори Collected Poems. Edinburgh, 1962; More Collected Poems. London, 1970; The Hugh MacDiarmid Anthology: Poems in Scots and English. Edinburgh, 1972; The Complete Poems. Vol. 1–2. Edinburgh, 1978; укр. перекл. — Вірші // Поклик. К., 1984; Стара в доброму гуморі (В единбурзькій пивничці) // Стріха М. Улю­блені переклади. К., 2015. Рекомендована література Булат В. М., Кобеляцький С. І., Погребенник Ф. П. Шевченко йде по світу. Англія // Всенар. шана: Відзначення сторіччя з дня смерті та 150-річчя з дня народж. Т. Шевченка. К., 1967. Google Scholar Internet Діброва В. Вірші поетів з Шотландії // ЛУ. 1990, 21 черв. Google Scholar Internet S. Lyall. Hugh Mac­Diarmid’s Poetry and Politics of Place: Imagining a Scottish Republic. Edinburgh, 2006. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 46, "name": "Мариняк Марія Іллівна", "birth_year": "1907.0", "death_year": "1982.0", "migration_status": "migrated", "reasoning": "Marija Marinjak voluntarily emigrated from Ukraine, first to Germany in 1944 and then permanently to Canada in 1949, where she settled, worked, studied, and lived until her death in Montreal in 1982. There is no evidence of forced displacement by Soviet authorities—her earlier brief Polish imprisonment was for Ukrainian nationalist views, not Soviet forced relocation.", "article_url": "https://esu.com.ua/article-65649", "bio": "МАРИНЯ́К Марія Іл­лівна (дівоче&nbsp;— Чиж; псевд.: Марта Чиж, Данко Вітер; 06. 04. 1907, Львів&nbsp;— 14. 10. 1982, м. Монреаль, провінція Квебек, Канада)&nbsp;— письмен­ниця. Закін. Самбір. учит. семінарію (Львів. обл., 1927). Заснувала 1924 в Самборі 47-й пластун. курінь ім. О. Басараб з учениць серед. польс. держ. шкіл. Польс. владою увʼязнена на кілька місяців за тверді укр. по­гляди. Після семінарії студіювала музику в класі скрипки проф.&nbsp; Й. Москвичіва &nbsp;у Львів. муз. ін­ституті. У 1930-х рр. учителювала в м. Стрий (Львів. обл.). 1944 емігрувала до Німеч­чини, 1949&nbsp;— до Канади. Учителювала в «Рідній школі» при парафії Успі­н­ня Божої Матері й керувала хором при товаристві «Просвіта». Від 1956 працювала асист. бібліотекаря при Університеті Мак-Ґілла й водночас студіювала словʼян. філологію у Монреал. університеті (закін. 1960 з дипломом магістра). Авторка дослідниц. праці «Жінка і дитина в модерній системі невільництва в Совєтському Союзі» (1960), на­друк. у Торонто окремою книжкою під псевд. Марта Чиж (у перекл. англ. мовою&nbsp;— «Woman and child in a mo­­dern system if slavery&nbsp;— the U.S.S.H», Toronto, 1962), французькомов. кн. «Savez vous a IʼOnest» (Montreal, 1965), пригодниц. повісті для молоді «Далекі мандри» (Торонто, 1973), в якій М. порушила тему під­невіл. життя молодих українців. Літ. герої щиро любили свій рідний край і тому, за автор. версією, окупац. влада їх вислала до Сибіру. За новелету «Дівчур» (1969; опубл. у ж. «Наше життя», 1970, № 3) отримала 1-у премію на 10-му літ. конкурсі СФУЖО (1970). Публікувалася у жін. журналах укр. діаспори. Рекомендована література Посмертні згадки // Українка в світі. 1982. № 4. Google Scholar Internet У пам’ять Марії Чиж-Мариняк // Наше життя. 1984. № 1. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 47, "name": "Маруненко-Недоля Амвросій Павлович", "birth_year": "1886.0", "death_year": "1968.0", "migration_status": "migrated", "reasoning": "Амвросій Маруненко-Недоля voluntarily left Soviet-controlled territory and permanently settled outside Soviet/post-Soviet borders. After initially moving to Poland (1920-1922) and Galicia (1922-1944), he emigrated to Austria in 1944 and subsequently to the USA in 1949, where he remained until his death in Bethlehem, Pennsylvania in 1968. There is no evidence of forced deportation or arrest by Sovi", "article_url": "https://esu.com.ua/article-63966", "bio": "МАРУНЕ́НКО-НЕДО́ЛЯ Амвросій Па­влович (за ін. даними&nbsp;— Андрі­йович; сцен. псевд.&nbsp;— Недоля; 07. 12. 1886, Київ&nbsp;— 15. 01. 1968, м. Бетлехем, шт. Пенсильванія, США)&nbsp;— актор, режисер. 1907 вступив до трупи М. Кропивницького. 1910–14&nbsp;— реж. аматор. театру залізничників у Києві. Під час Визв. змагань 1917–21&nbsp;— сотник Армії УНР. Від 1920&nbsp;— у таборах для інтернованих у Польщі, де 1921–22 був мист. кер. двох театрів (драм. і мініатюр) у таборі Стшалків. Від 1922&nbsp;— актор, реж. укр. мандрів. театрів Галичини: Театру товариства «Просвіта» під керівництвом М. Орла-Степняка (1922–23), приват. трупах&nbsp; І. Ko­­гутяка ,&nbsp; В. Кос­сака , Укр. театру «За­грава» (1933–38), Укр. нар. театру ім. І. Котляревського (1938–39). Від 1944&nbsp;— на еміграції в Австрії. Після 2-ї світової вій­ни мешкав у таборах для пере­міщ. осіб. 1945–49&nbsp;— спів­засн., реж. та актор табор. Укр. драм. театру в Зальцбурзі під керівництвом Г. Совачевої (згодом&nbsp;— Укр. нац. театр). У 2-й пол. 1940-х рр. по­ставив ви­стави «Ясні зорі» Б. Грінченка, «Ой, Морозе, Морозенку» Г. Лужницького, «Княгиня Капучідзе» А. Мол­лер. Від 1949&nbsp;— у США. 1952–58&nbsp;— керівник аматор. театр. гуртка при 50-му від­ділі Союзу українок Америки (м. Бетлехем); 1959&nbsp;— в Ансамблі укр. акторів під керівництвом&nbsp; Б. Паздрія ; 1963–68 грав на сцені Укр. театру Філадельфії під керівництвом В. Шаша­­ровського (згодом&nbsp;— «Театр у пʼятницю»). Виконував різноплан. ролі в укр. побут., зарубіж. класич. і новіт. драматургії, най­вдаліші серед яких&nbsp;— характерні. Здійснив по­становки на істор.-побут. теми. Від­повід­ав за костюми та декорації. Член Обʼ­єдн. бувших вояків-українців в Америці: від 1958&nbsp;— голова його управи у м. Ал­лентаун (шт. Пенсильванія). Від­знач. Хрестом С. Петлюри (1963). Додаткові відомості Основні ролі Унтер-офіцер («Тарас Шевченко» З. Тарнавського), ю"}, {"idx": 49, "name": "Мозалевський Іван Іванович", "birth_year": "1890.0", "death_year": "1975.0", "migration_status": "migrated", "reasoning": "Мозалевський voluntarily emigrated from Soviet Ukraine in 1920 to Vienna, then Berlin, and settled in Paris from 1926-1947, working as a professional artist and editor in the Ukrainian diaspora. Although he returned to Soviet territory in 1947 (to Kyiv, then Moscow, then Crimea where he died in 1975), his primary migration was a voluntary departure and extended settlement outside Soviet borders du", "article_url": "https://esu.com.ua/article-69572", "bio": "МОЗАЛЕ́ВСЬКИЙ Іван Іванович (псевд.&nbsp;— Жан Алле; 12. 03, за ін. даними&nbsp;— 24. 09. 1890, м. Вроцлав, нині Польща&nbsp;— 05. 01. 1975, Сімферополь)&nbsp;— графік, живописець, мистецтво­знавець. Чоловік В. Мозалевської . Член СХУ (1953). Навч. у Київ. худож. училищі (від 1908; викл. В. Менк, І. Селезньов), школі Товариства за­охоче­н­ня художників (1913; кер. І. Білібін, брав участь в оформлен­ні опери «Руслан і Людмила» М. Глінки для театру Нар. дому) та АМ як вільний студент (1914–15; майстерня В. Мате) у Петро­граді (нині С.-Петербург). Основні галузі&nbsp;— станк. і книжк. графіка, живопис. 1913–16 у техніках ліно­гравюри, офорта, рисунка, акварелі малював віньєтки, за­ставки, іл. для петербур. журналів і видавництв, обкладинки до зб. «Чемпионат поэтов» (С.-Петербург, 1913), кн. «Счастливый домик» В. Ходасевича (Москва, 1914). Використовував мотиви укр. нар. мистецтва, нац. символіку й орнаменти. 1917–19&nbsp;— у Києві: заснував власну художню школу та профес. спілку художників «Мистецтво»; 1918&nbsp;— гол. художник друкарні Кульженка; очолював гравіювал.-худож. від­діл Екс­педиції заготівлі держ. паперів, створ. урядом УЦР, роз­робляв проекти укр. грош. купюр. 1919–20 у м. Камʼнець-Подільський (нині Хмельн. обл.) від­крив Ху­­дож.-пром. школу; обраний головою губерн. шкіл. правлі­н­ня. Емігрував 1920 до Відня, де від­крив мист. студію. 1921&nbsp;— гол. художник видавництва І. Ладижникова у Берліні. 1923–26&nbsp;— проф. рисунка Укр. студії пластич. мистецтва в Празі. Від 1926&nbsp;— у Парижі: ред. худож. від­ділу г. «Українські вісті» (до 1930); спів­працював із ж. «Наш Союз», г. «Парижский вестник», де друкував стат­ті про укр. і рос. художників. 1947 повернувся у Київ, згодом жив у Москві. Від 1953&nbsp;— у Сімферополі, працював у картин. галереї. Учасник обл., всеукр., всесоюз. і між­нар. мистецьких ви­ставок від 1912. Персон.&nbsp;— у Парижі (1928–29, 1931), Сімферополі (1954, посмертна&nbsp;— 1990), Москві (1963, 1971). Для творчості М. характерні узагальне­н­ня форми та кольору, виразність контура, емоц. насиченість сюжету. Автор кн. «Современ­ное положение художников во Франции» (Москва, 1950); статей у моск. ж. «Художник», зокрема «Сколько стоит искус­ство?» (1961, № 10), «Несостоявшаяся встреча: Воспоминания о В. Серове» (1965, № 1), «Вдали от родины: Воспоминания о К. Коровине» (1965, № 6), «Памяти И. Билибина» (1966, № 8); неопубл. дослідж. «Техника офорта», «Техника гравюры на дереве и линолеуме», «И. Я. Билибин», мемуари «Книга скитаний». Деякі роботи зберігаються у Сімфероп. ХМ, НХМ (Київ). Додаткові відомості Основні твори іл. — до віршів «Білі пави» П. Верлена (1911), Е. По (1931), роману «Идиот» Ф. Достоєвського (Берлин, 1923), зб. «Казки» Дж.-Р. Кіплінґа (Прага, 1924), п’єси «Горе от ума» О. Грибоєдова (Мос­ква, 1950); станк. графіка — «Ш. Бодлер» (1912), «Літній вечір» (1913), «Лицар» (1921), «Робітник» (1923), «Праця» (1924), «Автопортрет» (1927), «Монмартр. Париж», «Гроза» (обидва — 1930), «Індійський мотив. Полювання» (1932), «Дружина» (1934), «Кокер» (1936), «Ельзас» (1937), «Чорна пантера», «І. Рєпін» (обидва — 1957); знак УВУ в Празі (1924); цикли — офортів «Види Парижа» (1929–34), гравюр «Звірі. Птахи. Квіти» (1930-і рр.); плакати — «Іван Федоров» (1950), «Кожному колгоспу — рибне господарство!» (1952; обидва — спів­авт.); живопис — «Сільська прогулянка» (1931). Рекомендована література Иван И сон («Дочка Белль Старр», 1948), Гаррі Квотермейн («Ватусі», 1959), Гід Мак­Кул («Револьвери ворога», 1967), Нестерович («Дикий вітер», 1985). Писав сценарії. Реж. фільмів «Самар» (1962), «Пекло Борнео» (1966), «Урожай сатани», «По­їздка тигра» (обидва&nbsp;— 1970). За­ймався боксом, від 1970-х рр.&nbsp;— живописом і скульптурою (створив понад 50 бронз. порт­ретів друзів і партнерів по фільмах), проектував будинки, виготовляв мист. меблі. Автор кн. «The years of George Montgomery» («Роки Джорджа Монтґомері», Лос-Ан­джелес, 1981). Завантажити статтю"}, {"idx": 51, "name": "Нагірна Стефанія Іванівна", "birth_year": "1898.0", "death_year": "1993.0", "migration_status": "migrated", "reasoning": "Stefaniia Nahirna voluntarily emigrated from Soviet-controlled territory to the United States in 1949, settling permanently in New York where she died in 1993. Her earlier residence in Czechoslovakia (1923-1945) and displacement camp in Germany (1945-1948) represent intermediate steps, but her final permanent settlement outside Soviet/post-Soviet borders qualifies as voluntary migration.", "article_url": "https://esu.com.ua/article-71452", "bio": "НАГІ́РНА Стефанія Іванівна (дівоче&nbsp;— Чабан; 09. 09. 1898, містечко Гримайлів Скалат. пов., нині смт Гусятин. р-ну Терноп. обл.&nbsp;— 05. 02. 1993, Нью-Йорк)&nbsp;— спів­ачка (сопрано), педагог, громадська діячка. Бабуся О. Кузишина. Закін. учит. семінарію (1919), Вищий муз. ін­ститут (1923) у Львові, Укр. високий пед. ін­ститут та Консерваторію (кл. А. Кадержабека; обидва&nbsp;— 1930) у Празі. Була зав. інтернату для дівчат побл. Праги, за­ймалась ви­да­н­ням учнів. ж. «Зірка». Н.&nbsp;— чл. літ. гуртка «празька школа». Брала активну участь у діяльності Укр. жін. союзу, зокрема 1934 була делегована на Укр. жін. кон­грес (Станіслав, нині Івано-Франківськ) із доповід­дю «Денаціоналізація українських дітей на еміграції». 1919–44 ви­ступала в укр. концертах у Львові, Празі, Берліні. 1930 виконала «Пісню пісень» В. Барвінського для сопрано, скрипки та фортепіано із Р. Мировичем та Р. Сімовичем на святі-академії. Брала участь разом із О. Руснаком у концертах із нагоди 30-річчя смерті М. Лисенка за участі хору під керівництвом О. Приходька (Прага). Викладала в укр. гімназіях у Подєбрадах (нині Чехія, 1931–37), Рахові (нині Закарп. обл., 1938–39), м. Модржани (побл. Праги). Згодом повернулася до Праги, де за­ймалася пере­кладац. діяльністю. 1945–48 пере­бувала у таборі для пере­міщених осіб (м. Реґенсбурґ, Німеч­чина), де брала активну участь в Обʼ­єдн. укр. жінок на еміграції. 1947 пере­клала українською мовою з англ. і видала кн. для дітей «Пригоди хороброго голуба» бенґал. пи­сьмен­ника Д.-Ґ. Мукерджі (2-е вид.&nbsp;— США), написала цикл новел на муз. теми, серед яких&nbsp;— «Adagio» (на­друк. у «Краківських вістях» та ж. «Громадянка» у Німеч­чині; згодом перед­рук. в «Adagio: Жит­тєвий шлях С. Нагірної», Л., 2003). У 1949 емігрувала до Нью-Йорка, де провадила пед. діяльність, була чл. управи Укр. літ. мист. клубу, очолювала батьків. комітет Укр. муз. ін­ституту (м. Чикаґо, США). Від 1969&nbsp;— референт Обʼ­єдн. працівників літ-ри для молоді. У різний час публікувалася в ж. «Жінка» (Львів), «Жіночий світ», «Наше життя» (Канада), «Краківські вісті» (Польща), «Громадянка», «Українське слово» (Німеч­чина). У репертуарі&nbsp;— твори М. Лисенка, К. Стеценка, О. і Н. Нижанківських, В. Барвінського, Д. Січинського, С. Людкевича, Я. Лопатинського, В.-А. Моцарта, К. Вебера, Ж. Бізе, Дж. Верді, Дж. Пуч­чіні, Б. Сметани, А. Дворжака, українські народні пісні. Мала красивий, добре по­ставлений голос широкого діапазону, володіла чудовою дикцією та артистизмом. Вокал. майстерність Н. цінували Н. Нижанківський і В. Барвінсь­кий, які часто їй акомпанували. Додаткові відомості Основні праці Музичні й звукові моменти в творах Ольги Кобилянської // Жінка. Л., 1937. Ч. 19–20, 23, 24; Із моїх музичних спогадів // Наше життя. 1952. Ч. 6; Український музичний інститут // Там само. 1955. Ч. 6–9; Музика в творах Ольги  is no evidence of forced deportation by Soviet authorities; his relocation appears to have been related to wartime m", "article_url": "https://esu.com.ua/article-71542", "bio": "НАДІ́ЇН Дмитро Пимонович (16. 05, за ін. даними&nbsp;— 21. 10. 1907, с. Володимирівка, нині Казанків. р-ну Микол. обл.&nbsp;— березень 1942, м. Батайськ Ростов. обл., РФ)&nbsp;— поет. Член СПУ (1934). Учасник 2-ї світової вій­ни, був без­під­ставно звинувачений у ворожій пропаганді й заарешт., вбитий під час прориву противника. Закін. Микол. ІНО (1930). На журналіст. роботі на Донбасі, друкував вірші в місц. газетах та ж. «Литера­тур­ный Донбасс». Від 1933&nbsp;— в Одесі, працював відп. секр. ж. «Лите­ратурный Октябрь», водночас читав лекції з історії укр. літ-ри в пед. ін­ституті. Автор наук. публікацій про творчість Лесі Українки, Т. Шевченка, П. Тичини, В. Сосюри та ін. Під­готував до захисту канд. дис. «Про­блеми особи в ліриці Лесі Українки». Ще студентом видав книжечку віршів із символіч. на­звою «На світан­ні» (1929), що ви­йшла у микол. видавництві «Геть неписемність!», потім&nbsp;— зб. «Втруча­н­ня поета» (1931) та «Про­зорість» (1933). Писав у дусі соц­реалізму, звертався до поет. епосу, балади, поеми, оспівуючи події 1-ї світової вій­ни та воєн. дій 1918–20&nbsp;— «Балада про полон», «Балада про подарунок», уривки з поеми «Прокля­т­тя». Ці твори він згодом багато разів пере­робляв, прагнучи досягнути макс. виразності образів і картин. Для творчості Н. властиві романтика, ліризм. Додаткові відомості Основні твори Я був бійцем. Сталіно, 1958; Пісня бійця. О., 1966; Прозорість: Вибр. поезії. К., 1972. Рекомендована література Дузь І. Смерть без вироку // Чорномор. комуна. 1990, 4 груд. Google Scholar Internet Крижанівський С. Дмитро Надіїн, що поліг «смертю хоробрих», або Як це було насправді // Дивослово. 2001. № 1. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 53, "name": "Незабудько Панько", "birth_year": "1919.0", "death_year": "2001.0", "migration_status": "migrated", "reasoning": "Nezabudko voluntarily left Ukraine during WWII, lived in Germany, then settled permanently in Argentina (1950-1956) and the United States (from 1956 onwards), where he died in 2001. This represents voluntary emigration and permanent settlement outside Soviet/post-Soviet borders, with no evidence of forced displacement.", "article_url": "https://esu.com.ua/article-72916", "bio": "НЕЗАБУ́ДЬКО Панько (ін. псевд.&nbsp;— Мікі Сукенсон, справж.&nbsp;— Демусь Анатоль; 30. 06. 1919, с. Па­вловичі Грубешів. пов. Холм. губ.&nbsp;— 17. 02. 2001, м. Спокен, шт. Вашинґтон, США)&nbsp;— поет-гуморист, сатирик, фейлетоніст. Член Асоц. діячів укр. культури в США. Під час 2-ї світової вій­ни ви­їхав до Німеч­чини, редагував табірні бюлетені, дописував до укр. емі­грант. часописів. 1950–56 пере­бував в Арґентині, працював у ред. ж. «Мітла», г. «Наш клич» та «Українське слово». Від 1956&nbsp;— у США. Автор зб. «У кривому дзеркалі» (1973), «Холмські усмішки» (1974), «Еміграційні родзинки» (1978), «Перо під ребро» (1981), «Сатирикон» (1987), «Скоморох» (1990; усі&nbsp;— Буенос-Айрес), «Життя в карикатурах» (Т., 1998). Для творів Н. характерні колюча іронія та сарказм, спрямов. проти ворогів України й тоталітар. держ. насильст­ва, елементи грубого бурлеску, що були реакцією на приповідк. рад. ошуканство поневолених народів. Рекомендована література Полтава Л. Український «Сатирикон» // Незабудько П. Сатирикон. Буенос-Айрес, 1987. Google Scholar Internet Кухар Р. Нема то, як «навесело» // Свобода. 1990, 3 трав. Google Scholar Internet Черінь Г. «Летить мій Пегас, хвостика піднявши…»: [про дві зб. сатир. віршів П. Незабудька] // Калейдоскоп: ст. і рец. К., 1995. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 54, "name": "Нейгауз Наталія Ґуставівна", "birth_year": "1884.0", "death_year": "1960.0", "migration_status": "migrated", "reasoning": "Natalia Neigauz was born in Elisavetgrad, Ukraine in 1884 and lived there until autumn 1920, when she voluntarily emigrated to Germany. She died in Niedermarsburg, North Westphalia, Germany in 1960, having permanently settled outside Soviet borders. There is no evidence of forced displacement; this was a voluntary emigration typical of many Ukrainian cultural figures during the Russian Civil War p", "article_url": "https://esu.com.ua/article-72941", "bio": "НЕЙГА́УЗ Наталія Ґу­ставівна (за чолові­ком&nbsp;— Штайнбах; 19. 05. 1884, м. Єли­савет­град, нині Кропивницький&nbsp;— 17. 12. 1960, м. Нідермарсбурґ, Пн. Вестфалія, Німеч­чина)&nbsp;— піаністка, педагог. Дочка Ґу­става, сестра Генріха Нейгаузів, племін­ниця Сиґізмунда та Фелікса Блуменфельдів, троюрідна сестра К. Шимановського. Навч. у муз. школі батька в Єлисавет­граді, приватно 1902–04&nbsp;— в А. Міхаловського (Варшава), 1905–09&nbsp;— у Л. Ґодовського, 1910–12&nbsp;— у К.-Г. Бар­та (обидва&nbsp;— Берлін). Брала участь у проектах композитор. угрупова­н­ня «Молода Польща в музиці» у Варшаві й Берліні, концертувала в Україні, Росії, Польщі, Німеч­чині, Італії. 1912–20 викладала гру на фортепіано в школі батька у Єлисавет­граді. Водночас брала активну участь у муз.-громад. житті міста. Восени 1920 емігрувала до Німеч­чини. Вона одна з перших інтер­претаторок фортепіан. музики Л. Ружицького, Ґ. Фітельберґа та ін. У репертуарі&nbsp;— твори Й.-С. Баха, Л. ван Бетговена, Ф. Шопена, Р. Шуман­на, Ф. Ліста, К. Сен-Санса, К. Шимановського, Ф. Блуменфельда. Н.&nbsp;— перша виконавиця творів К. Шимановського (4 етюди, 1906, присвяч. Н.; Соната № 1 c-moll, 1907). Їй присвячено Мазурку з «Польської сюїти» Ф. Блуменфельда, Сонату № 2 для скрипки і фортепіано F-dur Ґ. Фітельберґа. Рекомендована література Нейгауз Г. Г. Размышления, воспоминания, дневники. Москва, 1975. Google Scholar Internet Долгіх М. Нейгаузи: варіації на єлисаветградську тему. Кр., 2013. Google Scholar Internet Хилінська Т. Про Наталію й Генріха Нейгаузів — свідоцтво часів, до яких не дожив Кароль Шимановський // Шимановські, Блюменфельди, Нейгаузи: муз. родини на перехресті культур. Кр., 2019. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 55, "name": "Неруда Пабло", "birth_year": "1904.0", "death_year": "1973.0", "migration_status": "excluded_non_ukrainian", "reasoning": "Pablo Neruda was a Chilean poet (born in Parral, Chile; died in Santiago, Chile) of non-Ukrainian nationality. He is not Ukrainian and therefore falls outside the scope of a study classifying migration status of Ukrainian creative workers.", "article_url": "https://esu.com.ua/article-73695", "bio": "НЕРУ́ДА Пабло (Neruda Pablo; справж.&nbsp;— Ricardo Eliécer Neftalí Reyes Ba­­soalto, Рікардо Еліесер Нефталі Рейєс Басуальто; 12. 07. 1904, м. Пар­раль, Чилі&nbsp;— 23. 09. 1973, Сантьяґо)&nbsp;— чилійський поет, громадський діяч. Нобелівська премія з літ-ри (1971), Між­народна премія Всесвіт. Ради Миру (1950). Навч. в пед. ін­ституті в Сантьяґо (від 1921). У 1927–43&nbsp;— на дипломат. роботі. Учасник громадян. вій­ни в Іспанії 1936–39. Писати вірші почав у 10-річ. віці, через декілька років по­зна­йомився з Ґ. Містраль, котра сприяла його твор. роз­витку. Зб. «Veinte poemas de amor y una canción desesperada» («Двадцять поезій коха­н­ня і одна пісня від­чаю», 1924) заявив себе як тонкий лірик і майстер асоціат.-емоц. вільного вірша. Мотивами смутку, самотності пройняті перша та друга кн. «Residencia en la tierra» («Місце прожива­н­ня&nbsp;— земля», 1933 і 1935), характер. ознаками яких є ускладнена асоціативність і герметизм. У віршах зб. «España en el corazón» («Іспанія в серці», 1937) Н. звернувся до теми людської солідарності. Драм. і поет. історію Лат. Америки він закарбував у чітких образах епопеї «Canto general» («Вселюдська пісня», 1950). Філос. осмисле­н­ня людського буття характерне для зб. «Las uvas y el viento» («Вино­градники й вітер», 1954), «Odas elementales» («Оди одвічним речам», кн. 1–3, 1954–57), «Las pied­ras de Chile» («Камені Чилі», 1960), «Cantos ceremoniales» («Ритуальні пісні», 1962), «La Barcarola» («Баркарола», 1967), «Fin de mundo» («Кінець світу», 1969), автобіогр. поеми «Memorial de Isla Negra» («Меморіал Ісла-Неґра», т. 1–5, 1964). Писав стат­ті, нариси тощо. 1973–74 у Буенос-Айресі ви­йшли посмертні вид. 8-ми поет. збірок Н., а також кн. спогадів «Confieso que he vivido» («Зі­знаюсь, що я жив»). Окремі твори Н. українською мовою пере­клали М. Терещенко, Л. Первомайський, П. Дорошко, А. Малишко, Д. Павличко, М. Москаленко, І. Драч, Н. Кащук, С. Борщевський, М. Литвинець, В. Колодій, П. Марусик, С. Жолоб, М. Жердинівська. І. Драч присвятив Н. пʼєсу «Зоря і смерть Пабло Неруди» («Історико-літературний журнал», 2010, № 18). Додаткові відомості Основні твори укр. перекл. — Поеми та вірші. К., 1951; Лірика. К., 1975; Альєнде // Нескорені. К., 1982; Із книжки «Сто сонетів про кохання» // Світ. сонет. К., 1983; Зі збірки «Сто сонетів про кохання» // Поезія–83. Вип. 2. К., 1983; Ода першому дню року // Україна. 1984. № 29; [Вірші] // Всесвіт. 1984. № 8; Я люблю тебе... // Колодій В. С. Братерство. Л., 1985. Рекомендована література Агірре М. Дух і постать Пабло Неруди // Всесвіт. 1974. № 7. Google Scholar Internet Янковський Ю. Пабло Неруда. К., 1975. Google Scholar Internet Полєк В. «Уклонитися вашому серцю» // Вітчизна. 1979. № 12. Google Scholar Internet Харитонов В. Поет космічної ери // Всесвіт. 1984. № 8. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 56, "name": "Нікольсон Сілія-Анна", "birth_year": "1874.0", "death_year": "1936.0", "migration_status": "excluded_non_ukrainian", "reasoning": "Celia Anna Nicholson was born in Montreal, Canada in 1874 and was an English illustrator, engraver, and writer who worked primarily in Britain. She was not Ukrainian by nationality or residence — she was English/British. While she wrote poetry inspired by Taras Shevchenko and translated Ukrainian/Ruthenian works, this does not make her a Ukrainian creative worker eligible for a study of Ukrainian", "article_url": "https://esu.com.ua/article-74395", "bio": "НІ́КОЛЬСОН Сілія-Анна (Nicholson Celia An­na; дівоче&nbsp;— Levetus, Леветус; псевд.&nbsp;— Diana Forbes, Дайна Форбс; 1874, м. Монреаль, Канада&nbsp;— 1936, м. Бірмінґем, Велика Британія)&nbsp;— англійська ілюстраторка-граверка, письмен­ниця. Від 1887 навч. у Бірмінґем. мист. школі під керівництвом В. Крейна. Ілюструвала чимало збірок, зокрема «Songs of Innocen­ce» («Пісні невин­ності») В. Блейка, збірку турец. казок, а також «The English Illustrated Magazine» («Англійський ілюстрований журнал»). Авторка кількох повістей та зб. віршів «Comfort-Lady» («Затишок-Леді», Лондон, 1911), в якій вміщено вірш «On reading a trans­lation from Taras Shevchenko» («Прочитавши пере­клади поезії Тараса Шевченка»)&nbsp;— перша англомовна поезія, присвяч. укр. поету. Додаткові відомості Основні твори A dead voice called to me… // Six lyrics from the Ruthenian of Taras Shev­chenko, also the song of the merchant Kalashnikov from the Russian of Mikhail Lermontov. Rendered into English verse with a bibliographical sketch by E. L. Voy­nich. London, 1911. Завантажити статтю"}, {"idx": 57, "name": "Німців Любов-Ірина", "birth_year": "1908.0", "death_year": "1984.0", "migration_status": "migrated", "reasoning": "Любов-Ірина Німців was born in Premyshl (then Poland, now Ukraine) and had an active career in Lviv until 1944. The biography explicitly states \"Від 1944 — в еміграції\" (From 1944 — in emigration), indicating voluntary departure. She subsequently settled permanently in the United States (Vienna 1945-49, then USA from 1949 until her death in Washington in 1984), constituting permanent emigration ou", "article_url": "https://esu.com.ua/article-72428", "bio": "НІ́МЦІВ Любов-Ірина (псевд.&nbsp;— Фіялковська; за чоловіком&nbsp;— Вайнгаймер; 1908, м. Пере­мишль, нині Під­карп. воєводства, Польща&nbsp;— 01. 08. 1984, Вашинґтон)&nbsp;— спів­ачка (ліричне сопрано). Сестра М.-Д. Німцева. Закін. Консерваторію Польс. муз. товариства (Львів, 1930-і рр.; кл. С. Козловської, Р. Любинецького). Ви­вчала право у Львів. університеті. Від 1926 ви­ступала з концертами у Пере­мишлі. 1936–39&nbsp;— солістка Львів. радіо, 1942–44&nbsp;— Львів. опер. театру (партії в операх «Утоплена», «Наталка Полтавка», «Чорноморці» М. Лисенка, «Долина» Е. дʼАльбера). Також ви­ступала у Літ.-мист. клубі (Львів). Від 1944&nbsp;— в еміграції. 1945–49 концертувала у Відні. Від 1949&nbsp;— у США: ви­ступала з концертами (Рочестер, Детройт, Вашинґтон, Буф­фало), від 1962 викладала у коледжах Рочестера і Вашинґтона. У концерт. репертуарі&nbsp;— твори М. Лисенка, С. Гулака-Артемовського, К. Стеценка, Я. Степового, К. Січинського, Я. Лопатинського, Н. Нижанківського, С. Людкевича, Дж. Пуч­чіні, українські народні пісні. Рекомендована література М. Н. Любі Німців // Свобода. 1984, 29 серп. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 58, "name": "Павловська Євгенія", "birth_year": "1913.0", "death_year": "1965.0", "migration_status": "migrated", "reasoning": "Pavlovska voluntarily left Ukraine in 1944, initially to Germany during WWII, and then permanently settled in Australia from 1950 onwards, where she continued her career with Ukrainian cultural institutions until her death in 1965. There is no evidence of forced deportation or Soviet coercion—her movement represents voluntary emigration outside Soviet/post-Soviet borders.", "article_url": "https://esu.com.ua/article-880094", "bio": "ПАВЛО́ВСЬКА Євгенія (дівоче&nbsp;— Без­палова; 1913, Київ, за іншими даними&nbsp;— с. Сушки Золотоніського пов. Полтавської губ., нині Черкаського р-ну Черкаської обл.&nbsp;— 1965, м. Мельбурн, шт. Вікторія, Австралія)&nbsp;— спів­ачка (сопрано). Лауреатка 1-го Всеукраїнського конкурсу на найкраще викона­н­ня творів радянських композиторів (Київ, 1937, 3-я премія). Закінчила Київський музично-драматичний ін­ститут (1931). Була солісткою Київської (1931–43) і Львівської (1943–44) опер. 1944 виїхала до Німеч­чини, де ви­ступала в музично-драматичному театрі «Ренесанс» під керівництвом Г. Манька (англійська окупаційна зона). Від 1950&nbsp;— в Австралії: спів­працювала з Музично-драматичним театром-студією при Обʼ­єд­нан­ні демократичної української молоді та Українським музично-драматичним театром імені М. Лисенка в Мельбурні. . Додаткові відомості Основні партії Оксана («Запорожець за Дунаєм» С. Гулака-Артемовського), Наталка («Наталка Полтавка» М. Лисенка), Катерина (однойменна опера М. Аркаса), Марфа («Царева наречена» М. Римського-Корсакова), Віолетта («Травіата» Дж. Верді), Мікаела («Кармен» Ж. Бізе), Марґарита («Фауст» Ш. Ґуно), Баттерфляй («Мадам Баттерфляй» Дж. Пуччіні), Сільва (однойменна оперета І. Кальмана). Рекомендована література Гайдабура В. Австралійська киянка // День. 2005, 14 трав. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 59, "name": "Полевська Людмила", "birth_year": "1893.0", "death_year": "1975.0", "migration_status": "migrated", "reasoning": "Людмила Полевська voluntarily emigrated from Soviet Ukraine during World War II, relocating first to Austria and Italy, then permanently settling in the USA (New York) where she lived from 1952 until her death in 1975. There is no evidence of forced displacement by Soviet authorities; her departure was a voluntary wartime relocation followed by permanent emigration to America.", "article_url": "https://esu.com.ua/article-884874", "bio": "ПОЛЕ́ВСЬКА Людмила (дівоче&nbsp;— Тимошенко; 1893, Харків&nbsp;— 19. 12. 1975, м. Нью-Йорк, США)&nbsp;— віолончелістка, піаністка, педагог. Дружина Миколи , мати Зої Полевських . На­вчалася у Харківській і Московській консерваторіях. 1928–41 викладала в Харківській консерваторії. Водночас працювала солісткою у філармоніях Києва, Харкова, Москви. 1925 разом із чоловіком і О. Іл­лєвичевим створили Українське тріо, якому 1932 присвоєно зва­н­ня державного. Під час 2-ї світової війни пере­їхала до Австрії, де викладала у Ві­денській консерваторії музики і драматичного мистецтва; згодом&nbsp;— до Італії: викладала в Римській консерваторії (1943–45). Емігрувала з родиною до США, де від 1952 працювала в Українському музичному ін­ституті в Нью-Йорку, пізніше&nbsp;— у Філадельфії. Завантажити статтю"}, {"idx": 60, "name": "Ржепецька Олена", "birth_year": "1885.0", "death_year": "1948.0", "migration_status": "non_migrated", "reasoning": "Ржепецька lived and worked within Ukrainian territory throughout her life — born in Zhytomyr, worked in Kyiv during the early Soviet period, settled in Lviv during the interwar period, and died in Lviv in 1948. While Lviv changed sovereignty (Austrian→Polish→Soviet), she remained within the geographic Ukrainian region and never emigrated beyond Soviet/post-Soviet borders, nor was there evidence of", "article_url": "https://esu.com.ua/article-886551", "bio": "РЖЕПЕ́ЦЬКА Олена (дівоче&nbsp;— Покровська; псевдонім&nbsp;— Нічий; 1885, за ін. даними&nbsp;— 1890, Житомир&nbsp;— 1948, Львів)&nbsp;— прозаїк. Була по­стійною спів­робітницею «Літературно-наукового вістника» (в його «київський» період), на сторінках якого опублікувала кілька зразків малої прози («Вічна весняна казка», «Останій день Білецького», «Скарга»). Її рання та пізніша творчість за­знала виразного впливу В. Вин­ниченка , твори якого пере­кладала російською мовою з до­зволу автора. Збірка оповідань Р., куплена Державним видавництвом, та драма, написана на замовле­н­ня М. Садовського , були втрачені в Камʼянці-Подільському (нині Хмельницької обл.) під час 1-ї світової війни. У між­воєн­ний період мешкала у Львові. Тут окремими ви­да­н­нями ви­йшли друком її повість «На берегах Гориня» (1934) та збірка оповідань «Вічне полумʼя» (1936), в яких помітні виразні емансипаційні мотиви та спроба пере­осмисле­н­ня євангельських істин, що зумовило контроверсійну оцінку тогочасної літературної критики. У повоєн­ний період твори Р. друкували в журналі «Радянський Львів», однак М. Бажан роз­критикував письмен­ницю за «націоналістичні й буржуазні тенденції», що негативно вплинуло на її долю. Рекомендована література Лужницький Г. Передмова // Ржепецька О. Вічне полум’я: Оповідання. Л., 1936. Google Scholar Internet Сирота Л. Михайло Рудницький і українські письменники-дебютанти // Slavia Orientalis. 2011. Т. 60, № 1. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 61, "name": "Сельська Марґіт Ісаківна", "birth_year": "1900.0", "death_year": "1980.0", "migration_status": "non_migrated", "reasoning": "Margiт Selska was born in Kolomyia and lived primarily in Lviv throughout her life, remaining within Ukrainian/Soviet territory. While she studied abroad in Kraków, Vienna, and Paris (1921-1930) and was arrested by the Gestapo in 1942 with subsequent hiding in Polish cities during WWII, she returned to Lviv in 1943 and remained there until her death in 1980, with no evidence of permanent settlemen", "article_url": "https://esu.com.ua/article-888907", "bio": "СЕ́ЛЬСЬКА Марґіт Ісаківна (Райх-Сельська, від початку 2-ї світової війни&nbsp;— псевдо Марія Іванівна; 23. 06. 1900, м. Коломия, нині Івано-Франківська обл.&nbsp;— 03. 02. 1980, Львів)&nbsp;— живописець, монументаліст. Дружина Р.-С. Сельського . Членкиня мистецьких організацій «Artes» (1929–39), Асоціації незалежних українських митців (участь у ви­ставках&nbsp;— 1933–39), СХУ (1940–80). На­вчалася у Львівській вільній академії мистецтва (1918), в майстерні О. Новаківського (1918), Львівській художньо-промисловій школі (1920–21), Краківській (1921–22) та Ві­денській (1923–1924) АМ. Брала приватні уроки в М. Водзіцької (1917). Мандруючи Францією, на­вчалася в Модерній академії Ф. Леже та А. Озенфана в Парижі (1926–30). Основ
