цьким (1928 ви­ступав з ним у власних автор. концертах у Києві, Харкові, Одесі, Дні­пропетровську) здійснив гастрольну подорож по Зх. Україні. 1939 Б.&nbsp;— депутат Нар. зборів Зх. України. 1939–41, 1944–48&nbsp;— директор і проф. Львів. консерваторії; 1942–44&nbsp;— директор муз. шкіл з українською мовою навч. 1939–41&nbsp;— голова Львів. оргкомітету, 1944–48&nbsp;— голова Львів. від­діл. і чл. правлі­н­ня СКУ. 1940&nbsp;— депутат Львів. обл. ради депутатів трудящих. Навесні 1940 брав участь у роботі зʼ­їзду композиторів СРСР у Києві. 29 січня 1948 заарешт., був висланий разом з дружиною на 10 р. у мордов. табори. 1958 повернувся до Львова. Намагався від­творити рукописи своїх творів, знищених КДБ під час арешту. Реабіліт. 1964 (посмертно). Б.&nbsp;— засн. камерно-інструмент. жанру в Україні (2 фортепіан­них тріо, 1911; секс­тет для фортепіано, 2-х скрипок, альта, віолончелі, контрабаса, 1915; 2 струн­ні квартети, 1912, 1935). У ГУЛАГу в 1950-і рр. написав фортепіан­ні квінтет і концерт для віолончелі з фортепіано. Першим в Україні за­провадив у фортепіан. жанр риси ім­пресіонізму (8 прелюдій, 1908) та сонористики («Жабʼячий вальс», 1910). Ін. фортепіан­ні твори: «Соната» (1910), «Пісня. Серенада. Ім­провізація» (1911), цикл «Любов» (1914; у 3-х ч.), «Українська сюїта» (1915). Шість мініатюр на укр. нар. теми (1920) були першими укр. творами, опубл. у віден. «Universal-Edition» і в Токіо. 20 дит. пʼєс на теми укр. нар. пісень (зб. «Наше сонечко грає на фортепіані», 1935) стали основою навч. гри на цьому інструменті. 1935 ви­дані також «Збірка українських народних пісень» і «Збірка українських колядок і щедрівок» для фортепіано. 1993 від­найдений Концерт для фортепіано з орке­стром (1917–37), який вважався без­поворотно втраченим. Своєрідність лірич. почерку Б. виявилася у соло­співах із фортепіано й орке­стром до текс­тів І. Франка, Т. Шевченка, Б. Лепкого, П. Куліша, О. Кониського та ін., в обробках нар. пісень, також хорових (напр., «Уже сонечко закотилось» для мішаного хору). До творів великої форми належать «Українська рапсодія» для оркестру (1911) та вокал.-симф. твори: «Українське весі­л­ля» у 2-х ч. (1914), кантати «Заповіт» на слова Т. Шевченка та «Урочиста кантата на честь митрополита Андрея Шептицького» на слова В. Маслова (1917), «Наша пісня, наша туга», на слова С. Черкасенка (1933). Основні риси стилю Б.&nbsp;— камерність, ліричність, поліфонічність. Він створив економний і доцільний почерк, виходячи з укр. нар. музики. Звідси тип мелодики&nbsp;— діатонічна ладова опора й зумовленість гармонії поліфоніч. сплете­н­ням мелодич. ліній у про­зорій фактурі. Чутливість до витонченого колориту є нац. пере­втіле­н­ням ім­пресіонізму. Нар. пісня зумовила й принципи роз­витку&nbsp;— варіаційність та ім­провізаційність, метричну й ритмічну змін­ність у межах мініатюр. форм, від­точеність деталей і чіткість структури з без­посередністю висловлюва­н­ня. Чималою є й муз.-публіцист. спадщина Б., пере­йнята пафосом захисту нац. муз. культури українського народу (стат­ті про Б. Бартока, М. Лисенка, В. Косенка, С. Людкевича та ін., на­друковані в ж. «Боян», «Українська музика», «Радянська музика», «Мистецтво», в «Українській загальній енциклопедії», укр., рос. і польс. газетах). У грудні 1994 у Львові проведено муз. конкурс ім. В. Барвінського. Серед учнів&nbsp; Р. Савицький . Додаткові відомості Основні праці Українська народна пісня і українські композитори. Прага, 1914; Рецензія на «Пісні Холмщини і Підлясся» Ф. Колесси. Л., 1917; В обороні"}, {"idx": 1, "name": "Барка Василь", "birth_year": "1908.0", "death_year": "2003.0", "migration_status": "migrated", "reasoning": "Vasyl Barka was a Ukrainian creative worker (poet, prose writer, literary scholar) who voluntarily emigrated to the United States in 1950 after spending time in displaced persons camps in Augsburg post-WWII. He settled permanently in the USA (New York, then Glen Spey), where he lived and died in 2003, publishing most of his major works there. There is no evidence of forced Soviet deportation—his W", "article_url": "https://esu.com.ua/article-40577", "bio": "БА́РКА Василь (справж.&nbsp;— Очерет Василь Костянтинович; ін. псевд.&nbsp;— Іван Вершина; 16. 07. 1908, с. Солониці, нині Лубен. р-ну Полтав. обл.&nbsp;— 11. 04. 2003, м. Ґлен-Спей, шт. Нью-Йорк, США)&nbsp;— поет, прозаїк, есе­їст, літературо­знавець. Кандидат філологічних наук (1940). Навч. у Лубен. пед. технікумі, на філол. факультеті Краснодар. пед. ін­ституту (30-і рр.), де потім викладав історію зх.-європ. літ-р середньовіч­чя. Учасник 2-ї світової війни, був двічі поранений, а 1943 вивез. німцями до Берліна як остарбайтер. Після війни пере­бував у таборах для пере­міщ. осіб в Авґсбурзі. Від 1950&nbsp;— у США, спершу мешкав у Нью-Йорку, а від поч. 70-х рр.&nbsp;— у Ґлен-Спеї. До війни опубл. зб. поезій «Шляхи» (1930) і «Цехи» (1932; обидві&nbsp;— Харків). Критика звертала увагу на спорідненість ран­ньої творчості Б. з пантеїзмом П. Тичини, рос. символізмом, італ. Ренесансом і традиціями барок. поезії. Автор поет. книг «Апостоли» (Авґсбурґ, 1946), «Білий світ» (Мюнхен, 1947), «Псалом голубиного поля» (1958), «Океан І» (1959), «Лірник» (1968), «Океан ІІ» (1979; усі&nbsp;— Нью-Йорк), «Океан IІІ» (К., 1992), драм. поеми «Кавказ» (К., 1993). В романі у віршах «Свідок для сонця шестикрилих» (Нью-Йорк, 1981) Б. засобами поет. символіки та склад. алюзій до текс­ту Святого письма осмислює про­блему осягне­н­ня Людиною величного помислу Творця. Автор проз. романів «Рай» (Джерсі-Сіті; Нью-Йорк, 1953), де викривається соціаліст. «рай» у СРСР, та «Жовтий князь» (Мюнхен; Нью-Йорк, 1963)&nbsp;— одного із най­пронизливіших творів про геноцид українського народу в голодоморі 1932–33. Пере­клав з англ. мови трагедію В. Шек­спіра «Король Лір» (Штут­тґарт; Нью-Йорк, 1969), з італ.&nbsp;— фрагменти «Божествен­ної комедії» Данте (Штут­тґарт, 1978). Для зрілого періоду творчості Б. характерне оригін. викори­ста­н­ня засобів фольклор. поетики в по­єд­нан­ні з принципами барок. символіки, цілісність худож. композицій, пере­йнятих просвітленою християн. містикою й натхнен. оприсутне­н­ням Бога в колі дарованого людині світу. «Із двох можливих варіянтів символізму&nbsp;— одного, що знає, а другого, що шукає,&nbsp;— Барка послідовно надає пере­вагу першому. ...За нібито позірним сюр­реалізмом цих кон­струкцій існує зумисний смисл, існує правда» (І. Фізер). Цією правдою для Б. є радісна євангел. вість, адресована кожній людині, обтяж. марнотою буднів і тягарем влас. двочасності. Про­зрі­н­ня остаточ. смислів, що так химерно роз­бігаються з контекс­том дійсності та її мов. практикою&nbsp;— під­ґрунтя всієї творчості Б. Саме звідси&nbsp;— наполегливе й винахідливе творе­н­ня влас. мови, від­мін­ної як від традиц. літ., так і роз­мовно-побут. укр. дискурсів серед. 20 ст. «Мимоволі виникає від­чу­т­тя, що поет хоче сказати щось невисказане, щось, що лежить за межами звичайної лексики. Слова стоять на пере­шкоді, і поет мусить їх уживати, але робити це із за­стереже­н­ням. Тому його мова пере­сичена архаїзмами, рідко вживаними словами, новими формами старих слів і особливо новотворами... Ідеал Барки&nbsp;— це “незримість неба”, що роз­сипається сонячним вогнем у його поезії. Його релігійну пристрасть можна хіба порівняти з пристрастю барокових поетів» (В. Кейс). Чи не в цьому прагнен­ні витворити власну поет. мову для вираже­н­ня особистіс. світочут­тєвих комплексів Б. опинився на боці митців Нью-йорк. групи, чиє «літературне бунтарство» він рішуче під­тримав від самих початків (серед. 50-х рр.). А коли з публікацій деяких епатаж. віршів (зокрема М. Царин­ника) Б. ді­йшов висновку, що творчості «нью-йоркчан» на­справді чужі ви­значальні для нього сакральні смисли, то заявив про свій «духовний роз­рив» з групою. Реліг. пере­жива­н­ня тісно повʼязане у Б. з напруж. і повсякчасним осмисле­н­ням укр. нац. онтології, є способом її ро­зумі­н­ня та гармонізації. «Поезія Василя Барки&nbsp;— вияв такого світос­при­йма­н­ня, що засобами синхрон­ності й синпер­спективності шукає виявити понад­часові сутності українського світу. Ці шука­н­ня, формально збігаючись з шука­н­нями сучасної західної поезії й мистецтва взагалі, не наслідують їх. Вони ростуть з ґрунту українського середньовіч­чя, як воно збереглося в писаних текс­тах і народній творчості» (Ю. Шерех). В усіх метафіз. роз­мислах та образно-символ. медитаціях Б. увага акцентується на духовному самовдосконален­ні особистості в категоріях християн. моралі. Свої по­гляди на мистецтво, літературу і життя Б. висловив в есе «Жайворонкові джерела» (1956), «Вершник неба» (1965), «Земля садівничих» (1977; усі&nbsp;— Нью-Йорк) і літературо­знав. працях «Уваги про поезію старовин­ну і сучасну» (1958), «Хліборобський Орфей, або Клярнетизм» (1961; обидві&nbsp;— Мюнхен; Нью-Йорк), «Правда Кобзаря» (1961), «Творчість» (1968; обидві&nbsp;— Нью-Йорк). Влітку 1999 внаслідок інсульту був го­спіталіз., а згодом від­даний під мед. опіку до старечого будинку. Рекомендована література Бойко Ю. Про поета Барку і про дещо принципове // Орлик. 1947. № 5. Google Scholar Internet Шерех Ю. Етюди про незрозуміле в літе"}, {"idx": 2, "name": "Березін Юхим Йосипович", "birth_year": "1919.0", "death_year": "2004.0", "migration_status": "migrated", "reasoning": "Березін Юхим Йосипович was a prominent Soviet Ukrainian actor and comedian who had a long career in the Ukrainian SSR (born 1919 in Odesa, worked extensively in Kiev from 1940s-1980s as actor and director). The biography explicitly states \"На поч. 1990-х рр. виїхав до Ізраїлю\" (at the beginning of the 1990s emigrated to Israel) and he died in Tel Aviv in 2004, indicating voluntary emigration and p", "article_url": "https://esu.com.ua/article-39321", "bio": "БЕРЕ́ЗІН Юхим Йосипович (сцен. псевд.&nbsp;— Штепсель; 11. 11. 1919, Одеса&nbsp;— 29. 05. 2004, м. Тель-Авів, Ізраїль)&nbsp;— актор, артист роз­мовного жанру. Народний артист УРСР (1961). Член НСКінУ (1958–99). Учасник 2-ї світової війни. Мав бо­йові нагороди. Закін. Київ. ін­ститут театр. мистецтва (1941; викл. Г. Полежаєв ). На естраді ви­ступав від 1940 разом із Ю. Тимошенком : гуморист.-сатир. дуети «Галкін і Мочалкін» (1941–45), «Штепсель і Тарапунька» (від 1945)&nbsp;— зразок популярного «малоросійського» гумору з обі­грува­н­ням мовного суржика. Працював реж. Київ. рос. драм. театру ім. Лесі Українки (1945–46); від 1946&nbsp;— актор і гол. реж. Укр. респ. естради (від 1959&nbsp;— Укрконцерт). Знявся у фільмах Київ. кіностудії худож. фільмів ім. О. Довженка: «Тарапунька і Штепсель під хмарами» (1954), «Їхали ми, їхали» (1963), «Сміхонічні пригоди Штепселя і Тарапуньки» (1971; в усіх&nbsp;— спів­авт. сценарію і реж.), «Від і до» (1977; спів­авт. сценарію), «Веселі зірки» (1954); а також у фільмах «Гомони, містечко» (1956), «Майська ніч» (1959), «Навколо Європи» (1960). Ви­стави з участю Б.: «Двадцять з гаком» (1961), «Сміхонічний концерт» (1967), «Від і до» (1971–72), «Хвилюйтесь, будь ласка» (1978–79), «Моя хата скраю» (1986). У складі дуету виконував інтермедії та мініатюри К. Бахнова, О. Каневського, М. Костюковського, Р. Вік­керса, Ю. Тимошенка, власні твори. На поч. 1990-х рр. ви­їхав до Ізраїлю. Рекомендована література Слободенко О. А. Дарований людям сміх. К., 1979. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 3, "name": "Бостунич Григорій  Васильович", "birth_year": "1883.0", "death_year": "1945.0", "migration_status": "migrated", "reasoning": "Bostunich voluntarily emigrated from Ukraine/Soviet territory to Germany around the 1920s-1930s, where he published works, established himself as a writer, and eventually became an SS officer (Obersturmbannführer by 1937), settling permanently outside Soviet borders until his death in 1945. There is no evidence of forced deportation by Soviet authorities; rather, this was voluntary political emigr", "article_url": "https://esu.com.ua/article-37429", "bio": "БОСТУ́НИЧ Григорій Васильович (справж.&nbsp;— Шварц Григорій Вільгельмович; псевд.&nbsp;— Маркиз Поза; 19. 11. 1883, Київ&nbsp;— 1945?)&nbsp;— драматург, видавець. 1915 взяв прі­звище діда по матері (офіц. Давид Бостунов). Закін. Університет св. Володимира в Києві (1908). Більш як 8 р. працював адвокатом. У літературі ви­ступав від 1905. Видавав журнали «Киевский набат» (1906, 2 вип.; під псевд. Грегуар Ле-Нуар), «Киевский театрал» (1906– 07), «Арсетвита» (1910) та «Киевский звонок». 1909 заснував видавництво «Гонг», 1910&nbsp;— г. «Южная копейка» (від 1917&nbsp;— АТ). Автор легковаж. водевілів. Одноактну драму «Женщина или...?» (1911) заборонено до ви­стави цензурою. Пʼєсу «Наука любви» (К., 1916) по­ставлено в театрі Л. Яворської (Петро­град, 21 березня 1916) з великими купюрами. 1914 був у нім. полоні. Автор трагедії «Любовь императрицы: Коронован­ная измен­ница», драми «Ремесло Иуды» (обидві&nbsp;— 1917); моно­графії про реж. М. Євреїнова «Анархист в театре» (1918); дослідж. про масонство. З публ. лекціями ви­ступав іще в студент. роки (Київ. товариство мистецтва й літ-ри). Викладав у Вищому муз.-драм. ін­ституті, Драм. консерваторії, кінокурсах Азагарова, студії «Дні­просоюзу». Ви­їхавши до Німеч­чини, на­друкував у ж. «Луч света» пʼєсу про ВЧК «Последний вздох ката». Був обер-штурмбанфюрером СС (1937), а згодом штандартенфюрером СС (1944). Приятелював із Г. Гім­млером, Р. Гайдріхом та К. Вольфом. Додаткові відомості Основні праці Из вражеского плена. Петроград, 1915; Правда о сионских протоколах. Mitrovitsa (Sremskaja), 1921; Масонство в своей сущности и проявлениях: Со многими новыми рисами и чертами: В 2 ч. Ч. 1. Белград, 1928; Die Freimaurerei: Ihr Ursprung, ihre geheimnisse, ihr Wirken. Weimar, [1936]; Масонство и русская революция. Москва, 1995. Державний архів ЦДАМЛМ України. Ф. 508; НБУВ. Інститут рукописів. Ф. 195. Рекомендована література R. Š. Ganelin. Das Leben des Gregor Schwartz-Bostunitsch: Teil 1 // Russische Emigration in Deutschland, 1918 bis 1941: Leben im europеischen Bürgerkrieg // Herausgegeben von K. Schlögel. [Berlin, 1995]; M. Hagemeister. Das Leben des Gregor Schwartz-Bostunitsch: Teil 2 // Там само. Google Scholar Internet Ганелин Р. Ш. К истории русского фашизма в гитлеровской Германии // Клио. С.-Петербург, 1998. № 1. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 4, "name": "Вавилін Іван Михайлович", "birth_year": "1911.0", "death_year": "1975.0", "migration_status": "excluded_non_ukrainian", "reasoning": "Ivan Vavilin was a Komi poet (not Ukrainian) born in Komi ASSR and spent his entire life in Syktyvkar, Komi ASSR. While he translated Shevchenko's works and wrote poems about Ukraine, his nationality and primary creative identity were Komi, placing him outside the scope of a study of Ukrainian creative workers.", "article_url": "https://esu.com.ua/article-32797", "bio": "ВАВИ́ЛІН Іван Михайлович (Вавилин Иван Михайлович; псевд.&nbsp;— Баярса Иван; 21. 11. 1911, с. Бояркерос, нині Респ. Комі, РФ&nbsp;— 04. 10. 1975, м. Сиктивкар, нині Респ. Комі, РФ)&nbsp;— комі поет. Державна премія Комі АРСР ім. І. Куратова (1973). Закін. під­готовчі курси для вступу до ВШ (1933). Працював журналістом. Учасник 2-ї світової війни. Дебютував у пресі 1926. Автор зб.: «Ни öти шаг бöрö!» («Ні кроку назад!», 1942), «Сöветскöй вoин» («Радянський воїн», 1944), «Менам парма» («Моя парма», 1957), «Зу» («Колючка», 1963), «Мувыв кодзувъяс» («Земні зорі», 1965), «Кыаысь кыаö» («Від зорі до зорі», 1970); поем «Тарас дед» («Дід Тарас», 1959), «Öнія элегия» («Сучасна елегія», 1965), «Кывбуръяс» («Вірші», 1973), «Сьöлöм сьылöм» («Пісні серця», 1976) та ін. У творчості В. пере­важає громадян., медитат. та інтимна лірика, сатир. вірші, байки; від­чутний тісний звʼязок із традиціями комі фольклору. Писав також для дітей: зб. віршів «Пытшöсь сан» («Збитошниця-росомаха», 1961), «Миша вöчö йöв» («Михайлик любить молоко», 1965); казки «Дружнöй котыр» («Дружна сімейка», 1962), «Кысук да Серко» («Кисук і Сірко»; за цією казкою написав лібрето до дит. опери П. Чи­стальова). Україні, пере­важно часів 2-ї світової війни, присвятив вірші «Лым еджыд хата» («Білосніжна хата», 1943), «Остап дед» («Дід Остап», 1944). Усі за­знач. твори опубл. у Сиктивкарі. Пере­клав низку творів Т. Шевченка (зокрема «Пере­бендя», «Гоголю», «Заповіт», «Минають дні, минають ночі», «І виріс я на чужині», «Якось-то йдучи уночі», «Заворожи мені, волхве», «Не завидуй багатому»). Образ укр. поета від­творив у вірші «Без­смертному Кобзарю» (1968; укр. перекл.&nbsp;— В. Густі). Окремі поезії В. пере­клали П. Скунць, В. Діянич, В. Густі, І. Петровцій. Додаткові відомості Основні твори укр. перекл. — (Вірші) // Пісні з-над Печори. Уж.; Сиктивкар, 1975; (Вірші) // Випробування. Уж.; Сиктивкар, 1986. Рекомендована література Хоменко Б. Тарас Шевченко і комі література // Зб. праць 25-ї наук. Шевченків. конф. К., 1983. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 5, "name": "Верес Зоська", "birth_year": "1892.0", "death_year": "1991.0", "migration_status": "migrated", "reasoning": "Зоська Верес was born in Ukraine (Mezhybizh, Podilia) in 1892 but permanently settled in Vilnius (Wilno) from 1923 onwards, where she lived and worked until her death in 1991. Her relocation to Lithuania was voluntary and she established a permanent residence there, qualifying as voluntary emigration outside Soviet/post-Soviet Ukrainian borders.", "article_url": "https://esu.com.ua/article-33538", "bio": "ВЕ́РЕС Зоська (Верас Зоська; справж.&nbsp;— Войцик Людвіка Антонівна; Войцік Людвіка Антонаўна; 30. 09. 1892, м. Меджибіж Поділ. губ., нині смт Летичів. р-ну Хмельн. обл.&nbsp;— 08. 10. 1991, Вільнюс)&nbsp;— письмен­ниця. Член СП СРСР (1982). Закін. Київ. приват. комерц. училище Л. Володкевич (1908), приватну жін. гімназію у м. Гродно (Білорусь, 1912), курси городництва, садівництва і бджолярства у Варшаві (1914). Від 1909 ілкувалася з Лесею Українкою, Оленою Пчілкою. Рекомендована література Костриця М. Ю., Мокрицький Г. П. Дві сестри (Людмила Волошка та Вероніка Морозівна) // У просторі і часі: Видатні постаті Житомирщини. Ж., 1995. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 7, "name": "Вороньківський Іван", "birth_year": "1875.0", "death_year": "1925.0", "migration_status": "non_migrated", "reasoning": "Vororinkivsky lived and worked primarily in Ukraine (Chernihiv region and his native Voronkov), with no evidence of forced displacement or permanent voluntary emigration. After the fall of UNR, he returned to Voronkov and engaged in agricultural work and community life there until his death in 1925, remaining within Ukrainian territory throughout his life.", "article_url": "https://esu.com.ua/article-29859", "bio": "ВОРОНЬКІ́ВСЬКИЙ Іван (справж.&nbsp;— Коновал Іван Омелянович; крипт.&nbsp;— І. В.; 1875, містечко Вороньків Полтав. губ., нині село Борис­піл. р-ну Київ. обл.&nbsp;— 05. 10. 1925, там само)&nbsp;— поет. У 90-х рр. 19 ст. склав екс­терном іспити на зва­н­ня вчителя. Учителював. Через неблагонадійність увʼязнений, після чого йому заборонили працювати у школі. Від 1901 працював держ. службовцем, зокрема від 1903&nbsp;— в Черніг. губ. зем. управі (від­діл меліорації). Згодом&nbsp;— коректор і секр. «Земского сборника Черниговской губернии», де друкував свої стат­ті («К во­просу о сохранении памятников народного творчества», 1902 та ін.). Брав участь у діяльності Черніг. губ. вченої архів. комісії. Друкувався в одес. альманахах «Бага­т­тя» (1905) і «Вінок Т. Шевченкові» (1912). Автор поет. зб. «Зіронька» й «Вірші» (обидві&nbsp;— Чг., 1904), пʼєси «Без спомоги» (1905). У творчості В. помітний вплив фольклору і творів Т. Шевченка. Жив у Чернігові, де по­зна­йомився і під­тримував дружні взаємини з М. Коцюбинським, Б. Грінченком та ін. На муз.-літ. вечорах у В. свої твори читали молоді поети, серед них&nbsp;— П. Тичина (вірш «О панно Інно...» присвяч. доньці письмен­ника, 1915). Твори В. (пере­важно ліричні)&nbsp;— на соц.-побут. тематику, про істор. минуле і змага­н­ня за волю України. Після паді­н­ня УНР повернувся до Воронькова, за­ймався хліборобством, брав участь у громад.-культ. житті села. Рекомендована література Замошник О. Д., Дасюк М. І. Літературна Чернігівщина. Чг., 1960. Google Scholar Internet Неділько Г. Я. Іван Вороньківський // Наук. зап. Ніжин. пед. інституту. 1960. Т. 11, вип. 1. Google Scholar Internet Дудко В. По сторінках «Земского сборника...» // Вітчизна. 1986. № 5. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 8, "name": "Гаврилюк Ілько  Дмитрович", "birth_year": "1874.0", "death_year": "1947.0", "migration_status": "migrated", "reasoning": "Гаврилюк voluntarily emigrated to Austria in 1944, settling permanently in Münster, Tyrol, where he died in 1947. This represents permanent settlement outside Soviet/post-Soviet borders through voluntary departure, not forced displacement or internal Soviet movement.", "article_url": "https://esu.com.ua/article-28034", "bio": "ГАВРИЛЮ́К Ілько Дмитрович (крипт.&nbsp;— І. Г.; 05. 03. 1874, с. Спас, нині Коломий. р-ну Івано-Фр. обл.&nbsp;— 07. 01. 1947, с. Мінстер, Тіроль, Австрія)&nbsp;— письмен­ник, громадський і культурний діяч. Закін. Коломий. гімназію (1898), від 1900 навч. у Львів. та Віден. університетах. Учасник 1-ї світової війни та воєн. дій 1918– 20 (сотник УГА), пере­жив більшов. та денікін. ре­пресії. Учителював у г-зіях, був настоятелем бурси (м. Коломия, 1923–44). У 1944 емігрував до Австрії. Друкувався від 1901 у «Літературно-науковому віснику», часописах «Діло», «Дзвінок», «Руслан», ж. «Світ», під­тримував творчі звʼязки з В. Стефаником, Л. Мартовичем, Марком Черемшиною. Автор низки поезій, опубл. у тижневику «По­ступ» (Коломия, 1903, № 32, 50), антології укр. лірики «Акорди» (Л., 1903), альманахові «За красою» (1905), серед них: «Я не плачу, мов покутник», «Люблю тебе, люблю, єдина», «Летіть, летіть, понурі хвилі». До 1914 ви­йшла драма на 3 дії «Молоді паростки» (Чернівці). У ж. «Світ» на­друк. оповіда­н­ня «Влада темного» (1926, № 7), «Осінь» (1927, № 19–20), «Ілюзії» (1928, № 6). Автор зб. «По терню та Кремін­ню» (Коломия, 1923), в якій опубл. вірші «Проща­н­ня стрільця з дружиною» (1919), «Інтродукція», «Сон» (обидва&nbsp;— 1922), «До молоді», «Тиф серед УГА в Борі» (обидва&nbsp;— 1923). Додаткові відомості Основні твори (Вірші) // Стрілецька голгофа: Спроба антології. Л., 1992. Завантажити статтю"}, {"idx": 9, "name": "Гартл Антонін", "birth_year": "1885.0", "death_year": "1944.0", "migration_status": "excluded_non_ukrainian", "reasoning": "Antonín Hartl was born in Kunkovice (now Czech Republic) and was ethnically Czech, not Ukrainian. While he was a scholar of Ukrainian/Ruthenian literature working in Czechoslovakia, he was not himself Ukrainian and thus falls outside the scope of a study classifying Ukrainian creative workers.", "article_url": "https://esu.com.ua/article-28802", "bio": "ГАРТЛ Антонін (крипт.&nbsp;— Др. А. Г.; 11. 12. 1885, с. Кунковиці, округ Клатови, нині Чехія&nbsp;— 19. 02. 1944, Прага)&nbsp;— український літературо­знавець, журналіст, пере­кладач у Чехо-Словач­чині. Д-р філософії (1912). Закін. Карлів університет у Празі (1911). Працював гол. ред. від­ділу преси, кер. архіву, гол. радником МЗС Чехо-Словач­чини; ред. часописів «Prager Rundschau», «Èas», г. «Русинъ». 1939 пере­бував під на­глядом поліції. Автор праць з чес. літ-ри, дослідж. про літ. і мовний роз­виток Закарп. України 20–30-х рр.; наук. роз­відок про О. Духновича, А. Добрянського, рецензій на праці Ю. Яворського, П. Федора, Д. Вергуна. У 20-і рр. почав пере­кладати чес. мовою твори укр. письмен­ників (оповіда­н­ня Л. Демʼяна «Чорт на весі­л­лю» опубл. у г. «Hlídka času», 1923, 14 січ.). З власних пере­кладів уклав першу антологію закарпатоукр. літ-ри чес. мовою «Pozdravení Rusínů: Výbor z literatury podkarpatoruské 1920–1935» (Bratislava, 1936), куди уві­йшли твори Марка Бараболі, А. Бобульського, А. Ворона, В. Ґренджі-Донського, А. Карабелеша, Ф. Потушняка, Зореслава та ін. Стат­ті про Закарп. Україну друкував у нім. та франц. періодиці. Додаткові відомості Основні праці Основи руської народної і культурної політики. Уж., 1923; Literárni obrození podkarpatských Rusínů v létech 1920–1930. Praha, 1930; Písemníctvi podkarpatských Rusínû. Praha, 1933; Podkarpatská Rus v české literatúře // Podkarpatská Rus: Sbornik. Bratislava, 1936; Взгляд на современное состояние подкарпаторусской литературы // Карпаторус. слово. 1937. № 4. Рекомендована література Бабота Л. Невтомний дослідник закарпатоукраїнської літератури — Антонін Гартл // Мат. Міжнар. наук. конф. (Пряшів–Свидник, 12–15 червня 1991). К.; Л.; Пряшів; Мюнхен; Париж; Нью-Йорк; Торонто; Сідней, 1992. Google Scholar Internet Хланта І. В. Літературне Закарпаття у ХХ столітті: Біобібліогр. покажч. Уж., 1995. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 10, "name": "Глушаниця Павло", "birth_year": "1916.0", "death_year": "1945.0", "migration_status": "migrated", "reasoning": "Павло Глушаниця voluntarily left Soviet territory in January 1945 by crossing into the American occupation zone, subsequently settled permanently in North America (Canada in 1948, then USA), and spent the remainder of his life there as a publisher and activist, never returning to Soviet/Ukrainian territory. This represents clear voluntary emigration and permanent settlement outside Soviet borders.", "article_url": "https://esu.com.ua/article-30518", "bio": "ГЛУШАНИ́ЦЯ Павло (справж.&nbsp;— Гоминюк Павло Тодосьович; 03. 09. 1916, с. Новоселиця Сквир. пов. Київ. губ., нині Попільнян. р-ну Житомир. обл.)&nbsp;— публіцист. З сімʼї роз­куркулених. Учасник 2-ї світової війни, був у штраф. баталь­йоні, втік, у січні 1945 пере­йшов в амер. зону окупації, пере­бував у таборі для пере­міщ. осіб. 1948 ви­їхав до Канади, працював на лісорозробках. Заснував часописи «Український Прометей» (м. Детройт, шт. Мічиґан, США, 1951), «Наш вік». Ініціював вид. книги свідчень про комуніст. терор і голодомор 1932–33 в Україні «The Black Deeds of the Kremlin: A White book» («Біла книга про чорні справи Кремля», у 2-х т., Торонто, Детройт, 1953– 55); спогадів «Роз­ки­дані долею» (ви­дана в Україні 1990, остан­нє вид.&nbsp;— «Війна без по­стрілів», К., 2003&nbsp;— на його ж кошти 1994 створ. однойм. фільм), «Я ніс тяжкий хрест терни­стою дорогою на українську голгофу» (К., 2005). Спонсорував вид. англ. пере­кладу кн. «Українська інтелігенція на Соловках» С. Під­гайного. Створив фонд у Торонто на під­тримку україно­знавства. Рекомендована література Слабошпицький М. Його особиста війна (Павло Глушаниця) // Не загублена укр. людина (55 портретів з укр. діаспори). К., 2004. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 11, "name": "Голинська Галина Яківна", "birth_year": "1902.0", "death_year": "1976.0", "migration_status": "migrated", "reasoning": "Halyna Holyns'ka voluntarily left Ukraine in 1943, settling first in the USA and then permanently in Canada (Edmonton, Alberta), where she lived until her death in 1976. There is no evidence of forced displacement; her relocation was a professional emigration during wartime, and she established a permanent life abroad as a conductor and piano teacher.", "article_url": "https://esu.com.ua/article-25241", "bio": "ГОЛИ́НСЬКА Галина Яківна (дівоче&nbsp;— Краснопера; 02. 01. 1902, с. Хильчиці, нині Золочів. р-ну Львів. обл.&nbsp;— 10. 11. 1976, м. Едмонтон, провінція Альберта, Канада)&nbsp;— піаністка, диригент. Дружина М. Голинського . Муз. освіту здобула у Львів. вищому муз. ін­ституті (1925) та консерваторії у В. Барвінського , Р. Любинецького , С. Людкевича . Працювала асист. у Ч. Заремби та Р. Любинецького . Згодом була концерт­мейстером та хор­мейстером у Львів. опер. театрі. Також ви­ступала з ві­домими артистами і спів­аками як концерт­мейстер. Від 1943&nbsp;— у США, згодом&nbsp;— у Канаді, де працювала диригентом хору при філії Укр. нац. обʼ­єдн. у Віндзорі, від 1954&nbsp;— у Торонто. Мала фортепіан­ну студію. Рекомендована література Професор Галина Голинська // Жін. світ. 2007. № 27. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 12, "name": "Гошовська Ірина  Арсенівна", "birth_year": "1915.0", "death_year": "1934.0", "migration_status": "excluded_bad_dates", "reasoning": "The biography contains a chronological impossibility. The person is listed as dying in 1934, but the text states \"Від 1934 вивчала англістику\" (From 1934 studied English studies) at Jagiellonian University in Kraków, and goes on to describe extensive activities during WWII, post-1945 in Germany and Canada, and teaching positions from 1954-1984. A person cannot have died in 1934 and simultaneously", "article_url": "https://esu.com.ua/article-31657", "bio": "ГОШО́ВСЬКА Ірина Арсенівна (псевд.&nbsp;— Ївга Шугай; 23. 08. 1915, Волинь)&nbsp;— редактор, публіцист. Дружина Б. Гошовського . Від 1934 ви­вчала англістику, а також україністику (у проф. Б. Лепкого ) в Яґел­лон. університеті у Кракові, здобула ступінь магістра (1939). Кор. ж. «Світ молоді», «Українська молодь» (США). Під час 2-ї світової війни учителювала на Під­ляш­ші, організувала дит. табори та садки, збирала етногр. матеріали. Друкувалася у ж. «Малі друзі», «Дорога», робила англомовні пере­клади репортажів для під­піл. радіо. Після 1945&nbsp;— у Німеч­чині, Канаді. Спів­ред. дит. журналу-альманаху «Нашим дітям» (1947), двомісячника для юнацтва «Євшан-зілля» (1950) у Торонто. Від 1954&nbsp;— спів­роб. дит. ж. «Веселка», 1957–58&nbsp;— ред. англомов. частини. Організувала у Канаді 1-й укр. ляльк. театр (1951), викладала на курсах україно­знавства. 1961–84 викладала у держ. англомов. серед. канад. школах. Упорядкувала й під­готувала до друку «Зі­брані твори» О. Лятуринської, ілюстров. антологію укр. літ-ри для дітей «Віночок». Дописувала до ж. «Громадянка», «Жіночий світ», спів­ред. часопису «Наша мета» (1950). Опублікувала зб. сценок для дит. театру «Небесний гість» (1956). Рекомендована література Держко І. Гошовська Ірина Арсенівна // Укр. журналістика в іменах. Л., 2004. Вип. 11. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 13, "name": "Грималюк Василь Іванович", "birth_year": "1920.0", "death_year": "1998.0", "migration_status": "non_migrated", "reasoning": "Grimalyuk was born in 1920 in Zelene village (Ivano-Frankivsk region) and died in 1998 in Kovalivka (also Ivano-Frankivsk region), both in Ukraine. While he performed at festivals in Kyiv and Moscow and won international competitions, there is no evidence he permanently emigrated or was forcibly deported; his career activities were Soviet-era professional engagements within the USSR, and he remain", "article_url": "https://esu.com.ua/article-27239", "bio": "ГРИМАЛЮ́К Василь Іванович (прі­звисько&nbsp;— Моґур; 10. 03. 1920, с. Зелене, нині Верховин. р-ну Івано-Фр. обл.&nbsp;— 03. 02. 1998, с. Ковалівка Коломий. р-ну Івано-Фр. обл.)&nbsp;— скрипаль. Гри на скрипці навч. у І. Курилюка та І. Шкапʼюка. Ви­ступав на фестивалях нар. творчості у Києві та Москві (1950). Лауреат Між­нар. муз. кон­гресу у Москві (1971), під час якого у концерт. залі ім. П. Чайковського виконав власну про­грамну композицію «Ранок на полонині»; 1-е м. на Всеукр. радіоконкурсі «Золоті ключі» (Київ, 1987). На поч. 1970-х на фірмі «Мелодія» записано на грамплатівку «Ім­провізацію про Довбуша» Г. Як скрипаль озвучив к/ф «Тіні забутих предків» (1964, реж. С. Параджанов) та «Ан­ничка» (1968, реж. Б. Івченко; обидва&nbsp;— Київ. кіностудія худож. фільмів ім. О. Довженка). Автор творів «Вівчарська дума», «Гірська фантазія». Рекомендована література Семиволос Ю. Світ, оспіваний скрипкою // Прикарп. правда. 1980, 8 квіт. Google Scholar Internet Максим’юк О. Вже не заграє Моґурова скрипка // Вільний голос. 1998, 8 серп. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 14, "name": "Гринець Дмитро Митрофанович", "birth_year": "1905.0", "death_year": "1993.0", "migration_status": "internal_transfer", "reasoning": "Гринець was born in Zolotonosha (Ukraine) in 1905 and died in Lviv (Ukraine) in 1993. He moved internally within the Soviet Union — from Kharkiv (until 1941) to Tbilisi (1942–44) and then to Lviv — but remained within Soviet borders throughout his life. There is no evidence of forced deportation, and he never permanently settled outside the Soviet/post-Soviet state.", "article_url": "https://esu.com.ua/article-27272", "bio": "ГРИНЕ́ЦЬ Дмитро Митрофанович (16, за ін. даними&nbsp;— 18. 10. 1905, м. Золотоноша, нині Черкас. обл.&nbsp;— 05. 08. 1993, Львів)&nbsp;— графік. Член СХУ (1945). Закін. Харків. худож. ін­ститут (1931; викл. В. Касіян , С. Прохоров , М. Шаронов ). Жив у Харкові (до 1941), Тбілісі (1942–44), Львові. Роботи екс­понувалися від 1931. Прихильник соцреалізму. Працював у галузях плаката, станк. і книжк. графіки. Додаткові відомості Основні твори плакати — «Музику — на фронт соціалістичного будівництва» (1931), «По-більшовицькому борітесь за високий врожай» (1937); портрети — Ірини Вільде (1945), М. Островського (1946), І. Франка (1962), С. Крушельницької (1963), Т. Шевченка, М. Шолохова (обидва — 1968), Г. Сковоро-ди (1969), В. Вернадського (1970); оформлення видань творів І. Франка, П. Козланюка, С. Тудора. Рекомендована література Гапон Ю. Дмитро Гринець // Вільна Україна. 1958, 23 берез. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 15, "name": "Грицай Остап", "birth_year": "1881.0", "death_year": "1954.0", "migration_status": "migrated", "reasoning": "Грицай Остап voluntarily left Ukraine and settled permanently outside Soviet/post-Soviet borders. He lived in Vienna from 1914–45, then moved to Germany, spending his final years in Munich where he died in 1954. His migration was driven by voluntary professional and political activities (work with Ukrainian émigré publications, collaboration with the Petrusevych government, OUN-related work), not", "article_url": "https://esu.com.ua/article-31726", "bio": "ГРИЦА́Й Остап (крипт.&nbsp;— О. Г., o. h; 02. 11. 1881, с. Княжпіль Добромильс. пов., нині Старосамбір. р-ну Львів. обл.&nbsp;— 07. 05. 1954, Мюнхен)&nbsp;— літературо­знавець, критик, письмен­ник, пере­кладач. Син О. Грицай . Дійсний член НТШ. Закін. Львів. академ. гімназію (1902), студіював германістику і літературо­знавство у Віден. університеті, де захистив докторат з філософії. 1910 повернувся до Львова, де до 1914 викладав нім., лат. та польс. мови у академ. гімназії. 1914–45 жив у Відні, потім&nbsp;— у Німеч­чині. Спів­працював з часописами «Діло» (1908–15), «Źycie» (за ред. Л. Кульчицького), «Ukrainische Nachrichten» (1915–17; друк. орган СВУ) та «Ukrainische Blätter» (1918–19), де друкував свої літературо­знавчі та політ. стат­ті, «Український прапор» (1920–27), «Воля» (1920–23)&nbsp;— у Відні, «Український скиталець» (Ві­день; Прага, 1922–23), «Український голос» (Пере­мишль, 1925–28). У 20–30-х рр. Г. був також спів­роб. «ЛНВ» за ред. Д. Донцова, а у 1926–39&nbsp;— амер. «Свободи», пізніше&nbsp;— у «Християнському голосі» (Мюнхен) та «Українському слові» (Париж). У 20-х рр. Г. був тісно повʼязаний з урядом Петрушевича у Відні. За про­грамою нац. змагань він спів­працював з укр. визв. під­пі­л­лям, яке 1929 оформилося в ОУН під проводом Є. Коновальця. 1938–44 очолював Укр. нац. обʼ­єд­на­н­ня у Відні. 1945 пере­бував у таборі в Карлсфельді, де був одним із засновників Спілки укр. письмен­ників і журналістів та Укр. літ.-мист. обʼ­єд­на­н­ня, яке видавало часопис «Рідне слово». Від кін. 1946&nbsp;— у таборі «Орлик» у Берхтесґадені, а від 1951&nbsp;— у Мюнхені. Друкуватися почав на­прикінці 1890-х рр. У часописах «Діло», «Буковина», «ЛНВ» уміщував вірші, поеми, оповіда­н­ня. Автор соц.-психол. поеми «Утеча Олекси Перхуна» (1910), в якій засудив панську сваволю; циклів новел філос. і реліг. змісту «Облич­чя Сфінкса», «Шляхом Месії»; низки патріот. віршів, опубл. нім. мовою у «Ukrainische Nachrichten» (1915),&nbsp;— «Геній України» (про Т. Шевченка) та «Різдво 1914» (обидва&nbsp;— 7 січ.), «Україні» (про укр. хорунжу О. Степанів; 22 січ.), «Воскресла» (3 квіт.). Ви­ступав з літ.-крит. ста­т­тями про творчість В. Стефаника, О. Кобилянської, М. Коцюбинського. Пере­клав нім. мовою «Слово о полку Ігоревім», уривок з «Енеїди» І. Котляревського, твори Т. Шевченка («Кавказ», «Сонце заходить, гори чорніють», «Пророк», «Роз­рита могила», «Якби мені черевики», «Муза», «Огні горять, музика грає», «Мені однаково» та ін.), І. Франка («Гімн», «Каменярі», «Конкі­стадори», «У долині село лежить», пролог до поеми «Мойсей»), Олександра Олеся («Яка краса від­родже­н­ня країни», «На цвинтар сумно не ідіть»). Укр. мовою пере­клав низку балад Ф. Шіл­лера. Написав чимало перед­мов до укр. пере­кладів Ґі де Мопас­сана, Стендаля, Ґ. Флобера, О. де Бальзака, В. Гюґо, Ч. Дік­кенса, Р. Шері­дана та ін. Рекомендована література О. Грицай: Некролог // Шлях перемоги. Мюнхен. 1954. Ч. 13, 23 трав. Google Scholar Internet Винар Л. Остап Грицай. Життя і творчість. Клівленд, 1960. Google Scholar Internet Гавришків Б. З історії німецької шевченкіани // Архіви України. 1969. № 2. Google Scholar Internet Іваничук Н. Грицай Остап // Укр. журналістика в іменах. Л., 1998. Вип. 5. Google Scholar Internet Прима Л. Остап Грицай: Штрихи до портрета // СіЧ. 2000. № 5. Google Scholar Internet Остап Грицай: Бібліогр. покажч. Дрогобич, 2002. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 16, "name": "Давид Марія  Олександрівна", "birth_year": "1901.0", "death_year": "1988.0", "migration_status": "non_migrated", "reasoning": "Давид Марія Олександрівна was born in Chernihiv province in 1901 and died in Kyiv in 1988. Her biography shows she studied at the Kyiv Art Institute (1938), became a member of the Ukrainian Artists' Union (1944), and created sculptures throughout her life, with works displayed in Ukrainian regional museums. There is no evidence of forced displacement, voluntary emigration, or movement outside Sovi", "article_url": "https://esu.com.ua/article-25908", "bio": "ДАВИ́Д Марія Олександрівна (06. 08, за ін. даними&nbsp;— 07. 07. 1901, с. Душанка Черніг. губ.&nbsp;— 13. 11. 1988, Київ)&nbsp;— скульпторка. Член СХУ (1944). Закін. Київський художній ін­ститут (1938; викл. М. Гельман , Б. Кратко , П. Ульянов ). Створила реаліст. порт­рети, жанр. композиції, монум. фігури. Осн. матеріали&nbsp;— мармур, гіпс, бетон. Твори від­значаються точними індивід. характеристиками і ретел. обробле­н­ням форм. Окремі роботи зберігаються у Чернів. та Сум. крає­знав. музеях. Додаткові відомості Основні твори «Герой Радянського Союзу Л. Павличенко», «Партизанка Л. Убийвовк» (обидва — 1943), «С. Кіров» (1945), «Повернувся додому» (1948), «Сержант Корольов» (1953), «В. Ленін у дитинстві», «К. Маркс» (обидва — 1968). Завантажити статтю"}, {"idx": 17, "name": "Долина Павло Трохимович", "birth_year": "1888.0", "death_year": "1955.0", "migration_status": "non_migrated", "reasoning": "Pavlo Dolina was born in Myshоlovka (now part of Kyiv) in 1888 and died in Kyiv in 1955. Throughout his documented career, he worked primarily in Ukrainian cities (Kyiv, Odesa, Batumi) and briefly in Saratov (within the Russian SFSR, but not permanent relocation). There is no evidence of forced displacement, voluntary permanent emigration outside Soviet borders, or significant long-term settlement", "article_url": "https://esu.com.ua/article-20603", "bio": "ДОЛИ́НА Павло Трохимович (12, за ін. даними&nbsp;— 05. 11. 1888, с. Мишоловка, нині у складі Києва&nbsp;— 15. 09. 1955, Київ)&nbsp;— актор та режисер театру і кіно. Навч. у Київ. худож. училищі (1907–08), закін. Театр. училище Київ. товариства мистецтва і літ-ри (1915). Працював у Києві в Молодому театрі (1918–19), «Кийдрамте» (1920–21), у власному пере­сув. театрі «Каменярі» (1921), театрі «Березіль» (1922–27, з пере­рвами), театрах Батумі і Саратова. 1924–25 очолював навч. частину Держ. технікуму кінемато­графії Всеукр. фотокіно­управлі­н­ня в Одесі. Знявся у фільмах реж. Леся Курбаса «Макдональд» (роль Італійського журналіста, 1924) та «Арсенальці» (Старий робітник, 1925). Від 1925&nbsp;— реж. Одес. кінофабрики, 1929–40&nbsp;— Київ. кіностудії худож. фільмів. По­ставив фільми «Чортополох» (1927), «Буря», «Новими шляхами» (обидва&nbsp;— 1928), «В заметах» (1929), «Секрет рапіду», «Чорні дні» (спів­автор сценарію; обидва&nbsp;— 1930), «Чатуй» (1931), «Свято Унірі» (1932). Зняв низку наук.-популяр. і тех. стрічок на кіностудії «Техфільм» у Києві й Ташкенті (1941–43). Від 1943 очолював від­діл театрів Комітету у справах мистецтв, 1948–55&nbsp;— директор Держ. музею театр. мистецтва УРСР (нині Держ. музей театр., муз. та кіномистецтва України). Автор пʼєси «Царі» за Т. Шевченком, кіносценаріїв. Додаткові відомості Основні ролі Кардинал («Іван Гус» за Т. Шевченком), Осип («Ревізор» М. Гоголя), Дункан («Макбет» В. Шекспіра). Завантажити статтю"}, {"idx": 18, "name": "Домазар Сергій", "birth_year": "1900.0", "death_year": "1987.0", "migration_status": "migrated", "reasoning": "Домазар was born in Ukraine (Pryatin) in 1900 and initially lived within Soviet territory after the civil war, but voluntarily emigrated in stages — first to Germany in 1942, then to a displaced persons camp in Aschaffenburg (1947), and finally to Australia in 1949, where he settled permanently in Sydney until his death in 1987. This represents voluntary emigration and permanent settlement outside", "article_url": "https://esu.com.ua/article-20676", "bio": "ДОМАЗА́Р Сергій (справж.&nbsp;— Давиденко Сергій Федорович; ін. псевд.&nbsp;— Іван Сагайда; 29. 08. 1900, м. Пирятин, нині Полтав. обл.&nbsp;— 18. 07. 1987, Сідней)&nbsp;— прозаїк, публіцист. Навч. у Пирятин. гімназії. Закін. школу старшин УГА, брав участь у визв. змага­н­нях 1918–21. Після поразки військ УНР був заарешт. Уникнувши роз­стрілу, змінив прі­звище, мешкав у різних містах, працював суфлером (зокрема в театрі «Березіль»), коректором. Товаришував з І. Кавалерідзе , котрий на­вчав його мистецтву скульптури. Перед війною викладав нім. мову у Київ. вет. ін­ституті. 1942 ви­їхав до Німеч­чини. Після війни мешкав у таборі для пере­міщених осіб в м. Ашаф­фенбурґ, де 1947 видав кн. «Великі пита­н­ня» з аналізом пер­спектив політ. майбутнього України. 1949 ви­їхав до Австралії. Згодом оселився в Сіднеї. Публікувався в г. «Вільна думка» (Сідней), «Сучасність» (Мюнхен), «Нові дні» (Торонто) та ін.; об­стоював права українців як окремої нації у місц. англомов. пресі. Написав автобіогр. роман «Замок над Водаєм» (Мюнхен, 1964; пере­вид. у Сумах 2003; англ. перекл.&nbsp;— «Castle on the Vоday», 1971) і роз­відку про частоту вжива­н­ня літер укр. абетки «Досконале знаря­д­дя нашої мови» (Сідней, 1971). Пере­клав роман «Зелені ро- ки» А.-Дж. Кроніна, оповіда­н­ня «Вбивці» Е. Гемінґвея. Рекомендована література Ротач П. Розвіяні по чужині: Полтавці на еміграції. П., 1998. Google Scholar Internet Романюк М. Домазар Сергій Федорович // Укр. журналістика в іменах. Л., 2005. Вип. 12. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 19, "name": "Єременко Сергій", "birth_year": "1912.0", "death_year": "1997.0", "migration_status": "migrated", "reasoning": "Єременко voluntarily emigrated from Soviet Ukraine during World War II, initially to the Netherlands as a political prisoner but subsequently remained in Western Europe and then permanently settled in Canada (Vancouver from 1952, Edmonton from 1953), where he lived until his death in 1997. This represents permanent voluntary settlement outside Soviet/post-Soviet borders.", "article_url": "https://esu.com.ua/article-19947", "bio": "ЄРЕ́МЕНКО Сергій (сценіч.&nbsp;— Яременко; 10. 10. 1912, с. Старокозаче, нині Білгород-Дністров. р-ну Одес. обл.&nbsp;— 19. 11. 1997, м. Едмонтон, провінція Альберта, Канада)&nbsp;— скрипаль, диригент, музично-громадський діяч, педагог. Навч. в укр. муз. школі «Буковин. кобзар» (від 1929, також спів­ав у хорі), закін. Держ. консерваторію (1940) у Чернівцях. Викладав гру на скрипці, теорію камер. музики в Муз. школі м. Ак­керман (нині Білгород-Дністровський Одес. обл.). 1932 написав перший муз. твір. Після служби в армії збирав нар. пісні (понад 200). Під час 2-ї світової війни потрапив до Нідерландів як політвʼязень. Після втечі викладав музику в під­піл. організації в Данії. Згодом повернувся до Нідерландів, де грав у симф. оркестрі, диригував струн. орке­стром, вчителював. Від 1952&nbsp;— у м. Ванкувер (провінція Британська Колумбія, Канада). 1953 пере­їхав до Едмонтона, де грав у симф. оркестрі, диригував хорами та оркестрами, вчителював. Від 1959&nbsp;— диригент хору церкви св. Іллі (УПЦ). Викладав на літніх курсах Колегії св. Андрея у Він­ніпезі. Автор низки творів для хорів та інструм. ансамблів. 1982 від­булася світ. премʼєра кантати Є. «Заво­йовники прерій» (за участі хору «Дні­про» і Симф. оркестру Едмонтона). 1987 був одним із диригентів «Хору тисячолі­т­тя з Едмонтона» (м. Саскатун). Є.&nbsp;— один з ініціаторів створе­н­ня Укр.-канад. архіву-музею Альберти (від­крито 1974); один із засн. і чл. Укр. муз. товариства Альберти (1974), яке 2000 заснувало щорічну муз. премію ім. Є. на від­значе­н­ня музикантів, які роз­вивають і пропагують укр. музику в Альберті. Автор пере­дач про укр. композиторів-класиків на едмонтон. радіо (згодом публікував текс­ти цих пере­дач на сторінках укр. діаспор. преси, зокрема про К. Стеценка&nbsp;— у г. «Свобода», Нью-Йорк, 1983, 18 серп.). Рекомендована література Маценко П. С. Яременко. Композитор. Вінніпеґ, 1974. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 20, "name": "Єрмоленко-Южина Наталія Степанівна", "birth_year": "1881.0", "death_year": "1948.0", "migration_status": "migrated", "reasoning": "Наталія Єрмоленко-Южина was born in Kyiv in 1881 and initially worked as a singer in Russian Imperial theaters (St. Petersburg, Moscow) from 1900-1917. From 1917 she sang at Covent Garden in London, and from 1924 onward she permanently settled in Paris, where she died in 1948. This represents voluntary emigration and permanent settlement outside Soviet/post-Soviet borders, fitting the MIGRATED cat", "article_url": "https://esu.com.ua/article-20045", "bio": "ЄРМО́ЛЕНКО-Ю́ЖИНА Наталія Степанівна (дівоче&nbsp;— Плуговська; сценіч.&nbsp;— Єрмоленко; 1881, Київ&nbsp;— 22. 09. 1948, Париж)&nbsp;— спів­ачка (драматичне сопрано). Дружина Д. Южина . Заслужений артист Респ. (1920). Співу навч. у Києві в М. Зотової (1897–1901) та в Парижі у П. Ві­даля. Творчу діяльність роз­почала 1900 у приват. опер. трупі А. Церетелі (С.-Петербург). 1901–06, 1910–13, 1915–20&nbsp;— солістка Маріїн. театру в Петро­граді (нині С.-Петербург), 1906–08, 1913, 1916&nbsp;— Великого театру, 1908–10&nbsp;— Опери С. Зиміна у Москві. Гастролювала в Одесі, Тифлісі (нині Тбілісі), Баку, Казані, Ростові-на-Дону (обидва&nbsp;— Росія). 1908 брала участь у 1-му сезоні рос. опери (антре­приза С. Дягилєва) в Парижі (за партію Марини Мнішек з опери «Борис Годунов» М. Мусоргського була пред­ставлена до Ордена Почес. Легіону). Від 1917 спів­ала у театрі «Ковент-Ґарден» (Лондон). Гастролювала в Італії, Німеч­чині, Франції, Іспанії, Росії та ін. Від 1924 мешкала в Парижі, періодично ви­ступала на сцені «Ґранд-Опера». Володіла голосом широкого діапазону; виконувала також мецо-сопран. партії. Пропагувала в Росії і Франції укр. музику, зокрема у Москві як актив. чл. товариства «Кобзар» ви­ступала з укр. нар. піснями, романсами М. Лисенка, Я. Степового, Б. Під­горецького; у Петро­граді разом з І. Алчевським організовувала вечори укр. пісні й романсу. Записала на грамплатівки бл. 60 творів. Додаткові відомості Основні партії Ядвіґа Запольська («Пан воєвода» М. Римського-Корсакова), Поппея («Нерон» А. Рубінштейна), Електра (однойм. опера Р. Штраусса), Ельза, Венера, Брунгільда («Лоенґрін», «Тангейзер», «Зиґфрід» Р. Ваґнера), Ліза («Пікова дама» П. Чайковського), Ярославна («Князь Ігор» О. Бородіна), Горислава («Руслан і Людмила» М. Глінки), Марфа («Царева наречена» М. Римського-Корсакова), Аїда, Віолетта («Аїда», «Травіата» Дж. Верді), Кармен (однойм. опера Ж. Бізе). Рекомендована література Заслуженная артистка Республики // Жизнь иск-ва. 1920, 2 июня. Google Scholar Internet Боголюбов Н. 60 лет в оперном театре. Москва, 1967. Google Scholar Internet Москалець О. Наталія Єрмоленко-Южина // КС. 2006. № 2. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 21, "name": "Захаров Іван  Данилович", "birth_year": "1915.0", "death_year": "1936.0", "migration_status": "excluded_bad_dates", "reasoning": "The biography contains an internal chronological impossibility. Zakharov is stated to have been born in 1915 and died in 1936 (age 20-21), yet the text records him completing Moscow Art School in 1936, studying at Leningrad studio 1952-53, and creating artworks continuously from 1940 through 1975. These dates are clearly contradictory and cannot be reconciled.", "article_url": "https://esu.com.ua/article-15795", "bio": "ЗАХА́РОВ Іван Данилович (псевд.&nbsp;— І. Буревой; 28. 10. 1915, с. Писково, нині Твер. обл., РФ)&nbsp;— живописець. Закін. Моск. художнє училище (1936; викл. Г. Федоров), навч. у Ленінгр. студії художників Військ.-Мор. Сил СРСР (1952–53; кер. М. Авилов). Учасник мистецьких ви­ставок від 1940. Автор полотен, присвяч. пере­важно ВМФ. Окремі роботи зберігаються у Військ.-мор. музеї Чорномор. флоту (Севастополь). Додаткові відомості Основні твори «Вечір у Криму (Вечір в Артилерійській бухті)» (1940), «Лінкор “Севастополь” веде вогонь по станції Сариголь у 1942 році» (1948), «Феодосійська десантна операція 1941 року» (1953; 1957, 1960; 1968), «Пам’ятник затопленим кораблям» (1957), «Підводники приймають бій» (1959), «Десант Ц. Куникова на Малу землю» (1963), «Біля Приморського бульвару» (1966), «Нічні навчання» (1968), серія «Маневри “Океан”» (1970), «Уночі в Розливі (В. Ленін, Ф. Дзержинський і Я. Свердлов)» (1973), «Під прикриттям ВПС» (1974), «У негоду» (1975). Завантажити статтю"}, {"idx": 22, "name": "Збіржховська Антоніна", "birth_year": "1872.0", "death_year": "1930.0", "migration_status": "migrated", "reasoning": "Антоніна Збіржховська was born in Galicia (1872) and voluntarily moved to Italy to advance her musical career, where she performed with Italian opera companies from 1898 onwards and died there around 1930. This represents permanent settlement outside Soviet/post-Soviet borders through voluntary emigration for professional reasons.", "article_url": "https://esu.com.ua/article-16491", "bio": "ЗБІРЖХО́ВСЬКА Антоніна (сценіч.&nbsp;— Флоріані-Збіржховська; 1872, Галичина&nbsp;— бл. 1930, Італія)&nbsp;— піаністка, спів­ачка (лірико-колоратурне сопрано). Навч. у Львів. консерваторії (кл. В. Висоцького ). Удосконалювала майстерність в Італії. Брала участь у концертах товариства «Боян» (Львів, 1891–94). На вечорах памʼяті Т. Шевченка і М. Шашкевича грала на фортепіано твори М. Лисенка, акомпанувала С. Крушельницькій та М. Левицькому; спів­ала пісні на сл. М. Лисенка, А. Бігдая, нар. пісні. Від 1898&nbsp;— солістка італ. опер. трупи Кастелено (у її складі ви­ступала 1900 у Москві і Казані, Росія). Згодом спів­ала на ін. опер. сценах Італії. Додаткові відомості Основні партії Аїда (однойм. опера Дж. Верді), Лючія, Адіна («Лючія ді Ламмермур», «Любовний напій» Ґ. Доніцетті), Сантуцца («Сільська честь» П. Масканьї), Манон («Манон Леско» Дж. Пуччіні). Рекомендована література Галицько-русинська співачка в Росії // Галичанин. 1900. № 246. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 23, "name": "Злоцький Феодосій Антонович", "birth_year": "1846.0", "death_year": "1926.0", "migration_status": "non_migrated", "reasoning": "Феодосій Злоцький was born in 1846 in Osiy (Закарпатська область) and died in 1926 in Dragove (also in Zakarpattia region). Throughout his life, he worked as a priest and writer in Carpathian villages, with education obtained in Uzhhorod and Budapest, but no evidence indicates he permanently settled outside Ukrainian/Carpathian territories or experienced forced displacement by Soviet authorities.", "article_url": "https://esu.com.ua/article-16344", "bio": "ЗЛО́ЦЬКИЙ Феодосій Антонович (крипт.&nbsp;— О. Ф. З.; 11. 10. 1846, с. Осій, нині Іршав. р-ну Закарп. обл.&nbsp;— 30. 07. 1926, с. Драгове, нині Хуст. р-ну Закарп. обл.)&nbsp;— письмен­ник, етно­граф і фольклорист, церковний діяч. Член Етногр. товариства Угорщини. Теол. освіту здобув в Ужгороді та Будапешті. Служив священиком у закарп. селах. Почав писати язичієм, але під впливом усної нар. творчості, зpазки якої активно збирав упродовж життя, пере­йшов на нар. мову. У доробку домінувала любовна, соц.-побут. і патріот. лірика; порушував також громад.-політ., істор. та морал.-реліг. теми. Окремі його поезії стилізовані під нар. пісні. Перші вірші опубл. у г. «Свѣтъ». Друкувався також у «Новому свѣте», «Листку», «Карпато-рус­ском вѣстнике», «Рус­ском вѣстнике», «Науке». Автор першої граматики карпаторусин. мови «A karpátalji orosznyelv oknyomozó grámmatikája» (1883, у рукописі); повістей «Драгоманський великдень» та «Петрові дзвони», пʼєс «Образи із среди русинов» і «Під обоч­чю», зб. віршів «Вибор із поезії» (Уж., 1923). Публікував у газетах легенди, нар. пісні, оповіда­н­ня та приказки. Зібрав і впорядкував зб. «Народні пісні з поля Під­карпатської Русі» та «Народні пословиці-поговорики» (не ви­дані). В Ужгороді виявлено рукопис. пере­клад З. закарп. пісень угор. мовою. Записував також нар. казки. У г. «Kelet» друкував угор. мовою стат­ті («Забобони, вірува­н­ня і деякі звичаї з середовища під­карпатського руського народу...», 1888, ч. 32–49; 1889, ч. 8–15; «Русаля», 1891, ч. 25), рецензії, фольклорні матеріали, власні твори та пере­клади. Активно дописував до газет стат­ті про забобони, звичаї й вірува­н­ня, нар. ігри; під­німав пита­н­ня культури, соц. та госп. про­блеми, брав участь у полеміці про літ. мову. Завантажити статтю"}, {"idx": 24, "name": "Іванов Сергій Дмитрович", "birth_year": "1872.0", "death_year": "2011.0", "migration_status": "excluded_bad_dates", "reasoning": "The death year of 2011 is impossible for someone born in 1872 — that would require living 139 years, which is beyond documented human lifespan. The biography provides no evidence of survival beyond the early 20th century and contains no death date indicator (\"— ?\"), making this a clear data error that prevents reliable classification.", "article_url": "https://esu.com.ua/article-14393", "bio": "ІВАНО́В Сергій Дмитрович (сценіч.&nbsp;— Варягін; 1872, Харків&nbsp;— ?)&nbsp;— спів­ак (бас). Закін. Харків. муз. училище РМТ, С.-Петербур. консерваторію (1896). Удосконалював вокал. майстерність в Італії. Дебютував 1897 у м. Казань (Росія). Ви­ступав на опер. сценах Житомира, Камʼянця-Подільського (нині Хмельн. обл.), Нижнього Новгорода, Кисловодська (обидва&nbsp;— Росія), Москви, С.-Петербурга. Від 1907&nbsp;— соліст Опери Солодовникова у Москві. Гастролі у Дрездені (Німеч­чина, 1908), Берліні (1911), Мілані (Італія, 1913, театр «Ла Скала»). Спільно з М. Бочаровим , Є. Єгоровим , В. Селявіним 1906 у Києві брав участь у виконан­ні вокал. квартетів В.-А. Моцарта, Ф. Шуберта, Р. Шуман­на, О. Бородіна. Додаткові відомості Основні партії Сусанін («Життя за царя» М. Глінки), Мельник («Русалка» О. Даргомижського), Варлаам («Борис Годунов» М. Мусоргського), Кончак («Князь Ігор» О. Бородіна), Малюта Скуратов, Голова, Варязький гість («Царева наречена», «Майська ніч», «Садко» М. Римського-Корсакова), Кецал («Продана наречена» Б. Сметани), Мефістофель («Фауст» Ш. Ґуно), Марсель («Гуґеноти» Дж. Мейєрбера). Завантажити статтю"}, {"idx": 25, "name": "Івлєв Трохим  Васильович", "birth_year": "1878.0", "death_year": "1933.0", "migration_status": "non_migrated", "reasoning": "Трохим Івлєв was a Ukrainian bass-baritone singer and actor who worked in various theaters across Ukraine (Lviv, Kyiv, Vinnytsia, Artemivsk) from 1910-1933 and died in Sumy in 1933. There is no evidence of forced deportation, voluntary emigration outside Soviet/post-Soviet borders, or significant internal transfer outside Ukraine — his career involved movement within Ukrainian territory only.", "article_url": "https://esu.com.ua/article-13638", "bio": "І́ВЛЄВ Трохим Васильович (сценіч.&nbsp;— Трохименко; 1878&nbsp;— 1933, Суми)&nbsp;— спів­ак (бас-баритон), актор. Дебютував у трупах Д. Гайдамаки, М. Ярошенка. Соліст Руського нар. театру в Львові (1910–11), Театру М. Садовського у Києві (1911–18), Вінн. укр. драм. театру ім. І. Франка (1920–23), 1-го Донец. укр. робітн.-колгосп. пере­сув. театру ім. Артема (м. Артемівськ, нині Донец. обл., 1930–33). У концерт. репертуарі&nbsp;— українські народні пісні, твори М. Лисенка, Я. Степового, К. Стеценка. Володів сильним і добре по­ставленим голосом мʼякого тембру. Додаткові відомості Основні партії Султан («Запорожець за Дунаєм» С. Гулака-Артемовського), Абдул-Бакі («Роксолана» Д. Січинського), Іван («Катерина» М. Аркаса), Стольник («Галька» С. Монюшка), Крушина («Продана наречена» Б. Сметани), Голова («Утоплена» М. Лисенка), Євгеній Онєгін (однойм. опера П. Чайковського). Основні ролі Халява («Вій» М. Кропивницького), Хмара («Мазепа» Ю. Словацького). Фотоілюстрації &times; &#10094; &#10095; Завантажити статтю"}, {"idx": 26, "name": "Камінський Віктор", "birth_year": "1854.0", "death_year": "1929.0", "migration_status": "non_migrated", "reasoning": "Viktor Kaminskyi was born in 1854 and died in Uzhhorod on May 16, 1929, spending his entire documented career in Transcarpathia (then within Austro-Hungary, later Czechoslovakia, now Ukraine). There is no evidence of forced displacement, voluntary emigration across international borders, or significant internal transfer within the Soviet Union—he worked consistently as an educator, religious leade", "article_url": "https://esu.com.ua/article-10895", "bio": "КАМІ́НСЬКИЙ Віктор (крипт.&nbsp;— В. К.; 1854&nbsp;— 16. 05. 1929, Ужгород)&nbsp;— громадсько-культурний діяч. Здобув богослов. освіту. Активно захищав інтереси авто­хтон. насел. Закарпа­т­тя та церков. автономії краю. Брав участь у заснуван­ні товариства «Уніо», діяльності «Общества Св. Василія Великого», де, зокрема, редагував щотижневу г. «Görög-katholikus szemle» («Греко-католицький огляд», 1900–18, Ужгород). Згодом обраний кер. дирекції «Філ­лербанку». Працював проф., згодом дир. Ужгород. учител. семінарії. Спів­працював з г. «Наука»: на її сторінках опубл. під влас. прі­звищем міркува­н­ня «Ци треба ся оучи?» (1897, ч. 4–18), а під криптонімом В. К.&nbsp;— стат­ті «На концѣ школьнаго года» (1898, ч. 13), «Автономія» (1900, ч. 3, 4), «На что насъ на­учаетъ въ новомъ годѣ І. Христосъ?» (1899, ч. 2) та ін. матеріали. Рекомендована література О. Виктор Каминський: [Некролог] // Свобода. 1929. Ч. 21. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 27, "name": "Киреєнко Кастусь", "birth_year": "1918.0", "death_year": "1988.0", "migration_status": "excluded_non_ukrainian", "reasoning": "Kiryeyenko was a Belarusian writer (not Ukrainian) born in Belarus, educated in Belarus, and spent his entire career working in Minsk as a Belarusian-language literary figure. While he translated Ukrainian poets and some Ukrainian writers translated his work, he was not himself a Ukrainian creative worker and thus falls outside the scope of this study.", "article_url": "https://esu.com.ua/article-6294", "bio": "КИРЕ́ЄНКО Кастусь (Кірэенка Кастусь; справж.&nbsp;— Костянтин Тихонович; Кан­станцін Ціханавіч; 12. 12. 1918, с. Гайшин, нині Могильов. обл., Білорусь&nbsp;— 15. 09. 1988, Мінськ)&nbsp;— білоруський письмен­ник. Член СП СРСР (1943). Заслужений діяч культури Білоруської РСР (1970). Закін. Гомел. пед. ін­ститут (1940, Білорусь). Учасник 2-ї світової війни. Бо­йові нагороди. Працював у часописі «Беларусь» (1945–62); гол. ред. ж. «Бярозка» (1962–72) та ж. «Полымя» (1972–86). Друкувався від 1939. Автор поет. зб. «Ранак ідзе» (1945), «Пасля навальніцы» (1947), «Мая рэспубліка» (1949), «Маякі», «Родны свет» (обидві&nbsp;— 1952), «Любоў і дружба» (1955), «Светлая хваля» (1959), «Смага» (1962; Літ. премія ім. Я. Купали, 1964), «Цёплая радуга» (1966), «Кніга ста песень» (1971; Державна премія Білоруської РСР ім. Я. Купали, 1972), «Слухайце ла­ставак» (1974), «Сіні вырай» (1976), «Вёсны веснаваць» (1979), «Дэкрэтам сэрца» (1983), «Калыска вятроў», «Надзея» (обидві&nbsp;— 1985). Основна тематика&nbsp;— мужність та вірність рад. людей, інтернац. братерство, почу­т­тя громадян. обовʼязку, дружба й любов, краса рідної природи. Поеми «Іспанка» (1966), «Слёзы Ра­даны» (1967), «Трыпутнік» (1976) присвяч. духов. про­блемам сучасності. Автор зб. оповідань «Ручаіны шукаюць ракі» (1967), кн. «Вандроўнае шчасце: Рыбацкая паэма» (1977), публіцист. кн. «Амерыка здалёку і зблізку» (1971), «Заусёды з Радзімай» (1980). Писав також для дітей (поема «Алёнчына школа», 1951), зб. віршів «Зялёнае рэха» (1953), «Вясна-красна» (1956) та «Прысяга» (1969), повість «Сум і радасць дзеда Рэпкі» (1967), зб. оповідань «Алесева кніжка» (1972). Кілька творів присвятив Україні, дружбі укр. і білорус. народів (зокрема вірші «Перад вясной», 1948; «Дружба», 1951; «Падарунак», 1954; «Патомкі Тараса», 1975; ст. «У вянок памяці», 1976). Написав рецензію на «Вы­браные творы» П. Тичини (1954). Усі книги опубл. у Мінську. Пере­клав білорус. мовою окремі вірші П. Тичини, М. Рильського, В. Сосюри, М. Бажана, Л. Первомайського, Т. Масенка, М. Нагнибіди, Б. Степанюка, В. Бичка, М. Шеремета, збірку віршів «Явар» Я. Шпорти (1976), повість «Сашко» Л. Смілянського (1959). Укр. мовою деякі твори К. пере­клали В. Бровченко, Д. Павличко, І. Вирган, З. Гончарук, К. Дрок, О. Жолдак, А. Кацнельсон, М. Нагнибіда, М. Сингаївський, Б. Степанюк, В. Швець, Я. Шпорта, О. Ющенко та ін. Окремі твори К. пере­кладено рос., молд., азерб., узб. мовами. Низку віршів К. покладено на музику. Додаткові відомості Основні твори укр. перекл. — [Вірші] // Білорус. рад. поезія: Антологія. К., 1971. Т. 2; Допоки дружбою живем // Сузір’я. К., 1977. Вип. 11; Березовий край. К., 1977; [Вірші] // Лісова колиска. К., 1979; [Вірші] // Отче ім’я. X., 1982. Рекомендована література Гниломедов В. «Что я люблю...»: Штрихи к портрету Кастуся Киреенко // Неман. 1974. № 8. Google Scholar Internet Гурская Е. С. Адказнасць перад часам. Мінск, 1986. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 28, "name": "Клішевська Кароліна", "birth_year": "1864.0", "death_year": "1927.0", "migration_status": "excluded_pre_soviet", "reasoning": "Klishevska was born in 1864 in what is now Poland (Frystak, Subcarpathian Voivodeship) and died in 1927 in Katowice, Poland. While she was a prominent Ukrainian-language opera singer active in Galician theaters (particularly Lviv Opera 1897-1919), she never lived within Soviet borders and her career predates the Soviet era. Her life and death occurred entirely within the Austro-Hungarian Empire an", "article_url": "https://esu.com.ua/article-8523", "bio": "КЛІШЕ́ВСЬКА Кароліна (дівоче&nbsp;— Веселовська; сценіч.&nbsp;— Карлінська; 1864, с. Фриштак, нині Під­карпат. воєводства, Польща&nbsp;— 09. 11. 1927, м. Катовіце, Польща)&nbsp;— спів­ачка (сопрано). Навч. у І.-Є. Гриневецького та Г. Маєрановської. Сценічну діяльність роз­почала в аматор. ви­ставах Юрґенса у Львові (1880–81). Ви­ступала у пере­сув. трупі Г. Лясовського (1882–85), Руському нар. театрі у Львові (1885–92), Польс. театрі Скарбека (від 1892). Гастролювала у Варшаві та Кракові. 1897–1919&nbsp;— солістка Львів. опери, 1923–27&nbsp;— театру м. Катовіце. У концертах популяризувала у Галичині творчість М. Лисенка, С. Гулака-Артемовського, українські народні пісні та романси. К.&nbsp;— перша на зх.-укр. сцені виконавиця партії Оксани в опері «Різдвяна ніч» М. Лисенка (1890, високо оцінив І. Франко ). Додаткові відомості Основні партії Наталка, Маруся («Наталка Полтавка», «Чорноморці» М. Лисенка), Оксана («Запорожець за Дунаєм» С. Гулака-Артемовського), Мюзетта («Богема» Дж. Пуччіні), Сантуцца («Сільська честь» П. Масканьї), Галька (однойм. опера С. Монюшка). Основні ролі Оришка («Пошились у дурні» М. Кропивницького), Шарлотта («Гаспароне» К. Мілльокера), Моллі («Гейша» С. Джонса), Марґарита («Весілля при ліхтарях» Ж. Оффенбаха), Фіфі («Прекрасна з Нью-Йорку» Г. Керкера), Алізія («Лялька» Е. Одрина). Рекомендована література Медведик П. Діячі української музичної культури: Мат. до біо-бібліогр. слов. // Зап. НТШ. Т. 226: Пр. Музикознав. комісії. Л., 1993. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 29, "name": "Кобець Григорій Якович", "birth_year": "1900.0", "death_year": "1990.0", "migration_status": "deported", "reasoning": "Kobets was arrested twice — first in Birobi­dzhan in 1938 (exonerated 1939), then arrested again in Khabarovsk in 1941 and sentenced on October 4, 1942 to 10 years in labour camps (GULAG). He served his sentence in forced labour camps in Taishет (Irkutsk region), Mongolia, and Transbaikalia, then was placed in forced settlement in Kyrgyzstan from 1951 onwards — clear evidence of Soviet authorities", "article_url": "https://esu.com.ua/article-8798", "bio": "КО́БЕЦЬ Григорій Якович (Кобец Рыгор Якаўлевіч, справж.&nbsp;— Драч Михайло Мусі­йович; 07. 07. 1900, Єлисавет­град, нині Кірово­град&nbsp;— 09. 09. 1990, Мінськ)&nbsp;— білоруський письмен­ник, кінодраматург. Заслужений діяч мистецтв Білоруської РСР (1935). Член СП Білоруської РСР і СРСР (1935). Навч. у Єлисавет­град. реал. училищі (1910–17). Належав до партії анархістів. Працював токарем, маркувальником на товар. станції. У 1918–19 друкувався у місц. г. «Наша жизнь», «Друг народа» під псевдонімом Михайло Сандига. Пізніше користувався ін. псевдо&nbsp;— Гриша Лохматий (Рыгор Лахматы). 1920 після контр­революц. заколоту зна­йшов притулок у Білорусі, де обрав прі­звище Ригор Кобець, працював у Мінську: на заводах (1922–28); у ред. г. «Рабочий» (1928–30); зав. сценар. від­ділу кіностудії «Радянська Білорусь» (Ленін­град, нині С.-Петербург, 1930–32). Творчі від­рядже­н­ня у м. Бір­обіджан (РФ, 1933, 1935, 1937), де спів­працював із г. «Биробиджанская правда», «Тихоокеанская звезда». 1938 заарешт. у Бір­обіджані, 1939 виправ­даний. Мешкав у м. Хабаровськ (РФ), де 1939–41 був ред. студії кінохроніки. 1941 заарешт. удруге, 4 жовтня 1942 засудж. до 10-ти р. таборів. Від­бував покара­н­ня на буд-ві залізниць у м. Тайшет (Іркут. обл., РФ), Монголії, на Забайкал­лі. Від 1951&nbsp;— на поселен­ні в Киргизії, де працював на різних роботах. 1958 повернувся до Мінська. Реабіліт. 1960. Писав рос. та білорус. мовами. Автор пʼєс «Гута» (1929, по­ставлено 1930), «А ўсе ж заспяваю», «Ратуй, божа!» (з А. Вольним; обидві&nbsp;— 1932); комедій «На за­ставе» (1935), «Мигрень» (Хабаровск, 1940), одноакт. пʼєс «Цяжкі выпадак» (1961), «Катавасія брата Гервасія» (з А. Астрейком), «Нішто сабе жарты» (обидві&nbsp;— 1962), «Святая тайна» і «Піражкі з чырвонцамі» (обидві&nbsp;— 1965; усі&nbsp;— Мінськ). Спів­автор сценаріїв до фільмів «Паў­стан­не гневу» (з А. Вольним), «Ураган» (з Б. Бродянським, І. Зельцером, 1932; опубл. 1988), «Двойчы народжаны» (1933), «Шукальнікі шчасця» (1936), «Дня­про ў агні» (з І. Барашком, 1937) та ін. Написав автобіогр. повість «Ноев ковчег», де вперше у Білорусі показав життя у таборах ГУЛАГУ (1964, опубл. у ж. «Нёман», 1989, № 3), кн. спогадів «Аўтабія­графія» (Мінск, 1973). К.&nbsp;— один із засновників білорус. театру і кіно, ініціатор створ. респ. кіностудії, для якої написав сценарії перших білорус. звукових фільмів. Довгий час імʼя та творчість К. замовчувалися, 2009 у Мінську ви­йшла кн. «Рыгор Кобец. Вы­браныя творы». Рекомендована література Азгур З. Гнеў і любоў // Літаратура і мастацтва. 1969, 13 мая. Google Scholar Internet Падаляк У. Шукальнік шчасця // Там само. 2010, 26 лістапада. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 30, "name": "Конрад Джозеф", "birth_year": "1857.0", "death_year": "1924.0", "migration_status": "migrated", "reasoning": "Conrad Joseph (born in Ternopil region, Ukraine in 1857) voluntarily emigrated to England, served in the British merchant navy (1878-1894), and settled permanently in Great Britain, where he died in Bishopsbourne in 1924. He became an English writer and never returned to Soviet/post-Soviet territory as a resident, representing classic voluntary emigration.", "article_url": "https://esu.com.ua/article-4547", "bio": "КО́НРАД Джозеф (Conrad Joseph; справж.&nbsp;— Коженьовський Теодор-Юзеф-Конрад; 03. 12. 1857, с. Терехове, нині Бердичів. р-ну Житомир. обл.&nbsp;— 03. 08. 1924, м. Бішопс­борн, Велика Британія)&nbsp;— англійський письмен­ник, критик польського походже­н­ня. Навч. у Львові (1868–69), Кракові (1872–74). Служив 1878–94 на англ. флоті. Автор неоромант. творів антирасист. («Almayerʼs Folly»&nbsp;— «Олмейєрове без­умство», Лондон, 1895; «An Outcast of the Is­­lands»&nbsp;— «Ви­гнанець з островів», 1896; «Youth»&nbsp;— «Юність», 1898), антиколоніал. («The Nigger of the “Narcissus”»&nbsp;— «Негр із “Нарциса”», 1897; «Heart of Darkness»&nbsp;— «Серце темряви», 1899), антибурж. («Nostromo»&nbsp;— «Но­стромо», 1904) спрямува­н­ня. Романи «Vic­­tory» («Пере­мога», 1915), «The Re­­scue» («Визволе­н­ня», 1920)&nbsp;— про мужність, чесність, дружбу; повісті «Typhoon» («Тайфун», 1902; укр. перекл.&nbsp;— Х., 1930), «The Rover» («Корсар», 1923)&nbsp;— на морал. тематику. Засудив гнобител. політику рос. царизму у повістях «The Secret Agent» («Та­­ємний агент», 1907), «Under Wes­­tern Eyes» («Очима Заходу», 1911). Автор низки статей про творчість А. Доде, Ґі де Мопас­сана, А. Франса, Дж. Ґолсуорсі, І. Тургенєва. 1890 і 1893 від­відав Україну. Враже­н­ня про по­­дорож стали основою кн. «A Per­­sonal Record» («Із спогадів», 1912), оповіда­н­ня «Prinze Ro­man» («Князь Роман», 1925), не­­закін. повісті «The sisters» («Сестри», 1928). У серії «Бібліотека “ЛітАкценту”» ви­дано кн. «Зроби або помри: морські історії», куди уві­йшли популярні повісті та оповіда­н­ня К. Тлом склад. морал.-психол. ви­пробувань ге­­роїв є екзотика неймовір. пригод. У його творах майстерно по­єд­нано романтизм із реалізмом, від­чувається знач. вплив Ґ. Флобера, Ф. Достоєвського, В. Шек­спіра, В. Гюґо. Засуджував соц. та нац. не­справедливість, під­дав критиці соц. революції, терор, ви­ступав за мирні шляхи роз­витку су­спільства. У Великій Британії діє Конрадів. товариство, у США виходить ж. «Conradiana» (від 1968). Окремі твори К. українською мовою пере­клали С. Вільховий, М. Калинович, В. Петровський, Г. Касьяненко, М. Рошківський, М. Лисиченко, Е. Хоменко, О. Мо­­кровольський, Л. Гончар. Творчість К. досліджували А. Ніковський, М. Калинович, Г. Майфет, С. Родзевич. Знято к/ф: за однойм. романами «Таємний агент» (реж. А. Хічкок), «Очима Заходу» (реж. М. Ал­леґре; обидва&nbsp;— 1936), за однойм. новелою «По­­верне­н­ня» (1975, реж. В. Ожеховський), за однойм. повістями «Тіньова смуга» (1976, реж. А. Вайда), «Пере­мога» (2005, гол. роль&nbsp;— І. Іл­лєнко), за повістями «Дуель» («Дуелянти», 1977, реж. Р. Скотт), «Серце пітьми» («Апокаліпсис нашого часу», 1977, реж. Ф. Коп­пола), за однойм. оповіда­н­ням «Емі Фостер» (1997, реж. Б. Кідрон). За романом «Lord Jim» («Лорд Джім», 1900) Р. Твардовський створив оперу (по­ставлено 1976). У м. Сан-Франциско (шт. Каліфорнія, США) на­звано площу ім. К. У 1970-х рр. в англ. пресі опубл. серію фоторепортажів В. Коржука «Тут народився Джозеф Конрад». У Музеї історії с. Терехове (від­критий 1987) зберігаються при­жит­тєві ви­да­н­ня його творів англ. та ін. мовами, книги Ю.-І. Крашевського, листи сина Б. Конрада до жит. села, погру­д­дя К., виконане А. Матвієнком. 2007 у Польщі засн. премію ім. К. для укр. письмен­ників, Нац. банк Польщі на честь К. випустив ком­плект ювіл. монет. У Бердичеві в приміщен­ні нижнього храму мо­­настиря босих кармелітів 2008 створ. екс­позицію, присвяч. К.; від­крито мемор. дошки та Музейну кімнату його памʼяті в заг.-осв. школі № 15. Памʼятники К. встановлено у м. Ґдиня (Польща) та Вологда (РФ; 2013, скульп­тор В. Бухаєв). Додаткові відомості Основні твори укр. перекл. — Твори. Т. 1–2. Х., 1929; Фрейя з Семи Островів. К., 1960; Аванпост прогресу // Книга пригод. К., 1983. Рекомендована література Цибульська В. Степи, як море, і море, як степи. Джозеф Конрад на Україні // Прапор. 1974. № 8. Google Scholar Internet Урнов Д. М. Джозеф Конрад. Москва, 1977. Google Scholar Internet Опана­сюк О. Джозеф Конрад. Земляк із ко­­горти великих // Волинь моя. Лц., 2004. Вип. 4. Google Scholar Internet Бедь М., Скавронський П. Джо­зеф Конрад про свою літературну пра­цю // Бердичів. земля у плині часу: Наук. зб. «Велика Волинь». Т. 1. Ж., 2007. Google Scholar Internet Бедь М. Феномен Джозефа Кон­­рада // Земля Бердичівська. 2007, 21 ве­­рес.; Сокальський Ю. Джозеф Конрад — письменник трьох культур // Там само. 2008, 5 груд. Google Scholar Internet Костриця М. Співець мор­ської романтики Джозеф Конрад. Ж., 2009. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 31, "name": "Кортасар Хуліо", "birth_year": "1914.0", "death_year": "1984.0", "migration_status": "excluded_non_ukrainian", "reasoning": "Julio Cortázar was an Argentine writer born in Brussels and based in Paris — not Ukrainian by nationality or origin. While his works were translated into Ukrainian and published in Ukrainian literary journals, he was a foreign author, not a Ukrainian creative worker, making him ineligible for this study on Ukrainian migration patterns.", "article_url": "https://esu.com.ua/article-5304", "bio": "КОРТА́САР Хуліо (Cortázar Julio; справж.&nbsp;— Флоренсіо Хулес; Florencio Jules; 26. 08. 1914, Брюс­сель&nbsp;— 12. 02. 1984, Париж)&nbsp;— арґентинський письмен­ник, пере­кладач. Закін. пед. коледж (1932), навч. в Університеті у Буенос-Айресі, на курсах пере­кладачів англ. та франц. мов. Учителював; від 1944&nbsp;— викладач літ-ри у м. Болівар, Саладільо, Чивількой; франц. літ-ри в Університеті м. Мендоса. Від 1951&nbsp;— у Парижі. Пере­кладач у ЮНЕСКО. Пред­ставник лат.-амер. магіч. реаліз­­му. Літ. діяльність роз­почав як поет-символіст. Дебютував зб. сонетів «Presencia» («Присутність», 1938). Його драм. поема у прозі «Los Reyes» («Королі», 1949; опубл. під псевд. Хуліо Деніс)&nbsp;— вільна інтер­претація давньогрец. міфу про по­єдинок Тесея з Мінотавром. Видав зб. оповідань «Bestiario» («Звіринець», 1951), «Final de Juego» («Кінець гри», 1956). До зб. «Las armas secretas» («Таємна зброя», 1959) та «Todos los fuegos el fuego» («Усі вогні&nbsp;— це вогонь», 1966) уві­йшли його найві­доміші оповіда­н­ня. Своєрід. баче­н­ням світу по­значені зб. філос. притч «Historias de cronopios y de fa­­mas» («Історії хронопів і фамів», 1962) та «Un tal Lucas» («Такий собі Лукас», 1979). Автор романів «Los Premios» («Ви­граші», 1960; гармонійно спів­існують фантазія та реальність у по­єд­нан­ні з елементами сатири), «Ra­­yuela» («Гра в класи», 1963; від­значається багатоплановістю, оригінальністю задуму й викладу), «62. Modelo para armar» («62. Модель для будува­н­ня», 1968), «Libro de Manuel» («Читанка для Мануеля», 1973), «Divertimiento» («Дивертисмент»), «El examen» («Іспит»; окремо опубл. його роз­­­діл «Diario de Andrés Fava»&nbsp;— «Що­­ден­ник Андреса Фави»; усі&nbsp;— 1986). Ви­дано зб. есеїв «La vuelta al día en ochenta mundos» («Навколо дня на вісімдесяти світах», 1967), «Prosa del obser­­vatorio» («Проза з обсерваторії», 1972), «Los autonautas de la cos­­mopista» («Автонавти космостра­­ди», 1982; спільно з К. Дюнлоп); зб. оповідань «Octáedro» («Вось­­ми­гран­ник», 1974), «Queremos tan­­to a Glenda» («Ми так любимо Ґленду», 1980), «Deshoras» («По­­за часом», 1982), «La otra orilla» («Інший берег»), зб. пʼєс «Adiós, Robinson» («Прощавай, Робінзоне»; обидві&nbsp;— 1995) та «Cartas» («Листи», 2000). Деякі оповіда­н­ня К. у перекл. укр. мо­­вою вміщено у ж. «Всесвіт» (1976, № 2; 1981, № 6; 1989, № 1; 1999, № 11/12; 2007, № 11/12; 2008, № 3/4; 2009, № 3/4); «Сучасність» (1979, № 7/8); «Вітчизна» (1986, № 9). Окремі твори К. українською мовою пере­клали Ю. Покальчук, А. Пере­падя, П. Таращук, С. Борщевський, О. Бурґгардт, О. Буценко, М. Жердинівська, Г. Грабовська та ін. Додаткові відомості Основні твори укр. перекл. — Гонитва // Сучас­­на лат.-амер. проза. К., 1978; Таємна зброя: Новели. К., 1983; Вірші // Зб. поетів Іспанії та Лат. Америки. К., 2006; Гра в класи. Х., 2008; Читанка для Ма­­нуеля. Х., 2009. Рекомендована література Покальчук Ю. Магічний світ Хуліо Кортасара // Всесвіт. 1981. № 6. Google Scholar Internet Буценко О. Матерія думки (про творчість Хуліо Кортасара) // Там само. 1989. № 1. Google Scholar Internet Ґарсія Маркес Ґ. Арґентинець, в якого закохався весь світ / Пер. з іс­­пан. // Там само. 2007. № 11/12. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 32, "name": "Кравченко Василь Олексійович", "birth_year": "1865.0", "death_year": "1924.0", "migration_status": "non_migrated", "reasoning": "Kravchenko was a Ukrainian creative worker (opera singer and director) who worked in Russian imperial institutions (Kyiv Opera 1891-96, Mariinsky Theatre in Petersburg 1896-1917) but remained within the Russian Empire/Soviet Union throughout his life. He died in Petrograd/Leningrad in 1924 with no evidence of forced displacement or voluntary emigration outside Soviet borders.", "article_url": "https://esu.com.ua/article-2465", "bio": "КРА&#769;ВЧЕНКО Василь Олексі­йович (сценіч.&nbsp;— Даверін; бл. 1865&nbsp;— 25. 03. 1924, Петро­град, нині С.-Пе­тербург)&nbsp;— спів­ак (тенор), режисер. 1891–96&nbsp;— соліст Київ., 1896–1917&nbsp;— Маріїн. (Петро­град; водночас від 1906&nbsp;— реж.) опер. Спів­ав також у Рос. опер. товаристві І. Прянишникова (Москва). Пропагував українські народні пісні та камерну літературу укр. і рос. композиторів. Додаткові відомості Основні партії Боян («Руслан і Людмила» М. Глінки), Бомелій, Сопель («Царева наречена», «Садко» М. Римського-Кор­сакова), Родріґо («Отелло» Дж. Верді), Єрошка («Князь Ігор» О. Бородіна), Чаплинський («Пікова дама» П. Чайковського), Брабантський дворянин («Лоенґрін» Р. Ваґнера). Рекомендована література В. А. Кравченко-Даверин (некро­лог) // Ленингр. правда. 1924, 30 марта. Google Scholar Internet Вибрати все Експортувати в TXT Експортувати в CSV Експортувати в JSON Завантажити статтю"}, {"idx": 33, "name": "Кузнецова Марія Миколаївна", "birth_year": "1880.0", "death_year": "1966.0", "migration_status": "migrated", "reasoning": "Mariya Kuznetsova was born in Odesa (Ukrainian territory) in 1880 and voluntarily left the Soviet Union in 1918, establishing herself permanently in Paris from 1919 onwards, where she founded a Russian private opera company and spent her final years until her death in 1966. This represents voluntary emigration and permanent settlement outside Soviet/post-Soviet borders.", "article_url": "https://esu.com.ua/article-1471", "bio": "КУЗНЕЦО&#769;ВА Марія Миколаївна (за чоловіками&nbsp;— Кузнецова-Бенуа, -Каре­панова, -Мас­сне; 1880, Одеса&nbsp;— 26. 04. 1966, Париж)&nbsp;— спів­ачка (ліричне сопра
